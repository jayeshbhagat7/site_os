    // ============================================
    // SUPABASE CONFIGURATION
    // ============================================
   const SUPABASE_URL = 'https://nixusvqbslokiexxxtic.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5peHVzdnFic2xva2lleHh4dGljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4ODM0NzIsImV4cCI6MjA4ODQ1OTQ3Mn0.DyFJ48Iryl5cSKB1fZbuNdcge30y0vevEKaR2UyKaLQ';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============================================
    // UTILITY: Safe Async Operations
    // ============================================
    const safeAsync = async (operation, fallback = null) => {
      try {
        const result = await operation();
        return { data: result, error: null };
      } catch (error) {
        console.error('Safe async error:', error);
        return { data: fallback, error };
      }
    };

    // ============================================
    // AUTH WRAPPER
    // ============================================
    function AuthGate({ children }) {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [authMode, setAuthMode] = useState('login');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');

      useEffect(() => {
        // Check active session
        supabase.auth.getSession().then(({ data: { session } }) => {
          setUser(session?.user ?? null);
          setLoading(false);
        });

        // Listen for auth changes
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setUser(session?.user ?? null);
        });

        return () => subscription.unsubscribe();
      }, []);

      const handleAuth = async (e) => {
        e.preventDefault();
        setError('');
        
        const { data, error: authError } = authMode === 'login'
          ? await supabase.auth.signInWithPassword({ email, password })
          : await supabase.auth.signUp({ email, password });

        if (authError) {
          setError(authError.message);
        }
      };

      const handleSignOut = async () => {
        await supabase.auth.signOut();
      };

      if (loading) {
        return (
          <div className="min-h-screen bg-slate-900 flex items-center justify-center">
            <div className="text-white text-xl">Loading...</div>
          </div>
        );
      }

      if (!user) {
        return (
          <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
            <div className="bg-slate-800 p-8 rounded-lg shadow-xl max-w-md w-full">
              <h1 className="text-3xl font-bold text-white mb-6 text-center">
                SiteOS
                <span className="block text-sm text-slate-400 mt-1">Construction ERP</span>
              </h1>
              
              <form onSubmit={handleAuth} className="space-y-4">
                <input
                  type="email"
                  placeholder="Email"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  className="w-full px-4 py-2 bg-slate-700 text-white rounded border border-slate-600 focus:border-blue-500 focus:outline-none"
                  required
                />
                <input
                  type="password"
                  placeholder="Password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  className="w-full px-4 py-2 bg-slate-700 text-white rounded border border-slate-600 focus:border-blue-500 focus:outline-none"
                  required
                />
                
                {error && (
                  <div className="text-red-400 text-sm bg-red-900/20 p-2 rounded">
                    {error}
                  </div>
                )}
                
                <button
                  type="submit"
                  className="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded font-medium transition"
                >
                  {authMode === 'login' ? 'Sign In' : 'Sign Up'}
                </button>
                
                <button
                  type="button"
                  onClick={() => setAuthMode(authMode === 'login' ? 'signup' : 'login')}
                  className="w-full text-blue-400 hover:text-blue-300 text-sm transition"
                >
                  {authMode === 'login' ? 'Need an account? Sign up' : 'Have an account? Sign in'}
                </button>
              </form>
            </div>
          </div>
        );
      }

      return children({ user, handleSignOut });
    }

    // ============================================
    // MAIN APP
    // ============================================
    function SiteOS({ user, handleSignOut }) {
      const [currentView, setCurrentView] = useState('workers');
      const [currentSite, setCurrentSite] = useState('all');
      const [workers, setWorkers] = useState([]);
      const [sites, setSites] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showNewWorker, setShowNewWorker] = useState(false);
      const [showGTVModal, setShowGTVModal] = useState(false);
      const [selectedWorker, setSelectedWorker] = useState(null);

      // ============================================
      // FETCH SITES
      // ============================================
      const fetchSites = async () => {
        const { data, error } = await supabase
          .from('sites')
          .select('*')
          .eq('user_id', user.id)
          .order('name');
        
        if (!error && data) {
          setSites(data);
        }
      };

      // ============================================
      // FETCH WORKERS
      // ============================================
      const fetchWorkers = async () => {
        setLoading(true);
        
        let query = supabase
          .from('workers')
          .select('*')
          .eq('user_id', user.id);
        
        if (currentSite !== 'all') {
          query = query.eq('site_id', currentSite);
        }
        
        const { data, error } = await query.order('name');
        
        if (!error && data) {
          setWorkers(data);
        } else if (error) {
          console.error('Error fetching workers:', error);
        }
        
        setLoading(false);
      };

      useEffect(() => {
        fetchSites();
        fetchWorkers();
      }, [currentSite, user.id]);

      // ============================================
      // WORKER STATS
      // ============================================
      const stats = useMemo(() => {
        const active = workers.filter(w => w.status === 'active').length;
        const gtv = workers.filter(w => w.status === 'gtv').length;
        const left = workers.filter(w => w.status === 'left').length;
        return { active, gtv, left };
      }, [workers]);

      // ============================================
      // GTV MODAL COMPONENT
      // ============================================
      const GTVModal = () => {
        const [gtvDate, setGtvDate] = useState(new Date().toISOString().split('T')[0]);
        const [promiseDate, setPromiseDate] = useState('');
        const [reason, setReason] = useState('');
        const [processing, setProcessing] = useState(false);

        const handleConfirmGTV = async () => {
          if (!gtvDate) return;
          
          setProcessing(true);

          const { error } = await supabase
            .from('workers')
            .update({
              status: 'gtv',
              gtv_date: gtvDate,
              gtv_promise_date: promiseDate || null,
              gtv_reason: reason || null,
              updated_at: new Date().toISOString()
            })
            .eq('id', selectedWorker.id);

          setProcessing(false);

          if (!error) {
            setShowGTVModal(false);
            setSelectedWorker(null);
            fetchWorkers();
          } else {
            console.error('GTV update error:', error);
            alert('Failed to mark worker as GTV');
          }
        };

        const canConfirmImmediately = workers.filter(
          w => w.id === selectedWorker?.id && w.attendance_sessions === 0
        ).length > 0;

        return (
          <div className="fixed inset-0 bg-black/50 blur-backdrop flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-lg shadow-xl max-w-md w-full p-6">
              <div className="flex justify-between items-start mb-4">
                <h2 className="text-xl font-bold text-slate-900">Mark Worker as GTV</h2>
                <button
                  onClick={() => {
                    setShowGTVModal(false);
                    setSelectedWorker(null);
                  }}
                  className="text-slate-400 hover:text-slate-600"
                >
                  ✕
                </button>
              </div>

              {selectedWorker && (
                <div className="mb-4 p-3 bg-orange-50 border border-orange-200 rounded">
                  <div className="font-medium text-slate-900">{selectedWorker.name}</div>
                  <div className="text-sm text-slate-600">
                    {selectedWorker.code} · {selectedWorker.trade} · ₹{selectedWorker.rate}/day
                  </div>
                </div>
              )}

              {!canConfirmImmediately && (
                <div className="mb-4 p-3 bg-amber-50 border border-amber-300 rounded text-sm text-amber-800">
                  ⚠️ <strong>Urgent / Unregistered GTV</strong> — bypasses advance registration workflow.
                  Attendance for days worker was present must be resolved before GTV is confirmed.
                </div>
              )}

              <div className="space-y-4 mb-6">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">
                    GTV DATE <span className="text-red-500">*</span>
                  </label>
                  <input
                    type="date"
                    value={gtvDate}
                    onChange={(e) => setGtvDate(e.target.value)}
                    className="w-full px-3 py-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    required
                  />
                </div>

                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">
                    PROMISE DATE (INFORMATIONAL)
                  </label>
                  <input
                    type="date"
                    value={promiseDate}
                    onChange={(e) => setPromiseDate(e.target.value)}
                    placeholder="mm/dd/yyyy"
                    className="w-full px-3 py-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none"
                  />
                  <div className="text-xs text-slate-500 mt-1">
                    Date worker said they will return
                  </div>
                </div>

                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">
                    REASON / NOTE (OPTIONAL)
                  </label>
                  <textarea
                    value={reason}
                    onChange={(e) => setReason(e.target.value)}
                    placeholder="e.g. Family emergency, urgent departure..."
                    rows={3}
                    className="w-full px-3 py-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none"
                  />
                </div>
              </div>

              {canConfirmImmediately && (
                <div className="mb-4 p-3 bg-green-50 border border-green-300 rounded text-sm text-green-800">
                  ✓ No unsubmitted attendance sessions found — GTV can be confirmed immediately.
                </div>
              )}

              <div className="flex gap-3">
                <button
                  onClick={() => {
                    setShowGTVModal(false);
                    setSelectedWorker(null);
                  }}
                  className="flex-1 px-4 py-2 border border-slate-300 text-slate-700 rounded hover:bg-slate-50 transition"
                  disabled={processing}
                >
                  Cancel
                </button>
                <button
                  onClick={handleConfirmGTV}
                  disabled={!gtvDate || processing}
                  className="flex-1 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
                >
                  {processing ? 'Processing...' : 'Confirm GTV'}
                </button>
              </div>
            </div>
          </div>
        );
      };

      // ============================================
      // WORKER CARD COMPONENT
      // ============================================
      const WorkerCard = ({ worker }) => {
        const siteName = sites.find(s => s.id === worker.site_id)?.name || 'Unknown Site';
        
        return (
          <div className="bg-white border border-slate-200 rounded-lg p-4 hover:shadow-md transition">
            <div className="flex justify-between items-start mb-2">
              <div>
                <div className="font-bold text-slate-900">{worker.name}</div>
                <div className="text-sm text-slate-600">
                  {worker.code} · {worker.trade}
                </div>
              </div>
              <div className={`px-2 py-1 rounded text-xs font-medium ${
                worker.status === 'active' ? 'bg-green-100 text-green-800' :
                worker.status === 'gtv' ? 'bg-orange-100 text-orange-800' :
                'bg-slate-100 text-slate-800'
              }`}>
                {worker.status.toUpperCase()}
              </div>
            </div>

            <div className="text-sm text-slate-600 mb-3">
              <div>{siteName}</div>
              <div className="font-medium text-slate-900">₹{worker.rate}/day</div>
            </div>

            <div className="flex gap-2">
              <button className="flex-1 px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded text-sm transition">
                Edit
              </button>
              {worker.status === 'active' && (
                <button
                  onClick={() => {
                    setSelectedWorker(worker);
                    setShowGTVModal(true);
                  }}
                  className="flex-1 px-3 py-1.5 bg-orange-100 hover:bg-orange-200 text-orange-700 rounded text-sm transition"
                >
                  GTV
                </button>
              )}
              <button className="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded text-sm transition">
                ID Card
              </button>
            </div>
          </div>
        );
      };

      // ============================================
      // MAIN RENDER
      // ============================================
      return (
        <div className="min-h-screen bg-slate-50">
          {/* HEADER */}
          <div className="bg-slate-900 text-white shadow-lg">
            <div className="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                  <span className="text-xl font-bold">S</span>
                </div>
                <div>
                  <h1 className="text-xl font-bold">SiteOS</h1>
                  <div className="text-xs text-slate-400">CONSTRUCTION ERP</div>
                </div>
              </div>
              <button
                onClick={handleSignOut}
                className="text-sm text-slate-300 hover:text-white transition"
              >
                🚪 Sign Out
              </button>
            </div>
          </div>

          <div className="max-w-7xl mx-auto px-4 py-6">
            {/* NAVIGATION */}
            <div className="mb-6 flex gap-2 overflow-x-auto pb-2">
              <button
                onClick={() => setCurrentView('dashboard')}
                className={`px-4 py-2 rounded whitespace-nowrap transition ${
                  currentView === 'dashboard'
                    ? 'bg-blue-600 text-white'
                    : 'bg-white text-slate-700 hover:bg-slate-100'
                }`}
              >
                Dashboard
              </button>
              <button
                onClick={() => setCurrentView('workers')}
                className={`px-4 py-2 rounded whitespace-nowrap transition ${
                  currentView === 'workers'
                    ? 'bg-blue-600 text-white'
                    : 'bg-white text-slate-700 hover:bg-slate-100'
                }`}
              >
                Workers
              </button>
              <button
                onClick={() => setCurrentView('attendance')}
                className={`px-4 py-2 rounded whitespace-nowrap transition ${
                  currentView === 'attendance'
                    ? 'bg-blue-600 text-white'
                    : 'bg-white text-slate-700 hover:bg-slate-100'
                }`}
              >
                Attendance
              </button>
            </div>

            {/* WORKERS VIEW */}
            {currentView === 'workers' && (
              <>
                {/* HEADER WITH FILTERS */}
                <div className="bg-white rounded-lg shadow p-4 mb-6">
                  <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4">
                    <div>
                      <h2 className="text-2xl font-bold text-slate-900">Workers</h2>
                      <div className="text-sm text-slate-600">
                        {stats.active} active · {stats.gtv} GTV · {stats.left} left
                      </div>
                    </div>
                    <button
                      onClick={() => setShowNewWorker(true)}
                      className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-medium transition"
                    >
                      + New Registration
                    </button>
                  </div>

                  {/* SITE FILTER */}
                  <select
                    value={currentSite}
                    onChange={(e) => setCurrentSite(e.target.value)}
                    className="w-full sm:w-auto px-4 py-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 focus:outline-none"
                  >
                    <option value="all">All Sites</option>
                    {sites.map(site => (
                      <option key={site.id} value={site.id}>{site.name}</option>
                    ))}
                  </select>
                </div>

                {/* WORKERS GRID */}
                {loading ? (
                  <div className="text-center py-12 text-slate-600">Loading workers...</div>
                ) : workers.length === 0 ? (
                  <div className="bg-white rounded-lg shadow p-12 text-center text-slate-600">
                    No workers found
                  </div>
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    {workers.map(worker => (
                      <WorkerCard key={worker.id} worker={worker} />
                    ))}
                  </div>
                )}
              </>
            )}

            {/* DASHBOARD VIEW */}
            {currentView === 'dashboard' && (
              <div className="bg-white rounded-lg shadow p-6">
                <h2 className="text-2xl font-bold text-slate-900 mb-4">Dashboard</h2>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="p-4 bg-green-50 border border-green-200 rounded">
                    <div className="text-sm text-green-600 font-medium">Active Workers</div>
                    <div className="text-3xl font-bold text-green-900">{stats.active}</div>
                  </div>
                  <div className="p-4 bg-orange-50 border border-orange-200 rounded">
                    <div className="text-sm text-orange-600 font-medium">GTV</div>
                    <div className="text-3xl font-bold text-orange-900">{stats.gtv}</div>
                  </div>
                  <div className="p-4 bg-slate-50 border border-slate-200 rounded">
                    <div className="text-sm text-slate-600 font-medium">Left</div>
                    <div className="text-3xl font-bold text-slate-900">{stats.left}</div>
                  </div>
                </div>
              </div>
            )}

            {/* ATTENDANCE VIEW */}
            {currentView === 'attendance' && (
              <div className="bg-white rounded-lg shadow p-6">
                <h2 className="text-2xl font-bold text-slate-900 mb-4">Attendance</h2>
                <p className="text-slate-600">Attendance module coming soon...</p>
              </div>
            )}
          </div>

          {/* GTV MODAL */}
          {showGTVModal && <GTVModal />}
        </div>
      );
    }

    // ============================================
    // ROOT RENDER
    // ============================================
    function App() {
      return (
        <AuthGate>
          {({ user, handleSignOut }) => (
            <SiteOS user={user} handleSignOut={handleSignOut} />
          )}
        </AuthGate>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>

const Dashboard = () => {
  const [s,setS] = useState(null);

  useEffect(()=>{
    (async()=>{
      const [{count:aw},{count:gtv},{count:activeSites},{count:stores},{data:mats},{count:users}] = await Promise.all([
        sb.from("workers").select("*",{count:"exact",head:true}).eq("status","Active"),
        sb.from("workers").select("*",{count:"exact",head:true}).eq("status","GTV"),
        sb.from("sites").select("*",{count:"exact",head:true}).eq("is_active",true),
        sb.from("stores").select("*",{count:"exact",head:true}).eq("is_active",true),
        sb.from("materials").select("moq,current_stock").eq("is_active",true),
        sb.from("app_users").select("*",{count:"exact",head:true}).eq("is_active",true),
      ]);
      const ls=(mats||[]).filter(m=>m.moq>0&&m.current_stock<m.moq).length;
      setS({aw:aw||0,gtv:gtv||0,activeSites:activeSites||0,stores:stores||0,ls,users:users||0});
      const {data:sd} = await sb.from("sites").select("*").eq("is_active",true).order("site_name");
      setSites(sd||[]);

  if(!s) return <Spinner/>;

  return <div>

    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:14,marginBottom:24}}>

      <Stat title="On GTV" value={s.gtv} icon={I.worker} color={C.orange} sub="Gone to village"/>
      <Stat title="Active Sites" value={s.activeSites} icon={I.building} color={C.accent}/>
      <Stat title="Active Stores" value={s.stores} icon={I.store} color={C.cyan}/>
      <Stat title="System Users" value={s.users} icon={I.user} color={C.purple}/>
    </div>

    {sites.length===0
      ?<div style={{background:C.accentBg,border:"1px solid #BFDBFE",borderRadius:12,
          padding:"20px 24px",display:"flex",gap:14,alignItems:"flex-start"}}>
          <Ic d={I.alert} s={20} col={C.accent}/>
          <div>
            <p style={{margin:0,fontWeight:700,fontSize:14,color:C.accent}}>Getting Started</p>
            <p style={{margin:"6px 0 0",fontSize:13,color:"#1D4ED8",lineHeight:1.6}}>
              <b>Step 1:</b> Go to Masters → Sites → Add your project sites (WWC, Khar, Dahisar)<br/>
              <b>Step 2:</b> Masters → Stores → Add stores for each site (D5, E2, C3)<br/>
              <b>Step 3:</b> Masters → Users → Add team members (Jayesh, Sikhu, PP, Milton)<br/>
              <b>Step 4:</b> Masters → Workers → Add your labour force
            </p>
          </div>
        </div>
      :<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
          <p style={{margin:"0 0 14px",fontSize:13,fontWeight:700}}>Active Sites</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10}}>
            {sites.map(site=>(
              <div key={site.site_id} style={{padding:"12px 14px",background:"#F8FAFC",
                border:`1px solid ${C.border}`,borderRadius:9}}>
                <p style={{margin:0,fontWeight:800,fontSize:15}}>{site.site_name}</p>

// SITE MASTER
// ══════════════════════════════════════════════════════════════════
const SiteMaster = () => {
  const [data,setData]=useState([]); const [open,setOpen]=useState(false);
  const [editing,setEditing]=useState(null); const [form,setForm]=useState({});
  const [errs,setErrs]=useState({}); const [saving,setSaving]=useState(false);
  const {show,Toast}=useToast();
  const F=v=>setForm(f=>({...f,...v}));

  const load=useCallback(async()=>{
    const {data:d}=await sb.from("sites").select("*").order("site_name");
    setData(d||[]);
  },[]);
  useEffect(()=>{load();},[load]);

  const openAdd=()=>{setEditing(null);setForm({is_active:true});setErrs({});setOpen(true);};
  const openEdit=r=>{setEditing(r);setForm({...r});setErrs({});setOpen(true);};

  const save=async()=>{
    const e={};
    if(!form.site_name?.trim()) e.site_name="Required";
    if(Object.keys(e).length){setErrs(e);return;}
    setSaving(true);
    const p={site_name:form.site_name.trim(),site_code:form.site_code?.trim()||null,
      location:form.location||null,client_name:form.client_name||null,
      started_on:form.started_on||null,is_active:form.is_active!==false};
    const {error}=editing
      ?await sb.from("sites").update(p).eq("site_id",editing.site_id)
      :await sb.from("sites").insert(p);
    setSaving(false);
    if(error){show(error.message,"error");return;}
    show(editing?"Site updated":"Site added ✓");
    setOpen(false);load();
  };

  const cols=[
    {h:"Site Name",r:r=><span style={{fontWeight:800,fontSize:15}}>{r.site_name}</span>},
    {h:"Code",r:r=>r.site_code?<code style={{color:C.accent,fontWeight:700}}>{r.site_code}</code>:<span style={{color:C.faint}}>—</span>},
    {h:"Client",r:r=>r.client_name||<span style={{color:C.faint}}>—</span>},
    {h:"Location",r:r=>r.location||<span style={{color:C.faint}}>—</span>},
    {h:"Status",r:r=>r.is_active?<Badge color="green" dot>Active</Badge>:<Badge color="gray" dot>Inactive</Badge>},
    {h:"",r:r=><Btn size="sm" variant="secondary" onClick={()=>openEdit(r)}>Edit</Btn>},
  ];

  return <div>
    <Toast/>
    <PH title="Site Master" sub={`${data.filter(d=>d.is_active).length} active sites`}
      right={<Btn onClick={openAdd}><Ic d={I.plus} s={15} col="#fff"/>Add Site</Btn>}/>
    <Tbl cols={cols} rows={data} empty="No sites yet — add your first project site"/>
    <SlideOver open={open} onClose={()=>setOpen(false)}
      title={editing?"Edit Site":"Add Site"}>
      <Inp label="Site Name *" value={form.site_name||""} placeholder="e.g. WWC, Khar, Dahisar"
        onChange={e=>F({site_name:e.target.value})} error={errs.site_name}/>
      <Inp label="Site Code" value={form.site_code||""} placeholder="Short code e.g. WWC"
        hint="Used in reports and dropdowns"
        onChange={e=>F({site_code:e.target.value})}/>
      <Inp label="Client / Owner Name" value={form.client_name||""}
        onChange={e=>F({client_name:e.target.value})}/>
      <Inp label="Location" value={form.location||""} placeholder="e.g. Bhingarwadi, Pune"
        onChange={e=>F({location:e.target.value})}/>
      <Inp label="Started On" type="date" value={form.started_on||""}
        onChange={e=>F({started_on:e.target.value})}/>
      <Tog label="Site is Active" checked={form.is_active!==false}
        onChange={v=>F({is_active:v})}/>
      <div style={{display:"flex",gap:8,paddingTop:8}}>
        <Btn onClick={save} disabled={saving}>{saving?"Saving...":editing?"Save Changes":"Add Site"}</Btn>
        <Btn variant="ghost" onClick={()=>setOpen(false)}>Cancel</Btn>
      </div>
    </SlideOver>
  </div>;
};

const StoreMaster = () => {
  const [data,setData]=useState([]); const [sites,setSites]=useState([]);
  const [filterSite,setFilterSite]=useState(""); const [open,setOpen]=useState(false);
  const [editing,setEditing]=useState(null); const [form,setForm]=useState({});
  const [errs,setErrs]=useState({}); const [saving,setSaving]=useState(false);
  const {show,Toast}=useToast();
  const F=v=>setForm(f=>({...f,...v}));

  const load=useCallback(async()=>{
    const [{data:d},{data:s}]=await Promise.all([
      sb.from("stores").select("*,sites(site_name)").order("site_id").order("store_name"),
      sb.from("sites").select("site_id,site_name").eq("is_active",true).order("site_name"),
    ]);
    setData(d||[]);setSites(s||[]);
  },[]);
  useEffect(()=>{load();},[load]);

  const openAdd=()=>{setEditing(null);setForm({is_active:true,store_type:"Central Store"});setErrs({});setOpen(true);};
  const openEdit=r=>{setEditing(r);setForm({...r,site_id:r.site_id?.toString()});setErrs({});setOpen(true);};

  const save=async()=>{
    const e={};
    if(!form.store_name?.trim()) e.store_name="Required";
    if(!form.site_id) e.site_id="Select a site";
    if(!form.store_type) e.store_type="Required";
    if(Object.keys(e).length){setErrs(e);return;}
    setSaving(true);
    const p={store_name:form.store_name.trim(),site_id:parseInt(form.site_id),
      store_type:form.store_type,location_detail:form.location_detail||null,
      company_bank:form.company_bank||null,company_account_no:form.company_account_no||null,
      company_ifsc:form.company_ifsc||null,last_cheque_no:parseInt(form.last_cheque_no)||0,
      is_active:form.is_active!==false};
    const {error}=editing
      ?await sb.from("stores").update(p).eq("store_id",editing.store_id)
      :await sb.from("stores").insert(p);
    setSaving(false);
    if(error){show(error.message,"error");return;}
    show(editing?"Store updated":"Store added ✓");
    setOpen(false);load();
  };

  const filtered=filterSite?data.filter(d=>d.site_id===parseInt(filterSite)):data;
  const grouped=filtered.reduce((acc,s)=>{
    const k=s.sites?.site_name||"Unknown";
    (acc[k]=acc[k]||[]).push(s);return acc;
  },{});

  const cols=[
    {h:"Store",r:r=><span style={{fontWeight:700,fontSize:15}}>{r.store_name}</span>},
    {h:"Type",r:r=><Badge color={r.store_type==="Central Store"?"blue":"cyan"}>{r.store_type}</Badge>},
    {h:"Location",r:r=>r.location_detail||<span style={{color:C.faint}}>—</span>},
    {h:"Status",r:r=>r.is_active?<Badge color="green" dot>Active</Badge>:<Badge color="gray" dot>Inactive</Badge>},
    {h:"",r:r=><Btn size="sm" variant="secondary" onClick={()=>openEdit(r)}>Edit</Btn>},
  ];

  return <div>
    <Toast/>
    <PH title="Store Master" sub="Central stores and substores per site"
      right={<>
        <select value={filterSite} onChange={e=>setFilterSite(e.target.value)}
          style={{padding:"7px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,
            fontSize:13,color:filterSite?C.text:C.muted,background:"#fff",fontFamily:"inherit"}}>
          <option value="">All Sites</option>
          {sites.map(s=><option key={s.site_id} value={s.site_id}>{s.site_name}</option>)}
        </select>
        <Btn onClick={openAdd}><Ic d={I.plus} s={15} col="#fff"/>Add Store</Btn>
      </>}/>

    {sites.length===0&&(
      <div style={{padding:16,background:C.accentBg,borderRadius:10,
        border:"1px solid #BFDBFE",marginBottom:16,fontSize:13,color:"#1D4ED8"}}>
        ⚠ Please create Sites first, then add Stores to them.
      </div>
    )}

    {Object.keys(grouped).length===0
      ?<Tbl cols={cols} rows={[]} empty="No stores yet — add stores after creating sites"/>
      :Object.entries(grouped).map(([siteName,strs])=>(
        <div key={siteName} style={{marginBottom:24}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <Ic d={I.building} s={15} col={C.muted}/>
            <span style={{fontWeight:700,fontSize:14}}>{siteName}</span>
            <Badge color="gray">{strs.length} store{strs.length!==1?"s":""}</Badge>
          </div>
          <Tbl cols={cols} rows={strs}/>
        </div>
      ))
    }

    <SlideOver open={open} onClose={()=>setOpen(false)}
      title={editing?"Edit Store":"Add Store"}>
      <Sel label="Site *" value={form.site_id||""} error={errs.site_id}
        options={sites.map(s=>({v:s.site_id,l:s.site_name}))}
        onChange={e=>F({site_id:e.target.value})}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="Store Name *" value={form.store_name||""} placeholder="e.g. D5, E2, Main"
          hint="Same name OK in different sites"
          onChange={e=>F({store_name:e.target.value})} error={errs.store_name}/>
        <Sel label="Store Type *" value={form.store_type||""}
          options={["Central Store","Substore"]}
          onChange={e=>F({store_type:e.target.value})} error={errs.store_type}/>
      </div>
      <Inp label="Location Detail" value={form.location_detail||""}
        placeholder="e.g. Ground Floor, Tower 3"
        onChange={e=>F({location_detail:e.target.value})}/>
      <Divider label="Bank Details (for Salary Letters)"/>
      <Inp label="Bank Name" value={form.company_bank||""} placeholder="e.g. Bank of Baroda"
        onChange={e=>F({company_bank:e.target.value})}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="Account Number" value={form.company_account_no||""}
          onChange={e=>F({company_account_no:e.target.value})}/>
        <Inp label="IFSC Code" value={form.company_ifsc||""}
          onChange={e=>F({company_ifsc:e.target.value})}/>
      </div>
      <Tog label="Store is Active" checked={form.is_active!==false} onChange={v=>F({is_active:v})}/>
      <div style={{display:"flex",gap:8,paddingTop:8}}>
        <Btn onClick={save} disabled={saving}>{saving?"Saving...":editing?"Save Changes":"Add Store"}</Btn>
        <Btn variant="ghost" onClick={()=>setOpen(false)}>Cancel</Btn>
      </div>
    </SlideOver>
  </div>;
};

// ══════════════════════════════════════════════════════════════════
const UserMaster = () => {
  const [data,setData]=useState([]); const [sites,setSites]=useState([]);
  const [search,setSearch]=useState(""); const [open,setOpen]=useState(false);
  const [editing,setEditing]=useState(null); const [form,setForm]=useState({});
  const [errs,setErrs]=useState({}); const [saving,setSaving]=useState(false);
  const {show,Toast}=useToast();
  const F=v=>setForm(f=>({...f,...v}));
  const ROLES=["Owner","SIC","Supervisor","Storekeeper","Office","Admin"];
  const ALL_SITE_ROLES=["Owner","Admin","Office"];

  const load=useCallback(async()=>{
    const [{data:u},{data:s}]=await Promise.all([
      sb.from("app_users").select("*,sites(site_name)").order("name"),
      sb.from("sites").select("site_id,site_name").eq("is_active",true).order("site_name"),
    ]);
    setData(u||[]);setSites(s||[]);
  },[]);
  useEffect(()=>{load();},[load]);

  const openAdd=()=>{setEditing(null);setForm({is_active:true});setErrs({});setOpen(true);};
  const openEdit=r=>{setEditing(r);setForm({...r,assigned_site_id:r.assigned_site_id?.toString()});setErrs({});setOpen(true);};

  const save=async()=>{
    const e={};
    if(!form.name?.trim()) e.name="Required";
    if(!form.role) e.role="Required";
    if(Object.keys(e).length){setErrs(e);return;}
    setSaving(true);
    const p={name:form.name.trim(),email:form.email||null,phone:form.phone||null,
      role:form.role,
      assigned_site_id:(!ALL_SITE_ROLES.includes(form.role)&&form.assigned_site_id)?parseInt(form.assigned_site_id):null,
      is_active:form.is_active!==false};
    const {error}=editing
      ?await sb.from("app_users").update(p).eq("user_id",editing.user_id)
      :await sb.from("app_users").insert(p);
    setSaving(false);
    if(error){show(error.message,"error");return;}
    show(editing?"User updated":"User added ✓");
    setOpen(false);load();
  };

  const filtered=data.filter(d=>!search||
    d.name.toLowerCase().includes(search.toLowerCase())||
    d.role.toLowerCase().includes(search.toLowerCase()));

  const cols=[
    {h:"Name",r:r=>(
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:32,height:32,borderRadius:"50%",flexShrink:0,
          background:C[(roleColor[r.role]||"gray")+"Bg"]||"#F1F5F9",
          display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:13,fontWeight:800,color:C[roleColor[r.role]]||C.muted}}>
            {r.name[0].toUpperCase()}
          </span>
        </div>
        <div>
          <p style={{margin:0,fontWeight:700}}>{r.name}</p>
          {r.phone&&<p style={{margin:0,fontSize:11,color:C.muted}}>{r.phone}</p>}
        </div>
      </div>
    )},
    {h:"Role",r:r=><Badge color={roleColor[r.role]||"gray"}>{r.role}</Badge>},
    {h:"Site Access",r:r=>ALL_SITE_ROLES.includes(r.role)
      ?<span style={{fontSize:12,color:C.muted}}>All Sites</span>
      :r.sites?.site_name||<span style={{color:C.red,fontSize:12}}>Not assigned</span>},
    {h:"Status",r:r=>r.is_active?<Badge color="green" dot>Active</Badge>:<Badge color="gray" dot>Inactive</Badge>},
    {h:"",r:r=><Btn size="sm" variant="secondary" onClick={()=>openEdit(r)}>Edit</Btn>},
  ];

  return <div>
    <Toast/>
    <PH title="Users & Roles" sub="All system users"
      right={<Btn onClick={openAdd}><Ic d={I.plus} s={15} col="#fff"/>Add User</Btn>}/>
    <div style={{background:C.accentBg,border:"1px solid #BFDBFE",borderRadius:10,
      padding:"12px 16px",marginBottom:16,display:"flex",flexWrap:"wrap",gap:8}}>
      {ROLES.map(r=>(
        <div key={r} style={{display:"flex",alignItems:"center",gap:5}}>
          <Badge color={roleColor[r]||"gray"}>{r}</Badge>
          <span style={{fontSize:11,color:"#1D4ED8"}}>{roleDesc[r]}</span>
        </div>
      ))}
    </div>
    <div style={{marginBottom:14}}><Search value={search} onChange={setSearch} placeholder="Search name or role..."/></div>
    <Tbl cols={cols} rows={filtered} empty="No users yet — add your first user"/>

    <SlideOver open={open} onClose={()=>setOpen(false)}
      title={editing?"Edit User":"Add User"}>
      <Inp label="Full Name *" value={form.name||""} placeholder="e.g. Jayesh Bhagat"
        onChange={e=>F({name:e.target.value})} error={errs.name}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="Phone" value={form.phone||""} placeholder="Mobile number"
          onChange={e=>F({phone:e.target.value})}/>
        <Inp label="Email" type="email" value={form.email||""}
          onChange={e=>F({email:e.target.value})}/>
      </div>
      <Sel label="Role *" value={form.role||""} options={ROLES}
        onChange={e=>F({role:e.target.value})} error={errs.role}/>
      {form.role&&<div style={{background:C.accentBg,border:"1px solid #BFDBFE",
        borderRadius:8,padding:"10px 14px",marginBottom:14}}>
        <p style={{margin:0,fontSize:12,color:"#1D4ED8",fontWeight:600}}>{roleDesc[form.role]}</p>
      </div>}
      {form.role&&!ALL_SITE_ROLES.includes(form.role)&&(
        <Sel label="Assigned Site" value={form.assigned_site_id||""}
          options={sites.map(s=>({v:s.site_id,l:s.site_name}))}
          onChange={e=>F({assigned_site_id:e.target.value})}/>
      )}
      {form.role&&ALL_SITE_ROLES.includes(form.role)&&(
        <div style={{background:"#F0FDF4",border:"1px solid #BBF7D0",
          borderRadius:8,padding:"10px 14px",marginBottom:14}}>
          <p style={{margin:0,fontSize:12,color:C.green}}>
            <b>{form.role}</b> has access to all sites automatically.
          </p>
        </div>
      )}
      <Tog label="User is Active" checked={form.is_active!==false} onChange={v=>F({is_active:v})}/>
      <div style={{display:"flex",gap:8,paddingTop:8}}>
        <Btn onClick={save} disabled={saving}>{saving?"Saving...":editing?"Save Changes":"Add User"}</Btn>
        <Btn variant="ghost" onClick={()=>setOpen(false)}>Cancel</Btn>
      </div>
    </SlideOver>
  </div>;
};

// MATERIAL MASTER
// ══════════════════════════════════════════════════════════════════
const MaterialMaster = () => {
  const [data,setData]=useState([]); const [search,setSearch]=useState("");
  const [filterCat,setFilterCat]=useState(""); const [open,setOpen]=useState(false);
  const [editing,setEditing]=useState(null); const [form,setForm]=useState({});
  const [errs,setErrs]=useState({}); const [saving,setSaving]=useState(false);
  const [page,setPage]=useState(0); const PS=25;
  const {show,Toast}=useToast();
  const F=v=>setForm(f=>({...f,...v}));
  const CATS=["Cement","Steel","Timber","Tools","Consumables","Electrical","Plumbing","Safety","Hardware","Other"];
  const UNITS=["kg","nos","mtr","bag","ltr","set","pair","rmt","sqmt","ton","cft"];

  const load=useCallback(async()=>{
    const {data:d}=await sb.from("materials").select("*").order("material_name");
    setData(d||[]);
  },[]);
  useEffect(()=>{load();},[load]);

  const save=async()=>{
    const e={};
    if(!form.material_name?.trim()) e.material_name="Required";
    if(!form.category) e.category="Required";
    if(!form.unit) e.unit="Required";
    if(!form.material_type) e.material_type="Required";
    if(Object.keys(e).length){setErrs(e);return;}
    setSaving(true);
    const p={material_name:form.material_name.trim(),category:form.category,unit:form.unit,
      material_type:form.material_type,is_returnable:!!form.is_returnable,
      brand_or_make:form.brand_or_make||null,moq:parseFloat(form.moq)||0,
      current_stock:parseFloat(form.current_stock)||0,is_active:form.is_active!==false};
    const {error}=editing
      ?await sb.from("materials").update(p).eq("material_id",editing.material_id)
      :await sb.from("materials").insert(p);
    setSaving(false);
    if(error){show(error.message,"error");return;}
    show(editing?"Updated ✓":"Added ✓");setOpen(false);load();
  };

  const filtered=data.filter(d=>{
    if(filterCat&&d.category!==filterCat) return false;
    if(search&&!d.material_name.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });
  const paged=filtered.slice(page*PS,(page+1)*PS);

  const cols=[
    {h:"Material",r:r=><div>
      <span style={{fontWeight:700}}>{r.material_name}</span>
      {r.brand_or_make&&<span style={{color:C.faint,fontSize:11,marginLeft:6}}>{r.brand_or_make}</span>}
    </div>},
    {h:"Category",r:r=><Badge color="blue">{r.category}</Badge>},
    {h:"Unit",r:r=><Badge color="gray">{r.unit}</Badge>},
    {h:"Stock/MOQ",r:r=><div style={{display:"flex",alignItems:"center",gap:5}}>
      <span style={{fontWeight:600}}>{r.current_stock}</span>
      <span style={{color:C.faint}}>/{r.moq}</span>
      {r.moq>0&&r.current_stock<r.moq&&<Badge color="red">Low</Badge>}
    </div>},
    {h:"",r:r=><Btn size="sm" variant="secondary" onClick={()=>{setEditing(r);setForm({...r});setErrs({});setOpen(true);}}>Edit</Btn>},
  ];

  return <div>
    <Toast/>
    <PH title="Material Master"
      sub={`${data.filter(d=>d.is_active).length} active, ${data.filter(d=>d.moq>0&&d.current_stock<d.moq).length} low stock`}
      right={<Btn onClick={()=>{setEditing(null);setForm({is_returnable:false,is_active:true,moq:0,current_stock:0});setErrs({});setOpen(true);}}>
        <Ic d={I.plus} s={15} col="#fff"/>Add Material</Btn>}/>
    <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
      <Search value={search} onChange={v=>{setSearch(v);setPage(0);}} placeholder="Search materials..."/>
      <select value={filterCat} onChange={e=>{setFilterCat(e.target.value);setPage(0);}}
        style={{padding:"8px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,
          fontSize:13,color:filterCat?C.text:C.muted,background:"#fff",fontFamily:"inherit"}}>
        <option value="">All Categories</option>
        {CATS.map(c=><option key={c} value={c}>{c}</option>)}
      </select>
    </div>
    <Tbl cols={cols} rows={paged} empty="No materials yet"/>
    <Pager page={page} total={filtered.length} size={PS} onChange={setPage}/>

    <SlideOver open={open} onClose={()=>setOpen(false)}
      title={editing?"Edit Material":"Add Material"}>
      <Inp label="Material Name *" value={form.material_name||""} placeholder="e.g. OPC Cement 53 Grade"
        onChange={e=>F({material_name:e.target.value})} error={errs.material_name}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Sel label="Category *" value={form.category||""} options={CATS}
          onChange={e=>F({category:e.target.value})} error={errs.category}/>
        <Sel label="Unit *" value={form.unit||""} options={UNITS}
          onChange={e=>F({unit:e.target.value})} error={errs.unit}/>
      </div>
      <Sel label="Material Type *" value={form.material_type||""}
        options={["Purchased","Client-Supplied","Tool"]}
        onChange={e=>F({material_type:e.target.value})} error={errs.material_type}/>
      <Inp label="Brand / Make" value={form.brand_or_make||""} placeholder="e.g. UltraTech, Tata"
        onChange={e=>F({brand_or_make:e.target.value})}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="MOQ" type="number" value={form.moq??0} onChange={e=>F({moq:e.target.value})}/>
        <Inp label="Current Stock" type="number" value={form.current_stock??0}
          onChange={e=>F({current_stock:e.target.value})}/>
      </div>
      <Tog label="Is Returnable (Tool/Equipment)" checked={!!form.is_returnable}
        onChange={v=>F({is_returnable:v})}/>
      <Tog label="Is Active" checked={form.is_active!==false} onChange={v=>F({is_active:v})}/>
      <div style={{display:"flex",gap:8,paddingTop:8}}>
        <Btn onClick={save} disabled={saving}>{saving?"Saving...":editing?"Save Changes":"Add Material"}</Btn>
        <Btn variant="ghost" onClick={()=>setOpen(false)}>Cancel</Btn>
      </div>
    </SlideOver>
  </div>;
};

// WORKER MASTER
// ══════════════════════════════════════════════════════════════════
const WorkerMaster = () => {
  const [data,setData]=useState([]); const [sites,setSites]=useState([]);
  const [stores,setStores]=useState([]); const [formStores,setFormStores]=useState([]);
  const [search,setSearch]=useState(""); const [fSite,setFSite]=useState("");
  const [fStatus,setFStatus]=useState(""); const [open,setOpen]=useState(false);
  const [editing,setEditing]=useState(null); const [form,setForm]=useState({});
  const [errs,setErrs]=useState({}); const [saving,setSaving]=useState(false);
  const [page,setPage]=useState(0); const PS=25;
  const {show,Toast}=useToast();
  const F=v=>setForm(f=>({...f,...v}));
  const TRADES=["Carpenter","Fitter","M/C","BRM","Supervisor","Engineer","Electrician","Storekeeper","Helper","Safety","Other"];
  const STATUS_COLOR={Active:"green",GTV:"orange",Transferred:"blue",Left:"red"};

  const load=useCallback(async()=>{
    const [{data:w},{data:s},{data:st}]=await Promise.all([
      sb.from("workers").select("*,sites(site_name),stores(store_name)").order("worker_name"),
      sb.from("sites").select("site_id,site_name").eq("is_active",true).order("site_name"),
      sb.from("stores").select("store_id,store_name,site_id").eq("is_active",true),
    ]);
    setData(w||[]);setSites(s||[]);setStores(st||[]);
  },[]);
  useEffect(()=>{load();},[load]);

  useEffect(()=>{
    if(form.current_site_id)
      setFormStores(stores.filter(s=>s.site_id===parseInt(form.current_site_id)));
    else setFormStores([]);
  },[form.current_site_id,stores]);

  const openAdd=()=>{setEditing(null);setForm({status:"Active",is_active:true,
    esic_eligible:true,worker_type:"Daily Wage",bank_account_type:"SB"});
    setErrs({});setOpen(true);};
  const openEdit=r=>{setEditing(r);setForm({...r,
    current_site_id:r.current_site_id?.toString(),
    current_store_id:r.current_store_id?.toString()});
    setErrs({});setOpen(true);};

  const save=async()=>{
    const e={};
    if(!form.worker_code?.trim()) e.worker_code="Required";
    if(!form.worker_name?.trim()) e.worker_name="Required";
    if(!form.trade) e.trade="Required";
    if(!form.per_day_rate&&form.per_day_rate!==0) e.per_day_rate="Required";
    if(Object.keys(e).length){setErrs(e);return;}
    setSaving(true);
    const p={worker_code:form.worker_code.trim(),worker_name:form.worker_name.trim(),
      trade:form.trade,worker_type:form.worker_type||"Daily Wage",
      aadhaar_number:form.aadhaar_number||null,pan_number:form.pan_number||null,
      bank_account:form.bank_account||null,bank_ifsc:form.bank_ifsc||null,
      bank_name:form.bank_name||null,bank_account_type:form.bank_account_type||"SB",
      is_bob_midc_branch:!!form.is_bob_midc_branch,
      esic_ip_number:form.esic_ip_number||null,esic_eligible:form.esic_eligible!==false,
      pf_uan_number:form.pf_uan_number||null,
      per_day_rate:parseFloat(form.per_day_rate)||0,
      current_site_id:form.current_site_id?parseInt(form.current_site_id):null,
      current_store_id:form.current_store_id?parseInt(form.current_store_id):null,
      status:form.status||"Active",
      gtv_date:form.status==="GTV"?form.gtv_date||null:null,
      date_joined:form.date_joined||null,
      minimum_wage_category:form.minimum_wage_category||"semi_skilled",
      is_active:form.is_active!==false};
    const {error}=editing
      ?await sb.from("workers").update(p).eq("id",editing.id)
      :await sb.from("workers").insert(p);
    setSaving(false);
    if(error){show(error.message,"error");return;}
    show(editing?"Updated ✓":"Worker added ✓");setOpen(false);load();
  };

  const filtered=data.filter(d=>{
    if(fSite&&d.current_site_id!==parseInt(fSite)) return false;
    if(fStatus&&d.status!==fStatus) return false;
    if(search&&!d.worker_name.toLowerCase().includes(search.toLowerCase())&&
      !d.worker_code.includes(search)) return false;
    return true;
  });
  const paged=filtered.slice(page*PS,(page+1)*PS);

  const cols=[
    {h:"Code",r:r=><code style={{fontWeight:700,color:C.accent}}>{r.worker_code}</code>},
    {h:"Name",r:r=><span style={{fontWeight:600}}>{r.worker_name}</span>},
    {h:"Trade",r:r=><Badge color="blue">{r.trade}</Badge>},
    {h:"Site",r:r=><div>
      <p style={{margin:0,fontSize:12,fontWeight:600}}>{r.sites?.site_name||"—"}</p>
      {r.stores?.store_name&&<p style={{margin:0,fontSize:11,color:C.muted}}>{r.stores.store_name}</p>}
    </div>},
    {h:"Rate",r:r=><span style={{fontWeight:600}}>₹{r.per_day_rate}</span>},
    {h:"Status",r:r=><div>
      <Badge color={STATUS_COLOR[r.status]||"gray"}>{r.status}</Badge>
      {r.status==="GTV"&&r.gtv_date&&<p style={{margin:"2px 0 0",fontSize:10,color:C.faint}}>{r.gtv_date}</p>}
    </div>},
    {h:"",r:r=><Btn size="sm" variant="secondary" onClick={()=>openEdit(r)}>Edit</Btn>},
  ];

  return <div>
    <Toast/>
    <PH title="Worker Master"
      sub={`${data.filter(d=>d.status==="Active").length} active · ${data.filter(d=>d.status==="GTV").length} GTV · ${data.length} total`}
      right={<Btn onClick={openAdd}><Ic d={I.plus} s={15} col="#fff"/>Add Worker</Btn>}/>
    <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
      <Search value={search} onChange={v=>{setSearch(v);setPage(0);}} placeholder="Search name or code..."/>
      <select value={fSite} onChange={e=>{setFSite(e.target.value);setPage(0);}}
        style={{padding:"8px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,
          fontSize:13,color:fSite?C.text:C.muted,background:"#fff",fontFamily:"inherit"}}>
        <option value="">All Sites</option>
        {sites.map(s=><option key={s.site_id} value={s.site_id}>{s.site_name}</option>)}
      </select>
      <select value={fStatus} onChange={e=>{setFStatus(e.target.value);setPage(0);}}
        style={{padding:"8px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,
          fontSize:13,color:fStatus?C.text:C.muted,background:"#fff",fontFamily:"inherit"}}>
        <option value="">All Status</option>
        {["Active","GTV","Transferred","Left"].map(s=><option key={s} value={s}>{s}</option>)}
      </select>
    </div>
    <Tbl cols={cols} rows={paged} empty="No workers yet"/>
    <Pager page={page} total={filtered.length} size={PS} onChange={setPage}/>

    <SlideOver open={open} onClose={()=>setOpen(false)}
      title={editing?"Edit Worker":"Add Worker"} width={540}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="Worker Code *" value={form.worker_code||""} placeholder="e.g. 1258"
          hint="Existing system code" error={errs.worker_code}
          onChange={e=>F({worker_code:e.target.value})}/>
        <Inp label="Full Name *" value={form.worker_name||""}
          onChange={e=>F({worker_name:e.target.value})} error={errs.worker_name}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Sel label="Trade *" value={form.trade||""} options={TRADES}
          onChange={e=>F({trade:e.target.value})} error={errs.trade}/>
        <Sel label="Worker Type" value={form.worker_type||"Daily Wage"}
          options={["Daily Wage","Fixed Salary","Contract"]}
          onChange={e=>F({worker_type:e.target.value})}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="Rate/Day (₹) *" type="number" value={form.per_day_rate||""}
          onChange={e=>F({per_day_rate:e.target.value})} error={errs.per_day_rate}/>
        <Sel label="Status" value={form.status||"Active"}
          options={["Active","GTV","Transferred","Left"]}
          onChange={e=>F({status:e.target.value})}/>
      </div>
      {form.status==="GTV"&&
        <Inp label="GTV Date" type="date" value={form.gtv_date||""}
          onChange={e=>F({gtv_date:e.target.value})}/>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Sel label="Assigned Site" value={form.current_site_id||""}
          options={sites.map(s=>({v:s.site_id,l:s.site_name}))}
          onChange={e=>F({current_site_id:e.target.value,current_store_id:""})}/>
        <Sel label="Assigned Store" value={form.current_store_id||""}
          placeholder={form.current_site_id?"— Select store —":"Select site first"}
          options={formStores.map(s=>({v:s.store_id,l:s.store_name}))}
          onChange={e=>F({current_store_id:e.target.value})}/>
      </div>
      <Inp label="Date Joined" type="date" value={form.date_joined||""}
        onChange={e=>F({date_joined:e.target.value})}/>
      <Divider label="Identity"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="Aadhaar" value={form.aadhaar_number||""}
          onChange={e=>F({aadhaar_number:e.target.value})}/>
        <Inp label="PAN" value={form.pan_number||""}
          onChange={e=>F({pan_number:e.target.value})}/>
      </div>
      <Divider label="Bank Details"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="Bank Name" value={form.bank_name||""}
          onChange={e=>F({bank_name:e.target.value})}/>
        <Sel label="Account Type" value={form.bank_account_type||"SB"} options={["SB","Current"]}
          onChange={e=>F({bank_account_type:e.target.value})}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="Account Number" value={form.bank_account||""}
          onChange={e=>F({bank_account:e.target.value})}/>
        <Inp label="IFSC Code" value={form.bank_ifsc||""}
          onChange={e=>F({bank_ifsc:e.target.value})}/>
      </div>
      <Tog label="BOB MIDC Branch" sub="Format 1 salary letter"
        checked={!!form.is_bob_midc_branch} onChange={v=>F({is_bob_midc_branch:v})}/>
      <Divider label="Statutory"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="ESIC IP No" value={form.esic_ip_number||""}
          onChange={e=>F({esic_ip_number:e.target.value})}/>
        <Inp label="PF UAN No" value={form.pf_uan_number||""}
          onChange={e=>F({pf_uan_number:e.target.value})}/>
      </div>
      <Tog label="ESIC Eligible" checked={form.esic_eligible!==false}
        onChange={v=>F({esic_eligible:v})}/>
      <Tog label="Worker is Active" checked={form.is_active!==false}
        onChange={v=>F({is_active:v})}/>
      <div style={{display:"flex",gap:8,paddingTop:8}}>
        <Btn onClick={save} disabled={saving}>{saving?"Saving...":editing?"Save Changes":"Add Worker"}</Btn>
        <Btn variant="ghost" onClick={()=>setOpen(false)}>Cancel</Btn>
      </div>
    </SlideOver>
  </div>;
};

// ══════════════════════════════════════════════════════════════════
// POLICY MASTER
// ══════════════════════════════════════════════════════════════════
const PolicyMaster = () => {
  const [policies,setPolicies]=useState([]); const [perms,setPerms]=useState([]);
  const [sel,setSel]=useState(null); const [saving,setSaving]=useState(false);
  const {show,Toast}=useToast();
  const MODULES=["Store","Labour","Payroll","Expense","DPR","Procurement","Compliance","Reports","Masters"];
  const ACTIONS=[{k:"can_view",l:"View"},{k:"can_add",l:"Add"},{k:"can_edit",l:"Edit"},
    {k:"can_delete",l:"Del"},{k:"can_export",l:"Export"},{k:"can_print",l:"Print"}];

  const load=useCallback(async()=>{
    const [{data:p},{data:pp}]=await Promise.all([
      sb.from("policy_master").select("*").order("policy_id"),
      sb.from("policy_permissions").select("*"),
    ]);
    setPolicies(p||[]);setPerms(pp||[]);
    if(p?.length&&!sel) setSel(p[0]);
  },[]);
  useEffect(()=>{load();},[load]);

  const getPerm=mod=>sel?perms.find(p=>p.policy_id===sel.policy_id&&p.module===mod)||{}:{};

  const toggle=async(mod,action)=>{
    if(!sel) return;
    const ex=getPerm(mod); setSaving(true);
    if(ex.id){
      await sb.from("policy_permissions").update({[action]:!ex[action]}).eq("id",ex.id);
    } else {
      await sb.from("policy_permissions").insert({policy_id:sel.policy_id,module:mod,[action]:true});
    }
    setSaving(false);show("Saved");load();
  };

  return <div>
    <Toast/>
    <PH title="Policy Master" sub="Role-based access control"/>
    <div style={{display:"grid",gridTemplateColumns:"180px 1fr",gap:16,alignItems:"start"}}>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {policies.map(p=>(
          <div key={p.policy_id} onClick={()=>setSel(p)}
            style={{padding:"11px 13px",borderRadius:9,cursor:"pointer",
              background:sel?.policy_id===p.policy_id?C.accentBg:C.card,
              border:`1.5px solid ${sel?.policy_id===p.policy_id?C.accent:C.border}`}}>
            <Badge color={roleColor[p.role_type]||"gray"}>{p.role_type}</Badge>
            <p style={{margin:"5px 0 0",fontSize:11,color:C.muted,lineHeight:1.4}}>{p.description}</p>
          </div>
        ))}
      </div>
      {sel&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
        <div style={{padding:"13px 16px",borderBottom:`1px solid ${C.border}`,
          display:"flex",alignItems:"center",gap:10}}>
          <h3 style={{margin:0,fontSize:14,fontWeight:800}}>{sel.policy_name}</h3>
          <Badge color={roleColor[sel.role_type]||"gray"}>{sel.role_type}</Badge>
          {saving&&<span style={{fontSize:11,color:C.faint,marginLeft:"auto"}}>Saving...</span>}
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{background:"#F8FAFC"}}>
                <th style={{padding:"9px 14px",textAlign:"left",fontWeight:700,fontSize:11,
                  textTransform:"uppercase",color:C.muted,borderBottom:`1px solid ${C.border}`}}>Module</th>
                {ACTIONS.map(a=><th key={a.k} style={{padding:"9px 10px",textAlign:"center",
                  fontWeight:700,fontSize:11,textTransform:"uppercase",color:C.muted,
                  borderBottom:`1px solid ${C.border}`}}>{a.l}</th>)}
              </tr>
            </thead>
            <tbody>
              {MODULES.map((mod,ri)=>{
                const perm=getPerm(mod);
                return <tr key={mod} style={{borderBottom:`1px solid ${C.border}`,
                  background:ri%2===0?"#fff":"#FAFAFA"}}>
                  <td style={{padding:"10px 14px",fontWeight:600}}>{mod}</td>
                  {ACTIONS.map(a=>(
                    <td key={a.k} style={{padding:"10px",textAlign:"center"}}>
                      <div onClick={()=>toggle(mod,a.k)}
                        style={{width:22,height:22,borderRadius:6,margin:"0 auto",cursor:"pointer",
                          background:perm[a.k]?C.accent:C.border,
                          display:"flex",alignItems:"center",justifyContent:"center",transition:"background .15s"}}>
                        {perm[a.k]&&<Ic d={I.check} s={12} col="#fff"/>}
                      </div>
                    </td>
                  ))}
                </tr>;
              })}
            </tbody>
          </table>
        </div>
      </div>}
    </div>
  </div>;
};

// ─── LOGIN ───────────────────────────────────────────────────────
const Login=({onLogin})=>{
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [showP,setShowP]=useState(false);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");

  const submit=async(e)=>{
    e.preventDefault();
    if(!email.trim()||!pass){setErr("Enter email and password");return;}
    setLoading(true);setErr("");
    try{
      const {data,error}=await sb.auth.signInWithPassword({email:email.trim(),password:pass});
      if(error)throw error;
      const {data:profile,error:pe}=await sb.from("app_users")
        .select("*,sites(site_name)").eq("auth_id",data.user.id).single();
      if(pe||!profile)throw new Error("User profile not found. Ask Admin to create your profile in app_users table.");
      if(!profile.is_active)throw new Error("Account deactivated. Contact Admin.");
      const {data:pol}=await sb.from("policy_master").select("policy_id").eq("role_type",profile.role).single();
      let perms=[];
      if(pol){const {data:pp}=await sb.from("policy_permissions").select("*").eq("policy_id",pol.policy_id);perms=pp||[];}
      onLogin({...profile,perms});
    }catch(e2){setErr(e2.message||"Login failed");}
    setLoading(false);
  };

  const iStyle={width:"100%",padding:"11px 14px",background:"rgba(255,255,255,.07)",
    border:"1.5px solid rgba(255,255,255,.1)",borderRadius:10,fontSize:14,
    color:"#F1F5F9",fontFamily:"inherit",outline:"none"};

  return <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0F172A 0%,#1E3A5F 60%,#0F172A 100%)",
    display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{width:"100%",maxWidth:380}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{width:58,height:58,background:C.accent,borderRadius:18,
          display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:12}}>
          <Ic d={I.building} s={28} col="#fff"/>
        </div>
        <h1 style={{margin:0,fontSize:24,fontWeight:900,color:"#F1F5F9"}}>SiteOS</h1>
        <p style={{margin:"3px 0 0",fontSize:11,color:"#475569",fontWeight:700,
          textTransform:"uppercase",letterSpacing:".12em"}}>Construction ERP</p>
      </div>
      <div style={{background:"rgba(255,255,255,.05)",backdropFilter:"blur(20px)",
        border:"1px solid rgba(255,255,255,.08)",borderRadius:20,padding:28}}>
        <h2 style={{margin:"0 0 4px",fontSize:17,fontWeight:800,color:"#F1F5F9"}}>Sign In</h2>
        <p style={{margin:"0 0 22px",fontSize:12,color:"#475569"}}>Use credentials provided by Admin</p>
        {err&&<div style={{background:"rgba(220,38,38,.15)",border:"1px solid rgba(220,38,38,.3)",
          borderRadius:9,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"flex-start",gap:8}}>
          <Ic d={I.alert} s={14} col="#FCA5A5"/>
          <span style={{fontSize:12,color:"#FCA5A5",fontWeight:600,lineHeight:1.5}}>{err}</span>
        </div>}
        <form onSubmit={submit}>
          <div style={{marginBottom:12}}>
            <label style={{display:"block",fontSize:10,fontWeight:700,color:"#64748B",
              marginBottom:4,textTransform:"uppercase",letterSpacing:".07em"}}>Email</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
              placeholder="you@example.com" autoComplete="email" style={iStyle}/>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{display:"block",fontSize:10,fontWeight:700,color:"#64748B",
              marginBottom:4,textTransform:"uppercase",letterSpacing:".07em"}}>Password</label>
            <div style={{position:"relative"}}>
              <input type={showP?"text":"password"} value={pass} onChange={e=>setPass(e.target.value)}
                placeholder="••••••••" autoComplete="current-password"

              <button type="button" onClick={()=>setShowP(s=>!s)}
                style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",
                  background:"none",border:"none",cursor:"pointer",color:"#64748B"}}>
                <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke="#64748B" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d={showP?"M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94 M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24 M1 1l22 22":"M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z M12 9a3 3 0 100 6 3 3 0 000-6z"}/>
                </svg>

// ─── APPROVALS MODULE ────────────────────────────────────────────
const Approvals=()=>{
  const {user}=useAuth();
  const [list,setList]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filter,setFilter]=useState("pending");
  const [sel,setSel]=useState(null);
  const [note,setNote]=useState("");
  const [rate,setRate]=useState("");
  const [saving,setSaving]=useState(false);
  const {show,Toast}=useToast();

  const typeLabel={debit_rate:"Debit Rate",worker_transfer:"Worker Transfer",
    material_request:"Material Request",salary_submission:"Salary Submission"};
  const typeColor={debit_rate:"red",worker_transfer:"blue",material_request:"orange",salary_submission:"green"};
  const statusColor={pending:"yellow",approved:"green",rejected:"red",cancelled:"gray"};

  const load=useCallback(async()=>{
    setLoading(true);
    let q=sb.from("approvals")
      .select("*,raiser:app_users!approvals_raised_by_fkey(name),sites(site_name)")
      .order("created_at",{ascending:false});
    if(filter!=="all") q=q.eq("status",filter);
    if(user.role==="SIC"&&user.assigned_site_id) q=q.eq("site_id",user.assigned_site_id);
    else if(user.role==="Office") q=q.eq("approver_role","Office");
    const {data}=await q;
    setList(data||[]);setLoading(false);
  },[filter,user]);
  useEffect(()=>{load();},[load]);

  const canAct=a=>a.status==="pending"&&(
    user.role==="Admin"||(a.approver_role==="SIC"&&user.role==="SIC")||
    (a.approver_role==="Office"&&user.role==="Office"));

  const approve=async()=>{
    if(!sel)return;
    if(sel.approval_type==="debit_rate"&&!rate){show("Enter debit rate","error");return;}
    setSaving(true);
    const pl=sel.approval_type==="debit_rate"?{...(sel.payload||{}),approved_rate:parseFloat(rate)}:sel.payload;
    await sb.from("approvals").update({status:"approved",approved_by:user.user_id,
      approved_at:new Date().toISOString(),payload:pl}).eq("id",sel.id);
    if(sel.approval_type==="worker_transfer"&&sel.payload?.worker_id){
      await sb.from("workers").update({current_site_id:sel.payload.to_site_id,
        current_store_id:null,status:"Active"}).eq("id",sel.payload.worker_id);
    }
    if(sel.approval_type==="debit_rate"&&sel.ref_id){
      await sb.from("worker_debit_log").update({status:"approved",
        debit_rate:parseFloat(rate),debit_amount:parseFloat(rate)*(sel.payload?.quantity||1)
      }).eq("id",sel.ref_id);
    }
    show("Approved ✓");setSel(null);setRate("");setNote("");load();setSaving(false);
  };

  const reject=async()=>{
    if(!note.trim()){show("Enter rejection reason","error");return;}
    setSaving(true);
    await sb.from("approvals").update({status:"rejected",approved_by:user.user_id,
      approved_at:new Date().toISOString(),rejection_note:note}).eq("id",sel.id);
    show("Rejected","warning");setSel(null);setNote("");load();setSaving(false);
  };

  const PayloadSummary=({a})=>{
    const p=a.payload||{};
    if(a.approval_type==="debit_rate") return <span style={{fontSize:12,color:C.muted}}>
      {p.worker_name} · {p.material_name} · Qty {p.quantity} {p.unit}
    </span>;
    if(a.approval_type==="worker_transfer") return <span style={{fontSize:12,color:C.muted}}>
      {p.worker_name}: {p.from_site} → {p.to_site} ({p.transfer_type})
    </span>;
    if(a.approval_type==="material_request") return <span style={{fontSize:12,color:C.muted}}>
      {(p.items||[]).slice(0,2).map((it,i)=>`${it.material_name} ×${it.qty_requested}`).join(", ")}
      {p.items?.length>2?` +${p.items.length-2} more`:""}
    </span>;
    if(a.approval_type==="salary_submission") return <span style={{fontSize:12,color:C.muted}}>
      {p.month} · {p.worker_count} workers · ₹{p.total_amount?.toLocaleString("en-IN")}
    </span>;
    return null;
  };

  return <div>
    <Toast/>
    <PH title="Approvals" sub="Pending actions and approval history"/>
    <div style={{display:"flex",gap:6,marginBottom:20,flexWrap:"wrap"}}>
      {["pending","approved","rejected","all"].map(f=>(
        <button key={f} onClick={()=>setFilter(f)}
          style={{padding:"6px 16px",borderRadius:99,border:`1.5px solid ${filter===f?C.accent:C.border}`,
            background:filter===f?C.accentBg:"#fff",color:filter===f?C.accent:C.muted,
            fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit",textTransform:"capitalize"}}>
          {f==="all"?"All":f}
        </button>
      ))}
    </div>
    {loading?<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"40vh",gap:10,color:C.muted}}>
        <div style={{width:18,height:18,border:`2px solid ${C.border}`,borderTopColor:C.accent,
          borderRadius:"50%",animation:"spin 1s linear infinite"}}/>Loading…
      </div>
      :list.length===0?<div style={{padding:"60px",textAlign:"center",color:C.faint}}>
          No {filter!=="all"?filter:""} approvals found
        </div>
      :<div style={{display:"flex",flexDirection:"column",gap:10}}>
        {list.map(a=>(
          <div key={a.id} style={{background:C.card,
            border:`1.5px solid ${a.status==="pending"?C.orange+"60":C.border}`,
            borderRadius:12,padding:"16px 20px"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:180}}>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
                  <Badge color={typeColor[a.approval_type]||"gray"}>{typeLabel[a.approval_type]||a.approval_type}</Badge>
                  <Badge color={statusColor[a.status]||"gray"} dot>{a.status}</Badge>
                  {a.sites?.site_name&&<Badge color="gray">{a.sites.site_name}</Badge>}
                </div>
                <p style={{margin:"0 0 3px",fontWeight:700}}>{a.payload?.title||"Approval Request"}</p>
                <PayloadSummary a={a}/>
                <p style={{margin:"5px 0 0",fontSize:11,color:C.faint}}>
                  By <b>{a.raiser?.name||"—"}</b> · {new Date(a.created_at).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})}
                </p>
                {a.rejection_note&&<p style={{margin:"4px 0 0",fontSize:12,color:C.red}}>Reason: {a.rejection_note}</p>}
                {a.payload?.approved_rate&&<p style={{margin:"4px 0 0",fontSize:12,color:C.green}}>Approved rate: ₹{a.payload.approved_rate}/unit</p>}
              </div>
              {canAct(a)&&<Btn size="sm" onClick={()=>{setSel(a);setNote("");setRate("");}}>Review</Btn>}
            </div>
          </div>
        ))}
      </div>
    }
    {sel&&<div style={{position:"fixed",inset:0,zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div onClick={()=>setSel(null)} style={{position:"absolute",inset:0,background:"rgba(15,23,42,.5)",backdropFilter:"blur(3px)"}}/>
      <div style={{position:"relative",width:Math.min(460,window.innerWidth-32),background:"#fff",
        borderRadius:16,boxShadow:"0 20px 60px rgba(0,0,0,.2)",overflow:"hidden"}}>
        <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.border}`,
          display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <h3 style={{margin:0,fontSize:16,fontWeight:800}}>Review Approval</h3>
          <button onClick={()=>setSel(null)} style={{background:"none",border:"none",cursor:"pointer",color:C.muted}}><Ic d={I.x}/></button>
        </div>
        <div style={{padding:"20px"}}>
          <div style={{background:"#F8FAFC",borderRadius:10,padding:"14px 16px",marginBottom:16}}>
            <Badge color={typeColor[sel.approval_type]||"gray"}>{typeLabel[sel.approval_type]}</Badge>
            <p style={{margin:"8px 0 4px",fontWeight:700}}>{sel.payload?.title}</p>
            <PayloadSummary a={sel}/>
          </div>
          {sel.approval_type==="debit_rate"&&(
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,
                marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>Set Debit Rate (₹/unit) *</label>
              <input type="number" value={rate} onChange={e=>setRate(e.target.value)} placeholder="Enter rate per unit"
                style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,
                  fontSize:14,color:C.text,background:"#fff",fontFamily:"inherit",outline:"none"}}/>
              <p style={{margin:"3px 0 0",fontSize:11,color:C.faint}}>
                Total debit = ₹{rate?(parseFloat(rate)*(sel.payload?.quantity||1)).toFixed(2):"—"}
              </p>
            </div>
          )}
          <div style={{marginBottom:16}}>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,
              marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>
              Rejection Reason <span style={{color:C.faint,textTransform:"none",fontWeight:400}}>(required if rejecting)</span>
            </label>
            <textarea value={note} onChange={e=>setNote(e.target.value)} rows={3}
              placeholder="Enter reason for rejection…"
              style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,
                borderRadius:8,fontSize:14,fontFamily:"inherit",resize:"vertical",outline:"none"}}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn variant="success" onClick={approve} disabled={saving}>
              <Ic d={I.check} s={14} col="#fff"/>Approve
            </Btn>
            <Btn variant="danger" onClick={reject} disabled={saving||!note.trim()}>
              <Ic d={I.x} s={14} col="#fff"/>Reject
            </Btn>
            <Btn variant="ghost" onClick={()=>setSel(null)}>Cancel</Btn>
          </div>
        </div>
      </div>
    </div>}
  </div>;
};

// ─── WORKER TRANSFER REQUEST ─────────────────────────────────────
const WorkerTransferModal=({open,onClose,worker,sites,user,onSubmit})=>{
  const [form,setForm]=useState({transfer_type:"permanent"});
  const [saving,setSaving]=useState(false);
  const {show,Toast}=useToast();
  if(!open||!worker)return null;

  const submit=async()=>{
    if(!form.to_site_id){show("Select destination site","error");return;}
    if(parseInt(form.to_site_id)===worker.current_site_id){show("Same site — pick different","error");return;}
    setSaving(true);
    const toSite=sites.find(s=>s.site_id===parseInt(form.to_site_id));
    const fromSite=sites.find(s=>s.site_id===worker.current_site_id);
    const {error}=await sb.from("approvals").insert({
      approval_type:"worker_transfer",status:"pending",raised_by:user.user_id,
      site_id:worker.current_site_id,approver_role:"SIC",
      payload:{worker_id:worker.id,worker_name:worker.worker_name,
        from_site_id:worker.current_site_id,from_site:fromSite?.site_name||"—",
        to_site_id:parseInt(form.to_site_id),to_site:toSite?.site_name||"—",
        transfer_type:form.transfer_type,notes:form.notes||"",
        title:`Transfer ${worker.worker_name} → ${toSite?.site_name}`},
      ref_id:worker.id,ref_table:"workers"
    });
    setSaving(false);
    if(error){show(error.message,"error");return;}
    show("Transfer request raised — awaiting SIC approval","warning");
    onClose();onSubmit&&onSubmit();
  };

  return <div style={{position:"fixed",inset:0,zIndex:55,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <Toast/>
    <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(15,23,42,.5)",backdropFilter:"blur(3px)"}}/>

      <div style={{padding:"20px"}}>
        <div style={{background:"#F8FAFC",borderRadius:10,padding:"12px 14px",marginBottom:16}}>
          <p style={{margin:0,fontWeight:700}}>{worker.worker_name} ({worker.worker_code})</p>
          <p style={{margin:"3px 0 0",fontSize:12,color:C.muted}}>
            Currently at: <b>{sites.find(s=>s.site_id===worker.current_site_id)?.site_name||"—"}</b>
          </p>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>Transfer To Site *</label>
          <select value={form.to_site_id||""} onChange={e=>setForm(f=>({...f,to_site_id:e.target.value}))}
            style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:14,color:form.to_site_id?C.text:C.muted,background:"#fff",fontFamily:"inherit"}}>
            <option value="">— Select site —</option>
            {sites.filter(s=>s.site_id!==worker.current_site_id).map(s=><option key={s.site_id} value={s.site_id}>{s.site_name}</option>)}
          </select>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>Transfer Type</label>
          <select value={form.transfer_type||"permanent"} onChange={e=>setForm(f=>({...f,transfer_type:e.target.value}))}
            style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:14,color:C.text,background:"#fff",fontFamily:"inherit"}}>
            <option value="permanent">Permanent</option>
