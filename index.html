                  <p style={{margin:0,fontSize:10,color:C.muted}}>{w.buildings.building_name}</p>}
              </td>

              {/* Trade */}
              <td style={{padding:"9px 12px"}}>
                <Badge color="blue">{w.trade||"—"}</Badge>
              </td>

              {/* Card */}
              <td style={{padding:"9px 12px",textAlign:"center"}}
                onClick={e=>e.stopPropagation()}>
                <button onClick={()=>openHaajriCard(w)}
                  title="View Haajri Card"
                  style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,
                    cursor:"pointer",padding:"5px 8px",fontSize:13,color:C.accent,
                    display:"inline-flex",alignItems:"center",gap:4}}>
                  📋
                </button>
              </td>
            </tr>;
          })}
        </tbody>
      </table>
    </div>

    {/* Absent summary strip */}
    {absentWorkers.length>0&&<div style={{marginTop:10,padding:"10px 14px",
      background:"#FEF2F2",borderRadius:10,border:"1px solid #fca5a5"}}>
      <p style={{margin:"0 0 6px",fontWeight:700,fontSize:12,color:"#dc2626"}}>
        ABSENT TODAY ({absentWorkers.length})
      </p>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
        {absentWorkers.map(w=>(
          <span key={w.id} style={{background:"#dc2626",color:"#fff",
            padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:600}}>
            {w.worker_code} · {w.worker_name}
          </span>
        ))}
      </div>
    </div>}

    {search&&filtered.length>0&&<p style={{margin:"8px 0 0",fontSize:11,color:C.muted,textAlign:"right"}}>
      Showing {filtered.length} of {workers.length} workers
    </p>}
  </div>;
};

const Attendance=()=>{
  const {user,perms,activeSiteId,assignedSiteIds,isUnrestricted}=useAuth();
  if(!hasPerm(perms,"Attendance","can_view"))return <NoAccess module="Attendance"/>;

  const isSK        = user.role==="Storekeeper";
  const isSIC       = ["SIC","Admin"].includes(user.role);
  const isSupervisor= user.role==="Supervisor"||user.role?.toLowerCase().includes("supervisor");
  // Fix 11: Trade-specific supervisor — extract trade from role name e.g. "Carpenter Supervisor"
  const supervisorTrade = isSupervisor&&user.role!=="Supervisor"
    ? user.role.replace(/\s*supervisor\s*/i,"").trim()  // "Carpenter Supervisor" → "Carpenter"
    : null; // null = can see all workers (generic Supervisor or SK/SIC)
  const canMark     = isSK||isSIC||hasPerm(perms,"Attendance","can_add");
  const canEnterHaajri = isSK||isSIC||isSupervisor;

  // ── State ─────────────────────────────────────────────────────
  const [sites,setSites]         = useState([]);
  const [buildings,setBuildings] = useState([]);
  const [selSite,setSelSite]     = useState("");
  const [selDate,setSelDate]     = useState(new Date().toISOString().split("T")[0]);
  const [session,setSession]     = useState(null);
  const [workers,setWorkers]     = useState([]);
  const [records,setRecords]     = useState({});
  const [assignments,setAssignments]=useState({});
  const [haajri,setHaajri]       = useState({});
  const [loading,setLoading]     = useState(false);
  const [saving,setSaving]       = useState(false);
  const [view,setView]           = useState("absent");
  const [bulkBldg,setBulkBldg]   = useState("");
  const [selWorkers,setSelWorkers]=useState(new Set());
  const [corrModal,setCorrModal] = useState(null);
  const [corrNote,setCorrNote]   = useState("");
  const [cardWorker,setCardWorker]=useState(null);
  const [cardMonth,setCardMonth] = useState(()=>new Date().toISOString().slice(0,7));
  const [monthRecs,setMonthRecs] = useState([]);
  const [cardLoading,setCardLoading]=useState(false);
  const [editHaajriDay,setEditHaajriDay]=useState(null);
  const [bulkCorrDate,setBulkCorrDate]=useState(()=>new Date().toISOString().split("T")[0]);
  const [bulkCorrSite,setBulkCorrSite]=useState("");
  const [bulkAbsent,setBulkAbsent] =useState([]);
  const [bulkSel,setBulkSel]       =useState(new Set());
  const [bulkCorrNote,setBulkCorrNote]=useState("");
  const [bulkCorrOpen,setBulkCorrOpen]=useState(false);
  const [bulkSaving,setBulkSaving]=useState(false);
  const {show,Toast}=useToast();

  // ── Load sites — scoped to assigned sites ─────────────────────
  useEffect(()=>{
    (async()=>{
      let q=sb.from("sites").select("site_id,site_name").eq("is_active",true).order("site_name");
      if(activeSiteId) q=q.eq("site_id",activeSiteId);
      else if(!isUnrestricted&&assignedSiteIds.length>0) q=q.in("site_id",assignedSiteIds);
      const {data:s}=await q;
      setSites(s||[]);
      if(activeSiteId){setSelSite(String(activeSiteId));setBulkCorrSite(String(activeSiteId));}
      else if(s&&s.length===1){setSelSite(String(s[0].site_id));setBulkCorrSite(String(s[0].site_id));}
    })();
  },[activeSiteId,assignedSiteIds]);

  // ── Load session when site+date changes ──────────────────────
  useEffect(()=>{if(!selSite||!selDate)return;loadSession();},[selSite,selDate]);

  // Clear stale building state immediately when site changes
  useEffect(()=>{
    setBuildings([]);
    setBulkBldg("");
    setView("absent");
    setSelWorkers(new Set());
    setAssignments({});
  },[selSite]);

  const fetchAll=async(q)=>{
    let all=[],from=0;
    while(true){
      const {data,error}=await q.range(from,from+999);
      if(error){console.error("fetchAll error:",error.message);break;}
      if(!data||data.length===0)break;
      all=[...all,...data];
      if(data.length<1000)break;
      from+=1000;
    }
    return all;
  };

  const loadSession=async()=>{
    setLoading(true);
    const siteId=parseInt(selSite);
    const {data:bl}=await sb.from("buildings").select("id,building_name,building_code").eq("site_id",siteId).eq("is_active",true).order("building_name");
    setBuildings(bl||[]);
    const w=await fetchAll(sb.from("workers").select("id,worker_code,worker_name,trade,per_day_rate,building_id").eq("current_site_id",siteId).eq("status","Active").eq("is_active",true).order("worker_name"));
    setWorkers(w);
    let {data:sess}=await sb.from("attendance_sessions").select("*").eq("site_id",siteId).eq("att_date",selDate).maybeSingle();
    if(!sess){const {data:ns}=await sb.from("attendance_sessions").insert({site_id:siteId,att_date:selDate,created_by:user.user_id,status:"draft"}).select().single();sess=ns;}
    setSession(sess);
    if(sess){
      const {data:rec}=await sb.from("attendance_records").select("*").eq("session_id",sess.id);
      const recMap={};(rec||[]).forEach(r=>{recMap[r.worker_id]=r;});
      const fullMap={};const hMap={};
      w.forEach(wk=>{
        fullMap[wk.id]=recMap[wk.id]||{is_present:true,worker_id:wk.id,session_id:sess.id,haajri:1.0,_new:true};
        hMap[wk.id]=String(recMap[wk.id]?.haajri??1.0);
      });
      setRecords(fullMap);setHaajri(hMap);
      const {data:asgn}=await sb.from("attendance_building_assignments").select("*").eq("session_id",sess.id);
      const asgnMap={};(asgn||[]).forEach(a=>{if(!asgnMap[a.worker_id])asgnMap[a.worker_id]=[];asgnMap[a.worker_id].push(a);});
      setAssignments(asgnMap);
    }
    setLoading(false);
  };

  // ── Toggle absent — SK CANNOT un-do an A after save ──────────
  const togglePresent=async(wk)=>{
    if(!canMark){show("No permission","error");return;}
    const rec=records[wk.id];
    const wasPresent=rec?.is_present!==false;
    // SK cannot change A→P on a saved (non-new) record
    if(isSK&&!wasPresent&&rec?.id&&!rec?._new){
      show("Absent mark is saved. Request SIC to correct.","error");return;
    }
    if(session?.status==="locked"&&!isSIC){show("Session locked — SIC correction required","error");return;}
    const newPresent=!wasPresent;
    setRecords(r=>({...r,[wk.id]:{...rec,is_present:newPresent,_dirty:true}}));
    // Reset haajri to 0 if marking absent
    if(!newPresent)setHaajri(h=>({...h,[wk.id]:"0"}));
    else setHaajri(h=>({...h,[wk.id]:"1.0"}));
  };

  // ── Bulk mark selected workers absent ────────────────────────
  const bulkMarkAbsent=(ids)=>{
    if(!canMark){show("No permission","error");return;}
    if(session?.status==="locked"&&!isSIC){show("Session locked — SIC correction required","error");return;}
    let count=0;
    setRecords(r=>{
      const next={...r};
      ids.forEach(wid=>{
        const rec=r[wid];
        const wasPresent=rec?.is_present!==false;
        if(!wasPresent)return; // already absent — skip
        const skLocked=isSK&&!wasPresent&&rec?.id&&!rec?._new;
        if(skLocked)return;
        next[wid]={...rec,is_present:false,_dirty:true};
        count++;
      });
      return next;
    });
    setHaajri(h=>{
      const next={...h};
      ids.forEach(wid=>{ next[wid]="0"; });
      return next;
    });
    if(count>0)show(`${count} worker${count>1?"s":""} marked absent`);
  };

  // ── Update haajri for a worker ────────────────────────────────
  const updateHaajri=(wid,val)=>{
    const rec=records[wid];
    // SK cannot edit haajri of absent worker
    if(isSK&&rec?.is_present===false){show("Cannot edit Haajri for absent worker","error");return;}
    setHaajri(h=>({...h,[wid]:val}));
    setRecords(r=>({...r,[wid]:{...r[wid],_dirty:true}}));
  };

  // ── SIC single correction ─────────────────────────────────────
  const applyCorrection=async()=>{
    if(!corrModal||!corrNote.trim()){show("Correction reason is required","error");return;}
    const {worker,record}=corrModal;
    if(!record.id){show("Save attendance first before correcting","error");return;}
    const newPresent=!record.is_present;
    const {error}=await sb.from("attendance_records").update({
      is_present:newPresent,haajri:newPresent?1.0:0,
      corrected_by:user.user_id,corrected_at:new Date().toISOString(),correction_note:corrNote,
    }).eq("id",record.id);
    if(error){show(error.message,"error");return;}
    setRecords(r=>({...r,[worker.id]:{...record,is_present:newPresent,haajri:newPresent?1.0:0}}));
    setHaajri(h=>({...h,[worker.id]:String(newPresent?1.0:0)}));
    show("Corrected ✓");setCorrModal(null);setCorrNote("");
  };

  // ── SIC Bulk correction — load absent workers for a date ──────
  const loadBulkAbsent=async()=>{
    if(!bulkCorrSite||!bulkCorrDate)return;
    const {data:sess}=await sb.from("attendance_sessions").select("id").eq("site_id",parseInt(bulkCorrSite)).eq("att_date",bulkCorrDate).maybeSingle();
    if(!sess){show("No attendance session found for this date","error");return;}
    const {data:recs}=await sb.from("attendance_records").select("*,workers(worker_name,worker_code,trade)").eq("session_id",sess.id).eq("is_present",false);
    setBulkAbsent(recs||[]);setBulkSel(new Set());
  };

  const applyBulkCorrection=async()=>{
    if(!bulkSel.size){show("Select at least one worker","error");return;}
    if(!bulkCorrNote.trim()){show("Correction reason is required","error");return;}
    setBulkSaving(true);
    const ids=[...bulkSel];
    const {error}=await sb.from("attendance_records").update({
      is_present:true,haajri:1.0,
      corrected_by:user.user_id,corrected_at:new Date().toISOString(),correction_note:bulkCorrNote,
    }).in("id",ids);
    setBulkSaving(false);
    if(error){show(error.message,"error");return;}
    show(`${ids.length} worker(s) corrected to Present ✓`,"success");
    setBulkAbsent(prev=>prev.filter(r=>!bulkSel.has(r.id)));
    setBulkSel(new Set());setBulkCorrNote("");
    // Refresh current session if same date/site
    if(bulkCorrSite===selSite&&bulkCorrDate===selDate)loadSession();
  };

  // ── Haajri Card — load month records for one worker ───────────
  const openHaajriCard=async(wk)=>{
    setCardWorker(wk);setCardLoading(true);
    const [yr,mo]=cardMonth.split("-");
    const from=`${yr}-${mo}-01`;
    const lastDay=new Date(parseInt(yr),parseInt(mo),0).getDate();
    const to=`${yr}-${mo}-${String(lastDay).padStart(2,"0")}`;
    const {data:recs}=await sb.from("attendance_records").select("*").eq("worker_id",wk.id).gte("att_date",from).lte("att_date",to).order("att_date");
    // Also fetch building assignments for this worker in this month
    const {data:bAssign}=await sb.from("attendance_building_assignments")
      .select("*,buildings(building_name,building_code)")
      .eq("worker_id",wk.id).gte("att_date",from).lte("att_date",to);
    // Merge building data into recs
    const bMap={};
    (bAssign||[]).forEach(a=>{
      if(!bMap[a.att_date])bMap[a.att_date]=[];
      bMap[a.att_date].push(a);
    });
    const enriched=(recs||[]).map(r=>({...r,_buildings:bMap[r.att_date]||[]}));
    setMonthRecs(enriched);setCardLoading(false);
  };

  const saveHaajriDay=async()=>{
    if(!editHaajriDay)return;
    const {rec,val}=editHaajriDay;
    const h=parseFloat(val)||0;
    // SK cannot change absent record
    if(isSK&&!rec.is_present){show("Cannot edit Haajri for absent day","error");return;}
    const wage=h*(cardWorker?.per_day_rate||0);
    const {error}=await sb.from("attendance_records").update({
      haajri:h,daily_wage:wage,
      haajri_updated_by:user.user_id,haajri_updated_at:new Date().toISOString(),
    }).eq("id",rec.id);
    if(error){show(error.message,"error");return;}
    setMonthRecs(prev=>prev.map(r=>r.id===rec.id?{...r,haajri:h,daily_wage:wage}:r));
    setEditHaajriDay(null);show("Haajri saved ✓");
  };

  // ── SIC correct absent day in card view ───────────────────────
  const correctCardAbsent=async(rec,note)=>{
    if(!note.trim()){show("Reason required","error");return;}
    const {error}=await sb.from("attendance_records").update({
      is_present:true,haajri:1.0,daily_wage:cardWorker?.per_day_rate||0,
      corrected_by:user.user_id,corrected_at:new Date().toISOString(),correction_note:note,
    }).eq("id",rec.id);
    if(error){show(error.message,"error");return;}
    setMonthRecs(prev=>prev.map(r=>r.id===rec.id?{...r,is_present:true,haajri:1.0}:r));
    show("Corrected to Present ✓");
  };

  // ── Assign building ───────────────────────────────────────────
  const assignBuilding=async(buildingId,isGeneral=false,hours=8)=>{
    if(!selWorkers.size){show("Select workers first","error");return;}
    const newAsgns={...assignments};
    for(const wid of selWorkers){
      if(!records[wid]?.is_present)continue;
      const existing=newAsgns[wid]||[];
      const totalHours=existing.reduce((s,a)=>s+parseFloat(a.hours),0);
      const rem=8-totalHours;if(rem<=0)continue;
      const useHours=Math.min(hours,rem);
      newAsgns[wid]=[...existing,{building_id:isGeneral?null:buildingId,is_general_work:isGeneral,hours:useHours,worker_id:wid,session_id:session?.id,site_id:parseInt(selSite),att_date:selDate,_new:true}];
    }
    setAssignments(newAsgns);setSelWorkers(new Set());
  };

  // ── Save session ──────────────────────────────────────────────
  const saveSession=async(submit=false)=>{
    if(!session||!selSite){show("Select site and date","error");return;}
    setSaving(true);const siteId=parseInt(selSite);
    const toUpsert=Object.values(records).map(r=>{
      const h=parseFloat(haajri[r.worker_id]||1.0)||0;
      const wk=workers.find(w=>w.id===r.worker_id);
      const wage=r.is_present===false?0:h*(parseFloat(wk?.per_day_rate)||0);
      return {session_id:session.id,worker_id:r.worker_id,site_id:siteId,att_date:selDate,
        is_present:r.is_present??true,haajri:r.is_present===false?0:h,daily_wage:wage,
        marked_by:user.user_id,marked_at:new Date().toISOString()};
    });
    if(toUpsert.length){
      const {error}=await sb.from("attendance_records").upsert(toUpsert,{onConflict:"session_id,worker_id"});
      if(error){setSaving(false);show(error.message,"error");return;}
    }
    const {data:savedRec}=await sb.from("attendance_records").select("id,worker_id,is_present").eq("session_id",session.id);
    const recIdMap={};(savedRec||[]).forEach(r=>{recIdMap[r.worker_id]=r.id;});
    const allNewAsgns=Object.values(assignments).flat().filter(a=>a._new);
    if(allNewAsgns.length){
      const wids=[...new Set(allNewAsgns.map(a=>a.worker_id))];
      await sb.from("attendance_building_assignments").delete().eq("session_id",session.id).in("worker_id",wids);
      const toInsert=allNewAsgns.map(({_new,...a})=>({...a,record_id:recIdMap[a.worker_id]||null,assigned_by:user.user_id}));
      await sb.from("attendance_building_assignments").insert(toInsert);
    }
    const generalWorkers=Object.values(assignments).flat().filter(a=>a.is_general_work);
    if(generalWorkers.length&&buildings.length){
      const bldgHeadcount={};
      Object.values(assignments).flat().filter(a=>!a.is_general_work&&a.building_id).forEach(a=>{bldgHeadcount[a.building_id]=(bldgHeadcount[a.building_id]||0)+1;});
      const totalBldgWorkers=Object.values(bldgHeadcount).reduce((s,c)=>s+c,0)||buildings.length;
      const totalGenCost=generalWorkers.reduce((s,a)=>{const w=workers.find(wk=>wk.id===a.worker_id);return s+(w?parseFloat(w.per_day_rate||0)*(a.hours/8):0);},0);
      await sb.from("general_work_cost_distribution").delete().eq("session_id",session.id);
      await sb.from("general_work_cost_distribution").insert(buildings.map(b=>{
        const ratio=(bldgHeadcount[b.id]||1)/totalBldgWorkers;
        return {session_id:session.id,site_id:siteId,att_date:selDate,building_id:b.id,total_general_workers:generalWorkers.length,total_general_cost:totalGenCost,distributed_cost:parseFloat((totalGenCost*ratio).toFixed(2)),distribution_basis:"headcount_ratio"};
      }));
    }
    const presentCount=Object.values(records).filter(r=>r.is_present!==false).length;
    const upd={total_present:presentCount,total_absent:workers.length-presentCount};
    if(submit)Object.assign(upd,{status:"submitted",submitted_by:user.user_id,submitted_at:new Date().toISOString()});
    await sb.from("attendance_sessions").update(upd).eq("id",session.id);
    setSaving(false);show(submit?"Attendance submitted ✓":"Saved ✓","success");
    if(submit)loadSession();
  };

  const lockSession=async()=>{
    if(!isSIC){show("Only SIC can lock","error");return;}
    await sb.from("attendance_sessions").update({status:"locked",locked_by:user.user_id,locked_at:new Date().toISOString()}).eq("id",session.id);
    show("Session locked ✓");loadSession();
  };

  // ── Computed ──────────────────────────────────────────────────
  const presentWorkers=workers.filter(w=>records[w.id]?.is_present!==false);
  const absentWorkers=workers.filter(w=>records[w.id]?.is_present===false);
  const assignedCount=presentWorkers.filter(w=>(assignments[w.id]||[]).length>0).length;
  const unassignedPresent=presentWorkers.filter(w=>(assignments[w.id]||[]).length===0);
  const getBldgName=(id)=>id?buildings.find(b=>b.id===id)?.building_name||"—":"General Work";
  const SC_STATUS={draft:"gray",submitted:"orange",locked:"green"};

  // Daily wage total using haajri
  const totalWage=presentWorkers.reduce((s,w)=>{
    const h=parseFloat(haajri[w.id]||1.0)||0;
    return s+h*parseFloat(w.per_day_rate||0);
  },0);

  // Month calendar helpers
  const getDaysInMonth=(ym)=>{const [y,m]=ym.split("-");return new Date(parseInt(y),parseInt(m),0).getDate();};
  const getMonthRec=(day)=>{
    const d=`${cardMonth}-${String(day).padStart(2,"0")}`;
    return monthRecs.find(r=>r.att_date===d)||null;
  };

  // ── Render ────────────────────────────────────────────────────
  return <div>
    <Toast/>
    <PH title="Attendance & Haajri"
      sub={session?`${presentWorkers.length} present · ${absentWorkers.length} absent · ₹${totalWage.toFixed(0)} daily wage · ${session.status}`:"Select site and date"}
      right={<div style={{display:"flex",gap:8}}>
        {isSIC&&<Btn variant="secondary" onClick={()=>{setBulkCorrOpen(true);loadBulkAbsent();}} style={{borderColor:"#7c3aed",color:"#7c3aed"}}>SIC Bulk Correct</Btn>}
        {session&&session.status==="draft"&&canMark&&<Btn variant="secondary" onClick={()=>saveSession(false)} disabled={saving}>{saving?"Saving...":"Save Draft"}</Btn>}
        {session&&session.status==="draft"&&canMark&&<Btn onClick={()=>saveSession(true)} disabled={saving} style={{background:"#16a34a",borderColor:"#16a34a"}}>{saving?"Submitting...":"Submit"}</Btn>}
        {session&&session.status==="submitted"&&isSIC&&<Btn onClick={lockSession} style={{background:"#7c3aed",borderColor:"#7c3aed"}}>Lock</Btn>}
      </div>}/>

    {/* Site + Date */}
    <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
      <select value={selSite} onChange={e=>setSelSite(e.target.value)}
        style={{padding:"9px 14px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,background:"#fff",fontFamily:"inherit",minWidth:180}}>
        <option value="">— Select Site —</option>
        {sites.map(s=><option key={s.site_id} value={s.site_id}>{s.site_name}</option>)}
      </select>
      <input id="att_sel_date" name="att_sel_date" type="date" value={selDate} onChange={e=>setSelDate(e.target.value)}
        style={{padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,fontFamily:"inherit"}}/>
      {session&&<Badge color={SC_STATUS[session.status]||"gray"}>{session.status.toUpperCase()}</Badge>}
    </div>

    {!selSite&&<div style={{background:"#F8FAFC",borderRadius:12,padding:"40px",textAlign:"center",color:C.muted}}>Select a site to load attendance</div>}
    {selSite&&loading&&<div style={{background:"#F8FAFC",borderRadius:12,padding:"40px",textAlign:"center",color:C.muted}}>Loading workers...</div>}
    {selSite&&!loading&&workers.length===0&&<div style={{background:"#FEF2F2",borderRadius:12,padding:"24px",textAlign:"center",color:"#dc2626",fontWeight:600}}>No active workers at this site.</div>}

    {selSite&&!loading&&workers.length>0&&<>
      {/* Step tabs */}
      <div style={{display:"flex",gap:0,marginBottom:16,background:"#F8FAFC",borderRadius:10,padding:4,border:`1px solid ${C.border}`}}>
        {[
          {id:"absent",  label:`1 — Mark Absent (${absentWorkers.length})`,  color:absentWorkers.length>0?"#dc2626":"#16a34a"},
          {id:"haajri",  label:`2 — Haajri Entry`,                            color:"#f59e0b"},
          {id:"building",label:`3 — Buildings (${assignedCount}/${presentWorkers.length})`, color:assignedCount<presentWorkers.length?"#f59e0b":"#16a34a"},
          {id:"summary", label:"4 — Summary",                                 color:C.accent},
        ].map(t=>(
          <button key={t.id} onClick={()=>setView(t.id)}
            style={{flex:1,padding:"8px 6px",borderRadius:7,border:"none",
              background:view===t.id?"#fff":"transparent",fontWeight:view===t.id?700:500,
              fontSize:11,cursor:"pointer",fontFamily:"inherit",
              color:view===t.id?t.color:C.muted,
              boxShadow:view===t.id?"0 1px 4px rgba(0,0,0,.1)":"none"}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ── STEP 1: MARK ABSENT ─────────────────────────────── */}
      {view==="absent"&&<AbsentStep
        workers={workers} records={records} haajri={haajri}
        isSK={isSK} isSIC={isSIC} canMark={canMark}
        togglePresent={togglePresent} openHaajriCard={openHaajriCard}
        presentWorkers={presentWorkers} absentWorkers={absentWorkers}
        bulkMarkAbsent={bulkMarkAbsent}
      />}

      {/* ── STEP 2: HAAJRI ENTRY ────────────────────────────── */}
      {view==="haajri"&&<div>
        <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:"10px 14px",marginBottom:12}}>
          <p style={{margin:0,fontSize:12,color:"#92400e",fontWeight:600}}>
            Enter Haajri (wage units) for each present worker. 1.0 = full day. 0.5 = half day. Daily wage = Haajri × Rate.
            {isSK&&" Absent workers are locked — contact SIC to correct."}
            {supervisorTrade&&` You are viewing ${supervisorTrade} trade workers only.`}
          </p>
        </div>
        <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead>
              <tr style={{background:"#F8FAFC",borderBottom:`2px solid ${C.border}`}}>
                {["Worker","Trade","Rate/Day","Haajri","Daily Wage","Card"].map(h=>(
                  <th key={h} style={{padding:"9px 12px",textAlign:"left",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".05em"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {workers
                .filter(w=>!supervisorTrade||w.trade===supervisorTrade) // Fix 11: trade filter
                .map((w,i)=>{
                const isPresent=records[w.id]?.is_present!==false;
                const h=haajri[w.id]??"1.0";
                const hVal=parseFloat(h)||0;
                const wage=isPresent?hVal*parseFloat(w.per_day_rate||0):0;
                const saved=records[w.id]?.id&&!records[w.id]?._new;
                // Fix 11: Supervisor can enter haajri, but once saved only SIC can edit
                const haajriLocked=saved&&records[w.id]?.haajri_updated_by&&!isSIC;
                const canEditHaajri=isPresent&&canEnterHaajri&&!haajriLocked;
                return <tr key={w.id} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?"#fff":"#FAFBFC",opacity:isPresent?1:0.55}}>
                  <td style={{padding:"8px 12px"}}>
                    <p style={{margin:0,fontWeight:600,fontSize:13}}>{w.worker_name}</p>
                    <p style={{margin:0,fontSize:10,color:C.muted}}>{w.worker_code}</p>
                  </td>
                  <td style={{padding:"8px 12px"}}><Badge color="blue">{w.trade}</Badge></td>
                  <td style={{padding:"8px 12px",fontWeight:600}}>₹{w.per_day_rate||0}</td>
                  <td style={{padding:"8px 12px"}}>
                    {!isPresent
                      ? <span style={{background:"#dc2626",color:"#fff",padding:"3px 10px",borderRadius:20,fontSize:12,fontWeight:700}}>A</span>
                      : <div>
                          <input id="haajri_val" name="haajri" type="number" value={h} min="0" max="2" step="0.5"
                            disabled={!canEditHaajri}
                            onChange={e=>updateHaajri(w.id,e.target.value)}
                            style={{width:70,padding:"6px 8px",border:`1.5px solid ${canEditHaajri?C.border:"#fde68a"}`,borderRadius:8,
                            fontSize:14,fontWeight:700,fontFamily:"inherit",textAlign:"center",
                            background:canEditHaajri?"#fff":"#FFFBEB"}}/>
                          {haajriLocked&&<p style={{margin:"2px 0 0",fontSize:9,color:"#d97706"}}>🔒 SIC only</p>}
                        </div>
                    }
                  </td>
                  <td style={{padding:"8px 12px",fontWeight:700,color:isPresent?"#16a34a":C.faint}}>
                    {isPresent?`₹${wage.toFixed(0)}`:"—"}
                  </td>
                  <td style={{padding:"8px 12px"}}>
                    <button onClick={()=>openHaajriCard(w)} title="Open Haajri Card"
                      style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,cursor:"pointer",
                        padding:"5px 8px",fontSize:13,color:C.accent}}>📋</button>
                  </td>
                </tr>;
              })}
            </tbody>
            <tfoot>
              <tr style={{background:"#0F172A"}}>
                <td colSpan={3} style={{padding:"10px 12px",color:"rgba(255,255,255,.7)",fontWeight:600,fontSize:13}}>Total Daily Wage ({presentWorkers.length} present)</td>
                <td style={{padding:"10px 12px",color:"#fff",fontWeight:800,fontSize:16}}>
                  {presentWorkers.reduce((s,w)=>s+(parseFloat(haajri[w.id]||1)*1),0).toFixed(1)} haajri
                </td>
                <td style={{padding:"10px 12px",color:"#fff",fontWeight:800,fontSize:16}}>₹{totalWage.toFixed(0)}</td>
                <td/>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>}

      {/* ── STEP 3: ASSIGN BUILDINGS ─────────────────────────── */}
      {view==="building"&&<div>
        <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:"10px 14px",marginBottom:12}}>
          <p style={{margin:0,fontSize:12,color:"#92400e",fontWeight:600}}>Select workers → assign building or General Work. Workers can split hours (4+4, etc).</p>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center",padding:"10px 14px",background:"#F8FAFC",borderRadius:10,border:`1px solid ${C.border}`}}>
          <span style={{fontSize:12,fontWeight:600,color:C.muted}}>{selWorkers.size} selected</span>
          <select value={bulkBldg} onChange={e=>setBulkBldg(e.target.value)}
            style={{padding:"7px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:12,background:"#fff",fontFamily:"inherit",flex:1,minWidth:140}}>
            <option value="">— Assign to Building —</option>
            {buildings.map(b=><option key={b.id} value={b.id}>{b.building_name}{b.building_code?` (${b.building_code})`:""}</option>)}
            <option value="general">General Work</option>
          </select>
          <select id="bldg-hours" defaultValue="8"
            style={{padding:"7px 10px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:12,background:"#fff",fontFamily:"inherit",width:80}}>
            {["8","6","4","2"].map(h=><option key={h} value={h}>{h} hrs</option>)}
          </select>
          <Btn size="sm" onClick={()=>{const hrs=parseFloat(document.getElementById("bldg-hours")?.value||8);if(!bulkBldg){show("Select building","error");return;}assignBuilding(bulkBldg==="general"?null:parseInt(bulkBldg),bulkBldg==="general",hrs);}} disabled={!selWorkers.size||!bulkBldg}>Assign</Btn>
          <Btn size="sm" variant="ghost" onClick={()=>setSelWorkers(new Set(presentWorkers.map(w=>w.id)))}>All</Btn>
          <Btn size="sm" variant="ghost" onClick={()=>setSelWorkers(new Set())}>Clear</Btn>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:8}}>
          {presentWorkers.map(w=>{
            const wAsgn=assignments[w.id]||[];
            const totalHrs=wAsgn.reduce((s,a)=>s+parseFloat(a.hours),0);
            const isSel=selWorkers.has(w.id);
            return <div key={w.id} onClick={()=>{const ns=new Set(selWorkers);if(ns.has(w.id))ns.delete(w.id);else ns.add(w.id);setSelWorkers(ns);}}
              style={{padding:"10px 12px",borderRadius:10,cursor:"pointer",
                background:isSel?"#EFF6FF":totalHrs>=8?"#f0fdf4":"#fff",
                border:`1.5px solid ${isSel?C.accent:totalHrs>=8?"#86efac":C.border}`}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:wAsgn.length?5:0}}>
                <div style={{width:18,height:18,borderRadius:4,flexShrink:0,background:isSel?C.accent:C.border,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {isSel&&<span style={{color:"#fff",fontSize:10,fontWeight:700}}>✓</span>}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{margin:0,fontWeight:600,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{w.worker_name}</p>
                </div>
                <span style={{fontSize:10,fontWeight:700,color:totalHrs>=8?"#16a34a":totalHrs>0?"#f59e0b":C.faint}}>{totalHrs}/8h</span>
              </div>
              {wAsgn.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:3,paddingLeft:26}}>
                {wAsgn.map((a,i)=>(
                  <span key={i} style={{fontSize:10,padding:"1px 6px",borderRadius:10,fontWeight:600,
                    background:a.is_general_work?"#f3e8ff":"#EFF6FF",color:a.is_general_work?"#7c3aed":C.accent,display:"flex",alignItems:"center",gap:3}}>
                    {a.is_general_work?"Gen":getBldgName(a.building_id)} {a.hours}h
                    <button onClick={e=>{e.stopPropagation();setAssignments(prev=>{const n={...prev};n[w.id]=(n[w.id]||[]).filter((_,j)=>j!==i);return n;});}}
                      style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:11,padding:0,lineHeight:1}}>×</button>
                  </span>
                ))}
              </div>}
            </div>;
          })}
        </div>
        {unassignedPresent.length>0&&<div style={{marginTop:10,padding:"10px 14px",background:"#fffbeb",borderRadius:10,border:"1px solid #fde68a"}}>
          <p style={{margin:"0 0 5px",fontWeight:700,fontSize:12,color:"#92400e"}}>UNASSIGNED ({unassignedPresent.length})</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            {unassignedPresent.map(w=><span key={w.id} style={{background:"#f59e0b",color:"#fff",padding:"2px 8px",borderRadius:20,fontSize:11,fontWeight:600}}>{w.worker_name}</span>)}
          </div>
        </div>}
      </div>}

      {/* ── STEP 4: SUMMARY ─────────────────────────────────── */}
      {view==="summary"&&<div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:10,marginBottom:14}}>
          {[["Present",presentWorkers.length,"#16a34a","#f0fdf4"],["Absent",absentWorkers.length,"#dc2626","#FEF2F2"],
            ["Assigned",assignedCount,C.accent,"#EFF6FF"],["Unassigned",unassignedPresent.length,"#f59e0b","#fffbeb"]].map(([l,v,col,bg])=>(
            <div key={l} style={{background:bg,borderRadius:10,padding:"12px 14px",textAlign:"center",border:`1px solid ${col}30`}}>
              <p style={{margin:0,fontSize:22,fontWeight:800,color:col}}>{v}</p>
              <p style={{margin:0,fontSize:11,color:C.muted,fontWeight:600}}>{l}</p>
            </div>
          ))}
        </div>
        {buildings.length>0&&[...buildings,{id:null,building_name:"General Work",_general:true}].map(b=>{
          const bWkrs=presentWorkers.filter(w=>(assignments[w.id]||[]).some(a=>b._general?a.is_general_work:a.building_id===b.id));
          if(!bWkrs.length)return null;
          const bCost=bWkrs.reduce((s,w)=>{
            const asgns=(assignments[w.id]||[]).filter(a=>b._general?a.is_general_work:a.building_id===b.id);
            const hrs=asgns.reduce((h,a)=>h+parseFloat(a.hours),0);
            const h=parseFloat(haajri[w.id]||1);
            return s+(parseFloat(w.per_day_rate||0)*h*(hrs/8));
          },0);
          return <div key={b.id||"gen"} style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <p style={{margin:0,fontWeight:700,color:b._general?"#7c3aed":C.accent}}>{b._general?"🔄 General Work":b.building_name}</p>
              <div style={{textAlign:"right"}}>
                <p style={{margin:0,fontWeight:800}}>₹{bCost.toFixed(0)}</p>
                <p style={{margin:0,fontSize:11,color:C.muted}}>{bWkrs.length} workers</p>
              </div>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {bWkrs.map(w=>{
                const asgns=(assignments[w.id]||[]).filter(a=>b._general?a.is_general_work:a.building_id===b.id);
                const hrs=asgns.reduce((h,a)=>h+parseFloat(a.hours),0);
                const h=parseFloat(haajri[w.id]||1);
                return <span key={w.id} style={{background:"#F8FAFC",border:`1px solid ${C.border}`,borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:600}}>
                  {w.worker_name} · {hrs}h · H:{h}
                </span>;
              })}
            </div>
          </div>;
        })}
        <div style={{background:"#0F172A",borderRadius:10,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
          <div>
            <p style={{margin:0,color:"rgba(255,255,255,.7)",fontWeight:600}}>Total Site Daily Labour Cost</p>
            <p style={{margin:"2px 0 0",color:"rgba(255,255,255,.4)",fontSize:11}}>{presentWorkers.length} workers · {presentWorkers.reduce((s,w)=>s+(parseFloat(haajri[w.id]||1)||0),0).toFixed(1)} total haajri</p>
          </div>
          <p style={{margin:0,color:"#fff",fontWeight:800,fontSize:22}}>₹{totalWage.toFixed(0)}</p>
        </div>
      </div>}
    </>}

    {/* ── HAAJRI CARD — MONTH VIEW ──────────────────────────────── */}
    <SlideOver open={!!cardWorker} onClose={()=>{setCardWorker(null);setEditHaajriDay(null);}} title={cardWorker?`Haajri Card — ${cardWorker.worker_name}`:""} width={560}>
      {cardWorker&&<>
        {/* Worker info */}
        <div style={{background:"#F8FAFC",borderRadius:10,padding:"10px 14px",marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <p style={{margin:0,fontWeight:700}}>{cardWorker.worker_name}</p>
              <p style={{margin:"2px 0 0",fontSize:12,color:C.muted}}>{cardWorker.worker_code} · {cardWorker.trade} · ₹{cardWorker.per_day_rate}/day</p>
            </div>
            <input id="haajri_month" name="haajri_month" type="month" value={cardMonth}
              onChange={e=>{setCardMonth(e.target.value);setCardWorker(w=>{if(w){openHaajriCard({...cardWorker});} return cardWorker;});}}
              style={{padding:"6px 10px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,fontFamily:"inherit"}}/>
          </div>
          <Btn size="sm" onClick={()=>openHaajriCard(cardWorker)} style={{marginTop:8}}>Load Month</Btn>
        </div>

        {cardLoading&&<p style={{textAlign:"center",color:C.muted,padding:20}}>Loading...</p>}
        {!cardLoading&&<>
          {/* Month grid */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:14}}>
            {["M","T","W","T","F","S","S"].map((d,i)=>(
              <div key={i} style={{textAlign:"center",fontSize:10,fontWeight:700,color:C.muted,padding:"4px 0"}}>{d}</div>
            ))}
            {/* Offset for first day of month */}
            {(()=>{
              const [yr,mo]=cardMonth.split("-");
              const firstDow=(new Date(parseInt(yr),parseInt(mo)-1,1).getDay()+6)%7; // Mon=0
              return Array.from({length:firstDow},(_,i)=><div key={`e${i}`}/>);
            })()}
            {Array.from({length:getDaysInMonth(cardMonth)},(_,i)=>{
              const day=i+1;
              const rec=getMonthRec(day);
              const isAbsent=rec&&!rec.is_present;
              const isFuture=`${cardMonth}-${String(day).padStart(2,"0")}`>new Date().toISOString().split("T")[0];
              const corrected=rec?.corrected_by;
              return <div key={day} style={{
                  borderRadius:8,padding:"6px 2px",textAlign:"center",
                  background:isFuture?"#F8FAFC":isAbsent?"#FEF2F2":rec?"#f0fdf4":"#F8FAFC",
                  border:`1.5px solid ${isFuture?C.border:isAbsent?"#fca5a5":rec?"#86efac":C.border}`,
                  minHeight:54,position:"relative"}}>
                <p style={{margin:0,fontSize:10,color:C.muted,fontWeight:600}}>{day}</p>
                {!rec&&!isFuture&&<p style={{margin:0,fontSize:9,color:C.faint}}>—</p>}
                {rec&&<>
                  {isAbsent
                    ? <div>
                        <p style={{margin:0,fontSize:14,fontWeight:800,color:"#dc2626"}}>A</p>
                        {isSIC&&<button
                          onClick={()=>{
                            const note=window.prompt("Reason for correction (SIC):","");
                            if(note!=null)correctCardAbsent(rec,note);
                          }}
                          style={{fontSize:9,background:"#7c3aed",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",padding:"1px 4px",marginTop:2}}>
                          Fix
                        </button>}
                      </div>
                    : <div>
                        {editHaajriDay?.rec?.id===rec.id
                          ? <div style={{display:"flex",flexDirection:"column",gap:2}}>
                              <input id="haajri_edit" name="haajri_edit" type="number" value={editHaajriDay.val} min="0" max="2" step="0.5"
                                style={{width:"100%",border:`1px solid ${C.accent}`,borderRadius:4,textAlign:"center",fontSize:12,padding:"1px"}}
                                onChange={e=>setEditHaajriDay(d=>({...d,val:e.target.value}))}
                                autoFocus/>
                              <div style={{display:"flex",gap:2}}>
                                <button onClick={saveHaajriDay} style={{flex:1,background:"#16a34a",color:"#fff",border:"none",borderRadius:4,fontSize:9,cursor:"pointer",padding:"2px"}}>✓</button>
                                <button onClick={()=>setEditHaajriDay(null)} style={{flex:1,background:C.border,color:C.text,border:"none",borderRadius:4,fontSize:9,cursor:"pointer",padding:"2px"}}>✗</button>
                              </div>
                            </div>
                          : <div onClick={()=>canMark&&setEditHaajriDay({rec,val:String(rec.haajri??1)})} style={{cursor:canMark?"pointer":"default"}}>
                              <p style={{margin:0,fontSize:14,fontWeight:800,color:"#16a34a"}}>{rec.haajri??1}</p>
                              <p style={{margin:0,fontSize:9,color:C.muted}}>₹{(parseFloat(rec.haajri??1)*parseFloat(cardWorker.per_day_rate||0)).toFixed(0)}</p>
                              {/* Building split badges */}
                              {(rec._buildings||[]).length>0&&<div style={{marginTop:2,display:"flex",flexDirection:"column",gap:1}}>
                                {(rec._buildings||[]).map((b,bi)=>(
                                  <span key={bi} style={{fontSize:8,background:b.is_general_work?"#f3e8ff":"#dbeafe",
                                    color:b.is_general_work?"#7c3aed":"#1d4ed8",
                                    borderRadius:3,padding:"0 3px",lineHeight:1.6,display:"block",
                                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                                    {b.is_general_work?"Gen":b.buildings?.building_name||(b.building_id?"Bldg":"—")} {b.hours}h
                                  </span>
                                ))}
                              </div>}
                            </div>
                        }
                      </div>
                  }
                  {corrected&&<div style={{position:"absolute",top:2,right:2,width:6,height:6,borderRadius:"50%",background:"#7c3aed"}} title="SIC corrected"/>}
                </>}
              </div>;
            })}
          </div>

          {/* Month totals */}
          {monthRecs.length>0&&<div style={{background:"#0F172A",borderRadius:10,padding:"12px 16px",display:"flex",justifyContent:"space-between"}}>
            <div>
              <p style={{margin:0,color:"rgba(255,255,255,.7)",fontSize:12}}>Month Total</p>
              <p style={{margin:"2px 0 0",color:"#fff",fontWeight:800,fontSize:16}}>
                {monthRecs.filter(r=>r.is_present).reduce((s,r)=>s+(parseFloat(r.haajri)||0),0).toFixed(1)} haajri
              </p>
            </div>
            <div style={{textAlign:"right"}}>
              <p style={{margin:0,color:"rgba(255,255,255,.7)",fontSize:12}}>Earned</p>
              <p style={{margin:"2px 0 0",color:"#fff",fontWeight:800,fontSize:16}}>
                ₹{monthRecs.filter(r=>r.is_present).reduce((s,r)=>s+(parseFloat(r.daily_wage)||parseFloat(r.haajri||1)*parseFloat(cardWorker.per_day_rate||0)),0).toFixed(0)}
              </p>
            </div>
            <div style={{textAlign:"right"}}>
              <p style={{margin:0,color:"rgba(255,255,255,.7)",fontSize:12}}>Absent Days</p>
              <p style={{margin:"2px 0 0",color:"#fca5a5",fontWeight:800,fontSize:16}}>
                {monthRecs.filter(r=>!r.is_present).length}
              </p>
            </div>
          </div>}
          <p style={{margin:"8px 0 0",fontSize:11,color:C.muted,textAlign:"center"}}>
            {isSK?"Tap a number to edit Haajri. A = Absent (contact SIC to correct).":"Tap a number to edit Haajri. Tap Fix on A to correct absent marks."}
          </p>
        </>}
      </>}
    </SlideOver>

    {/* ── SIC SINGLE CORRECTION MODAL ──────────────────────────── */}
    <Modal open={!!corrModal&&corrModal!=="open"} onClose={()=>{setCorrModal(null);setCorrNote("");}} title="SIC Correction" width={420}>
      {corrModal&&corrModal!=="open"&&<>
        <div style={{background:"#f8fafc",borderRadius:10,padding:"12px 14px",marginBottom:14}}>
          <p style={{margin:0,fontWeight:700}}>{corrModal.worker.worker_name}</p>
          <p style={{margin:"3px 0 0",fontSize:12,color:C.muted}}>Currently: <b>{corrModal.record.is_present?"PRESENT":"ABSENT"}</b> → Will change to: <b>{corrModal.record.is_present?"ABSENT":"PRESENT"}</b></p>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>Correction Reason *</label>
          <textarea value={corrNote} onChange={e=>setCorrNote(e.target.value)} rows={3}
            placeholder="Reason for correction..."
            style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:14,fontFamily:"inherit",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={applyCorrection} style={{background:"#7c3aed",borderColor:"#7c3aed"}}>Apply Correction</Btn>
          <Btn variant="ghost" onClick={()=>{setCorrModal(null);setCorrNote("");}}>Cancel</Btn>
        </div>
      </>}
    </Modal>

    {/* ── SIC BULK CORRECTION MODAL ─────────────────────────────── */}
    <Modal open={bulkCorrOpen} onClose={()=>setBulkCorrOpen(false)} title="SIC Bulk Correction — Mark Absent → Present" width={540}>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <select value={bulkCorrSite} onChange={e=>setBulkCorrSite(e.target.value)}
          style={{padding:"8px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,background:"#fff",fontFamily:"inherit",flex:1}}>
          <option value="">— Select Site —</option>
          {sites.map(s=><option key={s.site_id} value={s.site_id}>{s.site_name}</option>)}
        </select>
        <input id="bulk_corr_date" name="bulk_corr_date" type="date" value={bulkCorrDate} onChange={e=>setBulkCorrDate(e.target.value)}
          style={{padding:"8px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,fontFamily:"inherit"}}/>
        <Btn onClick={loadBulkAbsent}>Load</Btn>
      </div>

      {bulkAbsent.length===0&&<p style={{textAlign:"center",color:C.muted,padding:"20px 0"}}>No absent workers found for this date. Load a date to begin.</p>}
      {bulkAbsent.length>0&&<>
        <div style={{marginBottom:10,display:"flex",gap:8,alignItems:"center"}}>
          <span style={{fontSize:12,color:C.muted,fontWeight:600}}>{bulkSel.size} of {bulkAbsent.length} selected</span>
          <Btn size="sm" variant="ghost" onClick={()=>setBulkSel(new Set(bulkAbsent.map(r=>r.id)))}>Select All</Btn>
          <Btn size="sm" variant="ghost" onClick={()=>setBulkSel(new Set())}>Clear</Btn>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:240,overflowY:"auto",marginBottom:14}}>
          {bulkAbsent.map(r=>{
            const isSel=bulkSel.has(r.id);
            return <div key={r.id} onClick={()=>{const ns=new Set(bulkSel);if(ns.has(r.id))ns.delete(r.id);else ns.add(r.id);setBulkSel(ns);}}
              style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:8,cursor:"pointer",
                background:isSel?"#EFF6FF":"#FEF2F2",border:`1.5px solid ${isSel?C.accent:"#fca5a5"}`}}>
              <div style={{width:18,height:18,borderRadius:4,background:isSel?C.accent:"#fca5a5",
                display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {isSel&&<span style={{color:"#fff",fontSize:10,fontWeight:700}}>✓</span>}
              </div>
              <div style={{flex:1}}>
                <p style={{margin:0,fontWeight:600,fontSize:13}}>{r.workers?.worker_name||"—"}</p>
                <p style={{margin:0,fontSize:11,color:C.muted}}>{r.workers?.worker_code} · {r.workers?.trade}</p>
              </div>
              <Badge color="red">Absent</Badge>
            </div>;
          })}
        </div>
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>Correction Reason * (applies to all selected)</label>
          <textarea value={bulkCorrNote} onChange={e=>setBulkCorrNote(e.target.value)} rows={2}
            placeholder="e.g. Marked absent by mistake — worker was present"
            style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:14,fontFamily:"inherit",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
        </div>
        <div style={{background:"#FEF2F2",border:"1px solid #fca5a5",borderRadius:8,padding:"9px 12px",marginBottom:14}}>
          <p style={{margin:0,fontSize:12,color:"#dc2626",fontWeight:600}}>
            Selected {bulkSel.size} worker(s) will be corrected to PRESENT with Haajri 1.0. This action is logged.
          </p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={applyBulkCorrection} disabled={bulkSaving||!bulkSel.size} style={{background:"#7c3aed",borderColor:"#7c3aed"}}>
            {bulkSaving?"Applying...":"✓ Apply to Selected"}
          </Btn>
          <Btn variant="ghost" onClick={()=>setBulkCorrOpen(false)}>Close</Btn>
        </div>
      </>}
    </Modal>

    {/* Inline SIC correction mode (legacy quick mode) */}
    {corrModal==="open"&&<div style={{background:"#f3e8ff",border:"1.5px solid #c4b5fd",borderRadius:10,padding:"12px 14px",marginTop:8}}>
      <p style={{margin:"0 0 8px",fontWeight:700,color:"#7c3aed",fontSize:13}}>SIC Quick Correct — click any worker</p>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
        {workers.map(w=>{const rec=records[w.id];const isP=rec?.is_present!==false;
          return <button key={w.id} onClick={()=>setCorrModal({worker:w,record:rec||{is_present:true,worker_id:w.id}})}
            style={{padding:"4px 10px",borderRadius:20,border:`1.5px solid ${isP?"#86efac":"#fca5a5"}`,
              background:isP?"#f0fdf4":"#FEF2F2",color:isP?"#15803d":"#dc2626",
              fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
            {w.worker_name} ({isP?"P":"A"})
          </button>;})}
      </div>
      <Btn size="sm" variant="ghost" style={{marginTop:8}} onClick={()=>setCorrModal(null)}>Exit</Btn>
    </div>}

  </div>;
};


// ─── DPR MODULE ───────────────────────────────────────────────────
// ─── DPR MODULE ───────────────────────────────────────────────────
const DPR=()=>{
  const {user,perms,activeSiteId,assignedSiteIds,isUnrestricted}=useAuth();
  if(!hasPerm(perms,"DPR","can_view"))return <NoAccess module="DPR"/>;
  const canEdit=hasPerm(perms,"DPR","can_add");

  const [sites,setSites]=useState([]);
  const [buildings,setBuildings]=useState([]);
  const [selSite,setSelSite]=useState("");
  const [selBuilding,setSelBuilding]=useState("");
  const [selDate,setSelDate]=useState(new Date().toISOString().split("T")[0]);
  const [dpr,setDpr]=useState(null);
  const [manpower,setManpower]=useState({});
  const [progress,setProgress]=useState("");
  const [schedule,setSchedule]=useState("");
  const [hindrance,setHindrance]=useState("");
  const [subName,setSubName]=useState(user.name||"");
  const [subDesig,setSubDesig]=useState(user.role||"");
  const [loading,setLoading]=useState(false);
  const [saving,setSaving]=useState(false);
  const {show,Toast}=useToast();

  const TRADES=["Carpenter","Fitter","BRM","PLM","Safety Rigger","Supervisor","Electrician","M/C"];

  useEffect(()=>{
    (async()=>{
      let q=sb.from("sites").select("site_id,site_name").eq("is_active",true).order("site_name");
      if(activeSiteId) q=q.eq("site_id",activeSiteId);
      else if(!isUnrestricted&&assignedSiteIds.length>0) q=q.in("site_id",assignedSiteIds);
      const {data:s}=await q;
      setSites(s||[]);
      if(activeSiteId) setSelSite(String(activeSiteId));
      else if(s&&s.length===1)setSelSite(String(s[0].site_id));
    })();
  },[activeSiteId,assignedSiteIds]);

  useEffect(()=>{
    if(!selSite)return;
    setBuildings([]);
    setSelBuilding("");
    sb.from("buildings").select("id,building_name,building_code")
      .eq("site_id",parseInt(selSite)).eq("is_active",true).order("building_name")
      .then(({data:b})=>setBuildings(b||[]));
  },[selSite]);

  useEffect(()=>{
    if(!selSite||!selDate)return;
    loadDPR();
  },[selSite,selDate,selBuilding]);

  const loadDPR=async()=>{
    setLoading(true);
    const siteId=parseInt(selSite);
    const bldgId=selBuilding?parseInt(selBuilding):null;

    // Load or init DPR record
    let q=sb.from("dpr_reports").select("*").eq("site_id",siteId).eq("dpr_date",selDate);
    if(bldgId)q=q.eq("building_id",bldgId);else q=q.is("building_id",null);
    const {data:existing}=await q.maybeSingle();

    // Load manpower from attendance
    let attQ=sb.from("attendance_records").select("workers(trade)").eq("site_id",siteId).eq("att_date",selDate).eq("is_present",true);
    const {data:attRecs}=await attQ;

    // Count by trade
    const counts={};
    TRADES.forEach(t=>counts[t]={count:0,remark:""});
    (attRecs||[]).forEach(r=>{
      const t=r.workers?.trade;
      if(t&&counts[t]!==undefined)counts[t].count++;
      else if(t){// map variants
        if(t==="M/C"&&counts["M/C"])counts["M/C"].count++;
        else if(["BRM","Bar Bender"].includes(t)&&counts["BRM"])counts["BRM"].count++;
      }
    });

    if(existing){
      setDpr(existing);
      setProgress(existing.todays_progress||"");
      setSchedule(existing.tomorrow_schedule||"");
      setHindrance(existing.hindrance||"");
      setSubName(existing.submitted_name||user.name||"");
      setSubDesig(existing.submitted_desig||user.role||"");
      // Load saved manpower remarks
      const {data:mp}=await sb.from("dpr_manpower").select("*").eq("dpr_id",existing.id);
      const mpMap={...counts};
      (mp||[]).forEach(m=>{
        if(mpMap[m.trade]!==undefined)mpMap[m.trade]={count:m.count||mpMap[m.trade].count,remark:m.remark||""};
      });
      setManpower(mpMap);
    } else {
      setDpr(null);setProgress("");setSchedule("");setHindrance("");
      setSubName(user.name||"");setSubDesig(user.role||"");
      setManpower(counts);
    }
    setLoading(false);
  };

  const saveDPR=async(print=false)=>{
    if(!selSite){show("Select a site","error");return;}
    setSaving(true);
    const siteId=parseInt(selSite);
    const bldgId=selBuilding?parseInt(selBuilding):null;
    const payload={site_id:siteId,building_id:bldgId,dpr_date:selDate,
      todays_progress:progress,tomorrow_schedule:schedule,hindrance,
      submitted_by:user.user_id,submitted_name:subName,submitted_desig:subDesig,
      submitted_at:new Date().toISOString(),status:"submitted"};

    let dprId=dpr?.id;
    if(dpr){
      await sb.from("dpr_reports").update(payload).eq("id",dpr.id);
    } else {
      const {data:nd}=await sb.from("dpr_reports").insert(payload).select().single();
      dprId=nd?.id;setDpr(nd);
    }

    // Save manpower
    if(dprId){
      await sb.from("dpr_manpower").delete().eq("dpr_id",dprId);
      const mpRows=Object.entries(manpower).map(([trade,{count,remark}])=>({dpr_id:dprId,trade,count,remark}));
      if(mpRows.length)await sb.from("dpr_manpower").insert(mpRows);
    }

    setSaving(false);
    show("DPR saved ✓");
    if(print)setTimeout(()=>printDPR(),300);
  };

  const printDPR=()=>{
    const site=sites.find(s=>s.site_id===parseInt(selSite))?.site_name||"";
    const bldg=buildings.find(b=>b.id===parseInt(selBuilding||0))?.building_name||"";
    const total=Object.values(manpower).reduce((s,{count})=>s+(count||0),0);
    const dateFormatted=new Date(selDate).toLocaleDateString("en-IN",{day:"2-digit",month:"2-digit",year:"numeric"});

    const trades3col=[
      ["Carpenter","PLM","Electrician"],
      ["Fitter","Safety Rigger","M/C"],
      ["BRM","Supervisor",""],
    ];

    const mpHTML=trades3col.map(row=>`
      <tr>
        ${row.map(t=>t?`
          <td class="trade-cell"><b>${t}</b></td>
          <td class="nos-cell">${manpower[t]?.count||0}</td>
          <td class="rem-cell">${manpower[t]?.remark||""}</td>
        `:`<td class="trade-cell"></td><td class="nos-cell"></td><td class="rem-cell"></td>`).join("")}
      </tr>`).join("");

    const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
    <style>
      body{font-family:Arial,sans-serif;font-size:11px;margin:0;padding:0;color:#000;}
      .page{width:210mm;min-height:297mm;margin:0 auto;padding:10mm 12mm;box-sizing:border-box;}
      h1{text-align:center;font-size:14px;margin:0 0 8px;letter-spacing:.05em;text-decoration:underline;}
      .section-title{font-size:11px;font-weight:700;margin:10px 0 4px;background:#eee;padding:3px 6px;border:1px solid #999;}
      table{width:100%;border-collapse:collapse;}
      td,th{border:1px solid #555;padding:4px 6px;vertical-align:top;}
      .trade-cell{width:12%;font-weight:700;}
      .nos-cell{width:6%;text-align:center;}
      .rem-cell{width:15%;}
      .header-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:11px;}
      .header-row span{border-bottom:1px solid #000;display:inline-block;min-width:120px;padding-bottom:1px;}
      .text-box{border:1px solid #555;min-height:50px;padding:6px;margin-bottom:6px;white-space:pre-wrap;font-size:11px;}
      .footer-confirm{font-size:10px;margin:12px 0 6px;font-style:italic;}
      .sig-row{display:flex;gap:20px;margin-top:10px;}
      .sig-item{flex:1;text-align:center;}
      .sig-line{border-bottom:1px solid #000;margin-bottom:3px;height:24px;}
      .sig-label{font-size:10px;font-weight:700;}
      .total-row td{font-weight:700;background:#f5f5f5;}
      @media print{body{margin:0;}@page{margin:8mm;size:A4;}}
    </style></head><body>
    <div class="page">
      <h1>DAILY PROGRESS REPORT</h1>
      <div class="header-row">
        <div>Date: <span>${dateFormatted}</span></div>
        <div>PROJECT / SITE: <span>${site}</span></div>
        <div>Tower / Building: <span>${bldg}</span></div>
      </div>
      <div class="section-title">1. MANPOWER REPORT</div>
      <table>
        <thead><tr>
          <th class="trade-cell">Trade</th><th class="nos-cell">Nos</th><th class="rem-cell">Remark</th>
          <th class="trade-cell">Trade</th><th class="nos-cell">Nos</th><th class="rem-cell">Remark</th>
          <th class="trade-cell">Trade</th><th class="nos-cell">Nos</th><th class="rem-cell">Remark</th>
        </tr></thead>
        <tbody>${mpHTML}
          <tr class="total-row">
            <td colspan="8" style="text-align:right;font-size:12px;">TOTAL MANPOWER</td>
            <td style="text-align:center;font-size:13px;font-weight:900;">${total}</td>
          </tr>
        </tbody>
      </table>
      <div class="section-title">2. TODAY'S PROGRESS</div>
      <div class="text-box">${progress||""}</div>
      <div class="section-title">3. TOMORROW'S SCHEDULE</div>
      <div class="text-box">${schedule||""}</div>
      <div class="section-title">4. HINDRANCE / DELAYS</div>
      <div class="text-box">${hindrance||""}</div>
      <p class="footer-confirm">I confirm that the above information is correct as per site condition.</p>
      <div class="sig-row">
        <div class="sig-item"><div class="sig-line">${subName}</div><div class="sig-label">Name</div></div>
        <div class="sig-item"><div class="sig-line">${subDesig}</div><div class="sig-label">Designation</div></div>
        <div class="sig-item"><div class="sig-line">${dateFormatted}</div><div class="sig-label">Date</div></div>
        <div class="sig-item"><div class="sig-line"></div><div class="sig-label">Signature</div></div>
      </div>
    </div>
    <script>window.onload=()=>{window.print();window.onafterprint=()=>window.close();}<\/script>
    </body></html>`;

    const w=window.open("","_blank","width=900,height=700");
    w.document.write(html);w.document.close();
  };

  const totalManpower=Object.values(manpower).reduce((s,{count})=>s+(count||0),0);

  return <div>
    <Toast/>
    <PH title="Daily Progress Report"
      sub={dpr?`${totalManpower} workers · ${dpr.status}`:"Select site and date"}
      right={<div style={{display:"flex",gap:8}}>
        {canEdit&&<Btn variant="secondary" onClick={()=>saveDPR(false)} disabled={saving}>{saving?"Saving...":"Save DPR"}</Btn>}
        <Btn onClick={()=>saveDPR(true)} disabled={saving} style={{background:"#7c3aed",borderColor:"#7c3aed"}}>🖨 Save & Print</Btn>
      </div>}/>

    {/* Selectors */}
    <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
      <select value={selSite} onChange={e=>setSelSite(e.target.value)}
        style={{padding:"9px 14px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,background:"#fff",fontFamily:"inherit",minWidth:160}}>
        <option value="">— Select Site —</option>
        {sites.map(s=><option key={s.site_id} value={s.site_id}>{s.site_name}</option>)}
      </select>
      <select value={selBuilding} onChange={e=>setSelBuilding(e.target.value)}
        style={{padding:"9px 14px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,background:"#fff",fontFamily:"inherit",minWidth:160}}>
        <option value="">— All Buildings —</option>
        {buildings.map(b=><option key={b.id} value={b.id}>{b.building_name}{b.building_code?` (${b.building_code})`:""}</option>)}
      </select>
      <input id="dpr_sel_date" name="dpr_sel_date" type="date" value={selDate} onChange={e=>setSelDate(e.target.value)}
        style={{padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,fontFamily:"inherit"}}/>
    </div>

    {!selSite&&<div style={{background:"#F8FAFC",borderRadius:12,padding:"40px",textAlign:"center",color:C.muted}}>Select a site to begin DPR</div>}
    {selSite&&loading&&<div style={{background:"#F8FAFC",borderRadius:12,padding:"40px",textAlign:"center",color:C.muted}}>Loading...</div>}

    {selSite&&!loading&&<>
      {/* Manpower Report */}
      <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:12,marginBottom:14,overflow:"hidden"}}>
        <div style={{background:"#0F172A",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <p style={{margin:0,fontWeight:700,color:"#fff",fontSize:13}}>1. MANPOWER REPORT</p>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:11,color:"rgba(255,255,255,.6)"}}>Auto-pulled from Attendance</span>
            <span style={{background:"#16a34a",color:"#fff",padding:"3px 12px",borderRadius:20,fontWeight:800,fontSize:14}}>
              {totalManpower} Total
            </span>
          </div>
        </div>
        <div style={{padding:16}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
            {TRADES.map(trade=>(
              <div key={trade} style={{border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",background:"#FAFBFC"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontWeight:700,fontSize:13}}>{trade}</span>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:11,color:C.muted}}>Nos:</span>
                    <span style={{background:manpower[trade]?.count>0?"#16a34a":"#E2E8F0",
                      color:manpower[trade]?.count>0?"#fff":C.muted,
                      padding:"2px 10px",borderRadius:20,fontWeight:800,fontSize:14,minWidth:32,textAlign:"center"}}>
                      {manpower[trade]?.count||0}
                    </span>
                  </div>
                </div>
                <input id={`dpr_remark_${trade}`} name={`dpr_remark_${trade}`} value={manpower[trade]?.remark||""} placeholder="Remark..."
                  onChange={e=>setManpower(m=>({...m,[trade]:{...m[trade],remark:e.target.value}}))}
                  style={{width:"100%",padding:"5px 8px",border:`1px solid ${C.border}`,borderRadius:6,
                    fontSize:11,fontFamily:"inherit",boxSizing:"border-box",background:"#fff"}}/>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Text sections */}
      {[
        {n:"2",title:"TODAY'S PROGRESS",key:"progress",val:progress,set:setProgress,rows:4},
        {n:"3",title:"TOMORROW'S SCHEDULE",key:"schedule",val:schedule,set:setSchedule,rows:3},
        {n:"4",title:"HINDRANCE / DELAYS",key:"hindrance",val:hindrance,set:setHindrance,rows:3},
      ].map(({n,title,val,set,rows})=>(
        <div key={n} style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:12,marginBottom:12,overflow:"hidden"}}>
          <div style={{background:"#F8FAFC",padding:"8px 16px",borderBottom:`1px solid ${C.border}`}}>
            <p style={{margin:0,fontWeight:700,fontSize:13,color:C.muted}}>{n}. {title}</p>
          </div>
          <textarea value={val} onChange={e=>set(e.target.value)} rows={rows}
            placeholder={`Enter ${title.toLowerCase()}...`} disabled={!canEdit}
            style={{width:"100%",padding:"12px 16px",border:"none",resize:"vertical",
              fontSize:13,fontFamily:"inherit",outline:"none",boxSizing:"border-box",
              background:canEdit?"#fff":"#F8FAFC",color:C.text}}/>
        </div>
      ))}

      {/* Signature block */}
      <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px"}}>
        <p style={{margin:"0 0 12px",fontSize:12,color:C.muted,fontStyle:"italic"}}>
          I confirm that the above information is correct as per site condition.
        </p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Inp label="Name" value={subName} onChange={e=>setSubName(e.target.value)}/>
          <Inp label="Designation" value={subDesig} onChange={e=>setSubDesig(e.target.value)}/>
        </div>
        <p style={{margin:"8px 0 0",fontSize:11,color:C.faint}}>Date: {selDate} · Signature: ________________</p>
      </div>
    </>}
  </div>;
};


// ─── GTV REPOSITORY + WORKER HISTORY ────────────────────────────
// ─── GTV REPOSITORY (SIC/Owner only) ─────────────────────────────
// ══════════════════════════════════════════════════════════════════
// GTV REGISTRATION MODULE
// ══════════════════════════════════════════════════════════════════
// DB TABLE REQUIRED — run gtv_registration_schema.sql first:
//
// CREATE TABLE IF NOT EXISTS gtv_registrations (
//   id               BIGSERIAL PRIMARY KEY,
//   worker_id        BIGINT NOT NULL REFERENCES workers(id),
//   site_id          INTEGER NOT NULL REFERENCES sites(site_id),
//   trade            TEXT NOT NULL,
//   planned_gtv_date DATE NOT NULL,       -- month worker wants to go
//   registered_by    UUID NOT NULL,       -- SK user_id
//   registered_at    TIMESTAMPTZ DEFAULT NOW(),
//   status           TEXT DEFAULT 'pending_supervisor',
//     -- pending_supervisor → pending_sic → pending_owner → approved → rejected
//   supervisor_id    UUID,
//   supervisor_action TEXT,              -- 'approved' | 'rejected'
//   supervisor_note  TEXT,
//   supervisor_at    TIMESTAMPTZ,
//   sic_id           UUID,
//   sic_action       TEXT,
//   sic_note         TEXT,
//   sic_at           TIMESTAMPTZ,
//   owner_id         UUID,
//   owner_action     TEXT,
//   owner_note       TEXT,
//   owner_at         TIMESTAMPTZ,
//   rejection_reason TEXT,
//   payment_hold     BOOLEAN DEFAULT FALSE,
//   notes            TEXT,
//   created_at       TIMESTAMPTZ DEFAULT NOW()
// );
// CREATE INDEX IF NOT EXISTS idx_gtvreg_worker ON gtv_registrations(worker_id);
// CREATE INDEX IF NOT EXISTS idx_gtvreg_site   ON gtv_registrations(site_id);
// CREATE INDEX IF NOT EXISTS idx_gtvreg_status ON gtv_registrations(status);
//
// TRADE SUPERVISOR ROLES TO CREATE IN POLICY MASTER:
//   "Carpenter Supervisor", "Fitter Supervisor", "Labour Supervisor"
//   (Labour Supervisor covers M/C + BRM + PLM combined)
// ══════════════════════════════════════════════════════════════════

// ── GTV Registration constants ────────────────────────────────────
const GTV_LIMITED_TRADES=["Fitter","Carpenter"]; // hard cap of 10
const GTV_LABOUR_TRADES=["M/C","BRM","PLM"];     // combined cap of 10
const GTV_UNLIMITED_TRADES=["Supervisor","Engineer","Electrician","Storekeeper","Helper","Safety","Other"];

// Map worker trade → which supervisor role should approve
const getTradeSupRole=(trade)=>{
  if(trade==="Carpenter") return "Carpenter Supervisor";
  if(trade==="Fitter")    return "Fitter Supervisor";
  if(["M/C","BRM","PLM"].includes(trade)) return "Labour Supervisor";
  return null; // no trade supervisor — goes straight to SIC
};

// Is this worker's trade subject to the 10-worker cap?
const isLimitedTrade=(trade)=>
  GTV_LIMITED_TRADES.includes(trade)||GTV_LABOUR_TRADES.includes(trade);

// Format a date as DD Mon YYYY
const fmtD=(d)=>d?new Date(d).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}):"—";

// Month name from YYYY-MM
const fmtMonth=(ym)=>{
  if(!ym)return"—";
  const [y,m]=ym.split("-");
  return new Date(parseInt(y),parseInt(m)-1,1).toLocaleDateString("en-IN",{month:"long",year:"numeric"});
};

// Status badge colour
const GTV_STATUS_COLOR={
  pending_supervisor:"orange",pending_sic:"blue",pending_owner:"purple",
  approved:"green",rejected:"red"
};
const GTV_STATUS_LABEL={
  pending_supervisor:"Pending Supervisor",pending_sic:"Pending SIC",
  pending_owner:"Pending Owner",approved:"Approved",rejected:"Rejected"
};

// ── Main component ────────────────────────────────────────────────
const GTVRegistration=()=>{
  const {user,perms,activeSiteId,assignedSiteIds,isUnrestricted}=useAuth();
  const isSK     = user.role==="Storekeeper";
  const isSIC    = ["SIC","Admin"].includes(user.role);
  const isOwner  = user.role==="Owner";
  const isSup    = user.role?.toLowerCase().includes("supervisor");
  // Derive which trade this supervisor covers
  const supTrade = isSup ? (()=>{
    const r=user.role.toLowerCase();
    if(r.includes("carpenter")) return "Carpenter";
    if(r.includes("fitter"))    return "Fitter";
    if(r.includes("labour"))    return GTV_LABOUR_TRADES; // array
    return null;
  })() : null;

  const canRegister=isSK;
  const canViewAll =isSIC||isOwner;

  // ── State ──────────────────────────────────────────────────────
  const [regs,setRegs]=useState([]);
  const [workers,setWorkers]=useState([]);
  const [sites,setSites]=useState([]);
  const [loading,setLoading]=useState(false);
  const [tab,setTab]=useState(
    isSK?"register":isSup?"supervisor":isSIC?"sic":"owner"
  );
  // Register form
  const [regOpen,setRegOpen]=useState(false);
  const [regForm,setRegForm]=useState({});
  const [regSaving,setRegSaving]=useState(false);
  const [regWorkers,setRegWorkers]=useState([]); // workers at site eligible for GTV
  const [capInfo,setCapInfo]=useState(null);
  // Action
  const [actOpen,setActOpen]=useState(false);
  const [actReg,setActReg]=useState(null);
  const [actNote,setActNote]=useState("");
  const [actSaving,setActSaving]=useState(false);
  const [payHold,setPayHold]=useState(false);
  // Filter/search
  const [search,setSearch]=useState("");
  const [fStatus,setFStatus]=useState("");
  const [fMonth,setFMonth]=useState("");
  const {show,Toast}=useToast();

  // ── Load ───────────────────────────────────────────────────────
  const load=async()=>{
    setLoading(true);
    let q=sb.from("gtv_registrations")
      .select(`id,worker_id,site_id,trade,planned_gtv_date,registered_at,status,
        supervisor_action,supervisor_note,supervisor_at,
        sic_action,sic_note,sic_at,
        owner_action,owner_note,owner_at,
        rejection_reason,payment_hold,notes,
        workers(worker_name,worker_code,per_day_rate,father_name,mobile),
        sites(site_name)`)
      .order("registered_at",{ascending:false});
    // Scope: SK sees own site regs, Supervisor sees regs for their trade, SIC/Owner see all
    if(isSK&&activeSiteId) q=q.eq("site_id",activeSiteId);
    else if(isSK&&!isUnrestricted&&assignedSiteIds.length>0) q=q.in("site_id",assignedSiteIds);
    if(isSup&&supTrade){
      const trades=Array.isArray(supTrade)?supTrade:[supTrade];
      q=q.in("trade",trades);
    }
    const {data:r,error}=await q;
    if(error&&error.code==="42P01"){
      // Table doesn't exist yet
      setRegs([]);setLoading(false);
      return;
    }
    setRegs(r||[]);
    const [s,si]=await Promise.all([
      sb.from("sites").select("site_id,site_name").eq("is_active",true).order("site_name").then(r=>r.data||[]),
      (()=>{
        let sq=sb.from("sites").select("site_id,site_name").eq("is_active",true).order("site_name");
        if(activeSiteId) sq=sq.eq("site_id",activeSiteId);
        else if(!isUnrestricted&&assignedSiteIds.length>0) sq=sq.in("site_id",assignedSiteIds);
        return sq.then(r=>r.data||[]);
      })(),
    ]);
    setSites(si||s);
    setLoading(false);
  };
  React.useEffect(()=>{load();},[activeSiteId,assignedSiteIds]);

  // ── Load workers eligible for registration ────────────────────
  const loadRegWorkers=async(siteId)=>{
    if(!siteId)return;
    const {data:w}=await sb.from("workers")
      .select("id,worker_code,worker_name,trade,per_day_rate")
      .eq("current_site_id",parseInt(siteId))
      .eq("status","Active")
      .eq("is_active",true)
      .order("worker_name");
    // Exclude already-pending or approved registrations this month
    const now=new Date();
    const thisMonthStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
    const {data:existing}=await sb.from("gtv_registrations")
      .select("worker_id")
      .eq("site_id",parseInt(siteId))
      .not("status","eq","rejected")
      .gte("registered_at",`${thisMonthStr}-01`);
    const taken=new Set((existing||[]).map(r=>r.worker_id));
    setRegWorkers((w||[]).filter(wk=>!taken.has(wk.id)));
  };

  // ── Check trade cap for a given month ────────────────────────
  const checkCap=async(siteId,trade,monthStr)=>{
    if(!isLimitedTrade(trade)){setCapInfo(null);return true;}
    const tradesToCheck=GTV_LABOUR_TRADES.includes(trade)?GTV_LABOUR_TRADES:[trade];
    // Count approved+pending for that month at any site (company-wide cap)
    const {count}=await sb.from("gtv_registrations")
      .select("*",{count:"exact",head:true})
      .in("trade",tradesToCheck)
      .in("status",["pending_supervisor","pending_sic","pending_owner","approved"])
      .like("planned_gtv_date",`${monthStr}%`);
    const used=count||0;
    const remaining=10-used;
    const tradeLabel=GTV_LABOUR_TRADES.includes(trade)?"M/C+BRM+PLM combined":trade;
    setCapInfo({trade:tradeLabel,used,remaining,monthStr});
    return remaining>0;
  };

  // ── Register new GTV ──────────────────────────────────────────
  const submitRegistration=async()=>{
    const {worker_id,site_id,planned_month,notes}=regForm;
    if(!worker_id){show("Select a worker","error");return;}
    if(!planned_month){show("Select planned GTV month","error");return;}
    // Validate: must be at least 1 month in advance
    const now=new Date();
    const [py,pm]=planned_month.split("-").map(Number);
    const planDate=new Date(py,pm-1,1);
    const minDate=new Date(now.getFullYear(),now.getMonth()+1,1); // next month at minimum
    if(planDate<minDate){
      show("GTV must be registered at least 1 month in advance","error");return;
    }
    const worker=regWorkers.find(w=>String(w.id)===String(worker_id));
    if(!worker){show("Worker not found","error");return;}
    // Check trade cap
    const capOk=await checkCap(site_id,worker.trade,planned_month);
    if(!capOk){
      show(`Trade cap reached: max 10 workers from ${worker.trade} can register for ${fmtMonth(planned_month)}`,"error");
      return;
    }
    setRegSaving(true);
    const {error}=await sb.from("gtv_registrations").insert({
      worker_id:parseInt(worker_id),
      site_id:parseInt(site_id||regForm._site_id),
      trade:worker.trade,
      planned_gtv_date:`${planned_month}-01`,
      registered_by:user.user_id,
      status:"pending_supervisor",
      notes:notes||null,
    });
    setRegSaving(false);
    if(error){show(error.message,"error");return;}
    show("GTV registered — awaiting Trade Supervisor approval ✓","success");
    setRegOpen(false);setRegForm({});setCapInfo(null);
    load();
  };

  // ── Supervisor / SIC / Owner approve or reject ────────────────
  const doAction=async(action)=>{ // action: "approve" | "reject"
    if(!actReg)return;
    if(action==="reject"&&!actNote.trim()){show("Rejection reason is required","error");return;}
    setActSaving(true);
    const now=new Date().toISOString();
    let updates={};
    const curStatus=actReg.status;

    if(isSup&&curStatus==="pending_supervisor"){
      updates={
        supervisor_id:user.user_id,
        supervisor_action:action,
        supervisor_note:actNote||null,
        supervisor_at:now,
        status:action==="approve"?"pending_sic":"rejected",
        rejection_reason:action==="reject"?(actNote||null):null,
        payment_hold:action==="reject"?payHold:false,
      };
    } else if(isSIC&&curStatus==="pending_sic"){
      updates={
        sic_id:user.user_id,
        sic_action:action,
        sic_note:actNote||null,
        sic_at:now,
        status:action==="approve"?"pending_owner":"rejected",
        rejection_reason:action==="reject"?(actNote||null):null,
        payment_hold:action==="reject"?payHold:false,
      };
    } else if(isOwner&&curStatus==="pending_owner"){
      updates={
        owner_id:user.user_id,
        owner_action:action,
        owner_note:actNote||null,
        owner_at:now,
        status:action==="approve"?"approved":"rejected",
        rejection_reason:action==="reject"?(actNote||null):null,
        payment_hold:payHold,
      };
    } else {
      show("You are not authorised to action this registration","error");
      setActSaving(false);return;
    }
    const {error}=await sb.from("gtv_registrations").update(updates).eq("id",actReg.id);
    setActSaving(false);
    if(error){show(error.message,"error");return;}
    const msg=action==="approve"
      ?curStatus==="pending_owner"?"GTV fully approved ✓":"Approved — forwarded to next level ✓"
      :"Registration rejected";
    show(msg,"success");
    setActOpen(false);setActReg(null);setActNote("");setPayHold(false);
    load();
  };

  // ── Derived lists ─────────────────────────────────────────────
  // My pending actions
  const myPending=regs.filter(r=>{
    if(isSup) return r.status==="pending_supervisor"&&Array.isArray(supTrade)?supTrade.includes(r.trade):r.trade===supTrade;
    if(isSIC) return r.status==="pending_sic";
    if(isOwner) return r.status==="pending_owner";
    return false;
  });

  const filteredRegs=regs.filter(r=>{
    const q=search.toLowerCase();
