    {/* Transfer Modal */}
    <Modal open={txOpen} onClose={()=>setTxOpen(false)} title="Request Worker Transfer" width={440}>
      {txWorker&&<>
        <div style={{background:"#F8FAFC",borderRadius:10,padding:"12px 14px",marginBottom:16}}>
          <p style={{margin:0,fontWeight:700}}>{txWorker.worker_name}</p>
          <p style={{margin:"3px 0 0",fontSize:12,color:C.muted}}>
            Currently at: <b>{sites.find(s=>s.site_id===txWorker.current_site_id)?.site_name||"—"}</b>
          </p>
        </div>
        <Sel label="Transfer To Site *" value={txForm.to_site_id||""}
          options={sites.filter(s=>s.site_id!==txWorker.current_site_id).map(s=>({v:s.site_id,l:s.site_name}))}
          onChange={e=>setTxForm(f=>({...f,to_site_id:e.target.value}))}/>
        <Sel label="Transfer Type" value={txForm.transfer_type||"permanent"}
          options={[{v:"permanent",l:"Permanent"},{v:"temporary",l:"Temporary"}]}
          onChange={e=>setTxForm(f=>({...f,transfer_type:e.target.value}))}/>
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,
            marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>Notes</label>
          <textarea value={txForm.notes||""} onChange={e=>setTxForm(f=>({...f,notes:e.target.value}))}
            rows={2} placeholder="Reason for transfer..."
            style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,
              borderRadius:8,fontSize:14,fontFamily:"inherit",resize:"vertical",outline:"none"}}/>
        </div>
        <div style={{background:C.yellowBg,border:`1px solid ${C.yellow}40`,borderRadius:8,padding:"10px 14px",marginBottom:14}}>
          <p style={{margin:0,fontSize:12,color:C.yellow,fontWeight:600}}>
            Transfer will be sent to SIC for approval before execution
          </p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={submitTransfer} disabled={txSaving}>{txSaving?"Submitting...":"Submit Request"}</Btn>
          <Btn variant="ghost" onClick={()=>setTxOpen(false)}>Cancel</Btn>
        </div>
      </>}
    </Modal>

    {/* Debit Rate Modal */}
    <Modal open={dbOpen} onClose={()=>setDbOpen(false)} title="Raise Debit Rate Request" width={440}>
      {dbWorker&&<>
        <div style={{background:"#F8FAFC",borderRadius:10,padding:"12px 14px",marginBottom:16}}>
          <p style={{margin:0,fontWeight:700}}>{dbWorker.worker_name}</p>
          <p style={{margin:"3px 0 0",fontSize:12,color:C.muted}}>Tool/material not returned — SIC will set debit rate</p>
        </div>
        <Sel label="Material / Tool *" value={dbForm.material_id||""}
          options={materials.filter(m=>m.material_type==="Tool"||m.is_returnable).length>0
            ?materials.filter(m=>m.material_type==="Tool"||m.is_returnable).map(m=>({v:m.material_id,l:`${m.material_name} (${m.unit})`}))
            :materials.map(m=>({v:m.material_id,l:`${m.material_name} (${m.unit})`}))}
          onChange={e=>setDbForm(f=>({...f,material_id:e.target.value}))}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
          <Inp label="Quantity *" type="number" value={dbForm.quantity||""}
            onChange={e=>setDbForm(f=>({...f,quantity:e.target.value}))}/>
          <Inp label="Salary Month" type="month" value={dbForm.salary_month||""}
            onChange={e=>setDbForm(f=>({...f,salary_month:e.target.value}))}/>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,
            marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>Reason</label>
          <textarea value={dbForm.reason||""} onChange={e=>setDbForm(f=>({...f,reason:e.target.value}))}
            rows={2} placeholder="Why is debit being raised..."
            style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,
              borderRadius:8,fontSize:14,fontFamily:"inherit",resize:"vertical",outline:"none"}}/>
        </div>
        <div style={{background:C.yellowBg,border:`1px solid ${C.yellow}40`,borderRadius:8,padding:"10px 14px",marginBottom:14}}>
          <p style={{margin:0,fontSize:12,color:C.yellow,fontWeight:600}}>
            SIC will review and set the debit rate. Deduction will apply to salary.
          </p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={submitDebit} disabled={dbSaving}>{dbSaving?"Submitting...":"Raise Request"}</Btn>
          <Btn variant="ghost" onClick={()=>setDbOpen(false)}>Cancel</Btn>
        </div>
      </>}
    </Modal>

    {/* Reactivate Worker Modal */}
    <Modal open={rxOpen} onClose={()=>setRxOpen(false)} title="↑ Rejoin Worker" width={460}>
      {rxWorker&&<>
        <div style={{background:"#f0fdf4",border:"1.5px solid #bbf7d0",borderRadius:10,padding:"14px 16px",marginBottom:18}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <p style={{margin:0,fontWeight:700,fontSize:16}}>{rxWorker.worker_name}</p>
              <p style={{margin:"3px 0 0",fontSize:12,color:"#6b7280"}}>
                <code style={{fontWeight:700}}>{rxWorker.worker_code}</code> · {rxWorker.trade}
              </p>
            </div>
            <Badge color="red">Left</Badge>
          </div>
          <div style={{display:"flex",gap:16,marginTop:10,paddingTop:10,borderTop:"1px solid #bbf7d0"}}>
            {rxWorker.aadhaar_number&&<p style={{margin:0,fontSize:11,color:"#6b7280"}}>Aadhaar: <b>{rxWorker.aadhaar_number}</b></p>}
            {rxWorker.bank_account&&<p style={{margin:0,fontSize:11,color:"#6b7280"}}>Bank: <b>{rxWorker.bank_account}</b></p>}
          </div>
        </div>
        <Divider label="Assign to Site"/>
        <Sel label="Site *" value={rxForm.current_site_id||""}
          options={sites.map(s=>({v:s.site_id,l:s.site_name}))}
          onChange={e=>{const sid=parseInt(e.target.value);setRxForm(f=>({...f,current_site_id:e.target.value,current_store_id:"",building_id:""}));setRxBuildings(allBuildings.filter(b=>b.site_id===sid));}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
          <Sel label="Store" value={rxForm.current_store_id||""}
            placeholder={rxForm.current_site_id?"— Select store —":"Select site first"}
            options={stores.filter(s=>s.site_id===parseInt(rxForm.current_site_id)).map(s=>({v:s.store_id,l:s.store_name}))}
            onChange={e=>setRxForm(f=>({...f,current_store_id:e.target.value}))}/>
          <Sel label="Building / Tower" value={rxForm.building_id||""}
            placeholder={rxForm.current_site_id?"— Optional —":"Select site first"}
            options={rxBuildings.map(b=>({v:b.id,l:b.building_name+(b.building_code?` (${b.building_code})`:"")})) }
            onChange={e=>setRxForm(f=>({...f,building_id:e.target.value}))}/>
        </div>
        <Divider label="Rate & Date"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
          <div>
            <Inp label="Rate per Day (₹) *" type="number" value={rxForm.per_day_rate||""}
              onChange={e=>setRxForm(f=>({...f,per_day_rate:e.target.value}))}/>
            {rxWorker.per_day_rate>0&&<p style={{margin:"-8px 0 8px",fontSize:10,color:"#6b7280"}}>Last rate: ₹{rxWorker.per_day_rate}</p>}
          </div>
          <Inp label="Rejoining Date" type="date" value={rxForm.date_joined||""}
            onChange={e=>setRxForm(f=>({...f,date_joined:e.target.value}))}/>
        </div>
        <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"10px 14px",marginBottom:14}}>
          <p style={{margin:0,fontSize:12,color:"#92400e",fontWeight:600}}>
            Status will change <b>Left → Active</b>. Worker will appear in attendance from rejoining date.
          </p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={submitReactivate} disabled={rxSaving} style={{background:"#16a34a",borderColor:"#16a34a"}}>
            {rxSaving?"Activating...":"✓ Confirm Rejoin"}
          </Btn>
          <Btn variant="ghost" onClick={()=>setRxOpen(false)}>Cancel</Btn>
        </div>
      </>}
    </Modal>

    {/* Worker History Modal */}
    <Modal open={histOpen} onClose={()=>{setHistOpen(false);setHistWorker(null);}}
      title={histWorker?`History — ${histWorker.worker_name}`:"Worker History"} width={500}>
      {histWorker&&<>
        <div style={{background:"#F8FAFC",borderRadius:10,padding:"10px 14px",marginBottom:14}}>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontWeight:700}}>{histWorker.worker_code}</span>
            <Badge color="blue">{histWorker.trade}</Badge>
            <Badge color={histWorker.status==="Active"?"green":histWorker.status==="GTV"?"orange":"red"}>
              {histWorker.status}
            </Badge>
            <span style={{fontSize:12,color:C.muted}}>₹{histWorker.per_day_rate||0}/day</span>
          </div>
        </div>
        <WorkerHistory workerId={histWorker.id} workerName={histWorker.worker_name}/>
      </>}
    </Modal>

    {/* View Worker Profile Modal */}
    <WorkerViewModal
      worker={viewWorker}
      onClose={()=>setViewWorker(null)}
      onEdit={canEdit?(w)=>{setViewWorker(null);setPendingEditWorker(w);setActive("labour");}:null}
      onIdCard={(w)=>{setViewWorker(null);setIdCardWorker(w);}}
      onPrint={async(w)=>{
        const {data:ppe}=await sb.from("worker_ppe")
          .select("helmet_issued,belt_issued,gumboot_issued")
          .eq("worker_id",w.id).maybeSingle();
        setViewWorker(null);setPrintWorker(ppe?{...w,...ppe}:w);
      }}/>

    {/* Print Registration Form */}
    <WorkerPrintForm worker={printWorker} onClose={()=>setPrintWorker(null)}/>

    {/* ID Card */}
    <WorkerIdCard worker={idCardWorker} onClose={()=>setIdCardWorker(null)}/>

    {/* ── MARK GTV MODAL (Urgent / Unregistered) ─────────── */}
    <Modal open={gtvOpen&&!!gtvWorker} onClose={()=>{setGtvOpen(false);setGtvWorker(null);setOpenSessions([]);}}
      title="Mark Worker as GTV" width={500}>
      {gtvWorker&&<>
        {/* Worker summary */}
        <div style={{background:"#F8FAFC",border:`1px solid ${C.border}`,borderRadius:10,
          padding:"12px 16px",marginBottom:16,display:"flex",gap:12,alignItems:"center"}}>
          <div style={{width:38,height:38,borderRadius:"50%",background:"#fff7ed",
            display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span style={{fontSize:15,fontWeight:800,color:"#f59e0b"}}>{gtvWorker.worker_name[0]}</span>
          </div>
          <div>
            <p style={{margin:0,fontWeight:700,fontSize:14}}>{gtvWorker.worker_name}</p>
            <p style={{margin:0,fontSize:12,color:C.muted}}>{gtvWorker.worker_code} · {gtvWorker.trade} · ₹{gtvWorker.per_day_rate||0}/day</p>
          </div>
        </div>

        {/* Policy note */}
        <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:9,
          padding:"10px 14px",marginBottom:14}}>
          <p style={{margin:0,fontSize:12,color:"#92400e",fontWeight:600}}>
            Urgent / Unregistered GTV — bypasses advance registration workflow.
            Attendance for days worker was present must be resolved before GTV is confirmed.
          </p>
        </div>

        {/* GTV Date */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px",marginBottom:4}}>
          <Inp label="GTV Date *" type="date" value={gtvForm.gtv_date||""}
            onChange={async e=>{
              setGtvForm(f=>({...f,gtv_date:e.target.value}));
              await checkOpenSessions(e.target.value);
            }}/>
          <Inp label="Promise Date (informational)" type="date" value={gtvForm.promise_date||""}
            hint="Date worker said they will return"
            onChange={e=>setGtvForm(f=>({...f,promise_date:e.target.value}))}/>
        </div>

        {/* Open sessions warning */}
        {openSessions.length>0&&<div style={{background:"#FEF2F2",border:"1.5px solid #fca5a5",
          borderRadius:10,padding:"12px 14px",marginBottom:14}}>
          <p style={{margin:"0 0 10px",fontWeight:700,fontSize:13,color:"#dc2626"}}>
            ⚠ {openSessions.length} unsubmitted attendance session{openSessions.length>1?"s":""} found
          </p>
          <p style={{margin:"0 0 10px",fontSize:12,color:"#991b1b"}}>
            Worker shows as <b>Present</b> in these sessions. Resolve each before confirming GTV.
            The company owes wages for days worker was genuinely at site.
          </p>
          {openSessions.map(s=>(
            <div key={s.session_id} style={{background:"#fff",border:`1px solid #fca5a5`,
              borderRadius:8,padding:"10px 12px",marginBottom:8}}>
              <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{fontWeight:700,fontSize:13}}>{s.att_date}</span>
                <Badge color="gray">{s.status}</Badge>
                <span style={{fontSize:12,color:C.muted}}>Haajri: {s.haajri||1.0}</span>
                <div style={{marginLeft:"auto",display:"flex",gap:6}}>
                  {["present","absent"].map(opt=>(
                    <button key={opt} onClick={()=>setSessionResolutions(r=>({...r,[s.session_id]:opt}))}
                      style={{padding:"5px 12px",borderRadius:7,fontSize:12,fontWeight:700,
                        cursor:"pointer",fontFamily:"inherit",
                        border:`1.5px solid ${sessionResolutions[s.session_id]===opt
                          ?(opt==="present"?"#16a34a":"#dc2626"):C.border}`,
                        background:sessionResolutions[s.session_id]===opt
                          ?(opt==="present"?"#dcfce7":"#fee2e2"):"#fff",
                        color:sessionResolutions[s.session_id]===opt
                          ?(opt==="present"?"#16a34a":"#dc2626"):C.muted}}>
                      {opt==="present"?"✓ Was Present (pay wages)":"✕ Was Absent"}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          ))}
        </div>}

        {openSessions.length===0&&gtvForm.gtv_date&&<div style={{background:"#f0fdf4",
          border:"1px solid #86efac",borderRadius:8,padding:"10px 14px",marginBottom:14}}>
          <p style={{margin:0,fontSize:12,color:"#166534",fontWeight:600}}>
            ✓ No unsubmitted attendance sessions found — GTV can be confirmed immediately.
          </p>
        </div>}

        {/* Note */}
        <Inp label="Reason / Note (optional)" value={gtvForm.note||""}
          placeholder="e.g. Family emergency, urgent departure…"
          onChange={e=>setGtvForm(f=>({...f,note:e.target.value}))}/>

        <div style={{display:"flex",gap:8,marginTop:8}}>
          <Btn onClick={submitMarkGTV} disabled={gtvSaving||!gtvForm.gtv_date
            ||openSessions.some(s=>!sessionResolutions[s.session_id])}
            style={{background:"#f59e0b",borderColor:"#f59e0b"}}>
            {gtvSaving?"Processing…":"✓ Confirm GTV"}
          </Btn>
          <Btn variant="ghost" onClick={()=>{setGtvOpen(false);setGtvWorker(null);setOpenSessions([]);}}>Cancel</Btn>
        </div>
        {openSessions.some(s=>!sessionResolutions[s.session_id])&&
          <p style={{margin:"8px 0 0",fontSize:11,color:"#dc2626",fontWeight:600}}>
            Resolve all attendance sessions above before confirming.
          </p>}
      </>}
    </Modal>

    {/* ── GTV TAB: REJOIN / MARK LEFT MODAL ───────────── */}
    <Modal open={gtvActOpen&&!!gtvActWorker}
      onClose={()=>{setGtvActOpen(false);setGtvActWorker(null);setGtvActNote("");}}
      title={gtvActType==="rejoin"?"Rejoin Worker":"Mark as Left"} width={460}>
      {gtvActWorker&&<>
        <div style={{background:"#F8FAFC",border:`1px solid ${C.border}`,borderRadius:10,
          padding:"12px 16px",marginBottom:16,display:"flex",gap:12,alignItems:"center"}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:C.accentBg,
            display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span style={{fontSize:14,fontWeight:800,color:C.accent}}>{gtvActWorker.worker_name[0]}</span>
          </div>
          <div>
            <p style={{margin:0,fontWeight:700}}>{gtvActWorker.worker_name}</p>
            <p style={{margin:0,fontSize:12,color:C.muted}}>{gtvActWorker.worker_code} · {gtvActWorker.trade} · GTV since {gtvActWorker.gtv_date||"—"}</p>
          </div>
        </div>
        {gtvActType==="rejoin"&&<>
          <div style={{marginBottom:12}}>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,
              marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}}>Assign to Site *</label>
            <select value={gtvRejoinSite} onChange={e=>setGtvRejoinSite(e.target.value)}
              style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${gtvRejoinSite?"#86efac":C.border}`,
                borderRadius:8,fontSize:14,fontFamily:"inherit",background:"#fff",outline:"none"}}>
              <option value="">— Select Site —</option>
              {sites.map(s=><option key={s.site_id} value={s.site_id}>{s.site_name}</option>)}
            </select>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px",marginBottom:12}}>
            <Inp label="Rejoining Date" type="date" value={gtvRejoinDate}
              onChange={e=>setGtvRejoinDate(e.target.value)}/>
            <Inp label={`Rate/Day (cur ₹${gtvActWorker.per_day_rate||0})`} type="number"
              value={gtvRejoinRate} placeholder={String(gtvActWorker.per_day_rate||0)}
              hint="Leave blank to keep current" onChange={e=>setGtvRejoinRate(e.target.value)}/>
          </div>
        </>}
        {gtvActType==="mark_left"&&<div style={{background:"#FEF2F2",border:"1px solid #fca5a5",
          borderRadius:8,padding:"12px 14px",marginBottom:12}}>
          <p style={{margin:0,fontSize:13,color:"#dc2626",fontWeight:700}}>⚠ Permanent Action</p>
          <p style={{margin:"4px 0 0",fontSize:12,color:"#dc2626"}}>
            Worker will be permanently marked Left. Outstanding salary must be settled in Payroll.
          </p>
        </div>}
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,
            marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>Note (optional)</label>
          <textarea value={gtvActNote} onChange={e=>setGtvActNote(e.target.value)} rows={2}
            style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,
              borderRadius:8,fontSize:13,fontFamily:"inherit",resize:"none",outline:"none",boxSizing:"border-box"}}/>
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={submitGtvAction} disabled={gtvActSaving}
            style={gtvActType==="mark_left"?{background:"#dc2626",borderColor:"#dc2626"}:
              {background:"#16a34a",borderColor:"#16a34a"}}>
            {gtvActSaving?"Processing…":gtvActType==="rejoin"?"✓ Confirm Rejoin":"✓ Mark as Left"}
          </Btn>
          <Btn variant="ghost" onClick={()=>setGtvActOpen(false)}>Cancel</Btn>
        </div>
      </>}
    </Modal>
  </div>;
};

// ─── BUILDING MASTER ─────────────────────────────────────────────
const BuildingMaster = () => {
  const {user} = useAuth();
  // Fix 3: Only Owner/Admin can create/edit buildings
  const canEdit = user.role==="Owner"||user.role==="Admin";
  const [sites,setSites]     = useState([]);
  const [buildings,setBuildings] = useState([]);
  const [users,setUsers]     = useState([]);
  const [assignments,setAssignments] = useState([]);
  const [filterSite,setFilterSite] = useState("");
  const [open,setOpen]       = useState(false);
  const [assignOpen,setAssignOpen] = useState(false);
  const [editing,setEditing] = useState(null);
  const [selBuilding,setSelBuilding] = useState(null);
  const [form,setForm]       = useState({});
  const [assignForm,setAssignForm] = useState({});
  const [errs,setErrs]       = useState({});
  const [saving,setSaving]   = useState(false);
  const {show,Toast}         = useToast();
  const F = v => setForm(f=>({...f,...v}));

  const load = useCallback(async()=>{
    const [{data:s},{data:b},{data:u},{data:a}] = await Promise.all([
      sb.from("sites").select("site_id,site_name").eq("is_active",true).order("site_name"),
      sb.from("buildings").select("*,sites(site_name)").order("site_id").order("building_name"),
      sb.from("app_users").select("user_id,name,role,avatar_url").eq("is_active",true).order("name"),
      sb.from("building_assignments").select("*,app_users(name,role),buildings(building_name,sites(site_name))").eq("is_active",true),
    ]);
    setSites(s||[]);setBuildings(b||[]);setUsers(u||[]);setAssignments(a||[]);
  },[]);
  useEffect(()=>{load();},[load]);

  const saveBuilding = async()=>{
    const e={};
    if(!form.building_name?.trim()) e.building_name="Required";
    if(!form.site_id) e.site_id="Select a site";
    if(Object.keys(e).length){setErrs(e);return;}
    setSaving(true);
    const bua=parseFloat(form.bua_sqft)||null;
    const cv=parseFloat(form.contract_value)||null;
    const p={
      building_name:form.building_name.trim(),
      site_id:parseInt(form.site_id),
      building_code:form.building_code?.trim()||null,
      floors:parseInt(form.floors)||null,
      bua_sqft:bua,
      contract_value:cv,
      cost_per_sqft:form.cost_per_sqft?parseFloat(form.cost_per_sqft):(bua&&cv?Math.round(cv/bua):null),
      description:form.description||null,
      is_active:form.is_active!==false
    };
    const {error} = editing
      ? await sb.from("buildings").update(p).eq("id",editing.id)
      : await sb.from("buildings").insert(p);
    setSaving(false);
    if(error){show(error.message,"error");return;}
    show(editing?"Updated ✓":"Building added ✓");
    setOpen(false);load();
  };

  const saveAssignment = async()=>{
    if(!assignForm.user_id){show("Select a user","error");return;}
    // Check duplicate
    const exists = assignments.find(a=>a.building_id===selBuilding.id&&a.user_id===assignForm.user_id&&a.is_active);
    if(exists){show("User already assigned to this building","error");return;}
    setSaving(true);
    const {error} = await sb.from("building_assignments").insert({
      building_id: selBuilding.id,
      user_id: assignForm.user_id,
      assigned_role: assignForm.assigned_role||null,
      is_active: true
    });
    setSaving(false);
    if(error){show(error.message,"error");return;}
    show("Assigned ✓");setAssignOpen(false);setAssignForm({});load();
  };

  const removeAssignment = async(a)=>{
    if(!confirm(`Remove ${a.app_users?.name} from ${selBuilding?.building_name}?`)) return;
    await sb.from("building_assignments").update({is_active:false}).eq("id",a.id);
    show("Removed");load();
  };

  const filtered = filterSite
    ? buildings.filter(b=>b.site_id===parseInt(filterSite))
    : buildings;

  // Group by site
  const grouped = filtered.reduce((acc,b)=>{
    const k = b.sites?.site_name||"Unknown";
    (acc[k]=acc[k]||[]).push(b); return acc;
  },{});

  const getBuildingAssignments = bid => assignments.filter(a=>a.building_id===bid);

  return <div>
    <Toast/>
    <PH title="Buildings & Towers"
      sub="Manage buildings per site and assign engineers/supervisors"
      right={canEdit&&<Btn onClick={()=>{setEditing(null);setForm({is_active:true});setErrs({});setOpen(true);}}>
        <Ic d={I.plus} s={15} col="#fff"/>Add Building
      </Btn>}/>

    {/* Site filter */}
    <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
      <select value={filterSite} onChange={e=>setFilterSite(e.target.value)}
        style={{padding:"8px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,
          fontSize:13,color:filterSite?C.text:C.muted,background:"#fff",fontFamily:"inherit"}}>
        <option value="">All Sites</option>
        {sites.map(s=><option key={s.site_id} value={s.site_id}>{s.site_name}</option>)}
      </select>
    </div>

    {/* Buildings grouped by site */}
    {Object.keys(grouped).length===0
      ?<div style={{padding:40,textAlign:"center",border:`1px dashed ${C.border}`,borderRadius:12,color:C.faint}}>
        No buildings yet — add towers/wings for each site
      </div>
      :Object.entries(grouped).map(([siteName,blds])=>(
        <div key={siteName} style={{marginBottom:28}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <Ic d={I.building} s={15} col={C.muted}/>
            <span style={{fontWeight:800,fontSize:15}}>{siteName}</span>
            <Badge color="blue">{blds.length} building{blds.length!==1?"s":""}</Badge>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
            {blds.map(b=>{
              const bAssign = getBuildingAssignments(b.id);
              return <div key={b.id} style={{background:C.card,border:`1px solid ${C.border}`,
                borderRadius:12,overflow:"hidden"}}>
                {/* Building header */}
                <div style={{padding:"14px 16px",borderBottom:`1px solid ${C.border}`,
                  background:b.is_active?"#F8FAFC":"#FEF2F2",
                  display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontWeight:800,fontSize:16}}>{b.building_name}</span>
                      {b.building_code&&<code style={{fontSize:11,color:C.accent,fontWeight:700}}>{b.building_code}</code>}
                    </div>
                    <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
                      {b.floors&&<Badge color="gray">{b.floors} Floors</Badge>}
                      {b.bua_sqft&&<Badge color="blue">{Number(b.bua_sqft).toLocaleString("en-IN")} sqft</Badge>}
                      {b.cost_per_sqft&&<Badge color="purple">₹{Number(b.cost_per_sqft).toLocaleString("en-IN")}/sqft</Badge>}
                      {b.is_active?<Badge color="green" dot>Active</Badge>:<Badge color="red" dot>Inactive</Badge>}
                    </div>
                    {b.contract_value&&<p style={{margin:"4px 0 0",fontSize:11,color:C.muted}}>Contract: <b>₹{(b.contract_value/100000).toFixed(2)}L</b></p>}
                    {b.description&&<p style={{margin:"2px 0 0",fontSize:11,color:C.muted}}>{b.description}</p>}
                  </div>
                  <Btn size="sm" variant="ghost" onClick={()=>{setEditing(b);setForm({...b,site_id:b.site_id?.toString()});setErrs({});setOpen(true);}}>Edit</Btn>
                </div>
                {/* Assigned users */}
                <div style={{padding:"12px 16px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <span style={{fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".06em"}}>
                      Assigned Team ({bAssign.length})
                    </span>
                    <button onClick={()=>{setSelBuilding(b);setAssignForm({});setAssignOpen(true);}}
                      style={{background:C.accentBg,border:"none",borderRadius:6,padding:"3px 10px",
                        fontSize:11,fontWeight:700,color:C.accent,cursor:"pointer"}}>
                      + Assign
                    </button>
                  </div>
                  {bAssign.length===0
                    ?<p style={{margin:0,fontSize:12,color:C.faint,fontStyle:"italic"}}>No team assigned yet</p>
                    :<div style={{display:"flex",flexDirection:"column",gap:6}}>
                      {bAssign.map(a=>(
                        <div key={a.id} style={{display:"flex",alignItems:"center",gap:8,
                          padding:"6px 8px",background:"#F8FAFC",borderRadius:7}}>
                          <div style={{width:28,height:28,borderRadius:"50%",flexShrink:0,
                            background:C[(roleColor[a.app_users?.role]||"gray")+"Bg"]||"#F1F5F9",
                            display:"flex",alignItems:"center",justifyContent:"center"}}>
                            <span style={{fontSize:11,fontWeight:800,color:C[roleColor[a.app_users?.role]]||C.muted}}>
                              {(a.app_users?.name||"?")[0].toUpperCase()}
                            </span>
                          </div>
                          <div style={{flex:1,minWidth:0}}>
                            <p style={{margin:0,fontSize:12,fontWeight:700,
                              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                              {a.app_users?.name}
                            </p>
                            <div style={{display:"flex",gap:4,marginTop:1}}>
                              <Badge color={roleColor[a.app_users?.role]||"gray"}>{a.app_users?.role}</Badge>
                              {a.assigned_role&&<Badge color="gray">{a.assigned_role}</Badge>}
                            </div>
                          </div>
                          <button onClick={()=>removeAssignment(a)}
                            style={{background:"none",border:"none",cursor:"pointer",color:C.faint,padding:2,flexShrink:0}}>
                            <Ic d={I.x} s={13}/>
                          </button>
                        </div>
                      ))}
                    </div>}
                </div>
              </div>;
            })}
          </div>
        </div>
      ))}

    {/* Add/Edit Building */}
    <SlideOver open={open} onClose={()=>setOpen(false)}
      title={editing?"Edit Building":"Add Building"}>
      <Sel label="Site *" value={form.site_id||""}
        options={sites.map(s=>({v:s.site_id,l:s.site_name}))}
        onChange={e=>F({site_id:e.target.value})} error={errs.site_id}/>
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:"0 12px"}}>
        <Inp label="Building / Tower Name *" value={form.building_name||""}
          placeholder="e.g. Tower A, Wing B, C3"
          onChange={e=>F({building_name:e.target.value})} error={errs.building_name}/>
        <Inp label="Code" value={form.building_code||""} placeholder="T-A"
          onChange={e=>F({building_code:e.target.value})}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="No. of Floors" type="number" value={form.floors||""}
          placeholder="e.g. 24" onChange={e=>F({floors:e.target.value})}/>
        <Inp label="Built-up Area (sqft)" type="number" value={form.bua_sqft||""}
          placeholder="e.g. 45000" hint="Optional — can fill later"
          onChange={e=>F({bua_sqft:e.target.value})}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="Contract Value (₹)" type="number" value={form.contract_value||""}
          placeholder="e.g. 25000000" hint="Optional"
          onChange={e=>F({contract_value:e.target.value})}/>
        <Inp label="Cost per sqft (₹)" type="number" value={form.cost_per_sqft||""}
          hint={form.bua_sqft&&form.contract_value
            ?`Auto = ₹${Math.round(parseFloat(form.contract_value)/parseFloat(form.bua_sqft)).toLocaleString("en-IN")}/sqft`
            :"Auto-calc from Contract ÷ BUA"}
          onChange={e=>F({cost_per_sqft:e.target.value})}/>
      </div>
      <Inp label="Description / Notes" value={form.description||""}
        placeholder="e.g. Residential tower, east wing"
        onChange={e=>F({description:e.target.value})}/>
      <Tog label="Building is Active" checked={form.is_active!==false} onChange={v=>F({is_active:v})}/>
      <div style={{display:"flex",gap:8,paddingTop:8}}>
        <Btn onClick={saveBuilding} disabled={saving}>{saving?"Saving...":editing?"Save Changes":"Add Building"}</Btn>
        <Btn variant="ghost" onClick={()=>setOpen(false)}>Cancel</Btn>
      </div>
    </SlideOver>

    {/* Assign User to Building */}

            <p style={{margin:"3px 0 0",fontSize:12,color:C.muted}}>{selBuilding?.sites?.site_name}</p>
          </div>
          <button onClick={()=>setAssignOpen(false)} style={{background:"none",border:"none",cursor:"pointer",color:C.muted}}><Ic d={I.x}/></button>

          <Inp label="Role in this Building (optional)" value={assignForm.assigned_role||""}
            placeholder="e.g. Incharge, Deputy SIC, Block Engineer"

          <div style={{background:C.accentBg,border:"1px solid #BFDBFE",borderRadius:8,

            </p>

          <div style={{display:"flex",gap:8}}>

            <Btn variant="ghost" onClick={()=>setAssignOpen(false)}>Cancel</Btn>

    </div>}
  </div>;
};

// MATERIAL MASTER
// ══════════════════════════════════════════════════════════════════
const MaterialMaster=()=>{
  const {perms}=useAuth();
  if(!hasPerm(perms,"Store","can_view")&&!hasPerm(perms,"Masters","can_view"))return <NoAccess module="Material Master"/>;
  const canEdit=hasPerm(perms,"Masters","can_add")||hasPerm(perms,"Store","can_add");
  const [data,setData]=useState([]);const [search,setSearch]=useState("");
  const [fCat,setFCat]=useState("");const [open,setOpen]=useState(false);
  const [editing,setEditing]=useState(null);const [form,setForm]=useState({});
  const [errs,setErrs]=useState({});const [saving,setSaving]=useState(false);
  const [page,setPage]=useState(0);const PS=25;
  const {show,Toast}=useToast();const F=v=>setForm(f=>({...f,...v}));
  const CATS=["Cement","Steel","Timber","Tools","Consumables","Electrical","Plumbing","Safety","Hardware","Other"];
  const UNITS=["kg","nos","mtr","bag","ltr","set","pair","rmt","sqmt","ton","cft"];

  const load=useCallback(async()=>{const {data:d}=await sb.from("materials").select("*").order("material_name");setData(d||[]);},[]);
  useEffect(()=>{load();},[load]);

  const save=async()=>{
    const e={};
    if(!form.material_name?.trim())e.material_name="Required";
    if(!form.category)e.category="Required";
    if(!form.unit)e.unit="Required";
    if(!form.material_type)e.material_type="Required";
    if(Object.keys(e).length){setErrs(e);return;}
    setSaving(true);
    const p={material_name:form.material_name.trim(),category:form.category,unit:form.unit,
      material_type:form.material_type,is_returnable:!!form.is_returnable,
      brand_or_make:form.brand_or_make||null,moq:parseFloat(form.moq)||0,
      current_stock:parseFloat(form.current_stock)||0,is_active:form.is_active!==false};
    const {error}=editing?await sb.from("materials").update(p).eq("material_id",editing.material_id)
      :await sb.from("materials").insert(p);
    setSaving(false);
    if(error){show(error.message,"error");return;}
    show("Saved ✓");setOpen(false);load();
  };

  const filtered=data.filter(d=>{
    if(fCat&&d.category!==fCat)return false;
    if(search&&!d.material_name.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });
  const paged=filtered.slice(page*PS,(page+1)*PS);

  return <div>
    <Toast/>
    <PH title="Material Master"
      sub={`${data.filter(d=>d.is_active).length} active · ${data.filter(d=>d.moq>0&&d.current_stock<d.moq).length} low stock`}
      right={canEdit&&<Btn onClick={()=>{setEditing(null);setForm({is_returnable:false,is_active:true,moq:0,current_stock:0});setErrs({});setOpen(true);}}>
        <Ic d={I.plus} s={15} col="#fff"/>Add Material</Btn>}/>
    <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
      <Search value={search} onChange={v=>{setSearch(v);setPage(0);}} placeholder="Search materials..."/>
      <select value={fCat} onChange={e=>{setFCat(e.target.value);setPage(0);}}
        style={{padding:"8px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,color:fCat?C.text:C.muted,background:"#fff",fontFamily:"inherit"}}>
        <option value="">All Categories</option>
        {CATS.map(c=><option key={c} value={c}>{c}</option>)}
      </select>
    </div>
    <Tbl cols={[
      {h:"Material",r:r=><div><span style={{fontWeight:700}}>{r.material_name}</span>
        {r.brand_or_make&&<span style={{color:C.faint,fontSize:11,marginLeft:6}}>{r.brand_or_make}</span>}</div>},
      {h:"Category",r:r=><Badge color="blue">{r.category}</Badge>},
      {h:"Unit",r:r=><Badge color="gray">{r.unit}</Badge>},
      {h:"Stock/MOQ",r:r=><div style={{display:"flex",gap:5,alignItems:"center"}}>
        <span style={{fontWeight:600}}>{r.current_stock}</span>
        <span style={{color:C.faint}}>/{r.moq}</span>
        {r.moq>0&&r.current_stock<r.moq&&<Badge color="red">Low</Badge>}
      </div>},
      {h:"Returnable",r:r=>r.is_returnable?<Badge color="green">Yes</Badge>:<Badge color="gray">No</Badge>},
      {h:"Status",r:r=>r.is_active?<Badge color="green" dot>Active</Badge>:<Badge color="gray" dot>Inactive</Badge>},
      {h:"",r:r=>canEdit&&<Btn size="sm" variant="secondary" onClick={()=>{setEditing(r);setForm({...r});setErrs({});setOpen(true);}}>Edit</Btn>},
    ]} rows={paged} empty="No materials yet"/>
    <Pager page={page} total={filtered.length} size={PS} onChange={setPage}/>

    <SlideOver open={open} onClose={()=>setOpen(false)} title={editing?"Edit Material":"Add Material"}>
      <Inp label="Material Name *" value={form.material_name||""} placeholder="e.g. OPC Cement 53 Grade"
        onChange={e=>F({material_name:e.target.value})} error={errs.material_name}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Sel label="Category *" value={form.category||""} options={CATS}
          onChange={e=>F({category:e.target.value})} error={errs.category}/>
        <Sel label="Unit *" value={form.unit||""} options={UNITS}
          onChange={e=>F({unit:e.target.value})} error={errs.unit}/>
      </div>
      <Sel label="Material Type *" value={form.material_type||""}
        options={["Purchased","Client-Supplied","Tool"]} onChange={e=>F({material_type:e.target.value})} error={errs.material_type}/>
      <Inp label="Brand / Make" value={form.brand_or_make||""} placeholder="e.g. UltraTech"
        onChange={e=>F({brand_or_make:e.target.value})}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="MOQ" type="number" value={form.moq??0} onChange={e=>F({moq:e.target.value})}/>
        <Inp label="Current Stock" type="number" value={form.current_stock??0} onChange={e=>F({current_stock:e.target.value})}/>
      </div>
      <Tog label="Is Returnable" sub="Tools and equipment" checked={!!form.is_returnable} onChange={v=>F({is_returnable:v})}/>
      <Tog label="Is Active" checked={form.is_active!==false} onChange={v=>F({is_active:v})}/>
      <div style={{display:"flex",gap:8,paddingTop:8}}>
        <Btn onClick={save} disabled={saving}>{saving?"Saving...":editing?"Save":"Add Material"}</Btn>
        <Btn variant="ghost" onClick={()=>setOpen(false)}>Cancel</Btn>
      </div>
    </SlideOver>
  </div>;
};

// ─── PAYROLL MODULE ──────────────────────────────────────────────
const PayrollModule=()=>{
  const {user,perms,assignedSiteIds,isUnrestricted}=useAuth();
  if(!hasPerm(perms,"Payroll","can_view"))return <NoAccess module="Payroll"/>;
  const canEdit=hasPerm(perms,"Payroll","can_add");
  const [tab,setTab]=useState("runs");
  const [sites,setSites]=useState([]);
  const [wallets,setWallets]=useState([]);
  const [selSite,setSelSite]=useState("");
  const [fromDate,setFromDate]=useState(()=>{const d=new Date();d.setDate(1);return d.toISOString().split("T")[0];});
  const [toDate,setToDate]=useState(()=>new Date().toISOString().split("T")[0]);
  const [entries,setEntries]=useState([]);
  const [runs,setRuns]=useState([]);
  const [selRun,setSelRun]=useState(null);
  const [runEntries,setRunEntries]=useState([]);
  const [advances,setAdvances]=useState([]);
  const [siteWorkers,setSiteWorkers]=useState([]);
  const [advForm,setAdvForm]=useState({worker_id:"",amount:"",payment_date:new Date().toISOString().split("T")[0],description:"",mode_type:"cash",wallet_id:""});
  const [advOpen,setAdvOpen]=useState(false);
  const [calcDone,setCalcDone]=useState(false);
  const [saving,setSaving]=useState(false);
  const [loading,setLoading]=useState(false);
  const [toast,setToast]=useState(null);
  const show=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};
  const fmtDate=d=>d?new Date(d).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}):"--";
  const fmtMoney=n=>"₹"+(parseFloat(n)||0).toLocaleString("en-IN",{minimumFractionDigits:0,maximumFractionDigits:0});
  const statusBadge=s=>{
    const cfg={draft:{col:C.orange,bg:C.orangeBg},paid:{col:C.green,bg:C.greenBg},approved:{col:C.blue,bg:C.blueBg}};
    const c=cfg[s]||cfg.draft;
    return <span style={{background:c.bg,color:c.col,padding:"2px 8px",borderRadius:12,fontSize:11,fontWeight:600}}>{s.toUpperCase()}</span>;
  };

  useEffect(()=>{
    (async()=>{
      let q=sb.from("sites").select("site_id,site_name").eq("is_active",true).order("site_name");
      if(!isUnrestricted&&assignedSiteIds.length>0) q=q.in("site_id",assignedSiteIds);
      const {data:s}=await q; setSites(s||[]);
      if((s||[]).length===1) setSelSite(String(s[0].site_id));
      const {data:w}=await sb.from("cash_wallets").select("wallet_id,person_name,current_balance").eq("is_active",true).order("person_name");
      setWallets(w||[]);
    })();
  },[]);

  const loadRuns=async()=>{
    if(!selSite) return;
    const {data}=await sb.from("payroll_runs")
      .select("run_id,from_date,to_date,run_date,status,total_amount,app_users(name)")
      .eq("site_id",parseInt(selSite))
      .order("from_date",{ascending:false});
    setRuns(data||[]);
  };
  useEffect(()=>{loadRuns();setSiteWorkers([]);setCalcDone(false);setEntries([]);setSelRun(null);
    if(selSite){
      sb.from("workers").select("id,worker_name,worker_code,trade,per_day_rate")
        .eq("current_site_id",parseInt(selSite)).eq("status","Active").order("worker_name")
        .then(({data})=>setSiteWorkers(data||[]));
    }
  },[selSite]);

  const loadAdvances=async()=>{
    if(!selSite) return;
    const {data}=await sb.from("labour_advances")
      .select("advance_id,payment_date,amount,mode_type,description,workers(worker_name,worker_code),cash_wallets(person_name)")
      .eq("site_id",parseInt(selSite))
      .order("payment_date",{ascending:false}).limit(300);
    setAdvances(data||[]);
  };
  useEffect(()=>{if(tab==="advance") loadAdvances();},[tab,selSite]);

  const calculate=async()=>{
    if(!selSite){show("Select a site first","error");return;}
    setLoading(true);setCalcDone(false);
    const {data:wks}=await sb.from("workers")
      .select("id,worker_name,worker_code,trade,per_day_rate")
      .eq("current_site_id",parseInt(selSite)).eq("status","Active").order("worker_name");
    if(!wks?.length){show("No active workers on this site","error");setLoading(false);return;}
    const {data:sessions}=await sb.from("attendance_sessions")
      .select("id").eq("site_id",parseInt(selSite))
      .gte("att_date",fromDate).lte("att_date",toDate);
    const sessIds=(sessions||[]).map(s=>s.id);
    let attMap={};
    if(sessIds.length>0){
      const {data:recs}=await sb.from("attendance_records")
        .select("worker_id,haajri,is_present").in("session_id",sessIds).eq("is_present",true);
      (recs||[]).forEach(r=>{attMap[r.worker_id]=(attMap[r.worker_id]||0)+(parseFloat(r.haajri)||1);});
    }
    const {data:advs}=await sb.from("labour_advances")
      .select("worker_id,amount").eq("site_id",parseInt(selSite))
      .gte("payment_date",fromDate).lte("payment_date",toDate);
    const advMap={};
    (advs||[]).forEach(a=>{advMap[a.worker_id]=(advMap[a.worker_id]||0)+parseFloat(a.amount||0);});
    const {data:lastRun}=await sb.from("payroll_runs")
      .select("run_id").eq("site_id",parseInt(selSite)).eq("status","paid")
      .order("to_date",{ascending:false}).limit(1);
    let cfMap={};
    if(lastRun?.length){
      const {data:le}=await sb.from("payroll_entries").select("worker_id,carry_forward").eq("run_id",lastRun[0].run_id);
      (le||[]).forEach(e=>{cfMap[e.worker_id]=parseFloat(e.carry_forward||0);});
    }
    const rows=wks.map(w=>{
      const days=parseFloat((attMap[w.id]||0).toFixed(1));
      const rate=parseFloat(w.per_day_rate||0);
      const gross=parseFloat((days*rate).toFixed(2));
      const adv=parseFloat((advMap[w.id]||0).toFixed(2));
      const cf=parseFloat((cfMap[w.id]||0).toFixed(2));
      const net=parseFloat(Math.max(0,gross-adv+cf).toFixed(2));
      const carry=parseFloat(Math.max(0,adv-gross-cf).toFixed(2));
      return {worker_id:w.id,worker_name:w.worker_name,worker_code:w.worker_code,
        trade:w.trade,per_day_rate:rate,days_present:days,
        gross_wages:gross,advances_deducted:adv,carry_forward_in:cf,
        net_payable:net,carry_forward:carry};
    });
    setEntries(rows);setCalcDone(true);setLoading(false);
  };

  const saveRun=async()=>{
    if(!calcDone||!entries.length){show("Calculate first","error");return;}
    setSaving(true);
    const total=entries.reduce((s,e)=>s+e.net_payable,0);
    const {data:run,error:re}=await sb.from("payroll_runs").insert({
      site_id:parseInt(selSite),from_date:fromDate,to_date:toDate,
      run_date:new Date().toISOString().split("T")[0],
      status:"draft",total_amount:total,
      created_by:user.user_id,tenant_id:user.tenant_id
    }).select().single();
    if(re){show("Error saving run: "+re.message,"error");setSaving(false);return;}
    const insRows=entries.map(e=>({
      run_id:run.run_id,worker_id:e.worker_id,site_id:parseInt(selSite),
      days_present:e.days_present,per_day_rate:e.per_day_rate,
      gross_wages:e.gross_wages,advances_deducted:e.advances_deducted,
      net_payable:e.net_payable,carry_forward:e.carry_forward,
      status:"pending",tenant_id:user.tenant_id
    }));
    const {error:ee}=await sb.from("payroll_entries").insert(insRows);
    if(ee){show("Error saving entries: "+ee.message,"error");setSaving(false);return;}
    show("Payroll run saved successfully");
    setCalcDone(false);setEntries([]);loadRuns();setSaving(false);
  };

  const markPaid=async(run,ev)=>{
    if(ev) ev.stopPropagation();
    if(!window.confirm("Mark this payroll run as PAID? This cannot be undone.")) return;
    await sb.from("payroll_runs").update({status:"paid"}).eq("run_id",run.run_id);
    await sb.from("payroll_entries").update({status:"paid",payment_date:new Date().toISOString().split("T")[0]}).eq("run_id",run.run_id);
    show("Marked as paid");loadRuns();
    if(selRun?.run_id===run.run_id) setSelRun(r=>({...r,status:"paid"}));
  };

  const openRun=async(run)=>{
    setSelRun(run);
    const {data}=await sb.from("payroll_entries")
      .select("*,workers(worker_name,worker_code,trade)")
      .eq("run_id",run.run_id).order("workers(worker_name)");
    setRunEntries(data||[]);
  };

  const saveAdvance=async()=>{
    if(!advForm.worker_id||!advForm.amount||parseFloat(advForm.amount)<=0){show("Select worker and enter amount","error");return;}
    setSaving(true);
    const {error}=await sb.from("labour_advances").insert({
      worker_id:parseInt(advForm.worker_id),site_id:parseInt(selSite),
      wallet_id:advForm.wallet_id?parseInt(advForm.wallet_id):null,
      amount:parseFloat(advForm.amount),payment_date:advForm.payment_date,
      description:advForm.description,mode_type:advForm.mode_type,
      created_by:user.user_id,tenant_id:user.tenant_id
    });
    if(error){show("Error: "+error.message,"error");}
    else{
      show("Advance recorded");
      setAdvForm({worker_id:"",amount:"",payment_date:new Date().toISOString().split("T")[0],description:"",mode_type:"cash",wallet_id:""});
      setAdvOpen(false);loadAdvances();
    }
    setSaving(false);
  };

  const thStyle={padding:"8px 12px",color:C.muted,fontWeight:600,fontSize:12,whiteSpace:"nowrap"};
  const tdStyle={padding:"9px 12px",fontSize:13};

  return <div style={{padding:"16px 20px",maxWidth:1100,margin:"0 auto"}}>
    {toast&&<div style={{position:"fixed",top:20,right:20,zIndex:9999,background:toast.type==="error"?C.red:C.green,
      color:"#fff",padding:"10px 18px",borderRadius:10,fontWeight:600,fontSize:14,boxShadow:"0 4px 16px rgba(0,0,0,0.2)"}}>{toast.msg}</div>}

    <div style={{marginBottom:20}}>
      <h2 style={{margin:0,fontSize:20,fontWeight:700,color:C.text}}>Payroll</h2>

// ─── WALLET MASTER ───────────────────────────────────────────────
const WalletMaster = () => {
  const {user} = useAuth();
  const [data,setData]=useState([]); const [users,setUsers]=useState([]);
  const [txns,setTxns]=useState([]); const [selWallet,setSelWallet]=useState(null);
  const [open,setOpen]=useState(false); const [openTx,setOpenTx]=useState(false);
  const [editing,setEditing]=useState(null); const [form,setForm]=useState({});
  const [txForm,setTxForm]=useState({}); const [errs,setErrs]=useState({});
  const [saving,setSaving]=useState(false); const [tab,setTab]=useState("wallets");
  const {show,Toast}=useToast();
  const F=v=>setForm(f=>({...f,...v}));

  const load=useCallback(async()=>{
    const [{data:w},{data:u}]=await Promise.all([
      sb.from("cash_wallets").select("*,app_users(name,avatar_url)").order("person_name"),
      sb.from("app_users").select("user_id,name,role,avatar_url").eq("is_active",true).order("name"),
    ]);
    setData(w||[]);setUsers(u||[]);
  },[]);

  const loadTxns=useCallback(async(walletId)=>{
    const {data:t}=await sb.from("wallet_transactions")
      .select("*,from_wallet:cash_wallets!wallet_transactions_from_wallet_id_fkey(person_name),to_wallet:cash_wallets!wallet_transactions_to_wallet_id_fkey(person_name),done_by:app_users(name)")
      .or(`from_wallet_id.eq.${walletId},to_wallet_id.eq.${walletId}`)
      .order("created_at",{ascending:false}).limit(50);
    setTxns(t||[]);
  },[]);

  useEffect(()=>{load();},[load]);
  useEffect(()=>{if(selWallet) loadTxns(selWallet.wallet_id);},[selWallet,loadTxns]);

  const save=async()=>{
    const e={};
    if(!form.person_name?.trim()) e.person_name="Required";
    if(!form.role) e.role="Required";
    if(Object.keys(e).length){setErrs(e);return;}
    setSaving(true);
    const p={person_name:form.person_name.trim(),role:form.role,
      current_balance:parseFloat(form.current_balance)||0,
      user_id:form.user_id||null,is_active:form.is_active!==false};
    const {error}=editing
      ?await sb.from("cash_wallets").update(p).eq("wallet_id",editing.wallet_id)
      :await sb.from("cash_wallets").insert(p);
    setSaving(false);
    if(error){show(error.message,"error");return;}
    show("Saved ✓");setOpen(false);load();
  };

  const doTransfer=async()=>{
    if(!txForm.from_wallet_id||!txForm.to_wallet_id){show("Select both wallets","error");return;}
    if(txForm.from_wallet_id===txForm.to_wallet_id){show("Cannot transfer to same wallet","error");return;}
    const amt=parseFloat(txForm.amount);
    if(!amt||amt<=0){show("Enter valid amount","error");return;}
    const fromW=data.find(w=>w.wallet_id===parseInt(txForm.from_wallet_id));
    if(fromW&&fromW.current_balance<amt){show(`Insufficient balance. Available: ₹${fromW.current_balance}`, "error");return;}
    setSaving(true);
    try{
      // Insert transaction record
      const {error:te}=await sb.from("wallet_transactions").insert({
        from_wallet_id:parseInt(txForm.from_wallet_id),
        to_wallet_id:parseInt(txForm.to_wallet_id),
        amount:amt,
        note:txForm.note||null,
        done_by_user_id:user.user_id,
        txn_date:txForm.txn_date||new Date().toISOString().split("T")[0]
      });
      if(te) throw te;
      // Update balances
      await sb.from("cash_wallets").update({current_balance:fromW.current_balance-amt})
        .eq("wallet_id",parseInt(txForm.from_wallet_id));
      const toW=data.find(w=>w.wallet_id===parseInt(txForm.to_wallet_id));
      await sb.from("cash_wallets").update({current_balance:(toW?.current_balance||0)+amt})
        .eq("wallet_id",parseInt(txForm.to_wallet_id));
      show("Transfer done ✓");setOpenTx(false);setTxForm({});load();
      if(selWallet) loadTxns(selWallet.wallet_id);
    }catch(err){show(err.message,"error");}
    setSaving(false);
  };

  const bc=b=>b>5000?C.green:b<0?C.red:C.orange;
  const TRANSFER_ROLES=["Owner","SIC","Storekeeper","Supervisor","Admin"];

  return <div>
    <Toast/>
    <div style={{display:"flex",gap:8,marginBottom:16}}>
      {["wallets","transactions"].map(t=>(
        <button key={t} onClick={()=>{setTab(t);if(t==="transactions"&&!selWallet&&data.length>0) setSelWallet(data[0]);}}
          style={{padding:"7px 18px",borderRadius:99,border:`1.5px solid ${tab===t?C.accent:C.border}`,
            background:tab===t?C.accentBg:"#fff",color:tab===t?C.accent:C.muted,
            fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit",textTransform:"capitalize"}}>
          {t==="wallets"?"💰 Wallets":"📋 Transactions"}
        </button>
      ))}
    </div>

    {tab==="wallets"&&<>
      <PH title="Cash Wallets" sub="Petty cash balances"
        right={<>
          <Btn variant="secondary" onClick={()=>{setTxForm({txn_date:new Date().toISOString().split("T")[0]});setOpenTx(true);}}>
            <Ic d={I.payroll} s={15} col={C.accent}/>Transfer Cash
          </Btn>
          <Btn onClick={()=>{setEditing(null);setForm({is_active:true,current_balance:0});setErrs({});setOpen(true);}}>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:14}}>
        {data.map(w=>(
          <div key={w.wallet_id} style={{background:C.card,border:`1px solid ${C.border}`,
            borderRadius:12,padding:"18px 20px",cursor:"pointer"}}

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>

                      {w.person_name[0].toUpperCase()}</span>}
                </div>
                <div>
                  <p style={{margin:0,fontWeight:700,fontSize:14}}>{w.person_name}</p>
                  <Badge color={roleColor[w.role]||"gray"}>{w.role}</Badge>
                </div>
              </div>
              <button onClick={e=>{e.stopPropagation();setEditing(w);setForm({...w});setErrs({});setOpen(true);}}
                style={{background:"none",border:"none",cursor:"pointer",color:C.faint}}>
                <Ic d={I.edit} s={15}/>
              </button>
            </div>
            <div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${C.border}`}}>
              <p style={{margin:0,fontSize:10,color:C.faint,textTransform:"uppercase",fontWeight:700}}>Balance</p>
              <p style={{margin:"3px 0 0",fontSize:24,fontWeight:800,color:bc(w.current_balance||0)}}>
                ₹{(w.current_balance||0).toLocaleString("en-IN")}
              </p>
            </div>
          </div>
        ))}
        {data.length===0&&<div style={{gridColumn:"1/-1",padding:40,textAlign:"center",
          border:`1px dashed ${C.border}`,borderRadius:12,color:C.faint}}>
          No wallets yet. Wallets are auto-created when you add users.
        </div>}
      </div>
    </>}

    {tab==="transactions"&&<>
      <PH title="Transaction Ledger" sub="Cash movement history"
        right={<>
          <select value={selWallet?.wallet_id||""} onChange={e=>setSelWallet(data.find(w=>w.wallet_id===parseInt(e.target.value)))}
            style={{padding:"7px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,
              color:C.text,background:"#fff",fontFamily:"inherit"}}>
            <option value="">All wallets</option>
            {data.map(w=><option key={w.wallet_id} value={w.wallet_id}>{w.person_name} — ₹{(w.current_balance||0).toLocaleString("en-IN")}</option>)}
          </select>
          <Btn variant="secondary" onClick={()=>{setTxForm({txn_date:new Date().toISOString().split("T")[0]});setOpenTx(true);}}>
            <Ic d={I.payroll} s={15} col={C.accent}/>Transfer Cash
          </Btn>
        </>}/>
      {txns.length===0
        ?<div style={{padding:40,textAlign:"center",color:C.faint,border:`1px dashed ${C.border}`,borderRadius:12}}>
          No transactions yet
        </div>
        :<div style={{display:"flex",flexDirection:"column",gap:8}}>
          {txns.map(t=>{
            const isOut=selWallet&&t.from_wallet_id===selWallet.wallet_id;
            const isIn=selWallet&&t.to_wallet_id===selWallet.wallet_id;
            return <div key={t.id} style={{background:C.card,border:`1px solid ${C.border}`,
              borderRadius:10,padding:"14px 18px",display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:36,height:36,borderRadius:"50%",flexShrink:0,
                background:isOut?C.redBg:C.greenBg,
                display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{fontSize:16}}>{isOut?"↑":"↓"}</span>
              </div>
              <div style={{flex:1}}>
                <p style={{margin:0,fontWeight:700,fontSize:13}}>
                  {t.from_wallet?.person_name} → {t.to_wallet?.person_name}
                </p>
                <p style={{margin:"2px 0 0",fontSize:11,color:C.muted}}>
                  {t.txn_date} · By {t.done_by?.name||"—"}
                  {t.note&&` · ${t.note}`}
                </p>
              </div>
              <span style={{fontWeight:800,fontSize:16,color:isOut?C.red:C.green,whiteSpace:"nowrap"}}>
                {isOut?"-":"+"}₹{parseFloat(t.amount).toLocaleString("en-IN")}
              </span>
            </div>;
          })}
        </div>}
    </>}

    {/* Add/Edit Wallet SlideOver */}
    <SlideOver open={open} onClose={()=>setOpen(false)} title={editing?"Edit Wallet":"Add Wallet"}>
      <Inp label="Person Name *" value={form.person_name||""} placeholder="e.g. Jayesh, Sikhu, PP"
        onChange={e=>F({person_name:e.target.value})} error={errs.person_name}/>
      <Sel label="Role *" value={form.role||""}
        options={TRANSFER_ROLES}
        onChange={e=>F({role:e.target.value})} error={errs.role}/>
      <Sel label="Link to System User" value={form.user_id||""}
        placeholder="— Link to user —"
        options={users.map(u=>({v:u.user_id,l:`${u.name} (${u.role})`}))}
        onChange={e=>F({user_id:e.target.value})}/>
      <Inp label="Current Balance (₹)" type="number" value={form.current_balance??0}
        onChange={e=>F({current_balance:e.target.value})}/>
      <Tog label="Active" checked={!!form.is_active} onChange={v=>F({is_active:v})}/>
      <div style={{display:"flex",gap:8,paddingTop:8}}>
        <Btn onClick={save} disabled={saving}>{saving?"Saving...":"Save"}</Btn>
        <Btn variant="ghost" onClick={()=>setOpen(false)}>Cancel</Btn>
      </div>
    </SlideOver>

    {/* Transfer Modal */}
    {openTx&&<div style={{position:"fixed",inset:0,zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div onClick={()=>setOpenTx(false)} style={{position:"absolute",inset:0,background:"rgba(15,23,42,.5)",backdropFilter:"blur(3px)"}}/>
      <div style={{position:"relative",width:Math.min(420,window.innerWidth-32),background:"#fff",
        borderRadius:16,boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
        <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.border}`,
          display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <h3 style={{margin:0,fontSize:16,fontWeight:800}}>Transfer Cash</h3>
          <button onClick={()=>setOpenTx(false)} style={{background:"none",border:"none",cursor:"pointer",color:C.muted}}><Ic d={I.x}/></button>
        </div>
        <div style={{padding:"20px",display:"flex",flexDirection:"column",gap:0}}>
          <Sel label="From Wallet *" value={txForm.from_wallet_id||""}
            options={data.map(w=>({v:w.wallet_id,l:`${w.person_name} (₹${(w.current_balance||0).toLocaleString("en-IN")})`}))}
            onChange={e=>setTxForm(f=>({...f,from_wallet_id:e.target.value}))}/>
          <Sel label="To Wallet *" value={txForm.to_wallet_id||""}
            options={data.filter(w=>w.wallet_id!==parseInt(txForm.from_wallet_id)).map(w=>({v:w.wallet_id,l:`${w.person_name} (${w.role})`}))}
            onChange={e=>setTxForm(f=>({...f,to_wallet_id:e.target.value}))}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
            <Inp label="Amount (₹) *" type="number" value={txForm.amount||""}
              onChange={e=>setTxForm(f=>({...f,amount:e.target.value}))}/>
            <Inp label="Date" type="date" value={txForm.txn_date||""}

            <Btn onClick={doTransfer} disabled={saving} full>{saving?"Processing...":"Transfer"}</Btn>
            <Btn variant="ghost" onClick={()=>setOpenTx(false)}>Cancel</Btn>
          </div>
        </div>
      </div>
    </div>}
  </div>;
};

// POLICY MASTER
// ══════════════════════════════════════════════════════════════════
const SYSTEM_ROLES=["Owner","SIC","Supervisor","Storekeeper","Office","Admin"];

const PolicyMaster = () => {
  const {user}=useAuth();
  // Fix 2: Only Admin can create/edit/delete roles
  const canManage=user.role==="Admin";
  const [policies,setPolicies]=useState([]);
  const [perms,setPerms]=useState([]);
  const [sel,setSel]=useState(null);
  const [saving,setSaving]=useState(false);
  const [addOpen,setAddOpen]=useState(false);
  const [editOpen,setEditOpen]=useState(false);
  const [roleForm,setRoleForm]=useState({});
  const {show,Toast}=useToast();
  const RF=v=>setRoleForm(f=>({...f,...v}));
  const MODULES=["Store","Labour","Payroll","Expense","Attendance","DPR","Procurement","Compliance","Reports","Masters","Billing"];
  const ACTIONS=[{k:"can_view",l:"View"},{k:"can_add",l:"Add"},{k:"can_edit",l:"Edit"},
    {k:"can_delete",l:"Del"},{k:"can_export",l:"Export"},{k:"can_print",l:"Print"}];
  const SITE_ACCESS=["All Sites","Assigned Site Only"];

  const load=useCallback(async()=>{
    const [{data:p},{data:pp}]=await Promise.all([
      sb.from("policy_master").select("*").order("policy_id"),
      sb.from("policy_permissions").select("*"),
    ]);
    setPolicies(p||[]);setPerms(pp||[]);
    if(p?.length&&!sel) setSel(p[0]);
  },[]);
  useEffect(()=>{load();},[load]);

  const getPerm=mod=>sel?perms.find(p=>p.policy_id===sel.policy_id&&p.module===mod)||{}:{};

  const toggle=async(mod,action)=>{
    if(!sel||!canManage) return;
    const ex=getPerm(mod); setSaving(true);
    if(ex.id){
      const {error}=await sb.from("policy_permissions").update({[action]:!ex[action]}).eq("id",ex.id);
      if(error){show(error.message,"error");setSaving(false);return;}
    } else {
      // Upsert — handles race conditions and missing rows
      const row={policy_id:sel.policy_id,module:mod,
        can_view:false,can_add:false,can_edit:false,can_delete:false,
        can_approve:false,can_export:false,can_print:false};
      row[action]=true;
      const {error}=await sb.from("policy_permissions")
        .upsert(row,{onConflict:"policy_id,module"});
      if(error){show(error.message,"error");setSaving(false);return;}
    }
    setSaving(false);show("Saved ✓");load();
  };

  const addRole=async()=>{
    if(!roleForm.role_type?.trim()){show("Role name required","error");return;}
    if(policies.find(p=>p.role_type.toLowerCase()===roleForm.role_type.trim().toLowerCase())){
      show("Role already exists","error");return;
    }
    setSaving(true);
    const {error}=await sb.from("policy_master").insert({
      policy_name:`${roleForm.role_type.trim()} Policy`,
      role_type:roleForm.role_type.trim(),
      description:roleForm.description||`Custom role — ${roleForm.site_access||"Assigned Site Only"}`
    });
    setSaving(false);
    if(error){show(error.message,"error");return;}
    show("Role added ✓ — set permissions in the grid");
    setAddOpen(false);setRoleForm({});load();
  };

  const deleteRole=async(p)=>{
    if(SYSTEM_ROLES.includes(p.role_type)){show("Cannot delete system roles","error");return;}
    if(!confirm(`Delete role "${p.role_type}"? This cannot be undone.`)) return;
    await sb.from("policy_permissions").delete().eq("policy_id",p.policy_id);
    await sb.from("policy_master").delete().eq("policy_id",p.policy_id);
    if(sel?.policy_id===p.policy_id) setSel(null);
    show("Role deleted");load();
  };

  const editRole=async()=>{
    if(!roleForm.role_type?.trim()){show("Role name required","error");return;}
    setSaving(true);
    const {error}=await sb.from("policy_master").update({
      role_type:roleForm.role_type.trim(),
      description:roleForm.description||""
    }).eq("policy_id",roleForm.policy_id);
    setSaving(false);
    if(error){show(error.message,"error");return;}
    show("Role updated ✓");setEditOpen(false);setRoleForm({});load();
  };

  const isSystem=p=>SYSTEM_ROLES.includes(p?.role_type);

  return <div>
    <Toast/>
    <PH title="Roles & Permissions" sub="Manage roles and module access"
      right={null}/>

    <div style={{display:"grid",gridTemplateColumns:"200px 1fr",gap:16,alignItems:"start"}}>
      {/* Role list */}
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {policies.map(p=>(
          <div key={p.policy_id}
            style={{padding:"11px 13px",borderRadius:9,cursor:"pointer",
              background:sel?.policy_id===p.policy_id?C.accentBg:C.card,
              border:`1.5px solid ${sel?.policy_id===p.policy_id?C.accent:C.border}`}}
            onClick={()=>setSel(p)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <Badge color={roleColor[p.role_type]||"gray"}>{p.role_type}</Badge>
              {!isSystem(p)&&canManage&&<div style={{display:"flex",gap:4}}>
                <button onClick={e=>{e.stopPropagation();setRoleForm({...p});setEditOpen(true);}}
                  style={{background:"none",border:"none",cursor:"pointer",color:C.faint,padding:2}}>
                  <Ic d={I.edit} s={12}/>
                </button>
                <button onClick={e=>{e.stopPropagation();deleteRole(p);}}
                  style={{background:"none",border:"none",cursor:"pointer",color:C.red,padding:2}}>
                  <Ic d={I.x} s={12}/>
                </button>
              </div>}
            </div>
            <p style={{margin:"5px 0 0",fontSize:11,color:C.muted,lineHeight:1.4}}>{p.description}</p>
            {isSystem(p)&&<p style={{margin:"3px 0 0",fontSize:9,color:C.faint,fontWeight:700,textTransform:"uppercase",letterSpacing:".05em"}}>System Role</p>}
          </div>
        ))}
      </div>

      {/* Permissions grid */}
      {sel&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
        <div style={{padding:"13px 16px",borderBottom:`1px solid ${C.border}`,
          display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <h3 style={{margin:0,fontSize:14,fontWeight:800}}>{sel.policy_name}</h3>
          <Badge color={roleColor[sel.role_type]||"gray"}>{sel.role_type}</Badge>
          {!isSystem(sel)&&<Badge color="orange">Custom</Badge>}
          {saving&&<span style={{fontSize:11,color:C.faint,marginLeft:"auto"}}>Saving...</span>}
          {/* Quick presets for custom roles */}
          {!isSystem(sel)&&<div style={{marginLeft:"auto",display:"flex",gap:6}}>
            <Btn size="sm" variant="ghost" onClick={async()=>{
              for(const mod of MODULES){
                const ex=getPerm(mod);
                if(!ex.id) await sb.from("policy_permissions").insert({policy_id:sel.policy_id,module:mod,can_view:true,can_add:false,can_edit:false,can_delete:false,can_export:false,can_print:false});
                else await sb.from("policy_permissions").update({can_view:true}).eq("id",ex.id);
              }
              show("View-only set");load();
            }}>View Only</Btn>
            <Btn size="sm" variant="ghost" onClick={async()=>{
              for(const mod of MODULES){
                const ex=getPerm(mod);
                if(!ex.id) await sb.from("policy_permissions").insert({policy_id:sel.policy_id,module:mod,can_view:true,can_add:true,can_edit:true,can_delete:false,can_export:true,can_print:true});
                else await sb.from("policy_permissions").update({can_view:true,can_add:true,can_edit:true,can_export:true,can_print:true}).eq("id",ex.id);
              }
              show("Full access set");load();
            }}>Full Access</Btn>
          </div>}
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{background:"#F8FAFC"}}>
                <th style={{padding:"9px 14px",textAlign:"left",fontWeight:700,fontSize:11,
                  textTransform:"uppercase",color:C.muted,borderBottom:`1px solid ${C.border}`}}>Module</th>
                {ACTIONS.map(a=><th key={a.k} style={{padding:"9px 10px",textAlign:"center",
                  fontWeight:700,fontSize:11,textTransform:"uppercase",color:C.muted,
                  borderBottom:`1px solid ${C.border}`}}>{a.l}</th>)}
              </tr>
            </thead>
            <tbody>
              {MODULES.map((mod,ri)=>{
                const perm=getPerm(mod);
                return <tr key={mod} style={{borderBottom:`1px solid ${C.border}`,
                  background:ri%2===0?"#fff":"#FAFAFA"}}>
                  <td style={{padding:"10px 14px",fontWeight:600}}>{mod}</td>
                  {ACTIONS.map(a=>(
                    <td key={a.k} style={{padding:"10px",textAlign:"center"}}>
                      <div onClick={()=>toggle(mod,a.k)}
                        style={{width:22,height:22,borderRadius:6,margin:"0 auto",cursor:"pointer",
                          background:perm[a.k]?C.accent:C.border,
                          display:"flex",alignItems:"center",justifyContent:"center",transition:"background .15s"}}>
                        {perm[a.k]&&<Ic d={I.check} s={12} col="#fff"/>}
                      </div>
                    </td>
                  ))}
                </tr>;
              })}
            </tbody>
          </table>
        </div>
      </div>}
    </div>

    {/* Add Role Modal */}
    {addOpen&&<div style={{position:"fixed",inset:0,zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div onClick={()=>setAddOpen(false)} style={{position:"absolute",inset:0,background:"rgba(15,23,42,.5)",backdropFilter:"blur(3px)"}}/>
      <div style={{position:"relative",width:Math.min(400,window.innerWidth-32),background:"#fff",
        borderRadius:16,boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
        <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.border}`,
          display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <h3 style={{margin:0,fontSize:16,fontWeight:800}}>Add New Role</h3>
          <button onClick={()=>setAddOpen(false)} style={{background:"none",border:"none",cursor:"pointer",color:C.muted}}><Ic d={I.x}/></button>
        </div>
        <div style={{padding:"20px"}}>
          <Inp label="Role Name *" value={roleForm.role_type||""} placeholder="e.g. Safety Officer, HR, Accountant"
            onChange={e=>RF({role_type:e.target.value})}/>
          <Inp label="Description" value={roleForm.description||""} placeholder="What does this role do?"
            onChange={e=>RF({description:e.target.value})}/>
          <Sel label="Site Access" value={roleForm.site_access||"Assigned Site Only"} options={SITE_ACCESS}
            onChange={e=>RF({site_access:e.target.value})}/>
          <div style={{background:C.accentBg,border:"1px solid #BFDBFE",borderRadius:8,padding:"10px 14px",marginBottom:14}}>
            <p style={{margin:0,fontSize:12,color:"#1D4ED8"}}>After adding, click the role in the list and set module permissions using the grid.</p>
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn onClick={addRole} disabled={saving}>{saving?"Adding...":"Add Role"}</Btn>
            <Btn variant="ghost" onClick={()=>setAddOpen(false)}>Cancel</Btn>
          </div>
        </div>
      </div>
    </div>}

    {/* Edit Role Modal */}
    {editOpen&&<div style={{position:"fixed",inset:0,zIndex:60,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div onClick={()=>setEditOpen(false)} style={{position:"absolute",inset:0,background:"rgba(15,23,42,.5)",backdropFilter:"blur(3px)"}}/>
      <div style={{position:"relative",width:Math.min(400,window.innerWidth-32),background:"#fff",
        borderRadius:16,boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}>
        <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.border}`,
          display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <h3 style={{margin:0,fontSize:16,fontWeight:800}}>Edit Role</h3>
          <button onClick={()=>setEditOpen(false)} style={{background:"none",border:"none",cursor:"pointer",color:C.muted}}><Ic d={I.x}/></button>
        </div>
        <div style={{padding:"20px"}}>
          <Inp label="Role Name *" value={roleForm.role_type||""}
            onChange={e=>RF({role_type:e.target.value})}/>
          <Inp label="Description" value={roleForm.description||""}
            onChange={e=>RF({description:e.target.value})}/>
          <div style={{display:"flex",gap:8}}>
            <Btn onClick={editRole} disabled={saving}>{saving?"Saving...":"Save Changes"}</Btn>
            <Btn variant="ghost" onClick={()=>setEditOpen(false)}>Cancel</Btn>
          </div>
        </div>
      </div>
    </div>}
  </div>;
};

// DOC STORE — Documents, Work Orders, RA Bills
// ══════════════════════════════════════════════════════════════════
const MyProfile = ({user, open, onClose, onUpdate}) => {
  const [form, setForm] = useState({});
  const [saving, setSaving] = useState(false);
  const {show, Toast} = useToast();
  const F = v => setForm(f=>({...f,...v}));

  useEffect(()=>{
    if(open) setForm({name:user.name, phone:user.phone||""});
  },[open, user]);

  const uploadPhoto = async(e) => {
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 500000){ show("Photo must be under 500KB","error"); return; }
    const reader = new FileReader();
    reader.onload = async(ev) => {
      const base64 = ev.target.result;
      const {error} = await sb.from("app_users").update({avatar_url: base64}).eq("user_id", user.user_id);
      if(error){ show(error.message,"error"); return; }
      show("Photo updated ✓");
      F({avatar_url: base64});
      onUpdate && onUpdate({...user, avatar_url: base64});
    };
    reader.readAsDataURL(file);
  };

  const saveProfile = async() => {
    if(!form.name?.trim()){ show("Name required","error"); return; }
    setSaving(true);
    const {error} = await sb.from("app_users")
      .update({name: form.name.trim(), phone: form.phone||null})
      .eq("user_id", user.user_id);
    setSaving(false);
    if(error){ show(error.message,"error"); return; }
    show("Profile updated ✓");
    onUpdate && onUpdate({...user, name: form.name.trim(), phone: form.phone});
  };

  const changeOwnPassword = async() => {
    if(!form.currentPass){ show("Enter current password","error"); return; }
    if(!form.newPass || form.newPass.length<6){ show("New password min 6 characters","error"); return; }
    if(form.newPass !== form.confirmPass){ show("Passwords do not match","error"); return; }
    setSaving(true);
    // Re-authenticate then update
    const {error: signInErr} = await sb.auth.signInWithPassword({email: user.email, password: form.currentPass});
    if(signInErr){ setSaving(false); show("Current password is wrong","error"); return; }
    const {error} = await sb.auth.updateUser({password: form.newPass});
    setSaving(false);
    if(error){ show(error.message,"error"); return; }
    show("Password changed ✓");
    F({currentPass:"", newPass:"", confirmPass:""});
  };

  if(!open) return null;
  const avatarUrl = form.avatar_url || user.avatar_url;

  return <div style={{position:"fixed",inset:0,zIndex:70,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <Toast/>
    <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(15,23,42,.55)",backdropFilter:"blur(4px)"}}/>
    <div style={{position:"relative",width:Math.min(420,window.innerWidth-32),background:"#fff",
      borderRadius:18,boxShadow:"0 24px 60px rgba(0,0,0,.22)",overflow:"hidden"}}>
      {/* Header with avatar */}
      <div style={{background:"linear-gradient(135deg,#0F172A,#1D4ED8)",padding:"24px 24px 20px",textAlign:"center"}}>
        <div style={{position:"relative",display:"inline-block"}}>
          <div style={{width:72,height:72,borderRadius:"50%",overflow:"hidden",margin:"0 auto",
            border:"3px solid rgba(255,255,255,.3)",
            background:C[(roleColor[user.role]||"gray")+"Bg"]||"#EFF6FF",
            display:"flex",alignItems:"center",justifyContent:"center"}}>
            {avatarUrl
              ?<img src={avatarUrl} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              :<span style={{fontSize:28,fontWeight:900,color:C[roleColor[user.role]]||C.accent}}>
                {user.name[0].toUpperCase()}</span>}
          </div>
          <label style={{position:"absolute",bottom:0,right:-4,width:24,height:24,borderRadius:"50%",
            background:C.accent,display:"flex",alignItems:"center",justifyContent:"center",
            cursor:"pointer",border:"2px solid #fff"}}>
            <span style={{fontSize:12,color:"#fff"}}>✎</span>
            <input type="file" accept="image/*" style={{display:"none"}} onChange={uploadPhoto}/>
          </label>
        </div>
        <p style={{margin:"10px 0 2px",fontWeight:800,fontSize:16,color:"#F1F5F9"}}>{user.name}</p>
        <Badge color={roleColor[user.role]||"gray"}>{user.role}</Badge>
        <p style={{margin:"6px 0 0",fontSize:11,color:"rgba(255,255,255,.4)"}}>{user.email}</p>
      </div>
      <div style={{padding:"20px 24px",maxHeight:"60vh",overflowY:"auto"}}>
        <Divider label="Profile Info"/>
        <Inp label="Full Name" value={form.name||""} onChange={e=>F({name:e.target.value})}/>
        <Inp label="Phone" value={form.phone||""} onChange={e=>F({phone:e.target.value})}/>
        <Btn onClick={saveProfile} disabled={saving} full>{saving?"Saving...":"Save Profile"}</Btn>

        <Divider label="Change Password"/>
        <Inp label="Current Password" type="password" value={form.currentPass||""}
          onChange={e=>F({currentPass:e.target.value})}/>
        <Inp label="New Password" type="password" value={form.newPass||""}
          hint="Min 6 characters"
          onChange={e=>F({newPass:e.target.value})}/>
        <Inp label="Confirm New Password" type="password" value={form.confirmPass||""}
          onChange={e=>F({confirmPass:e.target.value})}/>
        <Btn variant="secondary" onClick={changeOwnPassword} disabled={saving} full>
          {saving?"Updating...":"Change Password"}

      </div>
      <div style={{padding:"12px 24px",borderTop:`1px solid ${C.border}`,textAlign:"right"}}>
        <Btn variant="ghost" onClick={onClose}>Close</Btn>
      </div>

};
