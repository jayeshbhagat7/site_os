          <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>Notes</label>
          <textarea value={form.notes||""} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} rows={2}

        <div style={{background:C.yellowBg,border:`1px solid ${C.yellow}40`,borderRadius:8,padding:"10px 14px",marginBottom:14}}>

// ─── DEBIT RATE MODAL ────────────────────────────────────────────
const WorkerDebitModal=({open,onClose,worker,materials,user,onSubmit})=>{
  const [form,setForm]=useState({});
  const [saving,setSaving]=useState(false);
  const {show,Toast}=useToast();
  if(!open||!worker)return null;

  const submit=async()=>{
    if(!form.material_id||!form.quantity){show("Fill all fields","error");return;}
    setSaving(true);
    const mat=materials.find(m=>m.material_id===parseInt(form.material_id));
    const {data:debit,error}=await sb.from("worker_debit_log").insert({
      worker_id:worker.id,material_name:mat?.material_name||"",
      quantity:parseFloat(form.quantity),reason:form.reason||"",
      raised_by:user.user_id,site_id:worker.current_site_id,
      salary_month:form.salary_month||null,status:"pending_approval"
    }).select().single();
    if(!error&&debit){
      await sb.from("approvals").insert({
        approval_type:"debit_rate",status:"pending",raised_by:user.user_id,
        site_id:worker.current_site_id,approver_role:"SIC",
        payload:{worker_id:worker.id,worker_name:worker.worker_name,

        ref_id:debit.id,ref_table:"worker_debit_log"
      });
    }
    setSaving(false);
    if(error){show(error.message,"error");return;}
    show("Debit request raised — SIC will set rate","warning");
    onClose();onSubmit&&onSubmit();
  };

  const toolMats=materials.filter(m=>m.is_returnable||m.material_type==="Tool");
  const matList=toolMats.length>0?toolMats:materials;

  return <div style={{position:"fixed",inset:0,zIndex:55,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <Toast/>
    <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(15,23,42,.5)",backdropFilter:"blur(3px)"}}/>

      </div>
      <div style={{padding:"20px"}}>
        <div style={{background:"#F8FAFC",borderRadius:10,padding:"12px 14px",marginBottom:16}}>
          <p style={{margin:0,fontWeight:700}}>{worker.worker_name}</p>
          <p style={{margin:"3px 0 0",fontSize:12,color:C.muted}}>Tool/material not returned — SIC will set debit rate</p>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>Material / Tool *</label>
          <select value={form.material_id||""} onChange={e=>setForm(f=>({...f,material_id:e.target.value}))}
            style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:14,color:form.material_id?C.text:C.muted,background:"#fff",fontFamily:"inherit"}}>
            <option value="">— Select material/tool —</option>
            {matList.map(m=><option key={m.material_id} value={m.material_id}>{m.material_name} ({m.unit})</option>)}
          </select>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>Quantity *</label>
            <input type="number" value={form.quantity||""} onChange={e=>setForm(f=>({...f,quantity:e.target.value}))}
              style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:14,color:C.text,background:"#fff",fontFamily:"inherit",outline:"none"}}/>
          </div>
          <div style={{marginBottom:14}}>

            <input type="month" value={form.salary_month||""} onChange={e=>setForm(f=>({...f,salary_month:e.target.value}))}
              style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:14,color:C.text,background:"#fff",fontFamily:"inherit",outline:"none"}}/>
          </div>
        </div>
        <div style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>Reason</label>
          <textarea value={form.reason||""} onChange={e=>setForm(f=>({...f,reason:e.target.value}))} rows={2}
            style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:14,fontFamily:"inherit",resize:"vertical",outline:"none"}}/>
        </div>
        <div style={{background:C.yellowBg,border:`1px solid ${C.yellow}40`,borderRadius:8,padding:"10px 14px",marginBottom:14}}>
          <p style={{margin:0,fontSize:12,color:C.yellow,fontWeight:600}}>SIC reviews and sets debit rate. Deduction applies to salary.</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={submit} disabled={saving}>{saving?"Submitting…":"Raise Request"}</Btn>
          <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
        </div>
      </div>
    </div>
  </div>;
};
