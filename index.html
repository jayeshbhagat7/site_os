    const ms=!q||(r.workers?.worker_name||"").toLowerCase().includes(q)
      ||(r.workers?.worker_code||"").toLowerCase().includes(q)
      ||(r.trade||"").toLowerCase().includes(q);
    const fs=!fStatus||r.status===fStatus;
    const fm=!fMonth||r.planned_gtv_date?.startsWith(fMonth);
    return ms&&fs&&fm;
  });

  // Stats
  const statCounts={
    pending_supervisor:regs.filter(r=>r.status==="pending_supervisor").length,
    pending_sic:regs.filter(r=>r.status==="pending_sic").length,
    pending_owner:regs.filter(r=>r.status==="pending_owner").length,
    approved:regs.filter(r=>r.status==="approved").length,
    rejected:regs.filter(r=>r.status==="rejected").length,
  };

  // Upcoming months for the GTV month picker (next 1–4 months)
  const gtvMonthOptions=(()=>{
    const now=new Date();
    const opts=[];
    for(let i=1;i<=4;i++){
      const d=new Date(now.getFullYear(),now.getMonth()+i,1);
      const val=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      opts.push({val,label:fmtMonth(val)});
    }
    return opts;
  })();

  // ── RENDER ────────────────────────────────────────────────────
  return <div>
    <Toast/>

    {/* Header */}
    <PH title="GTV Registration"
      sub="Worker advance notice of Gone-To-Village · 1 month advance required"
      right={canRegister&&<Btn onClick={()=>{
        setRegForm({_site_id:activeSiteId?String(activeSiteId):""});
        setCapInfo(null);
        if(activeSiteId) loadRegWorkers(activeSiteId);
        setRegOpen(true);
      }}>
        <Ic d={I.plus} s={15} col="#fff"/>Register GTV
      </Btn>}/>

    {/* Policy notice */}
    <div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:10,
      padding:"10px 16px",marginBottom:16,display:"flex",gap:12,flexWrap:"wrap",
      alignItems:"center"}}>
      <Ic d={I.policy} s={16} col="#1D4ED8"/>
      <span style={{fontSize:12,color:"#1D4ED8",fontWeight:600}}>
        Company Policy:
      </span>
      <span style={{fontSize:12,color:"#1D4ED8"}}>
        Registration ≥ 1 month in advance &nbsp;·&nbsp;
        Max 10 workers per trade (Fitter / Carpenter / M/C+BRM+PLM) per GTV month &nbsp;·&nbsp;
        Approval chain: Trade Supervisor → SIC → Owner
      </span>
    </div>

    {/* Stat chips */}
    <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
      {[
        {k:"pending_supervisor",l:"Awaiting Supervisor",col:"#f59e0b",bg:"#fffbeb"},
        {k:"pending_sic",l:"Awaiting SIC",col:"#2563eb",bg:"#eff6ff"},
        {k:"pending_owner",l:"Awaiting Owner",col:"#7c3aed",bg:"#f5f3ff"},
        {k:"approved",l:"Approved",col:"#16a34a",bg:"#f0fdf4"},
        {k:"rejected",l:"Rejected",col:"#dc2626",bg:"#fef2f2"},
      ].map(s=>(
        <div key={s.k} onClick={()=>setFStatus(fStatus===s.k?"":s.k)}
          style={{background:fStatus===s.k?s.col:s.bg,
            border:`1.5px solid ${s.col}40`,borderRadius:9,padding:"7px 14px",
            cursor:"pointer",transition:"all .12s",userSelect:"none",textAlign:"center"}}>
          <p style={{margin:0,fontWeight:800,fontSize:17,color:fStatus===s.k?"#fff":s.col}}>
            {statCounts[s.k]}
          </p>
          <p style={{margin:0,fontSize:10,color:fStatus===s.k?"rgba(255,255,255,.85)":s.col,
            fontWeight:600}}>{s.l}</p>
        </div>
      ))}
    </div>

    {/* My pending action banner */}
    {myPending.length>0&&(
      <div style={{background:"#fff7ed",border:"1.5px solid #fed7aa",borderRadius:10,
        padding:"12px 16px",marginBottom:14,display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
        <Ic d={I.alert} s={18} col="#ea580c"/>
        <p style={{margin:0,fontWeight:700,color:"#ea580c",flex:1}}>
          {myPending.length} GTV registration{myPending.length>1?"s":""} awaiting your approval
        </p>
        <Btn size="sm" onClick={()=>setFStatus(
          isSup?"pending_supervisor":isSIC?"pending_sic":"pending_owner"
        )} style={{background:"#ea580c",borderColor:"#ea580c"}}>
          Review Now
        </Btn>
      </div>
    )}

    {/* Search + filter row */}
    <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
      <div style={{position:"relative",flex:1,minWidth:180}}>
        <svg style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",opacity:.4}}
          width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input id="search_worker_gtv" name="search" value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Search worker name, code or trade…"
          style={{width:"100%",padding:"8px 10px 8px 32px",border:`1.5px solid ${C.border}`,
            borderRadius:8,fontSize:13,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
        {search&&<button onClick={()=>setSearch("")}
          style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",
            background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:16,lineHeight:1}}>×</button>}
      </div>
      <select value={fMonth} onChange={e=>setFMonth(e.target.value)}
        style={{padding:"8px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,
          fontSize:13,fontFamily:"inherit",background:"#fff"}}>
        <option value="">All Months</option>
        {[...new Set(regs.map(r=>r.planned_gtv_date?.slice(0,7)).filter(Boolean))].sort().map(m=>(
          <option key={m} value={m}>{fmtMonth(m)}</option>
        ))}
      </select>
      {(fStatus||fMonth||search)&&<button onClick={()=>{setFStatus("");setFMonth("");setSearch("");}}
        style={{padding:"8px 12px",background:"none",border:`1px solid ${C.border}`,borderRadius:8,
          fontSize:12,cursor:"pointer",color:C.muted,fontFamily:"inherit"}}>
        Clear filters
      </button>}
      <span style={{fontSize:12,color:C.muted,whiteSpace:"nowrap"}}>
        {filteredRegs.length} records
      </span>
    </div>

    {loading&&<div style={{padding:40,textAlign:"center",color:C.muted}}>
      <div style={{width:24,height:24,border:`2px solid ${C.border}`,borderTopColor:C.accent,
        borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto 10px"}}/>
      Loading registrations…
    </div>}

    {/* ── TABLE ─────────────────────────────────────────────── */}
    {!loading&&<div style={{background:"#fff",border:`1px solid ${C.border}`,
      borderRadius:10,overflow:"hidden"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead>
          <tr style={{background:"#F8FAFC"}}>
            {["Code","Worker Name","Trade","Site","GTV Month","Status","Approvals","Action"].map(h=>(
              <th key={h} style={{padding:"10px 12px",textAlign:"left",fontSize:11,fontWeight:700,
                color:C.muted,textTransform:"uppercase",letterSpacing:".05em",
                borderBottom:`2px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {filteredRegs.length===0&&<tr>
            <td colSpan={8} style={{padding:"36px",textAlign:"center",color:C.muted}}>
              No GTV registrations found
            </td>
          </tr>}
          {filteredRegs.map((r,i)=>{
            const canAct=(isSup&&r.status==="pending_supervisor"&&(
              Array.isArray(supTrade)?supTrade.includes(r.trade):r.trade===supTrade
            ))||
            (isSIC&&r.status==="pending_sic")||
            (isOwner&&r.status==="pending_owner");

            const rowBg=r.status==="rejected"?"#fff8f8":
              r.status==="approved"?"#f0fdf4":
              i%2===0?"#fff":"#FAFBFC";

            return <tr key={r.id}
              style={{borderBottom:`1px solid ${C.border}`,background:rowBg,transition:"background .1s"}}
              onMouseEnter={e=>{e.currentTarget.style.background="#F0F7FF";}}
              onMouseLeave={e=>{e.currentTarget.style.background=rowBg;}}>

              <td style={{padding:"10px 12px"}}>
                <span style={{fontFamily:"monospace",fontSize:12,fontWeight:700,
                  color:C.accent,background:"#EFF6FF",padding:"2px 7px",borderRadius:6}}>
                  {r.workers?.worker_code||"—"}
                </span>
              </td>
              <td style={{padding:"10px 12px"}}>
                <p style={{margin:0,fontWeight:700,fontSize:13}}>{r.workers?.worker_name||"—"}</p>
                <p style={{margin:0,fontSize:10,color:C.muted}}>₹{r.workers?.per_day_rate||0}/day</p>
              </td>
              <td style={{padding:"10px 12px"}}>
                <Badge color={GTV_LABOUR_TRADES.includes(r.trade)?"cyan":"blue"}>{r.trade}</Badge>
              </td>
              <td style={{padding:"10px 12px",fontSize:12,color:C.muted}}>
                {r.sites?.site_name||"—"}
              </td>
              <td style={{padding:"10px 12px",fontWeight:600,fontSize:13}}>
                {fmtMonth(r.planned_gtv_date?.slice(0,7))}
              </td>
              <td style={{padding:"10px 12px"}}>
                <Badge color={GTV_STATUS_COLOR[r.status]||"gray"}>
                  {GTV_STATUS_LABEL[r.status]||r.status}
                </Badge>
                {r.payment_hold&&<p style={{margin:"3px 0 0",fontSize:10,color:"#dc2626",fontWeight:700}}>
                  💰 Payment Hold
                </p>}
              </td>
              {/* Approval trail */}
              <td style={{padding:"10px 12px"}}>
                <div style={{display:"flex",flexDirection:"column",gap:3}}>
                  <ApprovalDot label="Sup" action={r.supervisor_action} note={r.supervisor_note}/>
                  <ApprovalDot label="SIC" action={r.sic_action} note={r.sic_note}/>
                  <ApprovalDot label="Own" action={r.owner_action} note={r.owner_note}/>
                </div>
              </td>
              {/* Action */}
              <td style={{padding:"10px 12px"}} onClick={e=>e.stopPropagation()}>
                {canAct&&<div style={{display:"flex",gap:4}}>
                  <button onClick={()=>{setActReg(r);setActNote("");setPayHold(false);setActOpen(true);}}
                    style={{background:"#dcfce7",border:"1px solid #86efac",borderRadius:7,
                      padding:"5px 10px",fontSize:11,fontWeight:700,color:"#16a34a",cursor:"pointer"}}>
                    Review
                  </button>
                </div>}
                {!canAct&&r.rejection_reason&&<span style={{fontSize:10,color:"#dc2626",
                  fontStyle:"italic",maxWidth:120,display:"block",lineHeight:1.3}}>
                  ✕ {r.rejection_reason.slice(0,40)}{r.rejection_reason.length>40?"…":""}
                </span>}
              </td>
            </tr>;
          })}
        </tbody>
      </table>
    </div>}

    {/* ── REGISTER GTV SLIDEOVER ──────────────────────────── */}
    <SlideOver open={regOpen} onClose={()=>{setRegOpen(false);setRegForm({});setCapInfo(null);}}
      title="Register GTV" subtitle="Advance notice for worker going to village — min 1 month ahead"
      width={460}>
      <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:9,
        padding:"10px 14px",marginBottom:16}}>
        <p style={{margin:0,fontSize:12,color:"#92400e",fontWeight:600}}>
          ⚠ GTV must be registered at least <b>1 month in advance</b>.
          Registration goes to Trade Supervisor → SIC → Owner for approval.
        </p>
      </div>

      {/* Site selector (if multiple sites) */}
      {sites.length>1&&<div style={{marginBottom:12}}>
        <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,
          marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}}>Site *</label>
        <select value={regForm._site_id||""}
          onChange={e=>{setRegForm(f=>({...f,_site_id:e.target.value,worker_id:""}));
            loadRegWorkers(e.target.value);}}
          style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,
            borderRadius:8,fontSize:14,fontFamily:"inherit",background:"#fff",outline:"none"}}>
          <option value="">— Select Site —</option>
          {sites.map(s=><option key={s.site_id} value={s.site_id}>{s.site_name}</option>)}
        </select>
      </div>}

      {/* Worker selector */}
      <div style={{marginBottom:12}}>
        <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,
          marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}}>Worker *</label>
        <select value={regForm.worker_id||""}
          onChange={async e=>{
            const wid=e.target.value;
            setRegForm(f=>({...f,worker_id:wid}));
            if(wid&&regForm.planned_month){
              const w=regWorkers.find(w=>String(w.id)===wid);
              if(w) await checkCap(regForm._site_id,w.trade,regForm.planned_month);
            }
          }}
          style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,
            borderRadius:8,fontSize:14,fontFamily:"inherit",background:"#fff",outline:"none"}}>
          <option value="">— Select Worker —</option>
          {regWorkers.map(w=>(
            <option key={w.id} value={w.id}>
              {w.worker_name} ({w.worker_code}) — {w.trade}
            </option>
          ))}
        </select>
        {regWorkers.length===0&&(regForm._site_id||activeSiteId)&&
          <p style={{margin:"4px 0 0",fontSize:11,color:C.faint}}>
            No eligible workers (all may already have pending registrations)
          </p>}
      </div>

      {/* GTV Month */}
      <div style={{marginBottom:12}}>
        <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,
          marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}}>
          Planned GTV Month *
        </label>
        <select value={regForm.planned_month||""}
          onChange={async e=>{
            const m=e.target.value;
            setRegForm(f=>({...f,planned_month:m}));
            if(regForm.worker_id&&m){
              const w=regWorkers.find(w=>String(w.id)===regForm.worker_id);
              if(w) await checkCap(regForm._site_id,w.trade,m);
            }
          }}
          style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,
            borderRadius:8,fontSize:14,fontFamily:"inherit",background:"#fff",outline:"none"}}>
          <option value="">— Select Month —</option>
          {gtvMonthOptions.map(o=>(
            <option key={o.val} value={o.val}>{o.label}</option>
          ))}
        </select>
      </div>

      {/* Cap info */}
      {capInfo&&<div style={{background:capInfo.remaining<=0?"#fef2f2":capInfo.remaining<=3?"#fffbeb":"#f0fdf4",
        border:`1px solid ${capInfo.remaining<=0?"#fca5a5":capInfo.remaining<=3?"#fde68a":"#86efac"}`,
        borderRadius:8,padding:"10px 14px",marginBottom:12}}>
        <p style={{margin:0,fontSize:12,fontWeight:700,
          color:capInfo.remaining<=0?"#dc2626":capInfo.remaining<=3?"#d97706":"#16a34a"}}>
          {capInfo.trade} — {fmtMonth(capInfo.monthStr)}:&nbsp;
          {capInfo.used}/10 slots used · {capInfo.remaining} remaining
          {capInfo.remaining<=0&&" — FULL"}
        </p>
      </div>}

      {/* Notes */}
      <div style={{marginBottom:16}}>
        <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,
          marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>
          Worker's Reason (optional)
        </label>
        <textarea value={regForm.notes||""} rows={2}
          onChange={e=>setRegForm(f=>({...f,notes:e.target.value}))}
          placeholder="e.g. Family function, medical, harvest season…"
          style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,
            borderRadius:8,fontSize:13,fontFamily:"inherit",resize:"none",
            outline:"none",boxSizing:"border-box"}}/>
      </div>

      {/* Approval flow reminder */}
      <div style={{background:"#F8FAFC",border:`1px solid ${C.border}`,borderRadius:9,
        padding:"10px 14px",marginBottom:16}}>
        <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:C.muted,
          textTransform:"uppercase",letterSpacing:".05em"}}>Approval Flow</p>
        {[
          {role:"Trade Supervisor",desc:"Reviews workforce impact for trade"},
          {role:"SIC",desc:"Reviews site manpower situation"},
          {role:"Owner",desc:"Final approval"},
        ].map((s,i)=>(
          <div key={i} style={{display:"flex",gap:8,alignItems:"center",
            marginBottom:i<2?6:0}}>
            <div style={{width:20,height:20,borderRadius:"50%",background:C.accentBg,
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:10,fontWeight:800,color:C.accent,flexShrink:0}}>{i+1}</div>
            <p style={{margin:0,fontSize:12,color:C.text}}>
              <b>{s.role}</b> — {s.desc}
            </p>
          </div>
        ))}
      </div>

      <div style={{display:"flex",gap:8}}>
        <Btn onClick={submitRegistration} disabled={regSaving}>
          {regSaving?"Registering…":"Submit GTV Registration"}
        </Btn>
        <Btn variant="ghost" onClick={()=>{setRegOpen(false);setRegForm({});setCapInfo(null);}}>
          Cancel
        </Btn>
      </div>
    </SlideOver>

    {/* ── REVIEW / APPROVE / REJECT MODAL ────────────────── */}
    <Modal open={actOpen&&!!actReg}
      onClose={()=>{setActOpen(false);setActReg(null);setActNote("");setPayHold(false);}}
      title="Review GTV Registration" width={480}>
      {actReg&&<>
        {/* Worker summary card */}
        <div style={{background:"#F8FAFC",border:`1px solid ${C.border}`,borderRadius:10,
          padding:"12px 16px",marginBottom:16}}>
          <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:8}}>
            <div style={{width:38,height:38,borderRadius:"50%",background:C.accentBg,
              display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <span style={{fontSize:15,fontWeight:800,color:C.accent}}>
                {actReg.workers?.worker_name?.[0]||"?"}
              </span>
            </div>
            <div>
              <p style={{margin:0,fontWeight:700,fontSize:14}}>{actReg.workers?.worker_name}</p>
              <p style={{margin:0,fontSize:12,color:C.muted}}>
                {actReg.workers?.worker_code} · {actReg.trade} · ₹{actReg.workers?.per_day_rate||0}/day
              </p>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:12}}>
            <div><span style={{color:C.muted}}>Site:</span> <b>{actReg.sites?.site_name||"—"}</b></div>
            <div><span style={{color:C.muted}}>GTV Month:</span> <b>{fmtMonth(actReg.planned_gtv_date?.slice(0,7))}</b></div>
            <div><span style={{color:C.muted}}>Registered:</span> {fmtD(actReg.registered_at?.slice(0,10))}</div>
            {actReg.notes&&<div style={{gridColumn:"1/-1"}}><span style={{color:C.muted}}>Reason:</span> {actReg.notes}</div>}
          </div>
        </div>

        {/* Approval trail so far */}
        <div style={{marginBottom:14}}>
          <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:C.muted,
            textTransform:"uppercase",letterSpacing:".05em"}}>Approval Trail</p>
          <ApprovalTrail reg={actReg}/>
        </div>

        {/* Cap info for reviewer */}
        {isLimitedTrade(actReg.trade)&&<CapChecker
          trade={actReg.trade} monthStr={actReg.planned_gtv_date?.slice(0,7)}/>}

        {/* Note */}
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,
            marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>
            Note {isOwner||actReg.status==="pending_owner"?"(optional)":"(required if rejecting)"}
          </label>
          <textarea value={actNote} onChange={e=>setActNote(e.target.value)} rows={2}
            placeholder="Your observation, site condition, reason…"
            style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,
              borderRadius:8,fontSize:13,fontFamily:"inherit",resize:"none",
              outline:"none",boxSizing:"border-box"}}/>
        </div>

        {/* Payment hold option */}
        <div style={{marginBottom:16,background:"#fffbeb",border:"1px solid #fde68a",
          borderRadius:8,padding:"10px 14px"}}>
          <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
            <input type="checkbox" checked={payHold}
              onChange={e=>setPayHold(e.target.checked)}
              style={{width:16,height:16,accentColor:"#d97706"}}/>
            <span style={{fontSize:13,color:"#92400e",fontWeight:600}}>
              Hold payment as disciplinary action
            </span>
          </label>
          <p style={{margin:"5px 0 0 26px",fontSize:11,color:"#92400e"}}>
            Applies if rejecting. Worker's salary may be held pending resolution.
          </p>
        </div>

        <div style={{display:"flex",gap:8}}>
          <Btn onClick={()=>doAction("approve")} disabled={actSaving}
            style={{background:"#16a34a",borderColor:"#16a34a"}}>
            {actSaving?"Processing…":"✓ Approve"}
          </Btn>
          <Btn onClick={()=>doAction("reject")} disabled={actSaving}
            style={{background:"#dc2626",borderColor:"#dc2626"}}>
            {actSaving?"Processing…":"✕ Reject"}
          </Btn>
          <Btn variant="ghost"
            onClick={()=>{setActOpen(false);setActReg(null);}}>
            Cancel
          </Btn>
        </div>
      </>}
    </Modal>
  </div>;
};

// ── Sub-components ────────────────────────────────────────────────
const ApprovalDot=({label,action,note})=>{
  const col=action==="approved"?"#16a34a":action==="rejected"?"#dc2626":"#94a3b8";
  const bg=action==="approved"?"#dcfce7":action==="rejected"?"#fee2e2":"#f1f5f9";
  return <div title={note||""} style={{display:"flex",alignItems:"center",gap:5}}>
    <div style={{width:8,height:8,borderRadius:"50%",background:col,flexShrink:0}}/>
    <span style={{fontSize:10,color:col,fontWeight:600}}>{label}</span>
    {action&&<span style={{fontSize:9,color:col}}>
      {action==="approved"?"✓":"✕"}
    </span>}
  </div>;
};

const ApprovalTrail=({reg})=>(
  <div style={{display:"flex",flexDirection:"column",gap:8}}>
    {[
      {role:"Trade Supervisor",action:reg.supervisor_action,note:reg.supervisor_note,at:reg.supervisor_at},
      {role:"SIC",action:reg.sic_action,note:reg.sic_note,at:reg.sic_at},
      {role:"Owner",action:reg.owner_action,note:reg.owner_note,at:reg.owner_at},
    ].map((s,i)=>{
      const col=s.action==="approved"?"#16a34a":s.action==="rejected"?"#dc2626":"#94a3b8";
      return <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
        <div style={{width:26,height:26,borderRadius:"50%",background:
          s.action==="approved"?"#dcfce7":s.action==="rejected"?"#fee2e2":"#f1f5f9",
          border:`2px solid ${col}`,display:"flex",alignItems:"center",
          justifyContent:"center",flexShrink:0,fontSize:12,fontWeight:800,color:col}}>
          {s.action==="approved"?"✓":s.action==="rejected"?"✕":String(i+1)}
        </div>
        <div style={{flex:1,paddingTop:2}}>
          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontWeight:700,fontSize:12,color:C.text}}>{s.role}</span>
            {s.action&&<Badge color={s.action==="approved"?"green":"red"}>
              {s.action}
            </Badge>}
            {!s.action&&<Badge color="gray">Pending</Badge>}
            {s.at&&<span style={{fontSize:10,color:C.faint}}>{fmtD(s.at?.slice(0,10))}</span>}
          </div>
          {s.note&&<p style={{margin:"3px 0 0",fontSize:11,color:C.muted,
            fontStyle:"italic"}}>"{s.note}"</p>}
        </div>
      </div>;
    })}
  </div>
);

const CapChecker=({trade,monthStr})=>{
  const [capData,setCapData]=useState(null);
  React.useEffect(()=>{
    if(!trade||!monthStr)return;
    const trades=GTV_LABOUR_TRADES.includes(trade)?GTV_LABOUR_TRADES:[trade];
    sb.from("gtv_registrations")
      .select("*",{count:"exact",head:true})
      .in("trade",trades)
      .in("status",["pending_supervisor","pending_sic","pending_owner","approved"])
      .like("planned_gtv_date",`${monthStr}%`)
      .then(({count})=>{
        const label=GTV_LABOUR_TRADES.includes(trade)?"M/C+BRM+PLM combined":trade;
        setCapData({trade:label,used:count||0,remaining:10-(count||0)});
      });
  },[trade,monthStr]);
  if(!capData)return null;
  const col=capData.remaining<=0?"#dc2626":capData.remaining<=3?"#d97706":"#16a34a";
  const bg=capData.remaining<=0?"#fef2f2":capData.remaining<=3?"#fffbeb":"#f0fdf4";
  return <div style={{background:bg,border:`1px solid ${col}40`,borderRadius:8,
    padding:"9px 14px",marginBottom:14}}>
    <p style={{margin:0,fontSize:12,fontWeight:700,color:col}}>
      {capData.trade} cap — {fmtMonth(monthStr)}: {capData.used}/10 used · {capData.remaining} slot{capData.remaining!==1?"s":""} remaining
      {capData.remaining<=0&&" — FULL"}
    </p>
  </div>;
};

const GTVRepository=()=>{
  const {user}=useAuth();
  if(!["SIC","Admin","Owner"].includes(user.role))return <NoAccess module="GTV Repository"/>;

  // ── State ─────────────────────────────────────────────────────
  const [gtvWorkers,setGtvWorkers]=useState([]);
  const [leftWorkers,setLeftWorkers]=useState([]);
  const [tab,setTab]=useState("gtv");
  const [loading,setLoading]=useState(false);
  const [search,setSearch]=useState("");
  const [filterTrade,setFilterTrade]=useState("");
  const [filterSite,setFilterSite]=useState("");
  const [sortCol,setSortCol]=useState("gtv_date");
  const [sortDir,setSortDir]=useState("asc");
  const [sel,setSel]=useState(null);
  const [detailOpen,setDetailOpen]=useState(false);
  const [actionOpen,setActionOpen]=useState(false);
  const [actionType,setActionType]=useState("");
  const [actionNote,setActionNote]=useState("");
  const [saving,setSaving]=useState(false);
  const [sites,setSites]=useState([]);
  const [rejoinSite,setRejoinSite]=useState("");
  const [rejoinRate,setRejoinRate]=useState("");
  const [rejoinDate,setRejoinDate]=useState(()=>new Date().toISOString().split("T")[0]);
  const [history,setHistory]=useState([]);
  const [histLoading,setHistLoading]=useState(false);
  const {show,Toast}=useToast();

  // ── Load data ─────────────────────────────────────────────────
  const fetchAll=async(q)=>{
    let all=[],from=0;
    while(true){
      const {data}=await q.range(from,from+999);
      if(!data||data.length===0)break;
      all=[...all,...data];
      if(data.length<1000)break;
      from+=1000;
    }
    return all;
  };

  const load=async()=>{
    setLoading(true);
    const [wGTV,wLeft,s]=await Promise.all([
      fetchAll(sb.from("workers")
        .select("id,worker_code,worker_name,father_name,trade,per_day_rate,mobile,aadhaar_number,gtv_date,gtv_promise_date,sites(site_name,site_id)")
        .eq("status","GTV").order("gtv_date")),
      fetchAll(sb.from("workers")
        .select("id,worker_code,worker_name,father_name,trade,per_day_rate,mobile,aadhaar_number,gtv_date,sites(site_name,site_id)")
        .eq("status","Left").order("worker_name")),
      sb.from("sites").select("site_id,site_name").eq("is_active",true).order("site_name").then(r=>r.data||[]),
    ]);
    setGtvWorkers(wGTV||[]);
    setLeftWorkers(wLeft||[]);
    setSites(s);
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  // ── Load history for selected worker ─────────────────────────
  useEffect(()=>{
    if(!sel){setHistory([]);return;}
    setHistLoading(true);
    sb.from("worker_history").select("*").eq("worker_id",sel.id)
      .order("event_date",{ascending:false})
      .then(({data})=>{setHistory(data||[]);setHistLoading(false);});
  },[sel]);

  // ── Date helpers ─────────────────────────────────────────────
  const today=new Date();
  const getDaysOnGTV=(d)=>d?Math.floor((today-new Date(d))/(864e5)):null;
  const getDaysToExpiry=(d)=>{
    if(!d)return null;
    const exp=new Date(d);exp.setMonth(exp.getMonth()+6);
    return Math.ceil((exp-today)/(864e5));
  };
  const fmtDate=(d)=>d?new Date(d).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}):"—";

  // ── Action ────────────────────────────────────────────────────
  const doAction=async()=>{
    if(!sel)return;
    setSaving(true);
    const today_str=new Date().toISOString().split("T")[0];
    if(actionType==="mark_left"){
      const {error}=await sb.from("workers").update({status:"Left"}).eq("id",sel.id);
      if(error){show(error.message,"error");setSaving(false);return;}
      try {
        await sb.from("worker_history").insert({worker_id:sel.id,event_type:"left",
          event_date:today_str,old_value:"GTV",new_value:"Left",
          changed_by:user.user_id,changed_by_name:user.name,
          notes:actionNote||"Marked Left from GTV Repository"});
      } catch(e) {}
      show("Marked as Left ✓","success");
    } else if(actionType==="rejoin"){
      if(!rejoinSite){show("Select a site to rejoin","error");setSaving(false);return;}
      const updates={status:"Active",current_site_id:parseInt(rejoinSite),
        gtv_date:null,gtv_promise_date:null,is_active:true,
        date_joined:rejoinDate||today_str};
      if(rejoinRate&&parseFloat(rejoinRate)>0)updates.per_day_rate=parseFloat(rejoinRate);
      const {error}=await sb.from("workers").update(updates).eq("id",sel.id);
      if(error){show(error.message,"error");setSaving(false);return;}
      try {
        await sb.from("worker_history").insert({worker_id:sel.id,event_type:"rejoin",
          event_date:today_str,old_value:"GTV",new_value:"Active",
          changed_by:user.user_id,changed_by_name:user.name,
          notes:actionNote||`Rejoined at ${sites.find(s=>s.site_id===parseInt(rejoinSite))?.site_name}`});
      } catch(e) {}
      show("Worker rejoined successfully ✓","success");
    }
    setSaving(false);setActionOpen(false);setSel(null);
    setActionNote("");setRejoinSite("");setRejoinRate("");
    setDetailOpen(false);load();
  };

  // ── Computed lists ────────────────────────────────────────────
  const workers=tab==="gtv"?gtvWorkers:leftWorkers;
  const allTrades=[...new Set(workers.map(w=>w.trade).filter(Boolean))].sort();

  const filtered=workers.filter(w=>{
    const q=search.toLowerCase();
    const matchSearch=!q||(w.worker_name||"").toLowerCase().includes(q)
      ||(w.worker_code||"").toLowerCase().includes(q)
      ||(w.trade||"").toLowerCase().includes(q)
      ||(w.mobile||"").includes(search)
      ||(w.father_name||"").toLowerCase().includes(q);
    const matchTrade=!filterTrade||w.trade===filterTrade;
    const matchSite=!filterSite||String(w.sites?.site_id)===filterSite;
    return matchSearch&&matchTrade&&matchSite;
  });

  const sorted=[...filtered].sort((a,b)=>{
    let av,bv;
    if(sortCol==="code"){
      av=parseInt((a.worker_code||"0").replace(/\D/g,""))||0;
      bv=parseInt((b.worker_code||"0").replace(/\D/g,""))||0;
    } else if(sortCol==="name"){
      av=(a.worker_name||"").toLowerCase();bv=(b.worker_name||"").toLowerCase();
    } else if(sortCol==="trade"){
      av=(a.trade||"").toLowerCase();bv=(b.trade||"").toLowerCase();
    } else if(sortCol==="gtv_date"||sortCol==="left_date"){
      av=a.gtv_date||"";bv=b.gtv_date||"";
    } else if(sortCol==="days"){
      av=getDaysOnGTV(a.gtv_date)||0;bv=getDaysOnGTV(b.gtv_date)||0;
    } else if(sortCol==="rate"){
      av=parseFloat(a.per_day_rate)||0;bv=parseFloat(b.per_day_rate)||0;
    } else {av="";bv="";}
    if(av<bv)return sortDir==="asc"?-1:1;
    if(av>bv)return sortDir==="asc"?1:-1;
    return 0;
  });

  const toggleSort=col=>{
    if(sortCol===col)setSortDir(d=>d==="asc"?"desc":"asc");
    else{setSortCol(col);setSortDir("asc");}
  };

  // ── Stats ─────────────────────────────────────────────────────
  const expiredCount=gtvWorkers.filter(w=>(getDaysToExpiry(w.gtv_date)||0)<=0).length;
  const expiringCount=gtvWorkers.filter(w=>{const d=getDaysToExpiry(w.gtv_date);return d>0&&d<=30;}).length;
  const totalOutstanding=workers.reduce((s,w)=>s+(parseFloat(w.per_day_rate)||0)*30,0); // approx

  // ── Render helpers ────────────────────────────────────────────
  const SortTH=({label,col,w})=>{
    const active=sortCol===col;
    return <th onClick={()=>toggleSort(col)}
      style={{padding:"10px 12px",textAlign:"left",fontSize:11,fontWeight:700,
        color:active?C.accent:C.muted,textTransform:"uppercase",letterSpacing:".05em",
        cursor:"pointer",userSelect:"none",whiteSpace:"nowrap",
        background:"#F8FAFC",borderBottom:`2px solid ${C.border}`,width:w||"auto"}}>
      {label}
      <span style={{marginLeft:4,opacity:active?1:.3,fontSize:9}}>
        {active&&sortDir==="desc"?"▼":"▲"}
      </span>
    </th>;
  };

  // ── RENDER ────────────────────────────────────────────────────
  return <div>
    <Toast/>

    {/* Header */}
    <PH title="GTV Repository"
      sub="Gone To Village & Left workers — SIC / Owner / Admin only"
      right={<Btn variant="secondary" onClick={load} disabled={loading}>
        {loading?"Loading…":"↻ Refresh"}
      </Btn>}/>

    {/* Summary stats */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10,marginBottom:18}}>
      {[
        {label:"On GTV",value:gtvWorkers.length,color:"#f59e0b",bg:"#fffbeb",border:"#fde68a"},
        {label:"Expired (>6 mo)",value:expiredCount,color:"#dc2626",bg:"#FEF2F2",border:"#fca5a5"},
        {label:"Expiring (≤30 d)",value:expiringCount,color:"#ea580c",bg:"#fff7ed",border:"#fed7aa"},
        {label:"Left Workers",value:leftWorkers.length,color:"#64748b",bg:"#F8FAFC",border:C.border},
      ].map(s=>(
        <div key={s.label} style={{background:s.bg,border:`1px solid ${s.border}`,
          borderRadius:10,padding:"12px 16px",textAlign:"center"}}>
          <p style={{margin:0,fontSize:24,fontWeight:800,color:s.color}}>{s.value}</p>
          <p style={{margin:0,fontSize:11,color:s.color,fontWeight:600}}>{s.label}</p>
        </div>
      ))}
    </div>

    {/* Tab selector */}
    <div style={{display:"flex",gap:0,marginBottom:14,background:"#F8FAFC",
      borderRadius:10,padding:4,border:`1px solid ${C.border}`,width:"fit-content"}}>
      {[
        {id:"gtv",label:"GTV Workers",count:gtvWorkers.length,col:"orange"},
        {id:"left",label:"Left Workers",count:leftWorkers.length,col:"red"},
      ].map(t=>(
        <button key={t.id} onClick={()=>{setTab(t.id);setSearch("");setFilterTrade("");setFilterSite("");}}
          style={{padding:"8px 22px",borderRadius:7,border:"none",cursor:"pointer",
            fontFamily:"inherit",fontWeight:tab===t.id?700:500,fontSize:13,
            background:tab===t.id?"#fff":"transparent",
            color:tab===t.id?C[t.col]||C.accent:C.muted,
            boxShadow:tab===t.id?"0 1px 4px rgba(0,0,0,.1)":"none",
            transition:"all .12s"}}>
          {tab===t.id?"● ":""}{t.label} ({t.count})
        </button>
      ))}
    </div>

    {/* Search + filters */}
    <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
      <div style={{position:"relative",flex:1,minWidth:200}}>
        <svg style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",opacity:.4}}
          width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input id="search_worker_left" name="search" value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Search name, code, trade, mobile…"
          style={{width:"100%",padding:"8px 10px 8px 32px",border:`1.5px solid ${C.border}`,
            borderRadius:8,fontSize:13,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
        {search&&<button onClick={()=>setSearch("")}
          style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",
            background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:16,lineHeight:1}}>×</button>}
      </div>
      <select value={filterTrade} onChange={e=>setFilterTrade(e.target.value)}
        style={{padding:"8px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,
          fontSize:13,fontFamily:"inherit",background:"#fff",minWidth:130}}>
        <option value="">All Trades</option>
        {allTrades.map(t=><option key={t} value={t}>{t}</option>)}
      </select>
      <select value={filterSite} onChange={e=>setFilterSite(e.target.value)}
        style={{padding:"8px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,
          fontSize:13,fontFamily:"inherit",background:"#fff",minWidth:130}}>
        <option value="">All Sites</option>
        {sites.map(s=><option key={s.site_id} value={s.site_id}>{s.site_name}</option>)}
      </select>
      <span style={{fontSize:12,color:C.muted,whiteSpace:"nowrap"}}>
        {sorted.length} of {workers.length}
      </span>
    </div>

    {loading&&<div style={{padding:40,textAlign:"center",color:C.muted}}>
      <div style={{width:24,height:24,border:`2px solid ${C.border}`,borderTopColor:C.accent,
        borderRadius:"50%",animation:"spin 1s linear infinite",margin:"0 auto 10px"}}/>
      Loading workers…
    </div>}

    {/* ── TABLE ─────────────────────────────────────────────── */}
    {!loading&&<div style={{background:"#fff",border:`1px solid ${C.border}`,
      borderRadius:10,overflow:"hidden"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead>
          <tr>
            <SortTH label="Code" col="code" w="90px"/>
            <SortTH label="Worker Name" col="name"/>
            <SortTH label="Trade" col="trade" w="120px"/>
            <SortTH label="Last Site" col="site" w="130px"/>
            <SortTH label={tab==="gtv"?"GTV Since":"Left Date"} col="gtv_date" w="110px"/>
            {tab==="gtv"&&<SortTH label="Days / Status" col="days" w="120px"/>}
            {tab==="gtv"&&<SortTH label="Promise Date" col="promise" w="110px"/>}
            <SortTH label="Rate/Day" col="rate" w="90px"/>
            <th style={{padding:"10px 12px",textAlign:"center",fontSize:11,fontWeight:700,
              color:C.muted,textTransform:"uppercase",letterSpacing:".05em",
              background:"#F8FAFC",borderBottom:`2px solid ${C.border}`,width:100}}>
              Actions
            </th>
          </tr>
        </thead>
        <tbody>
          {sorted.length===0&&<tr><td colSpan={tab==="gtv"?9:7}
            style={{padding:"36px",textAlign:"center",color:C.muted}}>
            No workers found
          </td></tr>}
          {sorted.map((w,i)=>{
            const toExpiry=tab==="gtv"?getDaysToExpiry(w.gtv_date):null;
            const daysOn=tab==="gtv"?getDaysOnGTV(w.gtv_date):null;
            const isOverdue=tab==="gtv"&&toExpiry!==null&&toExpiry<=0;
            const isExpiring=tab==="gtv"&&toExpiry!==null&&toExpiry>0&&toExpiry<=30;
            const rowBg=isOverdue?"#FFF5F5":isExpiring?"#FFFBEB":i%2===0?"#fff":"#FAFBFC";

            return <tr key={w.id}
              style={{borderBottom:`1px solid ${C.border}`,background:rowBg,
                cursor:"pointer",transition:"background .1s"}}
              onMouseEnter={e=>{e.currentTarget.style.background="#F0F7FF";}}
              onMouseLeave={e=>{e.currentTarget.style.background=rowBg;}}
              onClick={()=>{setSel(w);setDetailOpen(true);}}>

              {/* Code */}
              <td style={{padding:"10px 12px"}}>
                <span style={{fontFamily:"monospace",fontSize:12,fontWeight:700,
                  color:C.accent,background:"#EFF6FF",padding:"2px 7px",borderRadius:6}}>
                  {w.worker_code}
                </span>
              </td>

              {/* Name */}
              <td style={{padding:"10px 12px"}}>
                <p style={{margin:0,fontWeight:700,fontSize:13}}>{w.worker_name}</p>
                {w.father_name&&<p style={{margin:0,fontSize:10,color:C.muted}}>S/o {w.father_name}</p>}
                {w.mobile&&<p style={{margin:0,fontSize:10,color:C.faint}}>{w.mobile}</p>}
              </td>

              {/* Trade */}
              <td style={{padding:"10px 12px"}}>
                <Badge color="blue">{w.trade||"—"}</Badge>
              </td>

              {/* Last site */}
              <td style={{padding:"10px 12px",fontSize:12,color:C.muted}}>
                {w.sites?.site_name||"—"}
              </td>

              {/* GTV/Left date */}
              <td style={{padding:"10px 12px",fontSize:12,fontWeight:600}}>
                {fmtDate(w.gtv_date)}
              </td>

              {/* Days / expiry status — GTV only */}
              {tab==="gtv"&&<td style={{padding:"10px 12px"}}>
                {isOverdue
                  ?<span style={{background:"#dc2626",color:"#fff",padding:"3px 8px",
                      borderRadius:20,fontSize:11,fontWeight:700}}>
                      EXPIRED {Math.abs(toExpiry)}d ago
                    </span>
                  :isExpiring
                    ?<span style={{background:"#f59e0b",color:"#fff",padding:"3px 8px",
                        borderRadius:20,fontSize:11,fontWeight:700}}>
                        {toExpiry}d left
                      </span>
                    :<span style={{fontSize:12,color:C.muted}}>{daysOn}d on GTV</span>
                }
              </td>}

              {/* Promise date — GTV only */}
              {tab==="gtv"&&<td style={{padding:"10px 12px",fontSize:12,color:C.faint}}>
                {w.gtv_promise_date?fmtDate(w.gtv_promise_date):"—"}
              </td>}

              {/* Rate */}
              <td style={{padding:"10px 12px",fontSize:13,fontWeight:700,color:C.green}}>
                ₹{w.per_day_rate||0}
              </td>

              {/* Actions */}
              <td style={{padding:"10px 12px",textAlign:"center"}}
                onClick={e=>e.stopPropagation()}>
                <div style={{display:"flex",gap:4,justifyContent:"center",flexWrap:"wrap"}}>
                  {tab==="gtv"&&<>
                    <button
                      onClick={()=>{setSel(w);setRejoinSite("");setRejoinRate(String(w.per_day_rate||""));setRejoinDate(new Date().toISOString().split("T")[0]);setActionType("rejoin");setActionOpen(true);}}
                      style={{background:"#dcfce7",border:"1px solid #86efac",borderRadius:7,
                        padding:"5px 10px",fontSize:11,fontWeight:700,color:"#16a34a",cursor:"pointer"}}>
                      ↑ Rejoin
                    </button>
                    <button
                      onClick={()=>{setSel(w);setActionType("mark_left");setActionNote("");setActionOpen(true);}}
                      style={{background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:7,
                        padding:"5px 10px",fontSize:11,fontWeight:700,color:"#dc2626",cursor:"pointer"}}>
                      Left
                    </button>
                  </>}
                  {tab==="left"&&<>
                    <button
                      onClick={()=>{setSel(w);setRejoinSite("");setRejoinRate(String(w.per_day_rate||""));setRejoinDate(new Date().toISOString().split("T")[0]);setActionType("rejoin");setActionOpen(true);}}
                      style={{background:"#eff6ff",border:`1px solid ${C.border}`,borderRadius:7,
                        padding:"5px 10px",fontSize:11,fontWeight:700,color:C.accent,cursor:"pointer"}}>
                      ↑ Rejoin
                    </button>
                  </>}
                </div>
              </td>
            </tr>;
          })}
        </tbody>
      </table>
    </div>}

    {/* ── WORKER DETAIL SLIDEOVER ───────────────────────────── */}
    <SlideOver open={detailOpen&&!!sel} onClose={()=>{setDetailOpen(false);setSel(null);}} width={480}
      title={sel?.worker_name||"Worker Detail"}
      subtitle={sel?`${sel.worker_code} · ${sel.trade}`:""}> 
      {sel&&<>
        {/* Status badge */}
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          <Badge color={tab==="gtv"?"orange":"red"}>{tab==="gtv"?"GTV":"Left"}</Badge>
          <Badge color="blue">{sel.trade}</Badge>
          {tab==="gtv"&&(()=>{
            const d=getDaysToExpiry(sel.gtv_date);
            if(d!==null&&d<=0)return <Badge color="red">Expired {Math.abs(d)}d ago</Badge>;
            if(d!==null&&d<=30)return <Badge color="orange">{d}d to expiry</Badge>;
            return null;
          })()}
        </div>

        {/* Worker info grid */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          {[
            ["Worker Code",sel.worker_code],
            ["Father's Name",sel.father_name||"—"],
            ["Trade",sel.trade||"—"],
            ["Mobile",sel.mobile||"—"],
            ["Rate / Day","₹"+(sel.per_day_rate||0)],
            ["Last Site",sel.sites?.site_name||"—"],
            ["GTV Date",fmtDate(sel.gtv_date)],
            ["Promise Date",fmtDate(sel.gtv_promise_date)],
          ].map(([label,val])=>(
            <div key={label} style={{background:"#F8FAFC",border:`1px solid ${C.border}`,
              borderRadius:8,padding:"10px 12px"}}>
              <p style={{margin:0,fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase",
                letterSpacing:".05em",marginBottom:2}}>{label}</p>
              <p style={{margin:0,fontSize:13,fontWeight:600,color:C.text}}>{val}</p>
            </div>
          ))}
        </div>

        {/* Action buttons */}
        {tab==="gtv"&&<div style={{display:"flex",gap:8,marginBottom:20}}>
          <Btn onClick={()=>{setDetailOpen(false);setRejoinSite("");setRejoinRate(String(sel.per_day_rate||""));setRejoinDate(new Date().toISOString().split("T")[0]);setActionType("rejoin");setActionOpen(true);}}>
            ↑ Rejoin Worker
          </Btn>
          <Btn variant="secondary" style={{borderColor:"#dc2626",color:"#dc2626"}}
            onClick={()=>{setDetailOpen(false);setActionType("mark_left");setActionNote("");setActionOpen(true);}}>
            Mark as Left
          </Btn>
        </div>}
        {tab==="left"&&<div style={{marginBottom:20}}>
          <Btn onClick={()=>{setDetailOpen(false);setRejoinSite("");setRejoinRate(String(sel.per_day_rate||""));setRejoinDate(new Date().toISOString().split("T")[0]);setActionType("rejoin");setActionOpen(true);}}>
            ↑ Rejoin Worker
          </Btn>
        </div>}

        {/* History timeline */}
        <Divider label="Work History"/>
        {histLoading&&<p style={{fontSize:12,color:C.muted,padding:"8px 0"}}>Loading history…</p>}
        {!histLoading&&history.length===0&&<p style={{fontSize:12,color:C.faint,padding:"8px 0"}}>No history recorded yet</p>}
        {!histLoading&&history.length>0&&(
          <div style={{position:"relative",paddingLeft:28,marginTop:8}}>
            <div style={{position:"absolute",left:10,top:4,bottom:4,width:2,background:C.border,borderRadius:2}}/>
            {history.map(h=>(
              <div key={h.id||h.event_date} style={{position:"relative",marginBottom:14}}>
                <div style={{position:"absolute",left:-22,width:20,height:20,borderRadius:"50%",
                  background:"#fff",border:`2px solid ${C.border}`,
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:11}}>
                  {EVENT_ICON[h.event_type]||"•"}
                </div>
                <div style={{background:"#F8FAFC",border:`1px solid ${C.border}`,
                  borderRadius:8,padding:"8px 12px"}}>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:2,flexWrap:"wrap"}}>
                    <span style={{fontWeight:700,fontSize:12,color:C.text,textTransform:"capitalize"}}>
                      {(h.event_type||"").replace(/_/g," ")}
                    </span>
                    <span style={{fontSize:11,color:C.faint}}>{fmtDate(h.event_date)}</span>
                    {h.changed_by_name&&<span style={{fontSize:10,color:C.faint}}>by {h.changed_by_name}</span>}
                  </div>
                  {(h.old_value||h.new_value)&&<p style={{margin:0,fontSize:11,color:C.muted}}>
                    {h.old_value&&<span style={{color:"#dc2626"}}>{h.old_value}</span>}
                    {h.old_value&&h.new_value&&<span style={{margin:"0 4px",color:C.faint}}>→</span>}
                    {h.new_value&&<span style={{color:"#16a34a"}}>{h.new_value}</span>}
                  </p>}
                  {h.notes&&<p style={{margin:"4px 0 0",fontSize:11,color:C.faint,fontStyle:"italic"}}>{h.notes}</p>}
                </div>
              </div>
            ))}
          </div>
        )}
      </>}
    </SlideOver>

    {/* ── ACTION MODAL ──────────────────────────────────────── */}
    <Modal open={actionOpen&&!!sel}
      onClose={()=>{setActionOpen(false);setActionNote("");setRejoinSite("");}}
      title={actionType==="rejoin"?"Rejoin Worker":"Mark as Left"} width={460}>
      {sel&&<>
        {/* Worker summary */}
        <div style={{background:"#F8FAFC",border:`1px solid ${C.border}`,borderRadius:10,
          padding:"12px 16px",marginBottom:16,display:"flex",gap:12,alignItems:"center"}}>
          <div style={{width:38,height:38,borderRadius:"50%",background:C.accentBg,
            display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <span style={{fontSize:15,fontWeight:800,color:C.accent}}>{sel.worker_name[0]}</span>
          </div>
          <div>
            <p style={{margin:0,fontWeight:700,fontSize:14}}>{sel.worker_name}</p>
            <p style={{margin:0,fontSize:12,color:C.muted}}>
              {sel.worker_code} · {sel.trade} · GTV since {fmtDate(sel.gtv_date)}
            </p>
          </div>
        </div>

        {actionType==="rejoin"&&<>
          <div style={{marginBottom:12}}>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,
              marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}}>
              Assign to Site *
            </label>
            <select value={rejoinSite} onChange={e=>setRejoinSite(e.target.value)}
              style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${rejoinSite?"#86efac":C.border}`,
                borderRadius:8,fontSize:14,fontFamily:"inherit",background:"#fff",outline:"none"}}>
              <option value="">— Select Site —</option>
              {sites.map(s=><option key={s.site_id} value={s.site_id}>{s.site_name}</option>)}
            </select>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
            <Inp label="Rejoining Date" type="date" value={rejoinDate}
              onChange={e=>setRejoinDate(e.target.value)}/>
            <Inp label={`Rate/Day (current ₹${sel.per_day_rate||0})`} type="number"
              value={rejoinRate} placeholder={String(sel.per_day_rate||0)}
              onChange={e=>setRejoinRate(e.target.value)}
              hint="Leave blank to keep current rate"/>
          </div>
          <div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,
            padding:"10px 12px",marginBottom:12}}>
            <p style={{margin:0,fontSize:12,color:"#166534",fontWeight:600}}>
              ✓ Worker status will become Active · GTV record cleared · History logged
            </p>
          </div>
        </>}

        {actionType==="mark_left"&&<div style={{background:"#FEF2F2",border:"1px solid #fca5a5",
          borderRadius:8,padding:"12px 14px",marginBottom:12}}>
          <p style={{margin:"0 0 4px",fontSize:13,color:"#dc2626",fontWeight:700}}>⚠ Permanent Action</p>
          <p style={{margin:0,fontSize:12,color:"#dc2626"}}>
            Worker will be permanently marked Left. Outstanding salary must be settled in Payroll.
            SIC can reverse this manually if needed.
          </p>
        </div>}

        <div style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,
            marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>
            Note {actionType==="mark_left"?"(optional)":"(optional)"}
          </label>
          <textarea value={actionNote} onChange={e=>setActionNote(e.target.value)} rows={2}
            placeholder={actionType==="rejoin"
              ?"e.g. Called and confirmed return date, assigned to tower A…"
              :"e.g. Worker confirmed permanent departure, contacted via family…"}
            style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,
              borderRadius:8,fontSize:13,fontFamily:"inherit",resize:"none",
              outline:"none",boxSizing:"border-box"}}/>
        </div>

        <div style={{display:"flex",gap:8}}>
          <Btn onClick={doAction} disabled={saving}
            style={actionType==="mark_left"?{background:"#dc2626",borderColor:"#dc2626"}:
              {background:"#16a34a",borderColor:"#16a34a"}}>
            {saving?"Processing…":actionType==="rejoin"?"✓ Confirm Rejoin":"✓ Mark as Left"}
          </Btn>
          <Btn variant="ghost" onClick={()=>{setActionOpen(false);setSel(null);}}>Cancel</Btn>
        </div>
      </>}
    </Modal>
  </div>;
};

const EVENT_ICON={join:"🟢",gtv:"🟡",rejoin:"🔵",left:"🔴",
  rate_change:"💰",designation_change:"🔧",transfer:"🔄",site_change:"📍"};

// ─── WORKER HISTORY LOG ───────────────────────────────────────────
const WorkerHistory=({workerId,workerName})=>{
  const [history,setHistory]=useState([]);
  const [loading,setLoading]=useState(false);

  useEffect(()=>{
    if(!workerId)return;
    setLoading(true);
    sb.from("worker_history").select("*").eq("worker_id",workerId)
      .order("event_date",{ascending:false})
      .then(({data})=>{setHistory(data||[]);setLoading(false);});
  },[workerId]);

  const EVENT_LABEL={join:"Joined",gtv:"GTV",rejoin:"Rejoined",left:"Left",
    rate_change:"Rate Changed",designation_change:"Designation Changed",
    transfer:"Transferred",site_change:"Site Changed"};

  if(loading)return <p style={{fontSize:12,color:C.muted,padding:"8px 0"}}>Loading history...</p>;
  if(!history.length)return <p style={{fontSize:12,color:C.faint,padding:"8px 0"}}>No history recorded yet</p>;

  return <div style={{display:"flex",flexDirection:"column",gap:0,position:"relative"}}>
    {/* Timeline line */}
    <div style={{position:"absolute",left:14,top:20,bottom:20,width:2,background:C.border}}/>
    {history.map((h,i)=>(
      <div key={h.id} style={{display:"flex",gap:12,paddingBottom:16,position:"relative"}}>
        {/* Dot */}
        <div style={{width:30,height:30,borderRadius:"50%",flexShrink:0,
          background:"#fff",border:`2px solid ${C.border}`,
          display:"flex",alignItems:"center",justifyContent:"center",
          fontSize:14,zIndex:1,position:"relative"}}>
          {EVENT_ICON[h.event_type]||"•"}
        </div>
        <div style={{flex:1,paddingTop:4}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:3}}>
            <span style={{fontWeight:700,fontSize:13,color:C.text}}>{EVENT_LABEL[h.event_type]||h.event_type}</span>
            <span style={{fontSize:11,color:C.muted}}>{h.event_date}</span>
            {h.changed_by_name&&<span style={{fontSize:11,color:C.faint}}>by {h.changed_by_name}</span>}
          </div>
          {(h.old_value||h.new_value)&&<p style={{margin:"0 0 2px",fontSize:12,color:C.muted}}>
            {h.old_value&&<span style={{textDecoration:"line-through",color:C.faint,marginRight:6}}>{h.old_value}</span>}
            {h.new_value&&<span style={{color:C.accent,fontWeight:600}}>{h.new_value}</span>}
          </p>}
          {h.notes&&<p style={{margin:0,fontSize:11,color:C.faint,fontStyle:"italic"}}>{h.notes}</p>}
        </div>
      </div>
    ))}
  </div>;
};

  {id:"wallets",     label:"Cash Wallets",      icon:I.wallet,     comp:WalletMaster,       group:"Setup",           module:"Masters"},

const PHASE2=["payroll","expense","storeinward","storeissue","stockledger","procurement","drawings","checklist","compliance","reports","workorder","rabill","billpayment"];

function App(){
  const [session,setSession]=useState(null);
  const [authUser,setAuthUser]=useState(null);
  const [active,setActive]=useState("dashboard");
  const [sideOpen,setSideOpen]=useState(false);
  const [isMob,setIsMob]=useState(window.innerWidth<768);
  const [pendingCount,setPending]=useState(0);
  const [profileOpen,setProfileOpen]=useState(false);
  const [pendingEditWorker,setPendingEditWorker]=useState(null);
  const [pendingNewWorker,setPendingNewWorker]=useState(false); // triggers LabourEntry wizard open
  // Multi-site SIC: track assigned sites and active selection
  const [assignedSiteIds,setAssignedSiteIds]=useState([]);
  const [assignedSites,setAssignedSites]=useState([]);
  const [activeSiteId,setActiveSiteId]=useState(null);
  // Sidebar collapse state — must be at App level (hooks cannot be inside nested functions)
  const [collapsedGroups,setCollapsedGroups]=useState({});
  const toggleGroup=g=>setCollapsedGroups(c=>({...c,[g]:!c[g]}));

  useEffect(()=>{
    const fn=()=>setIsMob(window.innerWidth<768);
    window.addEventListener("resize",fn);return()=>window.removeEventListener("resize",fn);
  },[]);

  // ── Idle session timeout — auto-logout after 30 min of inactivity ──
  const IDLE_MS=30*60*1000; // 30 minutes
  useEffect(()=>{
    if(!authUser)return; // only run when logged in
    let timer=null;
    const reset=()=>{
      clearTimeout(timer);
      timer=setTimeout(async()=>{
        await sb.auth.signOut();
        setAuthUser(null);setSession(false);setActive("dashboard");
        // Brief toast-style alert — uses a native alert as it fires after logout
        alert("⏱ Session expired after 30 minutes of inactivity. Please sign in again.");
      },IDLE_MS);
    };
    const events=["mousemove","mousedown","keydown","touchstart","scroll","click"];
    events.forEach(e=>window.addEventListener(e,reset,{passive:true}));
    reset(); // start timer immediately on login
    return()=>{
      clearTimeout(timer);
      events.forEach(e=>window.removeEventListener(e,reset));
    };
  },[authUser]);

  // Check existing Supabase session on load
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session:s}})=>{
      if(s){
        sb.from("app_users").select("*").eq("auth_id",s.user.id).single()
          .then(async({data:profile})=>{
            if(!profile||!profile.is_active){setSession(false);return;}
            // Load assigned sites — fallback to assigned_site_id
            const {data:us}=await sb.from("user_sites").select("site_id").eq("user_id",profile.user_id);
            let siteIds=(us||[]).map(r=>r.site_id);
            if(siteIds.length===0&&profile.assigned_site_id) siteIds=[profile.assigned_site_id];
            let siteList=[];
            if(siteIds.length>0){
              const {data:siteRows}=await sb.from("sites").select("site_id,site_name").in("site_id",siteIds);
              siteList=(siteRows||[]).map(s=>({site_id:s.site_id,site_name:s.site_name}));
            }
            setAssignedSites(siteList);
            setAssignedSiteIds(siteIds);
            // If only one site, auto-select it
            if(siteIds.length===1)setActiveSiteId(siteIds[0]);
            sb.from("policy_master").select("policy_id").eq("role_type",profile.role).single()
              .then(async({data:pol})=>{
                let perms=[];
                if(pol){const {data:pp}=await sb.from("policy_permissions").select("*").eq("policy_id",pol.policy_id);perms=pp||[];}
                // Merge per-user overrides
                const {data:overrides}=await sb.from("user_policy_overrides").select("*").eq("user_id",profile.user_id);
                if(overrides?.length){
                  const merged=perms.filter(p=>!overrides.find(o=>o.module===p.module));
                  perms=[...merged,...overrides];
                }
                setAuthUser({...profile,perms,_assignedSites:siteList});
                setSession(true);
              });
          });
      } else setSession(false);
    });
  },[]);

  // Load pending approvals count for badge
  useEffect(()=>{
    if(!authUser)return;
    if(!["SIC","Admin","Office"].includes(authUser.role))return;
    let q=sb.from("approvals").select("*",{count:"exact",head:true}).eq("status","pending");
    // SIC: filter to their assigned sites
    if(authUser.role==="SIC"){
      if(activeSiteId) q=q.eq("site_id",activeSiteId);
      else if(assignedSiteIds.length>0) q=q.in("site_id",assignedSiteIds);
    }
    if(authUser.role==="Office") q=q.eq("approver_role","Office");
    q.then(({count})=>setPending(count||0));
  },[authUser,active,activeSiteId,assignedSiteIds]);

  const logout=async()=>{
    await sb.auth.signOut();
    setAuthUser(null);setSession(false);setActive("dashboard");
  };

  if(session===null)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",gap:10,color:C.muted}}>
      <div style={{width:22,height:22,border:`2px solid ${C.border}`,borderTopColor:C.accent,
        borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
      Loading SiteOS…
    </div>
  );

  if(!session||!authUser) return <Login onLogin={u=>{
    setAuthUser(u);
    setSession(true);
    // Seed assigned sites from login payload
    const sl=u._assignedSites||[];
    setAssignedSites(sl);
    const ids=sl.map(s=>s.site_id);
    setAssignedSiteIds(ids);
    if(ids.length===1)setActiveSiteId(ids[0]);
  }}/>;

  // ── Visible nav — strict role + permission filtering ─────────
  const visibleNav=NAV.filter(n=>{
    // Admin-only items (Users & Roles, Policies)
    if(n.adminOnly) return ["Owner","Admin"].includes(authUser.role);
    // Owner-only items (Sites, Stores, Buildings)
    if(n.ownerOnly) return ["Owner","Admin"].includes(authUser.role);
    // SIC-only items (GTV Repository)
    if(n.sic) return ["SIC","Admin","Owner"].includes(authUser.role);
    // Top-level items always shown
    if(!n.module) return true;
    // Billing module — Owner/Admin/SIC only until roles configured
    if(n.module==="Billing") return ["Owner","Admin","SIC"].includes(authUser.role);
    // All others: check policy permission
    return hasPerm(authUser.perms,n.module,"can_view");
  });

  const HIDDEN_ROUTES={labour:LabourEntry};
  const Comp=HIDDEN_ROUTES[active]||visibleNav.find(n=>n.id===active)?.comp||Dashboard;

  // ── NavItem ───────────────────────────────────────────────────
  const NavItem=({item})=>{
    const isA=active===item.id;
    const isP2=PHASE2.includes(item.id);
    return <div onClick={()=>{setActive(item.id);setSideOpen(false);}}
      style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:7,
        cursor:"pointer",margin:"1px 0",
        background:isA?C.sideActive:"transparent",
        color:isA?"#fff":"#94A3B8",
        fontSize:12,fontWeight:isA?700:400,
        transition:"all .12s"}}>
      <Ic d={item.icon} s={13} col={isA?"#fff":"#475569"}/>
      <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.label}</span>
      {item.id==="approvals"&&pendingCount>0&&(
        <span style={{background:C.red,color:"#fff",fontSize:9,fontWeight:800,
          padding:"1px 5px",borderRadius:99,minWidth:16,textAlign:"center",flexShrink:0}}>{pendingCount}</span>
      )}
      {isP2&&<span style={{fontSize:7,background:"#1E293B",color:"#4B5563",
        padding:"1px 3px",borderRadius:3,fontWeight:700,flexShrink:0}}>P2</span>}
    </div>;
  };

  // ── Sidebar constants (defined at App level, not inside SideContent) ──
  const GROUP_ICONS={
    "Labour":  "M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2 M9 11a4 4 0 100-8 4 4 0 000 8 M23 21v-2a4 4 0 00-3-3.87 M16 3.13a4 4 0 010 7.75",
    "Salary":  "M12 2v20 M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6",
    "Store":   "M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z M3 6h18",
    "Projects":"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z M14 2v6h6 M16 13H8 M16 17H8",
    "Billing": "M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z",
    "Setup":   "M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4",
  };
  const GROUP_COLORS={
    "Labour":  "#1D4ED8",
    "Salary":  "#059669",
    "Store":   "#0F766E",
    "Projects":"#7C3AED",
    "Billing": "#EA580C",
    "Setup":   "#475569",
  };

  // ── SideContent ───────────────────────────────────────────────
  const SideContent=()=>{
    const groups=["Labour","Salary","Store","Projects","Billing","Setup"];
    return <>
      {/* Logo */}
      <div style={{padding:"14px 14px 12px",borderBottom:"1px solid #1E293B",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,background:C.accent,borderRadius:8,
            display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <Ic d={I.building} s={16} col="#fff"/>
          </div>
          <div>
            <p style={{margin:0,fontSize:13,fontWeight:800,color:"#F1F5F9"}}>SiteOS</p>
            <p style={{margin:0,fontSize:8,color:"#475569",fontWeight:600,
              textTransform:"uppercase",letterSpacing:".1em"}}>Construction ERP</p>
          </div>
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"6px 6px"}}>
        {/* Top-level items (Dashboard, Approvals) */}
        {visibleNav.filter(n=>!n.group).map(item=><NavItem key={item.id} item={item}/>)}

        {/* Group sections */}
        {groups.map(grp=>{
          const items=visibleNav.filter(n=>n.group===grp);
          if(!items.length) return null;
          const collapsed=!!collapsedGroups[grp];
          const col=GROUP_COLORS[grp]||C.accent;
          return <div key={grp} style={{marginTop:8}}>
            {/* Group header */}
            <div onClick={()=>toggleGroup(grp)}
              style={{display:"flex",alignItems:"center",gap:7,padding:"6px 10px",
                borderRadius:7,cursor:"pointer",userSelect:"none",
                background:"rgba(255,255,255,.03)",
                marginBottom:collapsed?0:2}}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                stroke={col} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d={GROUP_ICONS[grp]||GROUP_ICONS["Masters"]}/>
              </svg>
              <span style={{flex:1,fontSize:9,fontWeight:700,color:col,
                textTransform:"uppercase",letterSpacing:".1em"}}>{grp}</span>
              <span style={{fontSize:9,color:"#374151",fontWeight:600,
                transform:collapsed?"rotate(-90deg)":"rotate(0deg)",
                transition:"transform .15s",display:"inline-block"}}>▾</span>
            </div>

            {/* Group items */}
            {!collapsed&&<div style={{paddingLeft:8}}>
              {items.map(item=><NavItem key={item.id} item={item}/>)}
            </div>}
          </div>;
        })}
      </div>

      {/* User footer — with site selector */}
      <div style={{padding:"10px 12px",borderTop:"1px solid #1E293B",flexShrink:0}}>
        {profileOpen&&<MyProfile user={authUser} open={profileOpen} onClose={()=>setProfileOpen(false)} onUpdate={u=>setAuthUser(prev=>({...prev,...u}))}/>}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,cursor:"pointer"}}
          onClick={()=>setProfileOpen(true)}>
          <div style={{width:30,height:30,borderRadius:"50%",background:C.accent,
            overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            {authUser.avatar_url
              ?<img src={authUser.avatar_url} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              :<span style={{fontSize:12,fontWeight:800,color:"#fff"}}>{authUser.name[0].toUpperCase()}</span>}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{margin:0,fontSize:11,fontWeight:700,color:"#CBD5E1",
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{authUser.name}</p>
            <Badge color={roleColor[authUser.role]||"gray"}>{authUser.role}</Badge>
          </div>
        </div>

        {/* Fix 7: Site selector below profile name */}
        {assignedSites.length>0&&<div style={{marginBottom:8}}>
          <p style={{margin:"0 0 4px",fontSize:9,fontWeight:700,color:"#374151",
            textTransform:"uppercase",letterSpacing:".08em"}}>Current Site</p>
          <select
            value={activeSiteId||""}
            onChange={e=>{setActiveSiteId(e.target.value?parseInt(e.target.value):null);}}
            style={{width:"100%",padding:"5px 8px",background:"#1E293B",
              border:"1px solid #334155",borderRadius:7,
              color:activeSiteId?"#F1F5F9":"#64748B",
              fontSize:11,fontFamily:"inherit",fontWeight:600,cursor:"pointer"}}>
            {assignedSites.length>1&&<option value="">All My Sites</option>}
            {assignedSites.map(s=>(
              <option key={s.site_id} value={s.site_id}>{s.site_name}</option>
            ))}
          </select>
          {activeSiteId&&<p style={{margin:"3px 0 0",fontSize:9,color:"#475569",textAlign:"center"}}>
            Viewing: {assignedSites.find(s=>s.site_id===activeSiteId)?.site_name||"Selected Site"}
          </p>}
        </div>}
        {authUser.role==="SIC"&&assignedSites.length===0&&<div style={{
          background:"rgba(220,38,38,.1)",borderRadius:6,padding:"4px 8px",marginBottom:8}}>
          <p style={{margin:0,fontSize:10,color:"#FCA5A5",fontWeight:600}}>⚠ No sites assigned</p>
        </div>}

        <button onClick={logout}
          style={{width:"100%",padding:"6px 10px",background:"rgba(220,38,38,.15)",
            border:"1px solid rgba(220,38,38,.2)",borderRadius:7,color:"#FCA5A5",
            fontSize:11,fontWeight:700,cursor:"pointer",
            display:"flex",alignItems:"center",gap:5,fontFamily:"inherit"}}>
          <Ic d={I.logout} s={12} col="#FCA5A5"/>Sign Out
        </button>
      </div>
    </>;
  };

  // isSIC with multi-site capability
  const isMultiSiteSIC = authUser.role==="SIC" || authUser.role==="Admin";
  // Roles that see all sites without restriction
  const isUnrestricted = ["Admin","Owner","Office"].includes(authUser.role);

  return (
    <AuthCtx.Provider value={{
      user:authUser, perms:authUser.perms,
      activeSiteId, setActiveSiteId,
      assignedSiteIds, assignedSites,
      isUnrestricted,
      setActive,
      pendingEditWorker, setPendingEditWorker, pendingNewWorker, setPendingNewWorker,
    }}>
      <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
        {!isMob&&<div style={{width:210,background:C.sidebar,display:"flex",flexDirection:"column",flexShrink:0}}>
          <SideContent/>
        </div>}
        {isMob&&sideOpen&&<div style={{position:"fixed",inset:0,zIndex:60,display:"flex"}}>
          <div style={{position:"absolute",left:0,top:0,bottom:0,width:210,
            background:C.sidebar,display:"flex",flexDirection:"column",
            boxShadow:"4px 0 20px rgba(0,0,0,.3)"}}>
            <SideContent/>
          </div>
          <div style={{position:"absolute",left:210,right:0,top:0,bottom:0,
            background:"rgba(0,0,0,.5)"}} onClick={()=>setSideOpen(false)}/>
        </div>}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
          {/* ── TOPBAR ─────────────────────────────────────────── */}
          <div style={{height:50,background:C.card,borderBottom:`1px solid ${C.border}`,
            display:"flex",alignItems:"center",padding:"0 16px",gap:12,flexShrink:0}}>
            {isMob&&<button onClick={()=>setSideOpen(true)}
              style={{background:"none",border:"none",cursor:"pointer",color:C.muted,
                display:"flex",alignItems:"center",padding:4}}>
              <Ic d={I.menu} s={20}/>
            </button>}
            <span style={{fontSize:14,fontWeight:700,flex:1}}>
              {NAV.find(n=>n.id===active)?.label||"Dashboard"}
            </span>

            {/* Site badge in topbar — full selector moved to sidebar */}
            {activeSiteId&&assignedSites.length>0&&<div style={{
              background:"#1E293B",borderRadius:8,padding:"4px 10px",
              fontSize:11,color:"#94A3B8",fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
              <Ic d={I.building} s={11} col="#64748B"/>
              {assignedSites.find(s=>s.site_id===activeSiteId)?.site_name||"Site"}
            </div>}

            <Badge color={roleColor[authUser.role]||"gray"}>{authUser.role}</Badge>
            {!isMob&&<div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:13,color:C.muted}}>{authUser.name}</span>
              <button onClick={logout}
                style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,
                  padding:"5px 10px",cursor:"pointer",color:C.muted,fontSize:12,
                  display:"flex",alignItems:"center",gap:5,fontFamily:"inherit"}}>
                <Ic d={I.logout} s={13}/>Sign Out
              </button>
            </div>}
          </div>
          <div style={{flex:1,overflowY:"auto",padding:isMob?14:22}}>
            <Comp/>
          </div>
        </div>
      </div>

    </AuthCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
// Register service worker only when hosted (not in Claude preview or local file)
if('serviceWorker' in navigator){
  const origin=window.location.origin;
  const isHosted=origin.startsWith('http')&&
    !origin.includes('claudeusercontent.com')&&
    origin!=='null'&&
    window.location.protocol!=='file:';
  if(isHosted){
    window.addEventListener('load',()=>{
      navigator.serviceWorker.register('sw.js')
        .then(r=>console.log('SW registered'))
        .catch(e=>console.log('SW registration failed',e));
    });
  }
}
// PWA install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  deferredPrompt=e;
  // Show install button after 3 seconds if not installed
  setTimeout(()=>{
    if(deferredPrompt){
      const btn=document.createElement('div');
      btn.id='pwa-install-btn';
      btn.innerHTML='📲 Install SiteOS App';
      btn.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1D4ED8;color:#fff;padding:12px 24px;border-radius:30px;font-weight:700;font-size:14px;cursor:pointer;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);font-family:Segoe UI,sans-serif;white-space:nowrap';
      btn.onclick=async()=>{
        deferredPrompt.prompt();
        const {outcome}=await deferredPrompt.userChoice;
        deferredPrompt=null;
        btn.remove();
      };
      document.body.appendChild(btn);
      setTimeout(()=>{const b=document.getElementById('pwa-install-btn');if(b)b.remove();},15000);
    }
  },3000);
});
</script>
