// ─── REFERENCE WORKER SEARCH WIDGET ──────────────────────────────
// Used in Labour Entry wizard Step 2 — Emergency Contact section.
// Logic:
//   1. User types worker code (UA-XXXXX) or name → searches allWorkers
//   2. On selection: auto-fills relative_name, relative_mobile
//   3. Address auto-fill:
//      - Active → site name (current_site_id)
//      - GTV/Left → home_address of that worker
//      - Nothing found → manual entry
const RefWorkerSearch=({form,F,allWorkers,sites})=>{
  const [query,setQuery]=useState("");
  const [results,setResults]=useState([]);
  const [showDrop,setShowDrop]=useState(false);
  const [mode,setMode]=useState(
    form._refWorkerCode?"linked":"search" // "search"|"linked"|"manual"
  );

  // Search
  const doSearch=v=>{
    setQuery(v);
    if(!v.trim()){setResults([]);return;}
    const q=v.toLowerCase();
    const r=(allWorkers||[]).filter(w=>
      (w.worker_code||"").toLowerCase().includes(q)||
      (w.worker_name||"").toLowerCase().includes(q)||
      (w.mobile||"").includes(v)
    ).slice(0,10);
    setResults(r);
    setShowDrop(true);
  };

  // On picking a worker from dropdown
  const pickWorker=w=>{
    let address="";
    if(w.status==="Active"||w.status==="Transferred"){
      const site=sites.find(s=>s.site_id===w.current_site_id);
      address=site?`${site.site_name} Site`:"";
    } else {
      // GTV or Left — use their home address
      address=w.home_address||"";
    }
    F({
      relative_name:w.worker_name,
      relative_mobile:w.mobile||"",
      relative_address:address,
      _refWorkerCode:w.worker_code,
      _refWorkerId:w.id,
      _refWorkerStatus:w.status,
      _refWorkerSite:w.sites?.site_name||"",
    });
    setQuery(w.worker_code);
    setMode("linked");
    setShowDrop(false);
    setResults([]);
  };

  // Clear link
  const clearLink=()=>{
    F({
      relative_name:"",
      relative_mobile:"",
      relative_address:"",
      _refWorkerCode:"",
      _refWorkerId:null,
      _refWorkerStatus:"",
      _refWorkerSite:"",
    });
    setQuery("");
    setMode("search");
  };

  const SC={Active:"#16a34a",GTV:"#f59e0b",Left:"#dc2626",Transferred:"#2563eb"};

  return <div>
    <Divider label="Reference / Emergency Contact"/>

    {/* Policy note */}
    <div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:8,
      padding:"9px 14px",marginBottom:14}}>
      <p style={{margin:0,fontSize:12,color:"#1D4ED8",fontWeight:600}}>
        Our policy: new workers are introduced by an existing worker or supervisor at site.
        Search by code, name, or mobile to link the reference worker — or enter manually if no one introduced them.
      </p>
    </div>

    {/* Linked worker badge */}
    {mode==="linked"&&form._refWorkerCode&&(
      <div style={{background:"#f0fdf4",border:"1.5px solid #86efac",borderRadius:10,
        padding:"10px 14px",marginBottom:12,display:"flex",gap:10,alignItems:"center"}}>
        <div style={{flex:1}}>
          <p style={{margin:0,fontWeight:700,fontSize:13,color:"#166534"}}>
            ✓ Introduced by: {form._refWorkerCode}
          </p>
          <p style={{margin:"2px 0 0",fontSize:12,color:"#166534"}}>
            {form.relative_name}
            {form._refWorkerStatus&&<span style={{marginLeft:8,fontSize:11,
              color:SC[form._refWorkerStatus]||"#64748b",fontWeight:600}}>
              [{form._refWorkerStatus}
              {form._refWorkerStatus==="Active"&&form._refWorkerSite?` · ${form._refWorkerSite}`:""}]
            </span>}
          </p>
        </div>
        <button onClick={clearLink}
          style={{background:"none",border:`1px solid #86efac`,borderRadius:7,
            cursor:"pointer",padding:"5px 10px",fontSize:11,color:"#166534",fontWeight:700}}>
          Change
        </button>
      </div>
    )}

    {/* Search box — shown in search mode or before linking */}
    {mode!=="linked"&&<div style={{position:"relative",marginBottom:10}}>
      <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,
        marginBottom:5,textTransform:"uppercase",letterSpacing:".06em"}}>
        Search Existing Worker (Introducer)
      </label>
      <div style={{position:"relative"}}>
        <svg style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",opacity:.4}}
          width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input id="worker_search_query" name="mengram_query" value={query} onChange={e=>doSearch(e.target.value)}
          onFocus={()=>query&&setShowDrop(true)}
          onBlur={()=>setTimeout(()=>setShowDrop(false),180)}
          placeholder="Type code (UA-XXXXX), name or mobile…"
          style={{width:"100%",padding:"9px 12px 9px 34px",border:`1.5px solid ${C.border}`,
            borderRadius:8,fontSize:13,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
        {query&&<button onClick={()=>{setQuery("");setResults([]);setShowDrop(false);}}
          style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",
            background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:16,lineHeight:1}}>×</button>}
      </div>
      {/* Dropdown results */}
      {showDrop&&results.length>0&&<div style={{position:"absolute",zIndex:50,width:"100%",
        background:"#fff",border:`1.5px solid ${C.border}`,borderRadius:10,
        boxShadow:"0 8px 24px rgba(0,0,0,.12)",marginTop:3,maxHeight:240,overflowY:"auto"}}>
        {results.map(w=>(
          <div key={w.id} onMouseDown={()=>pickWorker(w)}
            style={{padding:"10px 14px",cursor:"pointer",borderBottom:`1px solid ${C.border}`,
              display:"flex",gap:10,alignItems:"center"}}
            onMouseEnter={e=>{e.currentTarget.style.background="#F0F7FF";}}
            onMouseLeave={e=>{e.currentTarget.style.background="#fff";}}>
            <div style={{flex:1}}>
              <p style={{margin:0,fontWeight:700,fontSize:13}}>{w.worker_name}</p>
              <p style={{margin:0,fontSize:11,color:C.muted}}>
                <span style={{fontFamily:"monospace",color:C.accent}}>{w.worker_code}</span>
                &nbsp;·&nbsp;{w.trade}
                {w.mobile&&<>&nbsp;·&nbsp;{w.mobile}</>}
              </p>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <span style={{fontSize:11,fontWeight:700,color:SC[w.status]||"#64748b"}}>
                {w.status}
              </span>
              <p style={{margin:"2px 0 0",fontSize:10,color:C.muted}}>
                {w.status==="Active"?w.sites?.site_name||"—":w.home_address?.slice(0,25)||(w.status==="GTV"?"(GTV — home addr)":"—")}
              </p>
            </div>
          </div>
        ))}
        {results.length===0&&query&&<div style={{padding:"12px 14px",color:C.muted,fontSize:13}}>
          No worker found — fill manually below
        </div>}
      </div>}
      {/* No match — manual entry option */}
      <p style={{margin:"5px 0 0",fontSize:11,color:C.faint}}>
        Not found?&nbsp;
        <button onMouseDown={()=>setMode("manual")}
          style={{background:"none",border:"none",cursor:"pointer",color:C.accent,
            fontWeight:700,fontSize:11,padding:0,fontFamily:"inherit",textDecoration:"underline"}}>
          Enter manually
        </button>
      </p>
    </div>}

    {/* Fields — always shown, pre-filled from search or manual */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
      <Inp label="Relative / Emergency Contact Name *"
        value={form.relative_name||""}
        onChange={e=>F({relative_name:e.target.value})}
        placeholder="Full name"/>
      <Inp label="Mobile Number"
        value={form.relative_mobile||""}
        onChange={e=>F({relative_mobile:e.target.value})}
        placeholder="10-digit mobile"
        hint={form._refWorkerCode?"From linked worker":"Enter manually"}/>
    </div>
    <div style={{marginBottom:4}}>
      <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,
        marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>
        Relative Address
        {form._refWorkerCode&&<span style={{marginLeft:8,fontWeight:400,
          textTransform:"none",color:C.faint,fontSize:10}}>
          — auto-filled: {form._refWorkerStatus==="Active"?"current site":
            (form._refWorkerStatus==="GTV"||form._refWorkerStatus==="Left")?"home address (GTV/Left worker)":""}
        </span>}
      </label>
      <textarea value={form.relative_address||""}
        onChange={e=>F({relative_address:e.target.value})}
        rows={2} placeholder={
          form._refWorkerStatus==="Active"?"Worker's current site (auto-filled)":
          form._refWorkerStatus==="GTV"||form._refWorkerStatus==="Left"?"Home/village address (auto-filled)":
          "Full address — village, district, state…"}
        style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,
          borderRadius:8,fontSize:13,fontFamily:"inherit",resize:"vertical",
          outline:"none",boxSizing:"border-box"}}/>
      {form._refWorkerStatus==="GTV"&&<p style={{margin:"3px 0 0",fontSize:10,
        color:"#f59e0b",fontWeight:600}}>
        ⚠ Linked worker is on GTV — home address used
      </p>}
      {form._refWorkerStatus==="Left"&&<p style={{margin:"3px 0 0",fontSize:10,
        color:"#dc2626",fontWeight:600}}>
        ⚠ Linked worker has Left — home address used
      </p>}
    </div>
  </div>;
};

const WorkerIdCard=({worker:w,onClose})=>{
  if(!w)return null;
  const RED="#9B1C1C";const DARKRED="#7F1D1D";const LIGHTRED="#FEE2E2";
  const siteName=w.sites?.site_name||"—";
  const siteLocation=w.sites?.location||"";
  const siteClient=w.sites?.client_name||"";

  const printCard=()=>{
    const front=document.getElementById("id-card-front");
    const back=document.getElementById("id-card-back");
    const pw=window.open("","_blank","width=900,height=500");
    // KEY FIX: force browser to render mm units at true physical size
    // 90mm @ 96dpi = 340.16px, 55mm @ 96dpi = 207.87px
    // We set @page to exact card pair size so browser doesn't scale
    pw.document.write(`<!DOCTYPE html><html><head><title>ID Card — ${w.worker_code}</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <style>
      /* Force true physical mm — no browser scaling */
      html{font-size:16px}
      @page{
        size:200mm 70mm;
        margin:0;
      }
      *{margin:0;padding:0;box-sizing:border-box;
        -webkit-print-color-adjust:exact;print-color-adjust:exact;
        color-adjust:exact}
      body{
        font-family:Arial,sans-serif;
        background:#fff;
        width:200mm;
        height:70mm;
        display:flex;
        flex-direction:row;
        align-items:flex-start;
        padding:5mm;
        gap:5mm;
      }
      /* Each card: exact physical 90x55mm */
      .card-wrap{display:flex;flex-direction:column;align-items:center;gap:1mm}
      .card-label{font-size:5pt;font-family:Arial,sans-serif;color:#94a3b8;font-weight:700;
        letter-spacing:.08em;text-transform:uppercase}
      .card{
        width:90mm !important;
        height:55mm !important;
        min-width:90mm !important;
        min-height:55mm !important;
        max-width:90mm !important;
        max-height:55mm !important;
        overflow:hidden;
        flex-shrink:0;
        position:relative;
      }
      /* Cut line between front and back */
      .cut-col{
        display:flex;flex-direction:column;align-items:center;
        justify-content:center;padding-top:6mm;gap:1mm;
      }
      .cut-line{
        border-left:0.3mm dashed #CBD5E1;
        height:55mm;
      }
      .cut-txt{
        font-size:5pt;color:#CBD5E1;font-family:Arial,sans-serif;
        writing-mode:vertical-rl;letter-spacing:.05em;
      }
      @media screen{
        body{transform-origin:top left;}
      }
    </style></head><body>
    <div class="card-wrap">
      <span class="card-label">① FRONT</span>
      <div class="card">${front.innerHTML}</div>
    </div>
    <div class="cut-col">
      <span class="cut-txt">✂ cut here</span>
      <div class="cut-line"></div>
    </div>
    <div class="card-wrap">
      <span class="card-label">② BACK</span>
      <div class="card">${back.innerHTML}</div>
    </div>
    </body></html>`);
    pw.document.close();
    // Wait for full render then print
    pw.onload=()=>{
      setTimeout(()=>{pw.focus();pw.print();},300);
    };
  };

  const cardStyle={
    width:"90mm",height:"55mm",border:`0.5mm solid ${RED}`,borderRadius:"2mm",
    overflow:"hidden",background:"#fff",fontFamily:"Arial,sans-serif",
    boxShadow:"0 4px 24px rgba(0,0,0,.22)",flexShrink:0,
    display:"flex",flexDirection:"column",
  };

  return <Modal open={!!w} onClose={onClose} title="ID Card — Print Preview" width={520}>
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
      <p style={{fontSize:11,color:"#64748B",margin:0,textAlign:"center"}}>
        Physical size: <b>90 mm × 55 mm</b> — Print both sides, cut, paste back-to-back into card sleeve
      </p>

      {/* ═══════ FRONT SIDE ═══════ */}
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <span style={{fontSize:9,fontWeight:700,color:RED,writingMode:"vertical-rl",
          transform:"rotate(180deg)",letterSpacing:".12em",opacity:.7}}>FRONT</span>
        <div id="id-card-front" style={cardStyle}>
          {/* Header */}
          <div style={{background:RED,height:"9mm",flexShrink:0,display:"flex",
            alignItems:"center",justifyContent:"space-between",padding:"0 3mm"}}>
            <span style={{color:"#fff",fontWeight:900,fontSize:"4.5mm",letterSpacing:".07em"}}>IDENTITY CARD</span>
            <span style={{color:"rgba(255,255,255,.75)",fontSize:"2mm",fontWeight:600,letterSpacing:".04em"}}>UMIYA ASSOCIATES</span>
          </div>

          {/* Body */}
          <div style={{flex:1,display:"flex",position:"relative",overflow:"hidden",minHeight:0}}>
            {/* Subtle arc */}
            <svg style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none"}}
              preserveAspectRatio="none" viewBox="0 0 340 174">
              <path d="M0,0 L115,0 Q68,87 115,174 L0,174 Z" fill={RED} opacity="0.09"/>
            </svg>

            {/* Photo col */}
            <div style={{width:"24mm",flexShrink:0,padding:"2mm 1mm 2mm 3mm",zIndex:1,
              display:"flex",flexDirection:"column",alignItems:"center",gap:"1mm"}}>
              <div style={{width:"20mm",height:"24mm",border:`0.4mm solid ${RED}`,
                borderRadius:"1mm",overflow:"hidden",background:LIGHTRED,

// ─── LABOUR ENTRY ─────────────────────────────────────────────────
const LabourEntry=()=>{
  const {user,perms,assignedSiteIds,isUnrestricted,pendingEditWorker,setPendingEditWorker,pendingNewWorker,setPendingNewWorker}=useAuth();
  if(!hasPerm(perms,"Labour","can_view"))return <NoAccess module="Labour Entry"/>;
  const canAdd=hasPerm(perms,"Labour","can_add");
  const isSIC=["SIC","Admin"].includes(user.role);
  const isSupervisor=["SIC","Admin","Supervisor"].includes(user.role);

  const [workers,setWorkers]=useState([]);
  const [sites,setSites]=useState([]);
  const [stores,setStores]=useState([]);
  const [buildings,setBuildings]=useState([]);
  const [allBuildings,setAllBuildings]=useState([]);
  const [search,setSearch]=useState("");
  const [fStatus,setFStatus]=useState("");
  const [fSite,setFSite]=useState("");
  const [page,setPage]=useState(0);const [PS,setPS]=useState(25);
  const [wizOpen,setWizOpen]=useState(false);
  const [wizStep,setWizStep]=useState(1);
  const [editWorker,setEditWorker]=useState(null);
  const [form,setForm]=useState({});
  const [saving,setSaving]=useState(false);
  const [viewWorker,setViewWorker]=useState(null);
  const [idCardWorker,setIdCardWorker]=useState(null);
  const [printWorker,setPrintWorker]=useState(null);
  const {show,Toast}=useToast();
  const F=v=>setForm(f=>({...f,...v}));

  const TRADES=["BRM","Carpenter","Driver","Electrician","Engineer","Fitter","Foreman","M/C","Mukadam","PLM","Project Incharge","Storekeeper","Supervisor"];
  const SC={Active:"green",GTV:"orange",Left:"red",Transferred:"blue"};
  const ENTRY_STATUS={draft:"gray",supervisor_signed:"orange",sic_approved:"green",active:"green"};
  const ENTRY_LABEL={draft:"Draft",supervisor_signed:"Supervisor Signed",sic_approved:"SIC Approved",active:"Active"};

  const load=async()=>{
    const fetchAll=async(query)=>{
      let all=[];let from=0;const PAGE=1000;
      while(true){
        const {data,error}=await query.range(from,from+PAGE-1);
        if(error||!data||data.length===0)break;
        all=[...all,...data];
        if(data.length<PAGE)break;
        from+=PAGE;
      }
      return all;
    };
    const [w,s,st,bl]=await Promise.all([
      fetchAll(sb.from("workers").select("*,sites(site_name)").order("created_at",{ascending:false})),
      (async()=>{
        let q=sb.from("sites").select("site_id,site_name,job_id").eq("is_active",true).order("site_name");
        if(!isUnrestricted&&assignedSiteIds.length>0) q=q.in("site_id",assignedSiteIds);
        return q.then(r=>r.data||[]);
      })(),
      sb.from("stores").select("store_id,store_name,site_id").eq("is_active",true).then(r=>r.data||[]),
      sb.from("buildings").select("id,building_name,building_code,site_id").eq("is_active",true).then(r=>r.data||[]),
    ]);
    setWorkers(w);setSites(s);setStores(st);setAllBuildings(bl);
  };
  useEffect(()=>{load();},[]);

  // Consume pendingEditWorker from WorkerMaster Edit button
  useEffect(()=>{
    if(pendingEditWorker){
      openEdit(pendingEditWorker);
      setPendingEditWorker(null);
    }
  },[pendingEditWorker]);

  // Consume pendingNewWorker from WorkerMaster New Registration button
  useEffect(()=>{
    if(pendingNewWorker){
      openNew();
      setPendingNewWorker(false);
    }
  },[pendingNewWorker]);

  // When site changes in form, filter stores/buildings and auto-fill job_no
  useEffect(()=>{
    if(form.current_site_id){
      setBuildings(allBuildings.filter(b=>b.site_id===parseInt(form.current_site_id)));
      // Fix 4b: auto-fill job_no from site's job_id unless user manually changed it
      const site=sites.find(s=>s.site_id===parseInt(form.current_site_id));
      if(site?.job_id&&!form._jobNoManual) setForm(f=>({...f,job_no:site.job_id}));
    }else setBuildings([]);
  },[form.current_site_id,allBuildings]);

  const openNew=()=>{
    setEditWorker(null);
    const today=new Date().toISOString().split("T")[0];
    // Determine default site: if user has exactly 1 assigned site use it, otherwise pick first site
    let defaultSite=null;
    if(!isUnrestricted&&assignedSiteIds.length>0){
      // Try to find the single assigned site or the first one
      defaultSite=sites.find(s=>s.site_id===assignedSiteIds[0])||null;
    } else if(sites.length>0){
      defaultSite=sites[0];
    }
    // Auto-generate next code based on site's job_id prefix
    let workerCode="UA-00001";
    if(defaultSite?.job_id){
      const siteCode=defaultSite.job_id;
      const siteWorkers=workers.filter(w=>w.worker_code?.startsWith(siteCode+"-"));
      const maxNum=siteWorkers.reduce((mx,w)=>{
        const n=parseInt((w.worker_code??"").split("-").pop()||"0");
        return n>mx?n:mx;
      },0);
      workerCode=`${siteCode}-${String(maxNum+1).padStart(5,"0")}`;
    } else {
      const maxCode=workers.reduce((mx,w)=>{
        const n=parseInt((w.worker_code||"").replace(/\D/g,""));
        return n>mx?n:mx;
      },0);
      workerCode=`UA-${String(maxCode+1).padStart(5,"0")}`;
    }
    setForm({
      worker_code:workerCode,
      status:"draft",worker_type:"Daily Wage",bank_account_type:"SB",
      esic_eligible:true,is_active:true,
      date_joined:today,
      helmet_issued:false,belt_issued:false,gumboot_issued:false,
      married:false,children_count:0,
      current_site_id:defaultSite?String(defaultSite.site_id):"",
      job_no:defaultSite?.job_id||"",
      first_name:"",father_name:"",surname:"",
    });
    setWizStep(1);setWizOpen(true);
  };

  const openEdit=w=>{
    setEditWorker(w);
    // Parse name parts if not stored separately
    const nameParts=(w.worker_name||"").trim().split(/\s+/);
    const first_name=w.first_name||nameParts[0]||"";
    const surname=w.surname||nameParts.slice(-1)[0]||"";
    setForm({...w,
      first_name,surname,
      helmet_issued:false,
      belt_issued:false,
      gumboot_issued:false,
      ppe_confirmed:false,
      current_site_id:w.current_site_id?.toString()||"",
      current_store_id:w.current_store_id?.toString()||"",
      building_id:w.building_id?.toString()||"",
      _refWorkerId:w.ref_worker_id||null,
      _refWorkerCode:w.ref_worker_id?"(linked)":"",
      _refWorkerStatus:"",
      _refWorkerSite:"",
    });
    // Load actual PPE status from worker_ppe table (source of truth)
    sb.from("worker_ppe")
      .select("helmet_issued,belt_issued,gumboot_issued,worker_confirmed")
      .eq("worker_id",w.id)
      .maybeSingle()
      .then(({data:ppe})=>{
        if(ppe){
          setForm(f=>({...f,
            helmet_issued:!!ppe.helmet_issued,
            belt_issued:!!ppe.belt_issued,
            gumboot_issued:!!ppe.gumboot_issued,
            ppe_confirmed:!!ppe.worker_confirmed,
          }));
        }
      });
    setWizStep(1);setWizOpen(true);
  };

  // File upload helper
  const uploadFile=async(file,folder)=>{
    if(!file)return null;
    const ext=file.name.split(".").pop();
    const path=`${folder}/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
    const {data,error}=await sb.storage.from("worker-docs").upload(path,file,{upsert:true});
    if(error){
      // If bucket not found, show a soft warning — don't block save
      if(error.message?.includes("Bucket not found")||error.message?.includes("bucket")){
        show("⚠ Storage bucket not set up — photo skipped. Worker details will still be saved.","error");
        return null;
      }
      show("Upload failed: "+error.message,"error");
      return null;
    }
    const {data:url}=sb.storage.from("worker-docs").getPublicUrl(path);
    return url.publicUrl;
  };

  const save=async()=>{
    if(!form.worker_name?.trim()){show("Worker name is required","error");return;}
    if(!form.trade){show("Select a trade","error");return;}
    setSaving(true);

    // Handle file uploads
    let photo_url=form.worker_photo_url||null;
    let aadhaar_url=form.aadhaar_photo_url||null;
    let pan_url=form.pan_photo_url||null;
    let bank_url=form.bank_photo_url||null;
    if(form._photoFile)photo_url=await uploadFile(form._photoFile,"photos")||photo_url;
    if(form._aadhaarFile)aadhaar_url=await uploadFile(form._aadhaarFile,"aadhaar")||aadhaar_url;
    if(form._panFile)pan_url=await uploadFile(form._panFile,"pan")||pan_url;
    if(form._bankFile)bank_url=await uploadFile(form._bankFile,"bank")||bank_url;

    const entry_status=form.entry_status||"draft";
    const payload={
      worker_code:(form.worker_code||"").trim(),
      worker_name:(form.worker_name||"").trim(),
      first_name:form.first_name||null,
      surname:form.surname||null,
      father_name:form.father_name||null,
      mother_name:form.mother_name||null,
      trade:form.trade,
      worker_type:form.worker_type||"Daily Wage",
      dob:form.dob||null,
      blood_group:form.blood_group||null,
      married:!!form.married,
      wife_name:form.wife_name||null,
      children_count:parseInt(form.children_count)||0,
      mobile:form.mobile||null,
      mobile_home:form.mobile_home||null,
      home_address:form.home_address||null,
      relative_name:form.relative_name||null,
      relative_mobile:form.relative_mobile||null,
      relative_address:form.relative_address||null,
      ref_worker_id:form._refWorkerId?parseInt(form._refWorkerId):null,
      allergy:form.allergy||null,
      job_no:form.job_no||null,
      aadhaar_number:form.aadhaar_number||null,
      pan_number:form.pan_number||null,
      esic_ip_number:form.esic_ip_number||null,
      pf_uan_number:form.pf_uan_number||null,
      bank_account:form.bank_account||null,
      bank_ifsc:form.bank_ifsc||null,
      bank_name:form.bank_name||null,
      bank_account_type:form.bank_account_type||"SB",
      per_day_rate:parseFloat(form.per_day_rate)||0,
      current_site_id:form.current_site_id?parseInt(form.current_site_id):null,
      current_store_id:form.current_store_id?parseInt(form.current_store_id):null,
      building_id:form.building_id?parseInt(form.building_id):null,
      date_joined:form.date_joined||null,
      minimum_wage_category:form.minimum_wage_category||"unskilled",
      status:entry_status==="sic_approved"||entry_status==="active"?"Active":"Left",
      entry_status,
      worker_photo_url:photo_url,
      aadhaar_photo_url:aadhaar_url,
      pan_photo_url:pan_url,
      bank_photo_url:bank_url,
      first_advance:parseFloat(form.first_advance)||0,
      is_active:true,
      is_bob_midc_branch:!!form.is_bob_midc_branch,
      esic_eligible:form.esic_eligible!==false,
      consent_given:!!form.consent_given,
      consent_date:form.consent_date||null,
      tenant_id:user.tenant_id||null,
    };

    let workerId=editWorker?.id;
    if(editWorker){
      const {error}=await sb.from("workers").update(payload).eq("id",editWorker.id);
      if(error){setSaving(false);show(error.message,"error");return;}
    } else {
      const {data:inserted,error}=await sb.from("workers").insert(payload).select().single();
      if(error){setSaving(false);show(error.message,"error");return;}
      workerId=inserted.id;
    }

    // Save PPE record
    if(workerId){
      const ppeData={
        worker_id:workerId,
        site_id:form.current_site_id?parseInt(form.current_site_id):null,
        helmet_issued:!!form.helmet_issued,
        helmet_issue_date:form.helmet_issued?form.date_joined||null:null,
        belt_issued:!!form.belt_issued,
        belt_issue_date:form.belt_issued?form.date_joined||null:null,
        gumboot_issued:!!form.gumboot_issued,
        gumboot_issue_date:form.gumboot_issued?form.date_joined||null:null,
        issued_by:user.user_id,
        worker_confirmed:!!form.ppe_confirmed,
      };
      // Upsert PPE
      const {data:existPPE}=await sb.from("worker_ppe").select("id,helmet_issued,belt_issued,gumboot_issued").eq("worker_id",workerId).maybeSingle();
      if(existPPE) await sb.from("worker_ppe").update(ppeData).eq("worker_id",workerId);
      else await sb.from("worker_ppe").insert(ppeData);

      // Deduct newly issued PPE items from store stock
      // Only deduct for items that are newly issued (not previously issued)
      const storeId=form.current_store_id?parseInt(form.current_store_id):null;
      if(storeId){
        const ppeItems=[
          {key:"helmet_issued",name:"Helmet",prev:existPPE?.helmet_issued},
          {key:"belt_issued",name:"Safety Belt",prev:existPPE?.belt_issued},
          {key:"gumboot_issued",name:"Gumboot",prev:existPPE?.gumboot_issued},
        ];
        for(const item of ppeItems){
          const nowIssued=ppeData[item.key];
          const wasIssued=item.prev||false;
          if(nowIssued&&!wasIssued){
            // Find material by name in this store
            const {data:mat}=await sb.from("materials")
              .select("material_id,material_name")
              .ilike("material_name",`%${item.name}%`)
              .eq("is_active",true).maybeSingle();
            if(mat){
              // Log PPE issue to ppe_log
              await sb.from("worker_ppe_log").insert({
                worker_id:workerId,
                site_id:form.current_site_id?parseInt(form.current_site_id):null,
                ppe_item:item.name,action:"issued",
                action_date:form.date_joined||new Date().toISOString().split("T")[0],
                notes:"Issued at joining",done_by:user.user_id,
              });
            }
          }
        }
      }
    }

    setSaving(false);
    show(editWorker?"Worker updated ✓":"Worker registered ✓","success");
    setWizOpen(false);load();
  };

  const [draftSaving,setDraftSaving]=useState(false);

  // Save Draft — persists current form to DB without closing wizard or changing step
  const saveDraft=async()=>{
    if(!form.worker_code?.trim()){show("Worker code is required to save draft","error");return;}
    if(!form.current_site_id){show("Select a site to save draft","error");return;}
    setDraftSaving(true);

    // Upload any staged files (graceful — won't fail if bucket missing)
    let photo_url=form.worker_photo_url||null;
    let aadhaar_url=form.aadhaar_photo_url||null;
    let pan_url=form.pan_photo_url||null;
    let bank_url=form.bank_photo_url||null;
    if(form._photoFile)photo_url=await uploadFile(form._photoFile,"photos")||photo_url;
    if(form._aadhaarFile)aadhaar_url=await uploadFile(form._aadhaarFile,"aadhaar")||aadhaar_url;
    if(form._panFile)pan_url=await uploadFile(form._panFile,"pan")||pan_url;
    if(form._bankFile)bank_url=await uploadFile(form._bankFile,"bank")||bank_url;

    const draftPayload={
      worker_code:(form.worker_code||"").trim(),
      worker_name:(form.worker_name||"").trim()||"(Draft)",
      first_name:form.first_name||null,
      surname:form.surname||null,
      father_name:form.father_name||null,
      mother_name:form.mother_name||null,
      trade:form.trade||"(TBD)",
      worker_type:form.worker_type||"Daily Wage",
      dob:form.dob||null,
      blood_group:form.blood_group||null,
      married:!!form.married,
      wife_name:form.wife_name||null,
      children_count:parseInt(form.children_count)||0,
      mobile:form.mobile||null,
      mobile_home:form.mobile_home||null,
      home_address:form.home_address||null,
      relative_name:form.relative_name||null,
      relative_mobile:form.relative_mobile||null,
      relative_address:form.relative_address||null,
      ref_worker_id:form._refWorkerId?parseInt(form._refWorkerId):null,
      allergy:form.allergy||null,
      job_no:form.job_no||null,
      aadhaar_number:form.aadhaar_number||null,
      pan_number:form.pan_number||null,
      esic_ip_number:form.esic_ip_number||null,
      pf_uan_number:form.pf_uan_number||null,
      bank_account:form.bank_account||null,
      bank_ifsc:form.bank_ifsc||null,
      bank_name:form.bank_name||null,
      bank_account_type:form.bank_account_type||"SB",
      per_day_rate:parseFloat(form.per_day_rate)||0,
      current_site_id:form.current_site_id?parseInt(form.current_site_id):null,
      current_store_id:form.current_store_id?parseInt(form.current_store_id):null,
      building_id:form.building_id?parseInt(form.building_id):null,
      date_joined:form.date_joined||null,
      minimum_wage_category:form.minimum_wage_category||"unskilled",
      entry_status:"draft",
      status:"Left", // draft workers are not yet active
      worker_photo_url:photo_url,
      aadhaar_photo_url:aadhaar_url,
      pan_photo_url:pan_url,
      bank_photo_url:bank_url,
      first_advance:parseFloat(form.first_advance)||0,
      is_active:true,
      is_bob_midc_branch:!!form.is_bob_midc_branch,
      esic_eligible:form.esic_eligible!==false,
      tenant_id:user.tenant_id||null,
    };

    if(editWorker){
      const {error}=await sb.from("workers").update(draftPayload).eq("id",editWorker.id);
      if(error){setDraftSaving(false);show("Draft save failed: "+error.message,"error");return;}
      // Update form with any newly uploaded file URLs so they persist in form state
      F({worker_photo_url:photo_url,aadhaar_photo_url:aadhaar_url,
        pan_photo_url:pan_url,bank_photo_url:bank_url,
        _photoFile:null,_aadhaarFile:null,_panFile:null,_bankFile:null});
    } else {
      // New worker — insert as draft and then treat as edit from here
      const {data:inserted,error}=await sb.from("workers").insert(draftPayload).select().single();
      if(error){setDraftSaving(false);show("Draft save failed: "+error.message,"error");return;}
      // Now treat as editWorker so subsequent saves update the same row
      setEditWorker(inserted);
      F({worker_photo_url:photo_url,aadhaar_photo_url:aadhaar_url,
        pan_photo_url:pan_url,bank_photo_url:bank_url,
        _photoFile:null,_aadhaarFile:null,_panFile:null,_bankFile:null});
    }

    setDraftSaving(false);
    show("Draft saved ✓ — you can continue filling the form","success");
    load(); // refresh list in background
  };

  // Supervisor sign
  const supervisorSign=async(w)=>{
    if(!isSupervisor){show("Only Supervisor/SIC can sign","error");return;}
    await sb.from("workers").update({entry_status:"supervisor_signed",supervisor_id:user.user_id}).eq("id",w.id);
    show("Supervisor signed ✓");load();
  };

  // SIC approve + first advance
  const [advOpen,setAdvOpen]=useState(false);const [advWorker,setAdvWorker]=useState(null);const [advAmt,setAdvAmt]=useState("");
  const sicApprove=async()=>{
    if(!isSIC){show("Only SIC/Admin can approve","error");return;}
    await sb.from("workers").update({
      entry_status:"sic_approved",status:"Active",
      sic_approved_by:user.user_id,sic_approved_at:new Date().toISOString(),
      first_advance:parseFloat(advAmt)||0,
    }).eq("id",advWorker.id);
    show("SIC approved — worker is now Active ✓","success");
    setAdvOpen(false);setAdvWorker(null);setAdvAmt("");load();
  };

  const filtered=workers.filter(w=>{
    const q=search.toLowerCase();
    if(search){
      const q=search.toLowerCase();
      const match=w.worker_name?.toLowerCase().includes(q)
        ||w.worker_code?.toLowerCase().includes(q)
        ||w.trade?.toLowerCase().includes(q)
        ||(w.father_name||"").toLowerCase().includes(q)
        ||(w.mobile||"").includes(search)
        ||(w.aadhaar_number||"").includes(search);
      if(!match)return false;
    }
    if(fStatus&&w.entry_status!==fStatus)return false;
    if(fSite&&w.current_site_id!==parseInt(fSite))return false;
    return true;
  });
  const paged=filtered.slice(page*PS,(page+1)*PS);

  // Step titles
  const STEPS=["Site & Trade","Personal Details","ID & Bank","Documents","PPE Issue","Review & Submit"];

  const stepValid=()=>{
    if(wizStep===1)return !!(form.worker_code&&form.trade&&form.current_site_id&&form.date_joined);
    if(wizStep===2)return !!(form.first_name||form.worker_name); // first name or full name required
    if(wizStep===3)return true;
    if(wizStep===4)return true;
    if(wizStep===5)return true;
    if(wizStep===6)return !!form.consent_given; // DPDP consent required before final save
    return true;
  };

  // Image preview helper
  const ImgUpload=({label,urlKey,fileKey,accept="image/*"})=>{
    const url=form[urlKey];
    return <div style={{marginBottom:14}}>
      <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>{label}</label>
      <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
        {url&&<div style={{width:72,height:72,borderRadius:8,overflow:"hidden",border:`1px solid ${C.border}`,flexShrink:0}}>
          <img src={url} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>
        </div>}
        <div style={{flex:1}}>
          <label style={{display:"inline-flex",alignItems:"center",gap:6,padding:"8px 14px",
            background:C.accent+"15",color:C.accent,borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600,
            border:`1.5px dashed ${C.accent}50`}}>
            <Ic d="M12 16v-4m0 0V8m0 4H8m4 0h4M3 12a9 9 0 1118 0 9 9 0 01-18 0z" s={14} col={C.accent}/>
            {url?"Replace Photo":"Upload Photo"}
            <input type="file" accept={accept} style={{display:"none"}} onChange={e=>{
              const file=e.target.files[0];if(!file)return;
              const reader=new FileReader();
              reader.onload=ev=>F({[urlKey]:ev.target.result,[fileKey]:file});
              reader.readAsDataURL(file);
            }}/>
          </label>
          {url&&<p style={{margin:"4px 0 0",fontSize:10,color:C.green}}>✓ Uploaded</p>}
        </div>
      </div>
    </div>;
  };

  return <div>
    <Toast/>
    <PH title="New Registration"
      sub={`${workers.filter(w=>w.entry_status==="active"||w.entry_status==="sic_approved").length} active · ${workers.filter(w=>w.entry_status==="draft").length} draft · ${workers.filter(w=>w.entry_status==="supervisor_signed").length} pending SIC · ${workers.length} total`}
      right={canAdd&&<Btn onClick={openNew}><Ic d={I.plus} s={15} col="#fff"/>New Registration</Btn>}/>

    {/* Filters */}
    <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
      <Search value={search} onChange={v=>{setSearch(v);setPage(0);}} placeholder="Name, father name, code, trade, mobile, aadhaar..."/>
      <select value={fSite} onChange={e=>{setFSite(e.target.value);setPage(0);}}
        style={{padding:"8px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,color:fSite?C.text:C.muted,background:"#fff",fontFamily:"inherit"}}>
        <option value="">All Sites</option>
        {sites.map(s=><option key={s.site_id} value={s.site_id}>{s.site_name}</option>)}
      </select>
      <select value={fStatus} onChange={e=>{setFStatus(e.target.value);setPage(0);}}
        style={{padding:"8px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,color:fStatus?C.text:C.muted,background:"#fff",fontFamily:"inherit"}}>
        <option value="">All Status</option>
        <option value="draft">Draft</option>
        <option value="supervisor_signed">Pending SIC</option>
        <option value="sic_approved">SIC Approved</option>
        <option value="active">Active</option>
      </select>
      <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6}}>
        <span style={{fontSize:12,color:C.muted}}>Show:</span>
        {[10,25,50,100,"All"].map(n=>(
          <button key={n} onClick={()=>{setPS(n==="All"?99999:n);setPage(0);}}
            style={{padding:"6px 12px",borderRadius:7,border:`1.5px solid ${(n==="All"?99999:n)===PS?C.accent:C.border}`,
              background:(n==="All"?99999:n)===PS?C.accent:"#fff",color:(n==="All"?99999:n)===PS?"#fff":C.text,
              fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>
            {n}
          </button>
        ))}
        <span style={{fontSize:12,color:C.muted,marginLeft:4}}>{filtered.length} results</span>
      </div>
    </div>

    {/* Table */}
    <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead>
          <tr style={{background:"#F8FAFC",borderBottom:`2px solid ${C.border}`}}>
            {["Code","Name","Trade","Site","Joined","Entry Status","Actions"].map(h=>(
              <th key={h} style={{padding:"10px 14px",textAlign:"left",fontWeight:700,fontSize:11,
                color:C.muted,textTransform:"uppercase",letterSpacing:".06em"}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {paged.length===0&&<tr><td colSpan={7} style={{padding:"32px",textAlign:"center",color:C.faint}}>No workers found</td></tr>}
          {paged.map((w,i)=>(
            <tr key={w.id} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?"#fff":"#FAFBFC"}}>
              <td style={{padding:"10px 14px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {w.worker_photo_url
                    ?<img src={w.worker_photo_url} style={{width:32,height:32,borderRadius:"50%",objectFit:"cover",border:`2px solid ${C.border}`}}/>
                    :<div style={{width:32,height:32,borderRadius:"50%",background:C.accentBg,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:13,fontWeight:700,color:C.accent,flexShrink:0}}>
                      {(w.worker_name||"?")[0].toUpperCase()}
                    </div>}
                  <code style={{fontWeight:700,color:C.accent,fontSize:12}}>{w.worker_code}</code>
                </div>
              </td>
              <td style={{padding:"10px 14px"}}>
                <p style={{margin:0,fontWeight:600}}>{w.worker_name}</p>
                {w.father_name&&<p style={{margin:0,fontSize:11,color:C.muted}}>S/o {w.father_name}</p>}
              </td>
              <td style={{padding:"10px 14px"}}><Badge color="blue">{w.trade}</Badge></td>
              <td style={{padding:"10px 14px",fontSize:12}}>{w.sites?.site_name||<span style={{color:C.faint}}>—</span>}</td>
              <td style={{padding:"10px 14px",fontSize:12,color:C.muted}}>{w.date_joined||"—"}</td>
              <td style={{padding:"10px 14px"}}>
                <Badge color={ENTRY_STATUS[w.entry_status||"draft"]||"gray"}>
                  {ENTRY_LABEL[w.entry_status||"draft"]||w.entry_status}
                </Badge>
              </td>
              <td style={{padding:"10px 14px"}}>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {canAdd&&<Btn size="sm" variant="secondary" onClick={()=>openEdit(w)}>Edit</Btn>}
                  <Btn size="sm" variant="ghost" onClick={()=>setViewWorker(w)}>View</Btn>
                  <Btn size="sm" variant="ghost" style={{color:"#7c3aed",borderColor:"#7c3aed"}} onClick={async()=>{
                    // Load PPE from worker_ppe table for accurate print display
                    const {data:ppe}=await sb.from("worker_ppe")
                      .select("helmet_issued,belt_issued,gumboot_issued")
                      .eq("worker_id",w.id).maybeSingle();
                    setPrintWorker(ppe?{...w,...ppe}:w);
                  }}>🖨 Form</Btn>
                  {w.entry_status==="draft"&&isSupervisor&&
                    <Btn size="sm" style={{background:"#f59e0b",color:"#fff",border:"none"}}
                      onClick={()=>supervisorSign(w)}>Supervisor Sign</Btn>}
                  {w.entry_status==="supervisor_signed"&&isSIC&&
                    <Btn size="sm" style={{background:"#16a34a",color:"#fff",border:"none"}}
                      onClick={()=>{setAdvWorker(w);setAdvAmt("");setAdvOpen(true);}}>SIC Approve</Btn>}
                  {(w.entry_status==="sic_approved"||w.entry_status==="active")&&
                    <Btn size="sm" style={{background:"#6366f1",color:"#fff",border:"none"}}
                      onClick={()=>setIdCardWorker(w)}>ID Card</Btn>}
                </div>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
    <Pager page={page} total={filtered.length} size={PS} onChange={setPage}/>

    {/* ── REGISTRATION WIZARD ─────────────────────────────── */}
    <Modal open={wizOpen} onClose={()=>setWizOpen(false)}
      title={editWorker?"Edit Registration — "+editWorker.worker_name:"New Labour Registration"}
      width={600}>

      {/* Draft status banner */}
      {editWorker&&editWorker.entry_status==="draft"&&<div style={{
        background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,
        padding:"7px 14px",marginBottom:12,display:"flex",gap:8,alignItems:"center"}}>
        <span style={{fontSize:13}}>💾</span>
        <p style={{margin:0,fontSize:12,color:"#92400e",fontWeight:600}}>
          Draft saved — {editWorker.worker_name} ({editWorker.worker_code||"no code yet"}).
          Use <b>Save Draft</b> anytime to preserve your progress.
        </p>
      </div>}

      {/* Step indicator */}
      <div style={{display:"flex",gap:0,marginBottom:20,overflowX:"auto",paddingBottom:2}}>
        {STEPS.map((s,i)=>{
          const n=i+1;const done=wizStep>n;const active=wizStep===n;
          const step1Done=!!(form.worker_code&&form.trade&&form.current_site_id&&form.date_joined);
          const canGo=n===1||(step1Done&&(n<=wizStep+1||editWorker));
          return <div key={n} style={{display:"flex",alignItems:"center",flex:1,minWidth:0}}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",flex:1,minWidth:0,
              cursor:canGo?"pointer":"default",opacity:canGo?1:0.5}}
              onClick={()=>{if(canGo)setWizStep(n);}}>
              <div style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",
                justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0,
                background:done?"#16a34a":active?C.accent:"#E2E8F0",
                color:done||active?"#fff":"#94A3B8"}}>
                {done?"✓":n}
              </div>
              <span style={{fontSize:9,textAlign:"center",marginTop:2,color:active?C.accent:C.muted,
                fontWeight:active?700:400,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:60}}>
                {s}
              </span>
            </div>
            {i<STEPS.length-1&&<div style={{height:2,flex:0.5,background:done?"#16a34a":C.border,flexShrink:0}}/>}
          </div>;
        })}
      </div>

      {/* STEP 1 — Site & Trade */}
      {wizStep===1&&<div>
        <Divider label="Site & Assignment"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
          <Inp label="Worker Code *" value={form.worker_code||""}
            onChange={e=>F({worker_code:e.target.value})}/>
          <Sel label="Job No." value={form.job_no||""}
            placeholder="— Select Job No. —"
            options={sites.filter(s=>s.job_id).map(s=>({v:s.job_id,l:`${s.job_id} — ${s.site_name}`}))}
            onChange={e=>{
              const jobId=e.target.value;
              const site=sites.find(s=>s.job_id===jobId);
              if(site){
                // Auto-generate code for this site
                const siteCode=site.job_id;
                const siteWorkers=workers.filter(w=>w.worker_code?.startsWith(siteCode+"-"));
                const maxNum=siteWorkers.reduce((mx,w)=>{
                  const n=parseInt((w.worker_code??"").split("-").pop()||"0");
                  return n>mx?n:mx;
                },0);
                const newCode=`${siteCode}-${String(maxNum+1).padStart(5,"0")}`;
                F({job_no:jobId,current_site_id:String(site.site_id),worker_code:newCode,_jobNoManual:true});
              } else {
                F({job_no:jobId,_jobNoManual:true});
              }
            }}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
          <Sel label="Site *" value={form.current_site_id||""}
            options={sites.map(s=>({v:s.site_id,l:s.site_name}))}
            onChange={e=>{
              const siteId=e.target.value;
              const site=sites.find(s=>String(s.site_id)===String(siteId));
              if(site&&site.job_id){
                const siteCode=site.job_id;
                const siteWorkers=workers.filter(w=>w.worker_code?.startsWith(siteCode+"-"));
                const maxNum=siteWorkers.reduce((mx,w)=>{
                  const n=parseInt((w.worker_code??"").split("-").pop()||"0");
                  return n>mx?n:mx;
                },0);
                F({current_site_id:siteId,job_no:site.job_id,worker_code:`${siteCode}-${String(maxNum+1).padStart(5,"0")}`,current_store_id:"",building_id:""});
              } else {
                F({current_site_id:siteId,current_store_id:"",building_id:""});
              }
            }}/>
          <Sel label="Building / Tower" value={form.building_id||""}
            placeholder={form.current_site_id?"— Optional —":"Select site first"}
            options={buildings.map(b=>({v:b.id,l:b.building_name+(b.building_code?` (${b.building_code})`:"")})) }
            onChange={e=>F({building_id:e.target.value})}/>
        </div>
        <Inp label="Date of Joining *" type="date" value={form.date_joined||""}
          onChange={e=>F({date_joined:e.target.value})}/>
        <Divider label="Trade & Rate"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
          <Sel label="Trade / Designation *" value={form.trade||""}
            options={TRADES} onChange={e=>F({trade:e.target.value})}/>
          <Sel label="Worker Type" value={form.worker_type||"Daily Wage"}
            options={["Daily Wage","Fixed Salary","Contract"]}
            onChange={e=>F({worker_type:e.target.value})}/>
        </div>
        <Inp label="Rate per Day (₹)" type="number" value={form.per_day_rate||""}
          onChange={e=>F({per_day_rate:e.target.value})}/>
      </div>}

      {/* STEP 2 — Personal Details */}
      {wizStep===2&&<div>
        <Divider label="Full Name"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 10px"}}>
          <Inp label="First Name *" value={form.first_name||""}
            onChange={e=>{
              const fn=e.target.value;
              F({first_name:fn,worker_name:[fn,form.father_name||"",form.surname||""].filter(Boolean).join(" ")});
            }}/>
          <Inp label="Father Name" value={form.father_name||""}
            onChange={e=>{
              const fn=e.target.value;
              F({father_name:fn,worker_name:[form.first_name||"",fn,form.surname||""].filter(Boolean).join(" ")});
            }}/>
          <Inp label="Surname" value={form.surname||""}
            onChange={e=>{
              const sn=e.target.value;
              F({surname:sn,worker_name:[form.first_name||"",form.father_name||"",sn].filter(Boolean).join(" ")});
            }}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
          <Inp label="Mother Name" value={form.mother_name||""}
            onChange={e=>F({mother_name:e.target.value})}/>
          <Inp label="Date of Birth" type="date" value={form.dob||""}
            onChange={e=>F({dob:e.target.value})}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
          <Sel label="Blood Group" value={form.blood_group||""}
            options={[{v:"",l:"— Not Known —"},"A+","A-","B+","B-","O+","O-","AB+","AB-"].map(o=>typeof o==="string"?{v:o,l:o}:o)}
            onChange={e=>F({blood_group:e.target.value})}/>
          <div/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 10px"}}>
          <div>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,
              marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>Married</label>
            <div style={{display:"flex",gap:8,paddingTop:4}}>
              {["Yes","No"].map(v=>(
                <button key={v} onClick={()=>F({married:v==="Yes"})}
                  style={{padding:"8px 18px",borderRadius:8,border:`1.5px solid ${form.married===(v==="Yes")?C.accent:C.border}`,
                    background:form.married===(v==="Yes")?C.accent:"#fff",
                    color:form.married===(v==="Yes")?"#fff":C.text,
                    fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
                  {v}
                </button>
              ))}
            </div>
          </div>
          {form.married&&<Inp label="Wife Name" value={form.wife_name||""}
            onChange={e=>F({wife_name:e.target.value})}/>}
          <Inp label="Children" type="number" value={form.children_count||0}
            onChange={e=>F({children_count:e.target.value})}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
          <Inp label="Mobile (Personal)" value={form.mobile||""}
            onChange={e=>F({mobile:e.target.value})} placeholder="Mob (P)"/>
          <Inp label="Mobile (Home / Village)" value={form.mobile_home||""}
            onChange={e=>F({mobile_home:e.target.value})} placeholder="Mob (H)"/>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,
            marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>Home Address</label>
          <textarea value={form.home_address||""} onChange={e=>F({home_address:e.target.value})}
            rows={2} placeholder="Full home / village address..."
            style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,
              borderRadius:8,fontSize:14,fontFamily:"inherit",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
        </div>
        <Divider label="Emergency Contact"/>
        <RefWorkerSearch form={form} F={F} allWorkers={workers} sites={sites}/>
        <Inp label="Known Allergies / Medical Notes" value={form.allergy||""}
          onChange={e=>F({allergy:e.target.value})} placeholder="e.g. Dust allergy, None"/>
      </div>}

      {/* STEP 3 — ID & Bank */}
      {wizStep===3&&<div>
        <Divider label="Identity Documents"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
          <Inp label="Aadhaar Number" value={form.aadhaar_number||""}
            onChange={e=>F({aadhaar_number:e.target.value})} placeholder="XXXX XXXX XXXX"/>
          <Inp label="PAN Number" value={form.pan_number||""}
            onChange={e=>F({pan_number:e.target.value.toUpperCase()})} placeholder="ABCDE1234F"/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
          <Inp label="PF UAN Number" value={form.pf_uan_number||""}
            onChange={e=>F({pf_uan_number:e.target.value})}/>
          <Inp label="ESIC IP Number" value={form.esic_ip_number||""}
            onChange={e=>F({esic_ip_number:e.target.value})}/>
        </div>
        <Divider label="Bank Details"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
          <Inp label="Bank Account Number" value={form.bank_account||""}
            onChange={e=>F({bank_account:e.target.value})}/>
          <Inp label="IFSC Code" value={form.bank_ifsc||""}
            onChange={e=>F({bank_ifsc:e.target.value.toUpperCase()})}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
          <Inp label="Bank Name" value={form.bank_name||""}
            onChange={e=>F({bank_name:e.target.value})}/>
          <Sel label="Account Type" value={form.bank_account_type||"SB"}
            options={["SB","Current"]} onChange={e=>F({bank_account_type:e.target.value})}/>
        </div>
        <Tog label="BOB MIDC Branch" sub="Format 1 salary letter"
          checked={!!form.is_bob_midc_branch} onChange={v=>F({is_bob_midc_branch:v})}/>
        <Tog label="ESIC Eligible" checked={form.esic_eligible!==false}
          onChange={v=>F({esic_eligible:v})}/>
      </div>}

      {/* STEP 4 — Documents Upload */}
      {wizStep===4&&<div>
        <div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:10,
          padding:"12px 14px",marginBottom:16}}>
          <p style={{margin:0,fontSize:12,color:"#1D4ED8",fontWeight:600}}>
            Collect and photograph: Worker photo, Aadhaar card, PAN card, Bank passbook / cancelled cheque
          </p>
        </div>
        <Divider label="Worker Photo"/>
        <ImgUpload label="Passport Photo" urlKey="worker_photo_url" fileKey="_photoFile"/>
        <Divider label="ID Documents"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
          <ImgUpload label="Aadhaar Card" urlKey="aadhaar_photo_url" fileKey="_aadhaarFile"/>
          <ImgUpload label="PAN Card" urlKey="pan_photo_url" fileKey="_panFile"/>
        </div>
        <Divider label="Bank Document"/>
        <ImgUpload label="Passbook / Cancelled Cheque" urlKey="bank_photo_url" fileKey="_bankFile"/>

        {/* Doc checklist */}
        <Divider label="Document Checklist"/>
        {[
          {key:"doc_photo",label:"Passport Photo collected"},
          {key:"doc_aadhaar",label:"Aadhaar card (original seen)"},
          {key:"doc_pan",label:"PAN card (original seen)"},
          {key:"doc_bank",label:"Bank passbook / cancelled cheque"},
        ].map(d=>(
          <div key={d.key} onClick={()=>F({[d.key]:!form[d.key]})}
            style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
              borderRadius:8,marginBottom:6,cursor:"pointer",
              background:form[d.key]?"#f0fdf4":"#F8FAFC",
              border:`1.5px solid ${form[d.key]?"#86efac":C.border}`}}>
            <div style={{width:20,height:20,borderRadius:5,display:"flex",alignItems:"center",
              justifyContent:"center",background:form[d.key]?"#16a34a":C.border,flexShrink:0}}>
              {form[d.key]&&<span style={{color:"#fff",fontSize:12,fontWeight:700}}>✓</span>}
            </div>
            <span style={{fontSize:13,fontWeight:form[d.key]?600:400,color:form[d.key]?"#15803d":C.text}}>
              {d.label}
            </span>
          </div>
        ))}
      </div>}

      {/* STEP 5 — PPE Issue */}
      {wizStep===5&&<div>
        <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,
          padding:"12px 14px",marginBottom:16}}>
          <p style={{margin:0,fontSize:12,color:"#92400e",fontWeight:600}}>
            Issue PPE items and get worker signature. Worker must sign before starting work.
          </p>
        </div>
        <Divider label="Store Transaction — PPE Issue"/>
        {[
          {key:"helmet_issued",label:"Helmet",icon:"🪖"},
          {key:"belt_issued",label:"Safety Belt",icon:"🦺"},
          {key:"gumboot_issued",label:"Gumboot",icon:"👢"},
        ].map(item=>(
          <div key={item.key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",
            padding:"14px 16px",borderRadius:10,marginBottom:8,

            border:`1.5px solid ${form[item.key]?"#86efac":C.border}`}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:22}}>{item.icon}</span>
              <span style={{fontWeight:600,fontSize:14}}>{item.label}</span>
            </div>
            <div style={{display:"flex",gap:8}}>
              {["Yes","No"].map(v=>(
                <button key={v} onClick={()=>F({[item.key]:v==="Yes"})}
                  style={{padding:"7px 16px",borderRadius:8,
                    border:`1.5px solid ${form[item.key]===(v==="Yes")?v==="Yes"?"#16a34a":"#dc2626":C.border}`,
                    background:form[item.key]===(v==="Yes")?v==="Yes"?"#16a34a":"#dc2626":"#fff",
                    color:form[item.key]===(v==="Yes")?"#fff":C.text,
                    fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>
                  {v}
                </button>
              ))}
            </div>
          </div>
        ))}
        <div style={{marginTop:16,padding:"14px 16px",borderRadius:10,
          background:form.ppe_confirmed?"#f0fdf4":"#F8FAFC",
          border:`1.5px solid ${form.ppe_confirmed?"#86efac":C.border}`}}>
          <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}
            onClick={()=>F({ppe_confirmed:!form.ppe_confirmed})}>
            <div style={{width:22,height:22,borderRadius:6,display:"flex",alignItems:"center",
              justifyContent:"center",background:form.ppe_confirmed?"#16a34a":C.border,flexShrink:0}}>
              {form.ppe_confirmed&&<span style={{color:"#fff",fontSize:13,fontWeight:700}}>✓</span>}
            </div>
            <span style={{fontSize:13,fontWeight:600,color:form.ppe_confirmed?"#15803d":C.text}}>
              Worker has received above PPE items and acknowledged (digital sign confirmation)
            </span>
          </div>
        </div>
      </div>}

      {/* STEP 6 — Review & Submit */}
      {wizStep===6&&<div>
        <div style={{background:"#F8FAFC",borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{display:"flex",gap:12,marginBottom:12}}>
            {form.worker_photo_url
              ?<img src={form.worker_photo_url} style={{width:60,height:60,borderRadius:10,objectFit:"cover",border:`2px solid ${C.border}`}}/>
              :<div style={{width:60,height:60,borderRadius:10,background:C.accentBg,display:"flex",
                alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:700,color:C.accent}}>
                {(form.worker_name||"?")[0].toUpperCase()}
              </div>}
            <div>
              <p style={{margin:0,fontWeight:700,fontSize:16}}>{form.worker_name||"—"}</p>
              <p style={{margin:"2px 0",fontSize:12,color:C.muted}}><code>{form.worker_code}</code> · {form.trade}</p>
              <p style={{margin:"2px 0",fontSize:12,color:C.muted}}>{sites.find(s=>s.site_id===parseInt(form.current_site_id))?.site_name||"No site"}</p>
            </div>
          </div>
          {/* Summary grid */}
          {[
            ["Date of Joining",form.date_joined],
            ["Father",form.father_name],
            ["DOB",form.dob],
            ["Mobile",form.mobile],
            ["Aadhaar",form.aadhaar_number],
            ["PAN",form.pan_number],
            ["Bank Account",form.bank_account],
            ["IFSC",form.bank_ifsc],
            ["Rate/Day","₹"+(form.per_day_rate||"—")],
          ].filter(([,v])=>v).map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",
              borderBottom:`1px solid ${C.border}`,fontSize:12}}>
              <span style={{color:C.muted,fontWeight:600}}>{k}</span>
              <span style={{fontWeight:500}}>{v}</span>
            </div>
          ))}
        </div>

        {/* PPE summary */}
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          {[["🪖 Helmet",form.helmet_issued],["🦺 Safety Belt",form.belt_issued],["👢 Gumboot",form.gumboot_issued]].map(([l,v])=>(
            <div key={l} style={{padding:"6px 12px",borderRadius:8,fontSize:12,fontWeight:600,
              background:v?"#f0fdf4":"#FEF2F2",color:v?"#15803d":"#dc2626",
              border:`1px solid ${v?"#86efac":"#fca5a5"}`}}>
              {l}: {v?"Issued":"Not Issued"}
            </div>
          ))}
        </div>

        {/* Docs summary */}
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          {[["📷 Photo",form.worker_photo_url],["🪪 Aadhaar",form.aadhaar_photo_url],["💳 PAN",form.pan_photo_url],["🏦 Bank",form.bank_photo_url]].map(([l,v])=>(
            <div key={l} style={{padding:"6px 12px",borderRadius:8,fontSize:12,fontWeight:600,
              background:v?"#f0fdf4":"#fffbeb",color:v?"#15803d":"#92400e",
              border:`1px solid ${v?"#86efac":"#fde68a"}`}}>
              {l}: {v?"✓ Uploaded":"⚠ Pending"}
            </div>
          ))}
        </div>

        {/* DPDP Consent — required before final save */}
        <div style={{background:form.consent_given?"#f0fdf4":"#FFF7ED",
          border:`1.5px solid ${form.consent_given?"#86efac":"#FED7AA"}`,
          borderRadius:10,padding:"14px 16px",marginBottom:14}}>
          <label style={{display:"flex",alignItems:"flex-start",gap:12,cursor:"pointer"}}>
            <input type="checkbox"
              id="dpdp_consent"
              name="dpdp_consent"
              checked={!!form.consent_given}
              onChange={e=>F({consent_given:e.target.checked,
                consent_date:e.target.checked?new Date().toISOString().split("T")[0]:null})}
              style={{width:18,height:18,marginTop:2,accentColor:"#16A34A",flexShrink:0,cursor:"pointer"}}/>
            <div>
              <p style={{margin:0,fontWeight:700,fontSize:13,
                color:form.consent_given?"#15803d":"#92400e"}}>
                Worker Consent — DPDP Act 2023 *
              </p>
              <p style={{margin:"4px 0 0",fontSize:12,color:form.consent_given?"#166534":"#9A3412",lineHeight:1.5}}>
                I confirm that the worker has been informed about and has verbally consented to the
                collection and storage of their personal data (name, Aadhaar, PAN, bank details,
                photograph, attendance records) for employment and statutory compliance purposes
                by Umiya Associates, as required under the Digital Personal Data Protection Act 2023.
              </p>
              {form.consent_date&&<p style={{margin:"4px 0 0",fontSize:11,color:"#16a34a",fontWeight:600}}>
                ✓ Consent recorded on {form.consent_date} by {user?.name||"user"}
              </p>}
            </div>
          </label>
        </div>

        <div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:8,padding:"12px 14px",marginBottom:14}}>
          <p style={{margin:0,fontSize:12,color:"#1D4ED8",fontWeight:600}}>
            After saving as Draft → Supervisor signs → SIC approves + pays first advance → Worker becomes Active.
          </p>
        </div>
      </div>}

      {/* Navigation */}
      <div style={{display:"flex",justifyContent:"space-between",paddingTop:12,borderTop:`1px solid ${C.border}`,marginTop:4}}>
        <Btn variant="ghost" onClick={()=>wizStep>1?setWizStep(s=>s-1):setWizOpen(false)}>
          {wizStep>1?"← Back":"Cancel"}
        </Btn>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {/* Save Draft — available from step 1 once worker_code and site are filled */}
          {(form.worker_code?.trim()&&form.current_site_id)&&<Btn
            variant="secondary"
            onClick={saveDraft}
            disabled={draftSaving}
            style={{borderColor:"#f59e0b",color:"#92400e",background:"#fffbeb"}}>
            {draftSaving?"Saving…":"💾 Save Draft"}
          </Btn>}
          {wizStep<6
            ?<Btn onClick={()=>stepValid()?setWizStep(s=>s+1):show("Please fill required fields","error")}
              style={{opacity:stepValid()?1:0.5}}>
                Next →
              </Btn>
            :<Btn onClick={save} disabled={saving} style={{background:"#16a34a",borderColor:"#16a34a"}}>
              {saving?"Saving...":"✓ Save Registration"}
            </Btn>}
        </div>
      </div>
    </Modal>

    {/* ── SIC APPROVAL + ADVANCE MODAL ────────────── */}
    <Modal open={advOpen} onClose={()=>setAdvOpen(false)} title="SIC Approval & First Advance" width={420}>
      {advWorker&&<>
        <div style={{background:"#f0fdf4",border:"1.5px solid #bbf7d0",borderRadius:10,
          padding:"14px 16px",marginBottom:16}}>
          <p style={{margin:0,fontWeight:700,fontSize:15}}>{advWorker.worker_name}</p>
          <p style={{margin:"3px 0 0",fontSize:12,color:C.muted}}>
            <code>{advWorker.worker_code}</code> · {advWorker.trade} · {advWorker.sites?.site_name}
          </p>
          <p style={{margin:"3px 0 0",fontSize:12,color:C.muted}}>
            Rate: ₹{advWorker.per_day_rate}/day
          </p>
        </div>
        <Inp label="First Advance Amount (₹)" type="number" value={advAmt}
          onChange={e=>setAdvAmt(e.target.value)}
          sub="Leave 0 if no advance is being given today"/>
        <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,
          padding:"10px 14px",marginBottom:14}}>
          <p style={{margin:0,fontSize:12,color:"#92400e",fontWeight:600}}>
            Approving will mark worker as <b>Active</b>. Worker will be eligible for attendance from today.
          </p>
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn onClick={sicApprove} style={{background:"#16a34a",borderColor:"#16a34a"}}>
            ✓ Approve & Activate Worker
          </Btn>
          <Btn variant="ghost" onClick={()=>setAdvOpen(false)}>Cancel</Btn>
        </div>
      </>}
    </Modal>

    {/* ── WORKER DETAIL VIEW ─────────────────────────── */}
    <WorkerViewModal
      worker={viewWorker}
      onClose={()=>setViewWorker(null)}
      onEdit={canAdd?(w)=>{setViewWorker(null);openEdit(w);}:null}
      onIdCard={(w)=>{setViewWorker(null);setIdCardWorker(w);}}
      onPrint={async(w)=>{
        const {data:ppe}=await sb.from("worker_ppe")
          .select("helmet_issued,belt_issued,gumboot_issued")
          .eq("worker_id",w.id).maybeSingle();
        setViewWorker(null);setPrintWorker(ppe?{...w,...ppe}:w);
      }}/>

    {/* ── PRINTABLE REGISTRATION FORM ─────────────────── */}
    <WorkerPrintForm worker={printWorker} onClose={()=>setPrintWorker(null)}/>

    {/* ── ID CARD ──────────────────────────────────────── */}
    <WorkerIdCard worker={idCardWorker} onClose={()=>setIdCardWorker(null)}/>
  </div>;
};


// ─── ATTENDANCE MODULE ────────────────────────────────────────────
// ─── ABSENT STEP — row table with search, sort, row-select ───────
const AbsentStep=({workers,records,haajri,isSK,isSIC,canMark,togglePresent,openHaajriCard,presentWorkers,absentWorkers,bulkMarkAbsent})=>{
  const [search,setSearch]=React.useState("");
  const [sortField,setSortField]=React.useState("trade"); // default: trade A-Z, then code
  const [sortDir,setSortDir]=React.useState("asc");
  const [bulkSel,setBulkSel]=React.useState(new Set());

  const toggleSort=col=>{
    if(sortField===col) setSortDir(d=>d==="asc"?"desc":"asc");
    else{setSortField(col);setSortDir("asc");}
  };

  // Sort: primary = chosen col, secondary always trade A-Z then code asc
  const sorted=[...workers].sort((a,b)=>{
    const codeA=parseInt((a.worker_code||"0").replace(/\D/g,""))||0;
    const codeB=parseInt((b.worker_code||"0").replace(/\D/g,""))||0;
    const tradeA=(a.trade||"").toLowerCase();
    const tradeB=(b.trade||"").toLowerCase();
    const nameA=(a.worker_name||"").toLowerCase();
    const nameB=(b.worker_name||"").toLowerCase();
    if(sortField==="trade"){
      const t=tradeA<tradeB?-1:tradeA>tradeB?1:0;
      if(t!==0)return sortDir==="asc"?t:-t;
      return codeA-codeB; // secondary: code asc always
    }
    if(sortField==="code"){
      const d=sortDir==="asc"?codeA-codeB:codeB-codeA;
      if(d!==0)return d;
      return tradeA<tradeB?-1:tradeA>tradeB?1:0;
    }
    if(sortField==="name"){
      const d=nameA<nameB?-1:nameA>nameB?1:0;
      return sortDir==="asc"?d:-d;
    }
    return 0;
  });

  const q=search.trim().toLowerCase();
  const filtered=q
    ?sorted.filter(w=>
        (w.worker_name||"").toLowerCase().includes(q)||
        (w.worker_code||"").toLowerCase().includes(q)||
        (w.trade||"").toLowerCase().includes(q))
    :sorted;

  // Bulk selection helpers — only present (not SK-locked) workers are selectable
  const selectableIds=filtered
    .filter(w=>{
      const rec=records[w.id];
      const isPresent=rec?.is_present!==false;
      const skLocked=isSK&&!isPresent&&rec?.id&&!rec?._new;
      return isPresent&&!skLocked; // can only bulk-absent present workers
    })
    .map(w=>w.id);
  const allSelected=selectableIds.length>0&&selectableIds.every(id=>bulkSel.has(id));
  const someSelected=bulkSel.size>0;
  const toggleBulkRow=(id)=>setBulkSel(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
  const toggleSelectAll=()=>{
    if(allSelected) setBulkSel(new Set());
    else setBulkSel(new Set(selectableIds));
  };
  const handleBulkMarkAbsent=()=>{
    if(!bulkMarkAbsent||bulkSel.size===0)return;
    bulkMarkAbsent([...bulkSel]);
    setBulkSel(new Set());
  };

  const SortIcon=({col})=>{
    const active=sortField===col;
    return <span style={{marginLeft:4,opacity:active?1:.3,fontSize:9,color:active?"#1D4ED8":"inherit",userSelect:"none"}}>
      {active&&sortDir==="desc"?"▼":"▲"}
    </span>;
  };

  const TH=({label,col,width})=>(
    <th onClick={()=>toggleSort(col)}
      style={{padding:"10px 12px",textAlign:"left",fontSize:11,fontWeight:700,color:C.muted,
        textTransform:"uppercase",letterSpacing:".05em",cursor:"pointer",
        borderBottom:`2px solid ${C.border}`,whiteSpace:"nowrap",width:width||"auto",
        userSelect:"none",background:"#F8FAFC"}}>
      {label}<SortIcon col={col}/>
    </th>
  );

  return <div>
    {/* Info banner */}
    <div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:10,padding:"10px 14px",marginBottom:12}}>
      <p style={{margin:0,fontSize:12,color:"#1D4ED8",fontWeight:600}}>
        All workers are <b>PRESENT</b> by default. Click a row or the P/A toggle to mark <b>ABSENT</b>.
        {isSK&&" Saved absent marks cannot be undone by Storekeeper — contact SIC."}
      </p>
    </div>

    {/* Bulk action bar — appears when rows are selected */}
    {someSelected&&canMark&&(
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",
        background:"#FEF2F2",border:"1.5px solid #FECACA",borderRadius:10,marginBottom:12,flexWrap:"wrap"}}>
        <span style={{fontWeight:700,fontSize:13,color:C.red}}>
          {bulkSel.size} worker{bulkSel.size>1?"s":""} selected
        </span>
        <Btn size="sm" variant="danger" onClick={handleBulkMarkAbsent}>
          Mark {bulkSel.size} Absent
        </Btn>
        <Btn size="sm" variant="ghost" onClick={()=>setBulkSel(new Set())}>Clear Selection</Btn>
      </div>
    )}

    {/* Search bar */}
    <div style={{marginBottom:12,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
      <div style={{position:"relative",flex:1,minWidth:200}}>
        <svg style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",opacity:.4}}
          width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input id="search_worker" name="search" value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Search by name, code or trade..."
          style={{width:"100%",padding:"8px 10px 8px 32px",border:`1.5px solid ${C.border}`,
            borderRadius:8,fontSize:13,fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
        {search&&<button onClick={()=>setSearch("")}
          style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",
            background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:16,lineHeight:1}}>×</button>}
      </div>
      <div style={{display:"flex",gap:6,flexShrink:0}}>
        {[["#16a34a",`P ${presentWorkers.length}`,"Present"],["#dc2626",`A ${absentWorkers.length}`,"Absent"],["#64748B",`T ${workers.length}`,"Total"]].map(([col,val,label])=>(
          <div key={label} style={{background:col+"15",border:`1px solid ${col}40`,borderRadius:8,
            padding:"6px 12px",textAlign:"center",minWidth:56}}>
            <p style={{margin:0,fontWeight:800,fontSize:15,color:col}}>{val}</p>
            <p style={{margin:0,fontSize:9,color:col,fontWeight:600,textTransform:"uppercase"}}>{label}</p>
          </div>
        ))}
      </div>
    </div>

    {/* Table */}
    <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead>
          <tr>
            {/* Select All checkbox — only shown when canMark */}
            {canMark&&<th style={{padding:"10px 12px",textAlign:"center",
              borderBottom:`2px solid ${C.border}`,background:"#F8FAFC",width:44}}
              title={allSelected?"Deselect all":"Select all present workers"}>
              <input type="checkbox"
                checked={allSelected}
                onChange={toggleSelectAll}
                style={{width:16,height:16,accentColor:C.red,cursor:"pointer"}}/>
            </th>}
            <th style={{padding:"10px 12px",textAlign:"center",fontSize:11,fontWeight:700,
              color:C.muted,textTransform:"uppercase",letterSpacing:".05em",
              borderBottom:`2px solid ${C.border}`,background:"#F8FAFC",width:52}}>
              Status
            </th>
            <TH label="Code" col="code" width="90px"/>
            <TH label="Worker Name" col="name"/>
            <TH label="Trade / Designation" col="trade"/>
            <th style={{padding:"10px 12px",textAlign:"center",fontSize:11,fontWeight:700,
              color:C.muted,textTransform:"uppercase",letterSpacing:".05em",
              borderBottom:`2px solid ${C.border}`,background:"#F8FAFC",width:60}}>
              Card
            </th>
          </tr>
        </thead>
        <tbody>
          {filtered.length===0&&(
            <tr><td colSpan={canMark?6:5} style={{padding:"32px",textAlign:"center",color:C.muted,fontSize:13}}>
              No workers match "{search}"
            </td></tr>
          )}
          {filtered.map((w,i)=>{
            const isPresent=records[w.id]?.is_present!==false;
            const saved=records[w.id]?.id&&!records[w.id]?._new;
            const skLocked=isSK&&!isPresent&&saved;
            const corrected=!!records[w.id]?.corrected_by;
            const isChecked=bulkSel.has(w.id);
            const canCheck=canMark&&isPresent&&!skLocked;
            const rowBg=isChecked?"#FEF2F2":!isPresent?"#FFF5F5":i%2===0?"#fff":"#FAFBFC";
            const rowBorder=isChecked?"1.5px solid #FECACA":!isPresent?"1.5px solid #FCA5A5":`1px solid ${C.border}`;
            return <tr key={w.id}
              onClick={()=>!skLocked&&togglePresent(w)}
              style={{borderBottom:rowBorder,background:rowBg,
                cursor:skLocked?"not-allowed":"pointer",
                transition:"background .1s"}}
              onMouseEnter={e=>{if(!skLocked)e.currentTarget.style.background=isChecked?"#FEE2E2":isPresent?"#F0F9FF":"#FEE2E2";}}
              onMouseLeave={e=>{e.currentTarget.style.background=rowBg;}}>

              {/* Checkbox cell — stops row click from firing */}
              {canMark&&<td style={{padding:"9px 12px",textAlign:"center"}}
                onClick={e=>e.stopPropagation()}>
                {canCheck
                  ? <input type="checkbox" checked={isChecked}
                      onChange={()=>toggleBulkRow(w.id)}
                      style={{width:16,height:16,accentColor:C.red,cursor:"pointer"}}/>
                  : <span style={{fontSize:10,color:C.faint}}>—</span>
                }
              </td>}

              {/* Status toggle */}
              <td style={{padding:"9px 12px",textAlign:"center"}}>
                <div style={{width:34,height:34,borderRadius:"50%",margin:"0 auto",
                  background:isPresent?"#16a34a":"#dc2626",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  color:"#fff",fontSize:13,fontWeight:800,flexShrink:0,
                  boxShadow:isPresent?"0 0 0 3px #bbf7d0":"0 0 0 3px #fecaca",
                  transition:"all .15s"}}>
                  {isPresent?"P":"A"}
                </div>
                {corrected&&<span style={{display:"block",fontSize:8,color:"#7c3aed",fontWeight:700,marginTop:2}}>CORR</span>}
                {skLocked&&<span style={{display:"block",fontSize:8,color:"#dc2626",fontWeight:700,marginTop:2}}>LOCKED</span>}
              </td>

              {/* Code */}
              <td style={{padding:"9px 12px"}}>
                <span style={{fontFamily:"monospace",fontSize:12,fontWeight:700,
                  color:C.accent,background:"#EFF6FF",padding:"2px 7px",borderRadius:6}}>
                  {w.worker_code}
                </span>
              </td>

              {/* Name */}
              <td style={{padding:"9px 12px"}}>
                <p style={{margin:0,fontWeight:700,fontSize:13,color:isPresent?"#0F172A":"#dc2626"}}>
                  {w.worker_name}
                </p>
                {w.buildings?.building_name&&
