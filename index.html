// Inject manifest only when hosted (not file:// or Claude preview)
(function(){
  const o=window.location.origin;
  const hosted=o.startsWith('http')&&!o.includes('claudeusercontent.com')&&o!=='null';
  if(hosted){
    const l=document.createElement('link');
    l.rel='manifest';l.href='manifest.json';
    document.head.appendChild(l);
  }
})();
</script>

const Inp=({label,error,hint,right,...p})=>{
  const fid=p.id||(label?'f_'+label.toLowerCase().replace(/[^a-z0-9]+/g,'_'):undefined);
  const fname=p.name||fid;
  return(
  <div style={{marginBottom:14}}>
    {label&&<label htmlFor={fid} style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,
      marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>{label}</label>}
    <div style={{position:"relative"}}>
      <input id={fid} name={fname} {...p} style={{width:"100%",padding:"9px 12px",paddingRight:right?40:12,
        border:`1.5px solid ${error?C.red:C.border}`,borderRadius:8,fontSize:14,
        color:C.text,background:"#fff",fontFamily:"inherit",...p.style}}/>
      {right&&<div style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)"}}>{right}</div>}
    </div>
    {hint&&!error&&<p style={{margin:"3px 0 0",fontSize:11,color:C.faint}}>{hint}</p>}
    {error&&<p style={{margin:"3px 0 0",fontSize:11,color:C.red,fontWeight:600}}>{error}</p>}
  </div>
);};

const Btn=({children,variant="primary",size="md",onClick,disabled,full})=>{
  const vs={primary:{bg:C.accent,col:"#fff",border:"none"},
    secondary:{bg:"transparent",col:C.accent,border:`1.5px solid ${C.accent}`},
    ghost:{bg:"transparent",col:C.muted,border:`1.5px solid ${C.border}`},
    danger:{bg:C.red,col:"#fff",border:"none"},
    success:{bg:C.green,col:"#fff",border:"none"},
    warning:{bg:C.orange,col:"#fff",border:"none"}};
  const ss={md:{p:"8px 18px",fs:14},sm:{p:"5px 12px",fs:12}};
  const v=vs[variant]||vs.primary;const s=ss[size]||ss.md;
  return <button onClick={onClick} disabled={disabled}
    style={{background:v.bg,color:v.col,border:v.border,padding:s.p,fontSize:s.fs,
      borderRadius:8,fontWeight:600,cursor:disabled?"not-allowed":"pointer",opacity:disabled?.6:1,
      display:"inline-flex",alignItems:"center",gap:6,whiteSpace:"nowrap",
      fontFamily:"inherit",width:full?"100%":undefined,justifyContent:full?"center":undefined}}>
    {children}
  </button>;
};

const SlideOver=({open,onClose,title,subtitle,children,width=500})=>{
  if(!open)return null;
  const w=Math.min(width,window.innerWidth);
  return <div style={{position:"fixed",inset:0,zIndex:50}}>
    <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(15,23,42,.5)",backdropFilter:"blur(3px)"}}/>
    <div style={{position:"absolute",right:0,top:0,bottom:0,width:w,background:"#fff",
      boxShadow:"-8px 0 32px rgba(0,0,0,.15)",display:"flex",flexDirection:"column",animation:"slideUp .2s ease"}}>
      <div style={{padding:"16px 20px",borderBottom:`1px solid ${C.border}`,
        display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexShrink:0}}>
        <div>
          <h3 style={{margin:0,fontSize:16,fontWeight:800}}>{title}</h3>
          {subtitle&&<p style={{margin:"3px 0 0",fontSize:12,color:C.muted}}>{subtitle}</p>}

        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,padding:4}}>

const useToast=()=>{
  const [t,setT]=useState(null);
  const show=(msg,type="success")=>{setT({msg,type});setTimeout(()=>setT(null),3500);};
  const Toast=()=>!t?null:(
    <div style={{position:"fixed",bottom:24,left:24,zIndex:200,
      background:t.type==="success"?C.green:t.type==="warning"?C.orange:C.red,
      color:"#fff",padding:"11px 18px",borderRadius:10,fontSize:13,fontWeight:700,
      boxShadow:"0 4px 20px rgba(0,0,0,.2)",display:"flex",alignItems:"center",gap:8,animation:"slideUp .2s ease"}}>
      <Ic d={t.type==="success"?I.check:I.alert} s={15} col="#fff"/>
      {t.msg}
    </div>
  );
  return {show,Toast};
};

const Pager=({page,total,size,onChange})=>{
  const pages=Math.ceil(total/size);if(pages<=1)return null;
  return <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:14,flexWrap:"wrap",gap:8}}>
    <span style={{fontSize:12,color:C.muted}}>{page*size+1}–{Math.min((page+1)*size,total)} of {total}</span>
    <div style={{display:"flex",gap:6}}>
      <Btn variant="ghost" size="sm" onClick={()=>onChange(page-1)} disabled={page===0}>← Prev</Btn>
      <Btn variant="ghost" size="sm" onClick={()=>onChange(page+1)} disabled={page>=pages-1}>Next →</Btn>
    </div>
  </div>;
};

// ─── LOGIN ──────────────────────────────────────────────────────
const Login=({onLogin})=>{
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [show,setShow]=useState(false);
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");

  const submit=async(e)=>{
    e.preventDefault();
    if(!email.trim()||!pass){setErr("Enter email and password");return;}
    setLoading(true);setErr("");
    try{
      const {data,error}=await sb.auth.signInWithPassword({email:email.trim(),password:pass});
      if(error)throw error;
      const {data:profile,error:pe}=await sb.from("app_users")
        .select("*").eq("auth_id",data.user.id).single();
      if(pe||!profile)throw new Error("User profile not found. Ask Admin to create your account.");
      if(!profile.is_active)throw new Error("Account deactivated. Contact Admin.");
      const {data:pol}=await sb.from("policy_master").select("policy_id").eq("role_type",profile.role).single();
      let perms=[];
      if(pol){const {data:pp}=await sb.from("policy_permissions").select("*").eq("policy_id",pol.policy_id);perms=pp||[];}
      // Load per-user overrides — these replace role defaults for specific modules
      const {data:overrides}=await sb.from("user_policy_overrides").select("*").eq("user_id",profile.user_id);
      if(overrides?.length){
        const merged=perms.filter(p=>!overrides.find(o=>o.module===p.module));
        perms=[...merged,...overrides];
      }
      // Load assigned sites — fallback to assigned_site_id if user_sites empty
      const {data:us}=await sb.from("user_sites").select("site_id").eq("user_id",profile.user_id);
      let siteIds=(us||[]).map(r=>r.site_id);
      if(siteIds.length===0&&profile.assigned_site_id) siteIds=[profile.assigned_site_id];
      let siteList=[];
      if(siteIds.length>0){
        const {data:siteRows}=await sb.from("sites").select("site_id,site_name").in("site_id",siteIds);
        siteList=(siteRows||[]).map(s=>({site_id:s.site_id,site_name:s.site_name}));
      }
      onLogin({...profile,perms,_assignedSites:siteList});
    }catch(e){setErr(e.message||"Login failed");}
    setLoading(false);
  };

  const inputStyle={width:"100%",padding:"11px 14px",background:"rgba(255,255,255,.07)",
    border:"1.5px solid rgba(255,255,255,.1)",borderRadius:10,fontSize:14,
    color:"#F1F5F9",fontFamily:"inherit",outline:"none"};

  return <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0F172A 0%,#1E3A5F 60%,#0F172A 100%)",
    display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{width:"100%",maxWidth:380}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{width:58,height:58,background:C.accent,borderRadius:18,
          display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:12}}>
          <Ic d={I.building} s={28} col="#fff"/>
        </div>
        <h1 style={{margin:0,fontSize:24,fontWeight:900,color:"#F1F5F9"}}>SiteOS</h1>
        <p style={{margin:"3px 0 0",fontSize:11,color:"#475569",fontWeight:700,
          textTransform:"uppercase",letterSpacing:".12em"}}>Construction ERP</p>
      </div>

      <div style={{background:"rgba(255,255,255,.05)",backdropFilter:"blur(20px)",
        border:"1px solid rgba(255,255,255,.08)",borderRadius:20,padding:28}}>
        <h2 style={{margin:"0 0 4px",fontSize:17,fontWeight:800,color:"#F1F5F9"}}>Sign In</h2>
        <p style={{margin:"0 0 22px",fontSize:12,color:"#475569"}}>Use credentials provided by Admin</p>

        {err&&<div style={{background:"rgba(220,38,38,.15)",border:"1px solid rgba(220,38,38,.3)",
          borderRadius:9,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"flex-start",gap:8}}>
          <Ic d={I.alert} s={14} col="#FCA5A5"/>
          <span style={{fontSize:12,color:"#FCA5A5",fontWeight:600,lineHeight:1.5}}>{err}</span>
        </div>}

        <form onSubmit={submit}>
          <div style={{marginBottom:12}}>
            <label style={{display:"block",fontSize:10,fontWeight:700,color:"#64748B",
              marginBottom:4,textTransform:"uppercase",letterSpacing:".07em"}}>Email</label>
            <input id="login_email" name="email" type="email" value={email} onChange={e=>setEmail(e.target.value)}
              placeholder="you@example.com" autoComplete="email" style={inputStyle}/>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{display:"block",fontSize:10,fontWeight:700,color:"#64748B",
              marginBottom:4,textTransform:"uppercase",letterSpacing:".07em"}}>Password</label>
            <div style={{position:"relative"}}>
              <input id="login_password" name="password" type={show?"text":"password"} value={pass} onChange={e=>setPass(e.target.value)}
                placeholder="••••••••" autoComplete="current-password"
                style={{...inputStyle,paddingRight:40}}/>
              <button type="button" onClick={()=>setShow(s=>!s)}
                style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",
                  background:"none",border:"none",cursor:"pointer",color:"#64748B"}}>
                <Ic d={show?I.eyeOff:I.eye} s={15}/>
              </button>
            </div>
          </div>
          <button type="submit" disabled={loading}
            style={{width:"100%",padding:"11px",background:C.accent,color:"#fff",border:"none",
              borderRadius:10,fontSize:14,fontWeight:700,cursor:loading?"not-allowed":"pointer",
              opacity:loading?.7:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {loading&&<div style={{width:15,height:15,border:"2px solid rgba(255,255,255,.3)",
              borderTopColor:"#fff",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>}
            {loading?"Signing in…":"Sign In"}
          </button>
        </form>
      </div>
      <p style={{textAlign:"center",marginTop:14,fontSize:11,color:"#374151"}}>
        Contact Admin to get your login credentials
      </p>
    </div>
  </div>;
};

// ─── DASHBOARD ──────────────────────────────────────────────────
const Dashboard=()=>{
  const {user,activeSiteId,assignedSiteIds,isUnrestricted}=useAuth();
  const [s,setS]=useState(null);
  const [sites,setSites]=useState([]);
  const [pending,setPending]=useState(0);
  const [gtvExpired,setGtvExpired]=useState([]);
  const [gtvWarning,setGtvWarning]=useState([]);
  const [gtvRegPending,setGtvRegPending]=useState([]); // pending GTV registrations for this user

  const applySiteFilter=(q)=>{
    if(activeSiteId) return q.eq("site_id",activeSiteId);
    if(!isUnrestricted&&assignedSiteIds.length>0) return q.in("site_id",assignedSiteIds);
    return q;
  };

  useEffect(()=>{
    (async()=>{
      const [{count:aw},{count:gtv},{count:actSites},{count:stores},{data:mats},{count:users}]=await Promise.all([
        sb.from("workers").select("*",{count:"exact",head:true}).eq("status","Active"),
        sb.from("workers").select("*",{count:"exact",head:true}).eq("status","GTV"),
        sb.from("sites").select("*",{count:"exact",head:true}).eq("is_active",true),
        sb.from("stores").select("*",{count:"exact",head:true}).eq("is_active",true),
        sb.from("materials").select("moq,current_stock").eq("is_active",true),
        sb.from("app_users").select("*",{count:"exact",head:true}).eq("is_active",true),
      ]);
      const ls=(mats||[]).filter(m=>m.moq>0&&m.current_stock<m.moq).length;
      setS({aw:aw||0,gtv:gtv||0,actSites:actSites||0,stores:stores||0,ls,users:users||0});

      if(["SIC","Admin","Office"].includes(user.role)){
        let q=sb.from("approvals").select("*",{count:"exact",head:true}).eq("status","pending");
        if(user.role==="SIC") q=applySiteFilter(q);
        if(user.role==="Office") q=q.eq("approver_role","Office");
        const {count:pc}=await q;
        setPending(pc||0);
      }

      // Fix 8: GTV auto-expiry — check for workers past 6 months
      if(["SIC","Admin","Owner"].includes(user.role)){
        const sixMonthsAgo=new Date();
        sixMonthsAgo.setMonth(sixMonthsAgo.getMonth()-6);
        const fiveMonthsAgo=new Date();
        fiveMonthsAgo.setMonth(fiveMonthsAgo.getMonth()-5);
        const sixStr=sixMonthsAgo.toISOString().split("T")[0];
        const fiveStr=fiveMonthsAgo.toISOString().split("T")[0];

        // Workers past 6 months — auto-move to Left
        const {data:expired}=await sb.from("workers")
          .select("id,worker_name,worker_code,gtv_date")
          .eq("status","GTV").lt("gtv_date",sixStr);
        if(expired?.length){
          // Batch update to Left
          const ids=expired.map(w=>w.id);
          await sb.from("workers").update({status:"Left"}).in("id",ids);
          setGtvExpired(expired);
        }

        // Workers between 5 and 6 months — warning
        const {data:warn}=await sb.from("workers")
          .select("id,worker_name,worker_code,gtv_date")
          .eq("status","GTV").lt("gtv_date",fiveStr).gte("gtv_date",sixStr);
        // Add days remaining
        const today=new Date();
        setGtvWarning((warn||[]).map(w=>{
          const gtv=new Date(w.gtv_date);
          const expiry=new Date(gtv);expiry.setMonth(expiry.getMonth()+6);
          const daysLeft=Math.ceil((expiry-today)/(1000*60*60*24));
          return {...w,daysLeft};
        }));
      }

      let sq=sb.from("sites").select("*").eq("is_active",true).order("site_name");
      sq=applySiteFilter(sq);
      const {data:sd}=await sq;
      setSites(sd||[]);

      // GTV Registration pending notifications
      try{
        const isSup=user.role?.toLowerCase().includes("supervisor");
        const isSIC=["SIC","Admin"].includes(user.role);
        const isOwner=user.role==="Owner";
        if(isSup||isSIC||isOwner){
          let pendingStatus=isSup?"pending_supervisor":isSIC?"pending_sic":"pending_owner";
          let rq=sb.from("gtv_registrations")
            .select("id,trade,planned_gtv_date,workers(worker_name,worker_code),sites(site_name)")
            .eq("status",pendingStatus);
          if(isSup){
            // scope to supervisor's trade
            const r=user.role.toLowerCase();
            const trades=r.includes("carpenter")?["Carpenter"]:
              r.includes("fitter")?["Fitter"]:
              r.includes("labour")?["M/C","BRM","PLM"]:[];
            if(trades.length) rq=rq.in("trade",trades);
          }
          const {data:grvRegs}=await rq.limit(20);
          setGtvRegPending(grvRegs||[]);
        }
      }catch(e){/* gtv_registrations table may not exist yet */}
    })();
  },[user,activeSiteId,assignedSiteIds]);

  if(!s)return <Spin/>;
  const siteLabel=activeSiteId
    ?(sites[0]?.site_name||"Selected Site")
    :isUnrestricted?"All Sites"
    :assignedSiteIds.length>0?`My ${assignedSiteIds.length} Sites`:"No site assigned";

  return <div>
    <PH title={`Welcome, ${user.name.split(" ")[0]}`}
      sub={`${user.role} · ${siteLabel}`}/>

    {/* GTV Registration Pending Approvals */}
    {gtvRegPending.length>0&&<div style={{background:"#fff7ed",border:"1.5px solid #fed7aa",
      borderRadius:12,padding:"14px 18px",marginBottom:14}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,flexWrap:"wrap"}}>
        <Ic d={I.transfer} s={18} col="#ea580c"/>
        <p style={{margin:0,fontWeight:700,color:"#ea580c",fontSize:14,flex:1}}>
          {gtvRegPending.length} GTV Registration{gtvRegPending.length>1?"s":""} awaiting your approval
        </p>
        <button onClick={()=>{}} style={{background:"#ea580c",color:"#fff",border:"none",
          borderRadius:8,padding:"6px 14px",fontWeight:700,fontSize:12,cursor:"pointer",
          fontFamily:"inherit"}}>
          Review in GTV Registration →
        </button>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
        {gtvRegPending.map(r=>(
          <span key={r.id} style={{background:"#fed7aa",color:"#92400e",padding:"2px 9px",
            borderRadius:20,fontSize:11,fontWeight:600}}>
            {r.workers?.worker_name} ({r.workers?.worker_code}) · {r.trade} · {fmtMonth(r.planned_gtv_date?.slice(0,7))}
          </span>
        ))}
      </div>
    </div>}

    {/* Fix 9: GTV Expired Notification — red */}
    {gtvExpired.length>0&&<div style={{background:"#FEF2F2",border:"1.5px solid #fca5a5",
      borderRadius:12,padding:"14px 18px",marginBottom:14}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
        <Ic d={I.alert} s={18} col="#dc2626"/>
        <p style={{margin:0,fontWeight:700,color:"#dc2626",fontSize:14}}>
          ⚠ GTV Auto-Expiry — {gtvExpired.length} worker{gtvExpired.length>1?"s":""} moved to Left
        </p>
      </div>
      <p style={{margin:"0 0 8px",fontSize:12,color:"#991b1b"}}>
        The following workers exceeded 6 months on GTV and have been automatically marked as Left:
      </p>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {gtvExpired.map(w=>(
          <span key={w.id} style={{background:"#dc2626",color:"#fff",padding:"3px 10px",
            borderRadius:20,fontSize:12,fontWeight:600}}>
            {w.worker_name} ({w.worker_code}) — GTV since {w.gtv_date}
          </span>
        ))}
      </div>
    </div>}

    {/* Fix 9: GTV Warning Notification — amber */}
    {gtvWarning.length>0&&<div style={{background:"#fffbeb",border:"1.5px solid #fde68a",
      borderRadius:12,padding:"14px 18px",marginBottom:14}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
        <Ic d={I.alert} s={18} col="#d97706"/>
        <p style={{margin:0,fontWeight:700,color:"#d97706",fontSize:14}}>
          ⏰ GTV Approaching Expiry — {gtvWarning.length} worker{gtvWarning.length>1?"s":""} within 30 days
        </p>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {gtvWarning.map(w=>(
          <span key={w.id} style={{background:"#f59e0b",color:"#fff",padding:"3px 10px",
            borderRadius:20,fontSize:12,fontWeight:600}}>
            {w.worker_name} ({w.worker_code}) — {w.daysLeft} day{w.daysLeft!==1?"s":""} remaining
          </span>
        ))}
      </div>
    </div>}

    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:14,marginBottom:22}}>
      <Stat title="Active Workers" value={s.aw} icon={I.worker} color={C.green}/>
      <Stat title="Below MOQ" value={s.ls} icon={I.alert} color={C.red} warn sub="Need reorder"/>
      <Stat title="On GTV" value={s.gtv} icon={I.worker} color={C.orange}/>
      <Stat title="Active Sites" value={s.actSites} icon={I.building} color={C.accent}/>
      <Stat title="Active Stores" value={s.stores} icon={I.store} color={C.cyan}/>
      {pending>0&&<Stat title="Pending Approvals" value={pending} icon={I.approval} color={C.red} warn sub="Need your action"/>}
    </div>
    {pending>0&&<div style={{background:C.redBg,border:`1px solid ${C.red}40`,borderRadius:12,
      padding:"14px 18px",marginBottom:20,display:"flex",gap:12,alignItems:"center"}}>
      <Ic d={I.alert} s={18} col={C.red}/>
      <p style={{margin:0,fontWeight:700,color:C.red}}>
        {pending} approval{pending>1?"s":""} pending — Go to Approvals in sidebar
      </p>
    </div>}
    {sites.length===0
      ?<div style={{background:C.accentBg,border:"1px solid #BFDBFE",borderRadius:12,padding:"20px 24px"}}>
        <p style={{margin:"0 0 8px",fontWeight:700,color:C.accent}}>Getting Started</p>
        <p style={{margin:0,fontSize:13,color:"#1D4ED8",lineHeight:1.9}}>
          <b>Step 1:</b> Setup → Sites → Add project sites (WWC, Khar, Dahisar)<br/>
          <b>Step 2:</b> Setup → Stores → Add stores per site (D5 Central, E2 Substore)<br/>
          <b>Step 3:</b> Setup → Users & Roles → Add team (Jayesh, Sikhu, PP, Milton)<br/>
          <b>Step 4:</b> Labour → New Registration → Register first workers
        </p>
      </div>
      :<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20}}>
        <p style={{margin:"0 0 12px",fontWeight:700,fontSize:13}}>{siteLabel}</p>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10}}>
          {sites.map(st=>(
            <div key={st.site_id} style={{padding:"12px 14px",background:"#F8FAFC",
              border:`1px solid ${C.border}`,borderRadius:9}}>
              <p style={{margin:0,fontWeight:800,fontSize:15}}>{st.site_name}</p>
              {st.site_code&&<p style={{margin:"2px 0 6px",fontSize:11,color:C.muted}}>{st.site_code}</p>}
              {st.job_id&&<p style={{margin:"0 0 4px",fontSize:10,color:C.muted}}>Job: {st.job_id}</p>}
              <Badge color="green" dot>Active</Badge>
            </div>
          ))}
        </div>
      </div>
    }
  </div>;
};

// ─── APPROVALS ──────────────────────────────────────────────────
const Approvals=()=>{
  const {user,activeSiteId,assignedSiteIds,isUnrestricted}=useAuth();
  const [list,setList]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filter,setFilter]=useState("pending");
  const [sel,setSel]=useState(null);
  const [note,setNote]=useState("");
  const [rate,setRate]=useState("");
  const [saving,setSaving]=useState(false);
  const {show,Toast}=useToast();

  const typeLabel={debit_rate:"Debit Rate",worker_transfer:"Worker Transfer",
    material_request:"Material Request",salary_submission:"Salary Submission"};
  const typeColor={debit_rate:"red",worker_transfer:"blue",material_request:"orange",salary_submission:"green"};
  const statusColor={pending:"yellow",approved:"green",rejected:"red",cancelled:"gray"};

  const load=useCallback(async()=>{
    setLoading(true);
    let q=sb.from("approvals")
      .select("*,raiser:app_users!approvals_raised_by_fkey(name),sites(site_name)")
      .order("created_at",{ascending:false});
    if(filter!=="all") q=q.eq("status",filter);
    if(user.role==="SIC"){
      if(activeSiteId) q=q.eq("site_id",activeSiteId);
      else if(!isUnrestricted&&assignedSiteIds.length>0) q=q.in("site_id",assignedSiteIds);
    } else if(user.role==="Office") q=q.eq("approver_role","Office");
    const {data}=await q;
    setList(data||[]);setLoading(false);
  },[filter,user,activeSiteId,assignedSiteIds]);
  useEffect(()=>{load();},[load]);

  const canAct=a=>a.status==="pending"&&(
    user.role==="Admin"||
    (a.approver_role==="SIC"&&user.role==="SIC")||
    (a.approver_role==="Office"&&user.role==="Office")
  );

  const approve=async()=>{
    if(!sel)return;
    if(sel.approval_type==="debit_rate"&&!rate){show("Enter debit rate","error");return;}
    setSaving(true);
    const pl=sel.approval_type==="debit_rate"?{...(sel.payload||{}),approved_rate:parseFloat(rate)}:sel.payload;
    await sb.from("approvals").update({status:"approved",approved_by:user.user_id,
      approved_at:new Date().toISOString(),payload:pl}).eq("id",sel.id);
    // Side effects
    if(sel.approval_type==="worker_transfer"&&sel.payload?.worker_id){
      await sb.from("workers").update({current_site_id:sel.payload.to_site_id,
        current_store_id:null,status:"Active"}).eq("id",sel.payload.worker_id);
    }
    if(sel.approval_type==="debit_rate"&&sel.ref_id){
      await sb.from("worker_debit_log").update({status:"approved",
        debit_rate:parseFloat(rate),debit_amount:parseFloat(rate)*(sel.payload?.quantity||1)
      }).eq("id",sel.ref_id);
    }
    show("Approved ✓");setSel(null);setRate("");setNote("");load();setSaving(false);
  };

  const reject=async()=>{
    if(!note.trim()){show("Enter rejection reason","error");return;}
    setSaving(true);
    await sb.from("approvals").update({status:"rejected",approved_by:user.user_id,
      approved_at:new Date().toISOString(),rejection_note:note}).eq("id",sel.id);
    show("Rejected","warning");setSel(null);setNote("");load();setSaving(false);
  };

  const PayloadView=({a})=>{
    const p=a.payload||{};
    if(a.approval_type==="debit_rate")
      return <p style={{margin:"4px 0 0",fontSize:12,color:C.muted}}>
        Worker: <b style={{color:C.text}}>{p.worker_name}</b> · Material: <b style={{color:C.text}}>{p.material_name}</b> · Qty: <b style={{color:C.text}}>{p.quantity} {p.unit}</b>
      </p>;
    if(a.approval_type==="worker_transfer")
      return <p style={{margin:"4px 0 0",fontSize:12,color:C.muted}}>
        Worker: <b style={{color:C.text}}>{p.worker_name}</b> · {p.from_site} → <b style={{color:C.accent}}>{p.to_site}</b> · {p.transfer_type}
      </p>;
    if(a.approval_type==="material_request")
      return <p style={{margin:"4px 0 0",fontSize:12,color:C.muted}}>
        {(p.items||[]).slice(0,3).map((it,i)=><span key={i}>{it.material_name} ×{it.qty_requested}{i<Math.min(p.items.length,3)-1?", ":""}</span>)}
        {p.items?.length>3&&<span> +{p.items.length-3} more</span>}
      </p>;
    if(a.approval_type==="salary_submission")
      return <p style={{margin:"4px 0 0",fontSize:12,color:C.muted}}>
        Month: <b style={{color:C.text}}>{p.month}</b> · {p.worker_count} workers · ₹{p.total_amount?.toLocaleString("en-IN")}
      </p>;

  };

      {["pending","approved","rejected","all"].map(f=>(

            fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit",textTransform:"capitalize"}}>
          {f==="all"?"All":f}
        </button>
      ))}
    </div>
    {loading?<Spin text="Loading approvals..."/>
      :list.length===0?<div style={{padding:"60px",textAlign:"center",color:C.faint}}>
          No {filter!=="all"?filter:""} approvals found
        </div>
      :<div style={{display:"flex",flexDirection:"column",gap:10}}>
        {list.map(a=>(
          <div key={a.id} style={{background:C.card,border:`1.5px solid ${a.status==="pending"?C.orange+"50":C.border}`,
            borderRadius:12,padding:"16px 20px"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:12,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:200}}>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
                  <Badge color={typeColor[a.approval_type]||"gray"}>{typeLabel[a.approval_type]||a.approval_type}</Badge>
                  <Badge color={statusColor[a.status]||"gray"} dot>{a.status}</Badge>
                  {a.sites?.site_name&&<Badge color="gray">{a.sites.site_name}</Badge>}
                </div>
                <p style={{margin:0,fontWeight:700}}>{a.payload?.title||"Approval Request"}</p>
                <PayloadView a={a}/>
                <p style={{margin:"6px 0 0",fontSize:11,color:C.faint}}>
                  By <b>{a.raiser?.name||"—"}</b> · {new Date(a.created_at).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})}
                </p>
                {a.rejection_note&&<p style={{margin:"4px 0 0",fontSize:12,color:C.red}}>Reason: {a.rejection_note}</p>}
                {a.approval_type==="debit_rate"&&a.payload?.approved_rate&&

              </div>

            </div>

    <Modal open={!!sel} onClose={()=>setSel(null)} title="Review Approval" width={460}>
      {sel&&<>
        <div style={{background:"#F8FAFC",borderRadius:10,padding:"14px 16px",marginBottom:16}}>
          <Badge color={typeColor[sel.approval_type]||"gray"}>{typeLabel[sel.approval_type]}</Badge>
          <p style={{margin:"8px 0 4px",fontWeight:700}}>{sel.payload?.title}</p>
          {sel.payload&&<div style={{fontSize:12,color:C.muted,lineHeight:1.8}}>
            {Object.entries(sel.payload).filter(([k])=>!["title","approved_rate"].includes(k))
              .map(([k,v])=><div key={k}><b>{k.replace(/_/g," ")}:</b> {String(v)}</div>)}

        </div>
        {sel.approval_type==="debit_rate"&&(

        <div style={{marginBottom:16}}>

const SiteMaster=()=>{

  // Fix 3: Only Owner can create/edit sites

  const load=useCallback(async()=>{const {data:d}=await sb.from("sites").select("*").order("site_name");setData(d||[]);},[]);
  useEffect(()=>{load();},[load]);

  const save=async()=>{
    const e={};if(!form.site_name?.trim())e.site_name="Required";
    if(Object.keys(e).length){setErrs(e);return;}
    // Guard: Admin-only can deactivate a site; and only if no active workers remain
    if(editing&&form.is_active===false&&editing.is_active!==false){
      if(user.role!=="Owner"&&user.role!=="Admin"){
        show("Only Admin or Owner can deactivate a site","error");return;
      }

      const {count}=await sb.from("workers")
        .select("id",{count:"exact",head:true})
        .eq("current_site_id",editing.site_id)
        .eq("status","Active");
      if(count>0){
        show(`Cannot deactivate: ${count} active worker(s) still assigned to this site. Transfer or mark them as GTV first.`,"error");
        return;
      }
      // Check for GTV workers
      const {count:gtvCount}=await sb.from("workers")
        .select("id",{count:"exact",head:true})
        .eq("current_site_id",editing.site_id)
        .eq("status","GTV");
      if(gtvCount>0){
        show(`Cannot deactivate: ${gtvCount} GTV worker(s) still assigned. Transfer or mark as Left first.`,"error");
        return;
      }

    setSaving(true);
    const p={site_name:form.site_name.trim(),site_code:form.site_code?.trim()||null,

    show(editing?"Updated ✓":"Site added ✓");setOpen(false);load();
  };

  return <div>
    <Toast/>
    <PH title="Site Master" sub={`${data.filter(d=>d.is_active).length} active sites`}
      right={canEdit&&<Btn onClick={()=>{setEditing(null);setForm({is_active:true});setErrs({});setOpen(true);}}>
        <Ic d={I.plus} s={15} col="#fff"/>Add Site</Btn>}/>
    <Tbl cols={[
      {h:"Site Name",r:r=><span style={{fontWeight:800,fontSize:15}}>{r.site_name}</span>},
      {h:"Code",r:r=>r.site_code?<code style={{color:C.accent,fontWeight:700}}>{r.site_code}</code>:<span style={{color:C.faint}}>—</span>},
      {h:"Job ID",r:r=>r.job_id?<Badge color="purple">{r.job_id}</Badge>:<span style={{color:C.faint}}>—</span>},
      {h:"Client",r:r=>r.client_name||<span style={{color:C.faint}}>—</span>},
      {h:"Location",r:r=>r.location||<span style={{color:C.faint}}>—</span>},
      {h:"Status",r:r=>r.is_active?<Badge color="green" dot>Active</Badge>:<Badge color="gray" dot>Inactive</Badge>},
      {h:"",r:r=>canEdit&&<Btn size="sm" variant="secondary" onClick={()=>{setEditing(r);setForm({...r});setErrs({});setOpen(true);}}>Edit</Btn>},
    ]} rows={data} empty="No sites yet"/>
    <SlideOver open={open} onClose={()=>setOpen(false)} title={editing?"Edit Site":"Add Site"}>
      <Inp label="Site Name *" value={form.site_name||""} placeholder="e.g. WWC, Khar, Dahisar"
        onChange={e=>F({site_name:e.target.value})} error={errs.site_name}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="Site Code" value={form.site_code||""} placeholder="Short code e.g. WWC"
          hint="Used in reports and dropdowns" onChange={e=>F({site_code:e.target.value})}/>
        <Inp label="Job ID *" value={form.job_id||""} placeholder="e.g. UA-WWC-2025"
          hint="Unique project ID — appears on all worker registration forms"
          onChange={e=>F({job_id:e.target.value})}/>
      </div>
      <Inp label="Client / Owner Name" value={form.client_name||""} onChange={e=>F({client_name:e.target.value})}/>
      <Inp label="Location" value={form.location||""} onChange={e=>F({location:e.target.value})}/>
      <Inp label="Started On" type="date" value={form.started_on||""} onChange={e=>F({started_on:e.target.value})}/>

// ─── USER MASTER ─────────────────────────────────────────────────
const UserMaster=()=>{
  const {user,perms}=useAuth();
  if(!hasPerm(perms,"Masters","can_view"))return <NoAccess module="User Master"/>;
  // Fix 2: Only Admin can create/edit users
  const canEdit=user.role==="Admin";
  const [data,setData]=useState([]);const [sites,setSites]=useState([]);
  const [dynamicRoles,setDynamicRoles]=useState([]); // Fix 1: roles from DB
  const [search,setSearch]=useState("");const [open,setOpen]=useState(false);
  const [editing,setEditing]=useState(null);const [form,setForm]=useState({});
  const [errs,setErrs]=useState({});const [saving,setSaving]=useState(false);
  const [passMode,setPassMode]=useState(false);const [newPass,setNewPass]=useState("");
  const [emailMode,setEmailMode]=useState(false);const [newEmail,setNewEmail]=useState("");const [emailErr,setEmailErr]=useState("");
  // Fix 1: Add Role inline in UserMaster
  const [addRoleOpen,setAddRoleOpen]=useState(false);
  const [roleForm,setRoleForm]=useState({});const [roleSaving,setRoleSaving]=useState(false);
  // Fix 2: Per-user policy override
  const [overrideUser,setOverrideUser]=useState(null);
  const [overridePerms,setOverridePerms]=useState({});
  const [overrideSaving,setOverrideSaving]=useState(false);
  const {show,Toast}=useToast();const F=v=>setForm(f=>({...f,...v}));

  const load=useCallback(async()=>{
    const [{data:u},{data:s},{data:pm}]=await Promise.all([
      sb.from("app_users").select("*").order("name"),
      sb.from("sites").select("site_id,site_name").eq("is_active",true).order("site_name"),
      sb.from("policy_master").select("role_type").order("role_type"), // Fix 1
    ]);
    // Fix 1: Build dynamic roles list — DB roles + built-in roles, deduplicated
    const dbRoles=(pm||[]).map(r=>r.role_type).filter(Boolean);
    const allRoles=[...new Set([...ROLES,...dbRoles])].sort();
    setDynamicRoles(allRoles);
    // Enrich each user with their assigned site IDs from junction table
    if(u&&u.length){
      const {data:us}=await sb.from("user_sites").select("user_id,site_id,sites(site_name)");
      const usMap={};
      (us||[]).forEach(r=>{
        if(!usMap[r.user_id])usMap[r.user_id]=[];
        usMap[r.user_id].push({site_id:r.site_id,site_name:r.sites?.site_name});
      });
      u.forEach(usr=>{usr._assignedSites=usMap[usr.user_id]||[];});
    }
    setData(u||[]);setSites(s||[]);
  },[]);
  useEffect(()=>{load();},[load]);

  const save=async()=>{
    const e={};
    if(!form.name?.trim())e.name="Required";
    if(!form.role)e.role="Required";
    if(!editing&&!form.email?.trim())e.email="Required";
    if(!editing&&!form.password?.trim())e.password="Required (min 6 chars)";
    if(!editing&&form.password&&form.password.length<6)e.password="Min 6 characters";
    if(Object.keys(e).length){setErrs(e);return;}
    setSaving(true);
    try{
      let auth_id=editing?.auth_id||null;
      if(!editing){
        // Create auth user via Supabase
        const {data:au,error:ae}=await sbAdmin.auth.admin.createUser({
          email:form.email.trim(),password:form.password,email_confirm:true
        });
        if(ae)throw ae;
        auth_id=au.user.id;
      }
      const selectedSiteIds=(form._assignedSiteIds||[]).map(Number).filter(Boolean);
      const p={name:form.name.trim(),email:form.email?.trim()||editing?.email,
        phone:form.phone||null,role:form.role,
        // Keep assigned_site_id for legacy compat — use first selected or null
        assigned_site_id:(!ALL_SITE_ROLES.includes(form.role)&&selectedSiteIds.length>0)
          ?selectedSiteIds[0]:null,
        is_active:form.is_active!==false,auth_id};
      const {data:savedUser,error}=editing
        ?await sb.from("app_users").update(p).eq("user_id",editing.user_id).select().single()
        :await sb.from("app_users").insert(p).select().single();
      if(error)throw error;
      const uid=savedUser?.user_id||editing?.user_id;
      // Write junction table (delete old, insert new)
      if(uid&&!ALL_SITE_ROLES.includes(form.role)){
        await sb.from("user_sites").delete().eq("user_id",uid);
        if(selectedSiteIds.length>0){
          await sb.from("user_sites").insert(
            selectedSiteIds.map(sid=>({user_id:uid,site_id:sid,assigned_by:user.user_id}))
          );
        }
      }
      show(editing?"Updated ✓":"User created ✓ — they can now login");
      setOpen(false);load();
    }catch(err){
      // Fallback: if admin API not available, create profile only
      if(err.message?.includes("admin")||err.message?.includes("service_role")){
        const selectedSiteIdsFb=(form._assignedSiteIds||[]).map(Number).filter(Boolean);
        const p={name:form.name.trim(),email:form.email?.trim()||editing?.email,
          phone:form.phone||null,role:form.role,
          assigned_site_id:(!ALL_SITE_ROLES.includes(form.role)&&selectedSiteIdsFb.length>0)
            ?selectedSiteIdsFb[0]:null,
          is_active:form.is_active!==false};
        const {data:fbSaved,error:pe}=editing
          ?await sb.from("app_users").update(p).eq("user_id",editing.user_id).select().single()
          :await sb.from("app_users").insert(p).select().single();
        if(pe){show(pe.message,"error");setSaving(false);return;}
        // Junction table
        const fbUid=fbSaved?.user_id||editing?.user_id;
        if(fbUid&&!ALL_SITE_ROLES.includes(form.role)){
          await sb.from("user_sites").delete().eq("user_id",fbUid);
          if(selectedSiteIdsFb.length>0)
            await sb.from("user_sites").insert(selectedSiteIdsFb.map(sid=>({user_id:fbUid,site_id:sid,assigned_by:user.user_id})));
        }
        show("Profile saved. Note: User must register via Auth to complete login setup","warning");
        setOpen(false);load();
      } else {show(err.message,"error");}
    }
    setSaving(false);
  };

  const resetPassword=async()=>{
    if(!newPass||newPass.length<6){show("Min 6 characters","error");return;}
    if(!editing?.auth_id){show("User has no auth account linked","error");return;}
    setSaving(true);
    try{
      const {error}=await sbAdmin.auth.admin.updateUserById(editing.auth_id,{password:newPass});
      if(error)throw error;
      show("Password reset ✓");setPassMode(false);setNewPass("");

      show("Password reset failed: "+e.message,"error");

    setSaving(false);

  const changeEmail=async()=>{
    setEmailErr("");
    if(!newEmail.trim()){setEmailErr("Email is required");return;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(newEmail.trim())){setEmailErr("Enter a valid email");return;}
    if(!editing?.auth_id){show("User has no auth account linked","error");return;}
    setSaving(true);
    try{
      // Update in Supabase Auth (service_role bypasses confirmation)
      const {error:ae}=await sbAdmin.auth.admin.updateUserById(editing.auth_id,{
        email:newEmail.trim(),email_confirm:true
      });

      // Sync email in app_users table

      if(pe)throw pe;
      show("Email updated ✓ — user must use new email to login");

        </div>

    </div>}
  </div>;
};

    const [w,s,st,m,bl]=await Promise.all([
      // Workers: Active workers scoped to user's assigned site(s). GTV/Left always visible to permitted users.
      fetchAll(sb.from("workers").select("*,sites(site_name)").order("worker_name")),
      (async()=>{
        let q=sb.from("sites").select("site_id,site_name,job_id").eq("is_active",true).order("site_name");
        if(!isUnrestricted&&assignedSiteIds.length>0) q=q.in("site_id",assignedSiteIds);
        return q.then(r=>r.data||[]);
      })(),
      sb.from("stores").select("store_id,store_name,site_id").eq("is_active",true).then(r=>r.data||[]),
      sb.from("materials").select("material_id,material_name,unit").eq("is_active",true).order("material_name").then(r=>r.data||[]),
      sb.from("buildings").select("id,building_name,building_code,site_id").eq("is_active",true).then(r=>r.data||[]),
    ]);
    setData(w);setSites(s);setStores(st);setMaterials(m);setAllBuildings(bl);
  },[]);
  useEffect(()=>{load();},[load]);
  useEffect(()=>{
    if(form.current_site_id){
      setFormStores(stores.filter(s=>s.site_id===parseInt(form.current_site_id)));
      setFormBuildings(allBuildings.filter(b=>b.site_id===parseInt(form.current_site_id)));
      // Fix 4b: auto-fill job_no from site's job_id
      const site=sites.find(s=>s.site_id===parseInt(form.current_site_id));
      if(site?.job_id&&!form._jobNoManual) setForm(f=>({...f,job_no:site.job_id}));
    } else { setFormStores([]); setFormBuildings([]); }
  },[form.current_site_id,stores,allBuildings]);

  const save=async()=>{
    const e={};
    if(!form.worker_code?.trim())e.worker_code="Required";
    if(!form.worker_name?.trim())e.worker_name="Required";
    if(!form.trade)e.trade="Required";
    // GTV status can only be set by SIC/Admin
    if(editing&&form.status==="GTV"&&editing.status!=="GTV"&&!canSetGTV){
      e.status="Only SIC or Admin can set GTV status";
    }
    if(editing&&form.status==="Active"&&editing.status==="GTV"&&!canSetGTV){
      e.status="Only SIC or Admin can clear GTV status";
    }
    if(Object.keys(e).length){setErrs(e);return;}
    setSaving(true);
    const p={
      worker_code:form.worker_code.trim(),
      worker_name:form.worker_name.trim(),
      trade:form.trade,
      worker_type:form.worker_type||"Daily Wage",
      per_day_rate:parseFloat(form.per_day_rate)||0,
      status:form.status||"Active",
      gtv_date:(form.status==="GTV"?form.gtv_date||null:null),
      gtv_promise_date:(form.status==="GTV"?form.gtv_promise_date||null:null),
      date_joined:form.date_joined||null,
      job_no:form.job_no||null,
      current_site_id:form.current_site_id?parseInt(form.current_site_id):null,
      current_store_id:form.current_store_id?parseInt(form.current_store_id):null,
      building_id:form.building_id?parseInt(form.building_id):null,
      // Personal
      father_name:form.father_name||null,
      mother_name:form.mother_name||null,
      dob:form.dob||null,
      blood_group:form.blood_group||null,
      married:!!form.married,
      wife_name:form.wife_name||null,
      children_count:parseInt(form.children_count)||0,
      mobile:form.mobile||null,
      mobile_home:form.mobile_home||null,
      home_address:form.home_address||null,
      relative_name:form.relative_name||null,
      relative_mobile:form.relative_mobile||null,
      relative_address:form.relative_address||null,
      ref_worker_id:form._refWorkerId?parseInt(form._refWorkerId):null,
      allergy:form.allergy||null,
      // ID & Statutory
      aadhaar_number:form.aadhaar_number||null,
      pan_number:form.pan_number||null,
      pf_uan_number:form.pf_uan_number||null,
      esic_ip_number:form.esic_ip_number||null,
      esic_eligible:form.esic_eligible!==false,
      // Bank
      bank_account:form.bank_account||null,
      bank_ifsc:form.bank_ifsc||null,
      bank_name:form.bank_name||null,
      bank_account_type:form.bank_account_type||"SB",
      is_bob_midc_branch:!!form.is_bob_midc_branch,
      minimum_wage_category:form.minimum_wage_category||"unskilled",
      is_active:form.is_active!==false,
    };
    const {error}=editing?await sb.from("workers").update(p).eq("id",editing.id)
      :await sb.from("workers").insert(p);
    setSaving(false);
    if(error){show(error.message,"error");return;}

    // Fix 10: Log history events on significant changes
    if(editing){
      const today=new Date().toISOString().split("T")[0];
      const histEvents=[];
      // Status change
      if(p.status!==editing.status){
        histEvents.push({worker_id:editing.id,event_type:p.status.toLowerCase(),
          event_date:p.status==="GTV"?p.gtv_date||today:today,
          old_value:editing.status,new_value:p.status,
          changed_by:user.user_id,changed_by_name:user.name});
      }
      // Rate change
      if(parseFloat(p.per_day_rate)!==parseFloat(editing.per_day_rate)){
        histEvents.push({worker_id:editing.id,event_type:"rate_change",event_date:today,
          old_value:`₹${editing.per_day_rate}`,new_value:`₹${p.per_day_rate}`,
          changed_by:user.user_id,changed_by_name:user.name});
      }
      // Designation/trade change
      if(p.trade!==editing.trade){
        histEvents.push({worker_id:editing.id,event_type:"designation_change",event_date:today,
          old_value:editing.trade,new_value:p.trade,
          changed_by:user.user_id,changed_by_name:user.name});
      }
      // Site change
      if(p.current_site_id&&p.current_site_id!==editing.current_site_id){
        const newSite=sites.find(s=>s.site_id===p.current_site_id);
        const oldSite=sites.find(s=>s.site_id===editing.current_site_id);
        histEvents.push({worker_id:editing.id,event_type:"site_change",event_date:today,
          old_value:oldSite?.site_name||`Site ${editing.current_site_id}`,
          new_value:newSite?.site_name||`Site ${p.current_site_id}`,
          changed_by:user.user_id,changed_by_name:user.name});
      }
      if(histEvents.length) await sb.from("worker_history").insert(histEvents);
    }

    show(editing?"Updated ✓":"Worker added ✓");setOpen(false);load();
  };

  // Transfer approval
  const submitTransfer=async()=>{
    if(!txForm.to_site_id){show("Select destination site","error");return;}
    if(parseInt(txForm.to_site_id)===txWorker.current_site_id){show("Same site — select a different site","error");return;}
    setTxSaving(true);
    const fromSite=sites.find(s=>s.site_id===txWorker.current_site_id);
    const toSite=sites.find(s=>s.site_id===parseInt(txForm.to_site_id));
    const payload={worker_id:txWorker.id,worker_name:txWorker.worker_name,
      from_site_id:txWorker.current_site_id,from_site:fromSite?.site_name||"—",
      to_site_id:parseInt(txForm.to_site_id),to_site:toSite?.site_name||"—",
      transfer_type:txForm.transfer_type||"permanent",notes:txForm.notes||""};
    const {data:appr,error}=await sb.from("approvals").insert({
      approval_type:"worker_transfer",status:"pending",raised_by:user.user_id,
      site_id:txWorker.current_site_id,approver_role:"SIC",
      payload:{...payload,title:`Transfer ${txWorker.worker_name} → ${toSite?.site_name}`},
      ref_id:txWorker.id,ref_table:"workers"
    }).select().single();
    if(!error&&appr){
      await sb.from("worker_transfers").insert({worker_id:txWorker.id,
        from_site_id:txWorker.current_site_id,to_site_id:parseInt(txForm.to_site_id),
        transfer_type:txForm.transfer_type||"permanent",requested_by:user.user_id,
        approval_id:appr.id,notes:txForm.notes});
    }
    setTxSaving(false);
    if(error){show(error.message,"error");return;}
    show("Transfer request submitted — awaiting SIC approval","warning");
    setTxOpen(false);setTxForm({});
  };

  // Debit rate approval
  const submitDebit=async()=>{
    if(!dbForm.material_id||!dbForm.quantity){show("Fill all fields","error");return;}
    setDbSaving(true);
    const mat=materials.find(m=>m.material_id===parseInt(dbForm.material_id));
    const {data:debit,error}=await sb.from("worker_debit_log").insert({
      worker_id:dbWorker.id,material_name:mat?.material_name||"",
      quantity:parseFloat(dbForm.quantity),reason:dbForm.reason||"",
      raised_by:user.user_id,site_id:dbWorker.current_site_id,
      salary_month:dbForm.salary_month||null,status:"pending_approval"
    }).select().single();
    if(!error&&debit){
      await sb.from("approvals").insert({
        approval_type:"debit_rate",status:"pending",raised_by:user.user_id,
        site_id:dbWorker.current_site_id,approver_role:"SIC",
        payload:{worker_id:dbWorker.id,worker_name:dbWorker.worker_name,
          material_name:mat?.material_name,quantity:parseFloat(dbForm.quantity),
          unit:mat?.unit,reason:dbForm.reason,
          title:`Debit rate — ${dbWorker.worker_name} — ${mat?.material_name}`},
        ref_id:debit.id,ref_table:"worker_debit_log"
      });
    }
    setDbSaving(false);
    if(error){show(error.message,"error");return;}
    show("Debit rate request raised — awaiting SIC approval","warning");
    setDbOpen(false);setDbForm({});
  };

  // Reactivate worker (Left → Active)
  const submitReactivate=async()=>{
    if(!rxForm.current_site_id){show("Select a site to assign worker","error");return;}
    if(!rxForm.per_day_rate||parseFloat(rxForm.per_day_rate)<=0){show("Enter valid rate per day","error");return;}
    setRxSaving(true);
    const {error}=await sb.from("workers").update({
      status:"Active",
      is_active:true,
      current_site_id:parseInt(rxForm.current_site_id),
      current_store_id:rxForm.current_store_id?parseInt(rxForm.current_store_id):null,
      building_id:rxForm.building_id?parseInt(rxForm.building_id):null,
      per_day_rate:parseFloat(rxForm.per_day_rate),
      date_joined:rxForm.date_joined||null,
    }).eq("id",rxWorker.id);
    setRxSaving(false);
    if(error){show(error.message,"error");return;}
    show(`${rxWorker.worker_name} reactivated ✓`,"success");
    setRxOpen(false);setRxForm({});setRxWorker(null);load();
  };

  // ── Open Mark GTV modal: check unsubmitted sessions first ─────
  const openMarkGTV=async(w)=>{
    const gtvDate=new Date().toISOString().split("T")[0];
    setGtvWorker(w);
    setGtvForm({gtv_date:gtvDate,note:""});
    setOpenSessions([]);
    setSessionResolutions({});
    setGtvOpen(true);
  };

  // ── When GTV date changes, scan for unsubmitted sessions ──────
  const checkOpenSessions=async(gtv_date)=>{
    if(!gtvWorker||!gtv_date)return;
    // Find draft/submitted attendance sessions that have this worker present
    // between GTV date and today (these are days worker was at site but not yet locked)
    const today=new Date().toISOString().split("T")[0];
    const {data:recs}=await sb.from("attendance_records")
      .select("id,session_id,is_present,haajri,attendance_sessions(id,att_date,status,site_id)")
      .eq("worker_id",gtvWorker.id)
      .eq("is_present",true)
      .then(r=>{
        return {data:(r.data||[]).filter(rec=>{
          const sess=rec.attendance_sessions;
          if(!sess)return false;
          const dt=sess.att_date;
          return dt>=gtv_date && dt<=today && (sess.status==="draft"||sess.status==="submitted");
        })};
      });
    const sessions=(recs||[]).map(r=>({
      record_id:r.id,
      session_id:r.session_id,
      att_date:r.attendance_sessions?.att_date,
      status:r.attendance_sessions?.status,
      haajri:r.haajri,
    }));
    setOpenSessions(sessions);
    // Default: all Present (company owes wages)
    const defaults={};
    sessions.forEach(s=>{defaults[s.session_id]="present";});
    setSessionResolutions(defaults);
  };

  // ── Confirm Mark GTV ──────────────────────────────────────────
  const submitMarkGTV=async()=>{
    if(!gtvWorker||!gtvForm.gtv_date){show("Enter GTV date","error");return;}
    // Block if any session unresolved
    if(openSessions.some(s=>!sessionResolutions[s.session_id])){
      show("Resolve all attendance sessions before marking GTV","error");return;
    }
    setGtvSaving(true);
    const today_str=new Date().toISOString().split("T")[0];
    // 1. Update attendance records as per resolutions
    for(const s of openSessions){
      const resolution=sessionResolutions[s.session_id];
      if(resolution==="absent"){
        await sb.from("attendance_records").update({
          is_present:false,haajri:0,daily_wage:0,
          corrected_by:user.user_id,
          corrected_at:new Date().toISOString(),
          correction_note:`Worker marked GTV from ${gtvForm.gtv_date} — session corrected to Absent`,
        }).eq("id",s.record_id);
      }
      // If present — leave as-is (worker was genuinely there, wages owed)
    }
    // 2. Mark worker as GTV
    const {error}=await sb.from("workers").update({
      status:"GTV",
      gtv_date:gtvForm.gtv_date,
      gtv_promise_date:gtvForm.promise_date||null,
    }).eq("id",gtvWorker.id);
    if(error){show(error.message,"error");setGtvSaving(false);return;}
    // 3. Log history
    try {
      await sb.from("worker_history").insert({
        worker_id:gtvWorker.id,event_type:"gtv",
        event_date:gtvForm.gtv_date,
        old_value:"Active",new_value:"GTV",
        changed_by:user.user_id,changed_by_name:user.name,
        notes:gtvForm.note||(openSessions.length>0?`Urgent GTV — ${openSessions.length} session(s) resolved`:"Urgent/unregistered GTV"),
      });
    } catch(e) {}
    setGtvSaving(false);
    show(`${gtvWorker.worker_name} marked GTV ✓`,"success");
    setGtvOpen(false);setGtvWorker(null);setGtvForm({});setOpenSessions([]);
    load();
  };

  // ── GTV tab: Rejoin / Mark Left ───────────────────────────────
  const submitGtvAction=async()=>{
    if(!gtvActWorker)return;
    if(gtvActType==="rejoin"&&!gtvRejoinSite){show("Select site","error");return;}
    setGtvActSaving(true);
    const today_str=new Date().toISOString().split("T")[0];
    if(gtvActType==="mark_left"){
      await sb.from("workers").update({status:"Left"}).eq("id",gtvActWorker.id);
      try {
        await sb.from("worker_history").insert({worker_id:gtvActWorker.id,event_type:"left",
          event_date:today_str,old_value:"GTV",new_value:"Left",
          changed_by:user.user_id,changed_by_name:user.name,
          notes:gtvActNote||"Marked Left from Workers screen"});
      } catch(e) {}
      show("Marked as Left ✓","success");
    } else {
      const updates={status:"Active",current_site_id:parseInt(gtvRejoinSite),
        gtv_date:null,gtv_promise_date:null,is_active:true,date_joined:gtvRejoinDate||today_str};
      if(gtvRejoinRate&&parseFloat(gtvRejoinRate)>0)updates.per_day_rate=parseFloat(gtvRejoinRate);
      await sb.from("workers").update(updates).eq("id",gtvActWorker.id);
      try {
        await sb.from("worker_history").insert({worker_id:gtvActWorker.id,event_type:"rejoin",
          event_date:today_str,old_value:"GTV",new_value:"Active",
          changed_by:user.user_id,changed_by_name:user.name,
          notes:gtvActNote||`Rejoined at ${sites.find(s=>s.site_id===parseInt(gtvRejoinSite))?.site_name}`});
      } catch(e) {}
      show("Worker rejoined ✓","success");
    }
    setGtvActSaving(false);setGtvActOpen(false);setGtvActWorker(null);
    setGtvActNote("");setGtvRejoinSite("");setGtvRejoinRate("");load();
  };

  // ── Date helpers ──────────────────────────────────────────────
  const today_=new Date();
  const getDaysOnGTV=(d)=>d?Math.floor((today_-new Date(d))/(864e5)):null;
  const getDaysToExpiry=(d)=>{if(!d)return null;const e=new Date(d);e.setMonth(e.getMonth()+6);return Math.ceil((e-today_)/(864e5));};
  const fmtDate_=(d)=>d?new Date(d).toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"}):"—";

  // ── canEditWorker: SIC can view all sites but edit only assigned site workers ──
  const canEditWorker=(worker)=>{
    if(!canEdit)return false;
    if(isUnrestricted)return true;
    if(assignedSiteIds.length===0)return true;
    return assignedSiteIds.includes(worker?.current_site_id);
  };
  // isViewingOtherSite: user is looking at a site they are NOT assigned to
  const isViewingOtherSite=selView!=="gtv_left"&&assignedSiteIds.length>0&&!assignedSiteIds.includes(parseInt(selView));

  // ── Filtered/sorted list — view-aware ─────────────────────────
  const filtered=data.filter(d=>{
    if(selView==="gtv_left"){
      // Combined GTV + Left view — sorted by worker_code
      if(d.status!=="GTV"&&d.status!=="Left")return false;
      // SIC/unrestricted see all; others see only their assigned sites
      if(!isUnrestricted&&assignedSiteIds.length>0&&!assignedSiteIds.includes(d.current_site_id))return false;
    } else {
      // Site-specific Active workers view
      if(d.status!=="Active")return false;
      if(d.current_site_id!==parseInt(selView))return false;
    }
    if(search){
      const q=search.toLowerCase();
      const match=(d.worker_name||"").toLowerCase().includes(q)
        ||(d.worker_code||"").toLowerCase().includes(q)
        ||(d.trade||"").toLowerCase().includes(q)
        ||(d.father_name||"").toLowerCase().includes(q)
        ||(d.mobile||"").includes(search)
        ||(d.aadhaar_number||"").includes(search);
      if(!match)return false;
    }
    return true;
  });
  const sorted=[...filtered].sort((a,b)=>{
    // GTV+Left always sorted by worker_code
    if(selView==="gtv_left"){
      return (a.worker_code||"").localeCompare(b.worker_code||"");
    }
    let av,bv;
    if(sortCol==="worker_code"){av=a.worker_code||"";bv=b.worker_code||"";}
    else if(sortCol==="worker_name"){av=(a.worker_name||"").toLowerCase();bv=(b.worker_name||"").toLowerCase();}
    else if(sortCol==="trade"){av=(a.trade||"").toLowerCase();bv=(b.trade||"").toLowerCase();}
    else if(sortCol==="site"){av=(a.sites?.site_name||"zzz").toLowerCase();bv=(b.sites?.site_name||"zzz").toLowerCase();}
    else{av="";bv="";}
    if(av<bv)return sortDir==="asc"?-1:1;
    if(av>bv)return sortDir==="asc"?1:-1;
    return 0;
  });
  const paged=sorted.slice(page*PS,(page+1)*PS);

  return <div>
    <Toast/>
    <PH title="Workers"
      sub={`${data.filter(d=>d.status==="Active").length} active · ${data.filter(d=>d.status==="GTV").length} GTV · ${data.filter(d=>d.status==="Left").length} left`}
      right={canEdit&&<Btn onClick={()=>{setPendingNewWorker(true);setActive("labour");}} style={{background:"#16a34a",borderColor:"#16a34a"}}>
        <Ic d={I.plus} s={15} col="#fff"/>New Registration
      </Btn>}/>

    {/* ── View selector + search ──────────────────────────────────── */}
    <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
      {/* Dropdown: assigned sites + GTV+Left */}
      <div style={{display:"flex",alignItems:"center",gap:8,flex:"0 0 auto"}}>
        <select value={selView} onChange={e=>{setSelView(e.target.value);setSearch("");setPage(0);}}
          style={{padding:"8px 12px",border:`1.5px solid ${C.accent}`,borderRadius:8,fontSize:13,
            fontWeight:600,color:C.text,background:"#fff",fontFamily:"inherit",minWidth:180}}>
          {/* Assigned sites */}
          {sites.filter(s=>isUnrestricted||assignedSiteIds.includes(s.site_id)).map(s=>(
            <option key={s.site_id} value={String(s.site_id)}>
              {s.site_name} ({data.filter(d=>d.status==="Active"&&d.current_site_id===s.site_id).length} active)
            </option>
          ))}
          {/* Other sites visible to SIC/unrestricted */}
          {isUnrestricted&&sites.filter(s=>!assignedSiteIds.includes(s.site_id)).map(s=>(
            <option key={s.site_id} value={String(s.site_id)}>
              {s.site_name} — view only ({data.filter(d=>d.status==="Active"&&d.current_site_id===s.site_id).length})
            </option>
          ))}
          {/* GTV + Left combined */}
          <option value="gtv_left">
            GTV + Left ({data.filter(d=>d.status==="GTV"||d.status==="Left").length}) — sorted by code
          </option>
        </select>
        {/* View-only badge for other sites */}
        {isViewingOtherSite&&<span style={{background:"#FEF3C7",color:"#92400E",fontSize:11,
          fontWeight:700,padding:"3px 10px",borderRadius:20,border:"1px solid #FCD34D"}}>
          👁 View Only
        </span>}
        {selView==="gtv_left"&&<span style={{background:"#FEF3C7",color:"#92400E",fontSize:11,
          fontWeight:700,padding:"3px 10px",borderRadius:20}}>
          GTV {data.filter(d=>d.status==="GTV").length} · Left {data.filter(d=>d.status==="Left").length}
        </span>}
      </div>
      <div style={{flex:1}}/>
      <Search value={search} onChange={v=>{setSearch(v);setPage(0);}} placeholder="Search workers…"/>
    </div>

    <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
        <thead>
          <tr style={{background:"#F8FAFC",borderBottom:`2px solid ${C.border}`}}>
            {[
              {label:"Code",col:"worker_code"},
              {label:"Name",col:"worker_name"},
              {label:"Trade",col:"trade"},
              {label:"Site / Store",col:"site"},
            ].map(({label,col})=>(
              <th key={col} onClick={()=>toggleSort(col)}
                style={{padding:"10px 14px",textAlign:"left",fontWeight:700,fontSize:11,
                  color:sortCol===col?C.accent:C.muted,textTransform:"uppercase",
                  letterSpacing:".06em",cursor:"pointer",userSelect:"none",
                  whiteSpace:"nowrap"}}>
                {label}<SortIc col={col}/>
              </th>
            ))}
            <th style={{padding:"10px 14px",textAlign:"left",fontWeight:700,fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:".06em"}}>Rate</th>
            <th style={{padding:"10px 14px",textAlign:"left",fontWeight:700,fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:".06em"}}>Status</th>
            <th style={{padding:"10px 14px",textAlign:"left",fontWeight:700,fontSize:11,color:C.muted,textTransform:"uppercase",letterSpacing:".06em"}}>Actions</th>
          </tr>
        </thead>
        <tbody>
          {paged.length===0&&<tr><td colSpan={7} style={{padding:"32px",textAlign:"center",color:C.faint}}>No workers found</td></tr>}
          {paged.map((r,i)=>(
            <tr key={r.id} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?"#fff":"#FAFBFC"}}>
              <td style={{padding:"10px 14px"}}><code style={{fontWeight:700,color:C.accent,fontSize:12}}>{r.worker_code}</code></td>
              <td style={{padding:"10px 14px",fontWeight:600}}>{r.worker_name}</td>
              <td style={{padding:"10px 14px"}}><Badge color="blue">{r.trade}</Badge></td>
              <td style={{padding:"10px 14px"}}>
                <p style={{margin:0,fontSize:12,fontWeight:600}}>{r.sites?.site_name||<span style={{color:C.faint}}>—</span>}</p>
                {r.current_store_id&&stores.find(s=>s.store_id===r.current_store_id)?.store_name&&
                  <p style={{margin:0,fontSize:11,color:C.muted}}>{stores.find(s=>s.store_id===r.current_store_id).store_name}</p>}
              </td>
              <td style={{padding:"10px 14px",fontWeight:600}}>₹{r.per_day_rate||"—"}</td>
              <td style={{padding:"10px 14px"}}>
                <Badge color={SC[r.status]||"gray"}>{r.status}</Badge>
                {r.status==="GTV"&&r.gtv_date&&(()=>{
                  const d=getDaysToExpiry(r.gtv_date);
                  const days=getDaysOnGTV(r.gtv_date);
                  return <div style={{marginTop:3}}>
                    <p style={{margin:0,fontSize:10,color:C.faint}}>Since {fmtDate_(r.gtv_date)}</p>
                    {d!==null&&d<=0&&<span style={{fontSize:10,color:"#dc2626",fontWeight:700}}>EXPIRED {Math.abs(d)}d ago</span>}
                    {d!==null&&d>0&&d<=30&&<span style={{fontSize:10,color:"#f59e0b",fontWeight:700}}>{d}d to expiry</span>}
                    {d!==null&&d>30&&<span style={{fontSize:10,color:C.faint}}>{days}d on GTV</span>}
                  </div>;
                })()}
              </td>
              <td style={{padding:"10px 14px"}}>
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {canEditWorker(r)&&<Btn size="sm" variant="secondary" onClick={()=>{setPendingEditWorker(r);setActive("labour");}}>Edit</Btn>}
                  {r.current_site_id&&canEditWorker(r)&&<Btn size="sm" variant="ghost" onClick={()=>{setTxWorker(r);setTxForm({transfer_type:"permanent"});setTxOpen(true);}}><Ic d={I.transfer} s={12}/></Btn>}
                  {r.status==="Active"&&canEditWorker(r)&&<Btn size="sm" variant="ghost" onClick={()=>{setDbWorker(r);setDbForm({});setDbOpen(true);}}><Ic d={I.alert} s={12}/>Debit</Btn>}
                  {r.status==="Active"&&canSetGTV&&canEditWorker(r)&&<Btn size="sm" variant="ghost"
                    style={{color:"#f59e0b",borderColor:"#f59e0b"}}
                    onClick={()=>openMarkGTV(r)}>GTV</Btn>}
                  {r.status==="Left"&&canEditWorker(r)&&<Btn size="sm" style={{background:"#16a34a",color:"#fff",border:"none"}}
                    onClick={()=>{setRxWorker(r);setRxBuildings(allBuildings.filter(b=>b.site_id===r.current_site_id));setRxForm({per_day_rate:r.per_day_rate||"",current_site_id:r.current_site_id?.toString()||"",current_store_id:"",building_id:"",date_joined:new Date().toISOString().split("T")[0]});setRxOpen(true);}}>↑ Rejoin</Btn>}
                  {r.status==="GTV"&&canSetGTV&&canEditWorker(r)&&<>
                    <Btn size="sm" style={{background:"#16a34a",color:"#fff",border:"none"}}
                      onClick={()=>{setGtvActWorker(r);setGtvActType("rejoin");setGtvRejoinSite("");setGtvRejoinRate(String(r.per_day_rate||""));setGtvRejoinDate(new Date().toISOString().split("T")[0]);setGtvActNote("");setGtvActOpen(true);}}>↑ Rejoin</Btn>
                    <Btn size="sm" variant="ghost" style={{color:"#dc2626",borderColor:"#dc2626"}}
                      onClick={()=>{setGtvActWorker(r);setGtvActType("mark_left");setGtvActNote("");setGtvActOpen(true);}}>Left</Btn>
                  </>}
                  {/* Fix 10: History button */}
                  <Btn size="sm" variant="ghost" title="View worker history"
                    onClick={()=>{setHistWorker(r);setHistOpen(true);}}>📋</Btn>
                  <Btn size="sm" variant="ghost"
                    onClick={()=>setViewWorker(r)}>View</Btn>
                  <Btn size="sm" variant="ghost" style={{color:"#7c3aed",borderColor:"#7c3aed"}}
                    onClick={async()=>{
                      const {data:ppe}=await sb.from("worker_ppe")
                        .select("helmet_issued,belt_issued,gumboot_issued")
                        .eq("worker_id",r.id).maybeSingle();
                      setPrintWorker(ppe?{...r,...ppe}:r);
                    }}>🖨 Form</Btn>
                  {(r.entry_status==="sic_approved"||r.entry_status==="active")&&
                    <Btn size="sm" style={{background:"#6366f1",color:"#fff",border:"none"}}
                      onClick={()=>setIdCardWorker(r)}>ID Card</Btn>}
                </div>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
    <Pager page={page} total={sorted.length} size={PS} onChange={setPage}/>

    {/* Edit Worker — Quick edit SlideOver (Add uses Labour Entry wizard) */}
    <SlideOver open={open} onClose={()=>setOpen(false)} title={"Edit Worker — "+(editing?.worker_name||"")} width={580}>

      <Divider label="Job Details"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="Worker Code *" value={form.worker_code||""} placeholder="e.g. UA-00001"
          error={errs.worker_code} onChange={e=>F({worker_code:e.target.value})}/>
        <Inp label="Job No." value={form.job_no||""}
          hint="Auto-fills from site's Job ID when site is selected"
          placeholder="Select site to auto-fill"
          onChange={e=>F({job_no:e.target.value,_jobNoManual:true})}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Sel label="Site *" value={form.current_site_id||""}
          options={sites.map(s=>({v:s.site_id,l:s.site_name+(s.job_id?` [${s.job_id}]`:"")}))}
          onChange={e=>F({current_site_id:e.target.value,current_store_id:"",building_id:"",_jobNoManual:false})}/>
        <Sel label="Building / Tower" value={form.building_id||""}
          placeholder={form.current_site_id?"— Optional —":"Select site first"}
          options={formBuildings.map(b=>({v:b.id,l:b.building_name+(b.building_code?` (${b.building_code})`:"")})) }
          onChange={e=>F({building_id:e.target.value})}/>
      </div>
      <Inp label="Date of Joining *" type="date" value={form.date_joined||""} onChange={e=>F({date_joined:e.target.value})}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Sel label="Trade / Designation *" value={form.trade||""} options={TRADES}
          onChange={e=>F({trade:e.target.value})} error={errs.trade}/>
        <Sel label="Worker Type" value={form.worker_type||"Daily Wage"}
          options={["Daily Wage","Fixed Salary","Contract"]} onChange={e=>F({worker_type:e.target.value})}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="Rate per Day (₹)" type="number" value={form.per_day_rate||""}
          onChange={e=>F({per_day_rate:e.target.value})}/>
        <div>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>Status</label>
          <select value={form.status||"Active"} onChange={e=>F({status:e.target.value})}
            disabled={!canSetGTV&&(form.status==="GTV"||editing?.status==="GTV")}
            style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${errs.status?C.red:C.border}`,borderRadius:8,fontSize:14,color:C.text,background:"#fff",fontFamily:"inherit"}}>
            {["Active","GTV","Transferred","Left"].map(s=><option key={s} value={s}>{s}</option>)}
          </select>
          {!canSetGTV&&<p style={{margin:"3px 0 0",fontSize:10,color:C.faint}}>GTV change: SIC/Admin only</p>}
        </div>
      </div>
      {form.status==="GTV"&&canSetGTV&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
          <Inp label="GTV Date" type="date" value={form.gtv_date||""} onChange={e=>F({gtv_date:e.target.value})}/>
          <Inp label="Promise Date (informational)" type="date" value={form.gtv_promise_date||""}
            hint="Date worker said they will return — display only, no auto action"
            onChange={e=>F({gtv_promise_date:e.target.value})}/>
        </div>
      )}

      <Divider label="Personal Details"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 10px"}}>
        <Inp label="First Name *" value={form.worker_name?.split(" ")[0]||""} error={errs.worker_name}
          onChange={e=>{const p=form.worker_name?.split(" ")||[];F({worker_name:[e.target.value,...p.slice(1)].join(" ").trim()});}}/>
        <Inp label="Father Name" value={form.father_name||""}
          onChange={e=>F({father_name:e.target.value})}/>
        <Inp label="Surname" value={form.worker_name?.split(" ").slice(-1)[0]||""}
          onChange={e=>{const b=form.worker_name?.split(" ").slice(0,-1).join(" ")||"";F({worker_name:(b+" "+e.target.value).trim()});}}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="Mother Name" value={form.mother_name||""} onChange={e=>F({mother_name:e.target.value})}/>
        <Inp label="Date of Birth" type="date" value={form.dob||""} onChange={e=>F({dob:e.target.value})}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0 10px"}}>
        <div>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>Married</label>
          <div style={{display:"flex",gap:6}}>
            {["Yes","No"].map(v=>(
              <button key={v} onClick={()=>F({married:v==="Yes"})}
                style={{flex:1,padding:"8px",borderRadius:8,border:`1.5px solid ${form.married===(v==="Yes")?C.accent:C.border}`,
                  background:form.married===(v==="Yes")?C.accent:"#fff",color:form.married===(v==="Yes")?"#fff":C.text,
                  fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>{v}</button>
            ))}
          </div>
        </div>
        {form.married&&<Inp label="Wife Name" value={form.wife_name||""} onChange={e=>F({wife_name:e.target.value})}/>}
        <Inp label="Children" type="number" value={form.children_count||""} onChange={e=>F({children_count:e.target.value})}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Sel label="Blood Group" value={form.blood_group||""}
          options={[{v:"",l:"— Not Known —"},...["A+","A-","B+","B-","O+","O-","AB+","AB-"].map(o=>({v:o,l:o}))]}
          onChange={e=>F({blood_group:e.target.value})}/>
        <Inp label="Mobile (Personal)" value={form.mobile||""} onChange={e=>F({mobile:e.target.value})} placeholder="Mob (P)"/>
      </div>
      <Inp label="Mobile (Home / Village)" value={form.mobile_home||""} onChange={e=>F({mobile_home:e.target.value})} placeholder="Mob (H)"/>
      <div style={{marginBottom:14}}>
        <label style={{display:"block",fontSize:11,fontWeight:700,color:C.muted,marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>Home Address</label>
        <textarea value={form.home_address||""} onChange={e=>F({home_address:e.target.value})} rows={2}
          placeholder="Full home / village address..."
          style={{width:"100%",padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:14,fontFamily:"inherit",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
      </div>
      <RefWorkerSearch form={form} F={F} allWorkers={data} sites={sites}/>
      <Inp label="Known Allergies / Medical Notes" value={form.allergy||""} onChange={e=>F({allergy:e.target.value})} placeholder="e.g. Dust allergy, None"/>

      <Divider label="Identity & Statutory"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="Aadhaar Number" value={form.aadhaar_number||""} onChange={e=>F({aadhaar_number:e.target.value})} placeholder="XXXX XXXX XXXX"/>
        <Inp label="PAN Number" value={form.pan_number||""} onChange={e=>F({pan_number:e.target.value.toUpperCase()})} placeholder="ABCDE1234F"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="PF UAN Number" value={form.pf_uan_number||""} onChange={e=>F({pf_uan_number:e.target.value})}/>

      </div>
      <Tog label="ESIC Eligible" checked={form.esic_eligible!==false} onChange={v=>F({esic_eligible:v})}/>

      <Divider label="Bank Details"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="Bank Account Number" value={form.bank_account||""} onChange={e=>F({bank_account:e.target.value})}/>
        <Inp label="IFSC Code" value={form.bank_ifsc||""} onChange={e=>F({bank_ifsc:e.target.value.toUpperCase()})}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
        <Inp label="Bank Name" value={form.bank_name||""} onChange={e=>F({bank_name:e.target.value})}/>
        <Sel label="Account Type" value={form.bank_account_type||"SB"} options={["SB","Current"]}
          onChange={e=>F({bank_account_type:e.target.value})}/>
      </div>
      <Tog label="BOB MIDC Branch" sub="Format 1 salary letter" checked={!!form.is_bob_midc_branch}
        onChange={v=>F({is_bob_midc_branch:v})}/>
      <Tog label="Worker is Active" checked={form.is_active!==false} onChange={v=>F({is_active:v})}/>

      <div style={{display:"flex",gap:8,paddingTop:8}}>

        <Btn variant="ghost" onClick={()=>setOpen(false)}>Cancel</Btn>
